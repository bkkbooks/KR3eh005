front:
  text: 自序文以載道醫雖小道亦道也則醫書亦載道之車也顧其文繁而義晦讀者卒未易得其指歸初學苦之瑤少多病失學於聖賢大道無所得雅不欲為浮靡之辭以貼虛車誚因念道之大者以治心其次以治身莊子曰哀莫大於心死而身死次之醫所以治身也身死則心無所寄固小道中之大者爰取少日所誦岐黃家言芟其繁蕪疏其湮鬱參以己見䪥為一書用以階梯初學非敢謂是載道之車欲使升車者藉此以登如履碥石云耳故以碥名編或曰方今景岳全書盛行桂附之烈等於崐岡子作焦頭爛額客數矣人咸謂子非醫病實醫醫是書出其時醫之藥石歟碥當作砭予笑而不敢言乾隆十六年歲次辛未季春望日南海何夢瑤書於樂只堂趙序予友何君西池年三十八始成進士其成晚故得博通諸藝能醫尤其篤嗜而專精者也然自其為諸生時即文名藉甚學士惠公稱為南海明珠於是西池之見知於人者獨著於詩文余技遂為所掩己酉選拔策詢水利西池以醫喻娓娓且千言學士顧公亟賞之拔置第一予亦與選得讀其文然後知西池之旁通於醫而猶未悉其妙也西池聯捷後尋觀政西粵歷宰義寧陽朔岑溪思恩諸邑遷牧遼陽則又但以善政聞然其在思恩也癘疫流行西池廣施方藥飲者輒起制府策公下其方於諸邑存活甚眾遼陽民王洪病風年餘狂易多力投入秫火中焦爛無完膚敷以藥數日愈於是西池坐廳事呼伍伯縛王洪庭柱間且詈且歌州人聚觀如堵西池先威以刑令怖慴旋予湯液兩人持耳灌之有頃暴吐下其病遽失人咸驚為神嗣是西池之醫遂稍稍著矣庚午夏予內子病兩月不少間諸醫皆束手已治木矣適西池請告歸里亟延診先後處大承氣白虎小柴胡數十劑效若桴鼓予謂西池諸醫皆言陽虛宜扶陽非參附勿用子獨反之何也曰此非粗工所知且此輩妄引易義動言扶陽抑陰夫易陽君子陰小人故當扶抑醫言陰陽俱氣耳氣非正則邪正虛無論陰陽均當扶邪勝無論寒熱均當抑何得牽西補東耶人以溫補為起死回生而不識熱伏於內而妄投桂附竟不明其誤服殺人而承氣湯大黃樸硝即回陽之上品故能扶補瀉初無定名蓋視病之寒熱以為去留今不問何證概從溫補何異懲溺而水趨火滅不亦惑乎又曰醫有偏黠庸醫不知溫補之能殺人也以為平穩而用之黠醫知溫補之能殺人而人不怨以為可以藏拙而用之於是景岳書徒遍天下而河間丹溪之學絕矣距邪閒正吾能己乎西池之言若此然則西池之醫之著於天下也所繫固不少矣西池所輯醫書凡數種向欲梓以問世而不名一錢此編乃朋好所醵刻先行者工竣命予弁其端予惟西池自序簡括精妙無可復益聊綴拾其言論案驗之未著於篇者告諸世使知西池之所長不獨在文章政事間而象著之以嘉惠天下也是為序賜進士出身截選知縣年眷同學弟趙林臨拜識辛序王金壇先生證治準繩膾炙人口予友何西池稱為近代醫書之冠慮其奧博難讀因作醫碥以羽翼之其書文約而義該深入而顯出當與準繩並傳無疑蓋皆以文學名儒而發軒岐之秘宜其足以行遠也獨是金壇之作準繩也以罷黜而西池之作醫碥也以幽憂之疾倘所謂窮愁著書者非耶因念西池少時妻子僕婢財十數人有田數十畝足供饘粥意興甚豪酒後耳熱縱談古今世事燭屢跋不肯休又嘗與予極論西曆平孤三角八線等法及填詞度曲之理片言印合欣然起舞初不知人世有窮愁事一行作吏田園荒蕪而食指且半乾於是引疾里居懸壺自結曩時豪興索然矣予嘗過其家老屋數椽僅蔽風雨琴囊藥里外無長物有數歲兒破衣木履得得晴階間遽前揖人婉孌可愛問之則其孫阿黃也予謂西池同年中惟君與孔兼容能醫又皆工詩而其窮亦相若兼容自宜春解組歸為小兒醫日獲百錢即彈琴歌商浩浩自得豈醫與詩皆能窮人耶抑廉吏固不可為耶今兼容補官有日矣西池尚高臥不起窺其意似欲以醫終老者然則貧固其所甘而窮愁著書又其所樂者矣或曰多文為富西池嘗舉鴻博著述追步金壇何富如之是編又繼準繩行世可以不朽視富貴利達朝榮夕萎者所得孰多宜西池不以彼易此也噫知言哉賜進士出身翰林院檢討加一級前翰林院漢書庶吉士壬子科鄉試福建文闈同考官己酉科解元年眷弟辛昌五頓首拜撰

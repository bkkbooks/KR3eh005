body:
  text: 凡例一論證須明其所以然則所當然者不言而喻茲集務窮其源故論證詳而系方略如怒太息等篇並不系一方但明其理則方在其中如必欲考古人成法於準繩等書檢求可也一論中所引古人成說欲令讀者易曉不無修飾之處即非古人原文故多不著其名氏非掠美也諒之一議論多出臆見間與古人牴牾不避不敏求正有道幸恕狂瞽一河間言暑火乃與仲景論風寒對講丹溪言陰虛乃與東垣論陽虛對講皆以補前人所未備非偏執也後人動議劉朱偏用寒涼矯以溫補立論過當遂開酷烈之門今日桂附之毒等於刀鋸夢瑤目睹時弊不得不救正其失初非偏執讀者幸勿以辭害意一是集宦遊所作自粵西而遼左十餘年來風鷁煙江霜輪沙磧偶有所得隨付小史錄之以故體裁無定亦欲改從畫一而多事倉卒未能也一論目方目各下注頁數而方目之前復冠以門目兩頁下注方目頁數使先得方目頁數而後查諸方頁數皆以便檢尋也一諸方有在論外者如關格門方全在論外蟲門取蟲積二方在論外是也檢方目即得一論中主治諸方隸別門者註明見某門字樣其不注者即本門方或雖隸別門而一篇之中重出數見亦但於首見者注之余不復注一方下例系主治以著本方之功即以明用藥之理知某藥為某病設也凡品味厖雜者必所治之證不一丹溪所謂雜合之病須用雜合之藥治之也本宜備錄以鋟板力絀刪之用方者當因病加減更詳考原方主治為佳諸方多從準繩錄入按門索之一藥品分兩輕重古今不同炮製亦異當酌宜用之一此書只論雜證尚有傷寒論近言婦科輯要幼科輯要痘疹輯要本草韻語針灸吹雲集等書俟續刻呈教一五卷四診䗋思恩時輯以教邑醫者本自為一書今附醫碥之末頗多改竄與舊本岐出當以今刻為定

body:
  text: 卷之五四診望色察面庭即天庭以候首面闕即眉心以候肺闕以上候咽喉下極即山根以候心年壽即鼻柱以候肝其左右以候膽面王即準頭以候脾方上即鼻隧以候胃人中以候膀胱子宮面中央顴骨之下迎香之外以候大腸大腸之旁頰之上也以候腎面王以上兩顴內鼻準旁以候小腸上本內經後人又以天庭候心左頰候肝右頰候肺鼻候脾頦候腎參而查之可也面有青黃赤白黑以應五臟岐伯曰生於心如以縞素帛也裹朱生於肺如以縞裹紅紅謂淡紅生於肝如以縞裹紺青含赤色生於脾如以縞裹栝蔞實黃含赤色生於腎如以縞裹紫黑含赤色按五色俱帶赤乃血之本色然色為精神所發現欲藏不欲露故如縞裹若露則為臟氣失守精氣外浮中臟告竭矣此為無病之色若病而色見則以相生者吉相剋者凶如脾病泄瀉而見赤色為相生見青色為相剋又秋見黃色為相生見赤色為相剋也滋潤而明亮者吉枯稿而晦滯者凶即內經所謂赤欲如白裹朱不欲如赭之意面不潤責之水無光責之火晦滯之色上行者病益甚審其色之尖鋭向上知為上行向下知為下行下文內走外走等仿此下行如雲散者病漸已女子色見右為逆左為從男子反此色散未聚病亦未聚凡色明顯者為新病濁晦者為久病色從面內走面外病亦自內走外左右上下以此推之青色屬肝主風主驚主寒主痛面唇青者寒極也青而脫色脫色謂面無血色神采脫也驚恐也青而黑者多寒痛青而白者多虛風以上皆寒證蓋肝陽不足陰寒內凝脾失其運行之權故多腹中冷痛吐泄之疾青而赤者為肝火青赤而晦滯者為鬱火以上熱證赤色屬心主熱心熱者庭先赤脾熱者鼻先赤肺熱者右頰先赤腎熱者頤頦先赤肝熱者左頰先赤面色緣緣正赤者陽氣怫鬱在表汗不徹故也此傷寒太陽經表熱證面赤而潮熱譫語者胃實也此傷寒陽明腑實熱證面赤如微酣或兩顴淺紅嬌嫩遊移不定不盡面通紅乃陰證戴陽必下利清穀或小便清白或淡黃脈沉細或浮數無力按之欲散雖或煩躁發熱欲坐臥泥水中外熱甚也渴欲飲水或咽喉痛證似實熱而索水置前卻不能飲肌表雖大熱而重按之則不熱或反覺冷且兩足必冷須審此傷寒直中寒證又有面赤煩躁遍舌生瘡生刺舌斂縮如荔枝狀或痰涎湧盛喘急小便頻數口乾引飲兩唇焦裂喉間如煙火上攻兩足心如烙脈洪數無論按之有力捫其身烙手此腎虛火不歸元所致證最難辨但病由內傷其來以漸是乃乾柴烈火不戢自焚與上所列三證固自不同也又有久病虛人兩顴至午後帶赤者此則陰虛火動之常證雖未至如上證之烈亦內傷也以上二證皆虛熱赤色出於兩顴狀若裝朱大如拇指者病雖愈必死又熱病無汗顴赤死蓋顴以骨為主骨屬腎水惡反克也黃色屬脾主濕熱食積黃而明如橘子者濕少熱多也黃如煙燻暗濁不明濕多熱少也濕土瘀濁黃而黯淡者則為寒濕黃而枯癯者胃中有火黃而色淡胃氣虛黃而青黑者為木剋土肝陽不升脾為寒滯水無制脾不運則水停白色屬肺主氣血虛寒縱有虛火斷無實熱白而無神者為肝泄脫血白而青者氣寒血凝白而淖澤肺胃之充也白而肥有痰白而瘦爪甲鮮赤氣虛有火也黑色屬腎主寒主痛青黑為陰寒焦黑齒稿為腎熱黑而枯夭見於耳目口鼻不論何處俱不吉若見於天庭大如拇指必不病而卒死陰晦之色加於陽之高位故死面慘不光者陰寒也面光不慘者陽熱也面如錦紋者陽毒也面垢如油喘促者暑病也凡暴感客邪之色不妨昏濁壅滯病久氣虛只宜瘦削清癯若病邪方鋭而青白少神氣羸久困而嫵媚鮮澤咸非正色五色之中青黑黯慘無論病之新久總屬陽氣不振惟黃色見於面目而明潤者向愈之候也此經所以謂面黃目青或赤或白或黑皆不死以黃色在也面青目赤或黑面赤目白或青面黑目白皆死以無黃色也按面目色同為順色異為逆説本華他則此所謂不死者但不死耳非順也察目凡目明能識見者可治昏不識人或反目上視或瞪目直視或目睛正圓或戴眼反折或眼胞陷下者皆不治也凡開目而欲嚮明欲見人多言好動者陽證也陽盛欲以動而散其熱也又有病熱而惡日與火者惡其助熱也目閉惡明不欲見人懶言惡動者陰證也陰盛則陽衰故惡動散又有陽虛而喜見日光者樂其助正也目痛為陽明表證目赤為經絡熱盛目黃頭汗欲發黃白睛黃欲發疸目睛不了了不了了猶不瞭瞭火熏而朦朧也為胃府實睛不和黑白不分明也似即俗所謂半朧眼為內熱甚目眩為痰火眼胞微腫為有水目下灰色為寒飲眼胞上下如煙煤者寒痰眼黑頰赤為熱痰眼黑而行走艱難呻吟者痰飲入骨也眼黑而面赤土色四肢痿痹屈伸不便者風痰也目眥黃者為病欲愈目痛赤脈從上而下者太陽病足太陽經為目之上綱從下而上者陽明病足陽明經為目之下綱從外眥走內者少陽病足少陽經行鋭眥之後瘰癧發寒熱赤脈上下至瞳子見一脈一歲死邪鋭而專也見一脈半一歲半死見二脈二歲死二脈半二歲半死三脈三歲死邪散而緩也察耳耳輪紅潤者生乾枯塵垢而青黑者為腎敗死耳中策策痛而耳輪黃者病名黃耳類傷寒也風入於腎卒然發熱惡寒脊強背直如痙狀察鼻鼻頭色青腹痛苦冷者死中寒暴證微黑而澤者水氣黑而枯燥者房勞黑黃而亮者瘀血黃色者小便難濕熱不泄故瘀而黃鮮明者有留飲津液不行濕生熱故色黃而明潤赤為肺熱鼻孔乾燥目瞑漱水不咽者欲衄也鼻孔黑如煙煤而燥者陽毒也黃黑枯稿為脾火津涸大便燥結鼻塞涕濁者風熱也白為氣虛為亡血鼻孔冷滑而黑者陰毒也鼻孔煽張者肺絶不治鼻上汗出如珠為心脾痛極男子色見於準頭為小腹痛為卵痛其圓直其色直垂而繞於面王之下為莖痛狐疝㿉陰之屬也女子為膀胱子處之病散為痛色散但為氣痛無積聚摶色若結滯為聚血凝氣滯方圓左右以積之形位為言各如其色形察唇齒唇焦乾燥裂為脾熱經謂脾胃之華在唇四白四白者唇之四際白肉也唇赤腫為胃濕熱鮮紅為火盛淡白為氣虛淡而四繞起白暈為亡血青黑為寒唇青舌卷或還口黧黑唇口動顫不止者皆死證也唇下有瘡名狐上有瘡名惑齒稿者腎熱前板齒燥者中暑察舌舌青或青紫而冷滑者為寒證青紫而焦燥或脹大或捲縮者為熱證寒甚亦捲縮筋脈得寒而收引也然必不焦燥凡舌強硬短縮而神氣昏亂語言不清者死亦有痰證而舌本硬及縮者不在此論熱病舌本爛熱不止者死陰陽易病舌出數寸者死傷寒熱止在表者舌無胎熱邪傳裡則胎漸生由白而黃而黑由潤而燥而拆裂由滑而澀而芒刺皆以熱之淺深微甚為層次胎因內熱致脾氣閉滯不行飲食津液停積於內故胎見於外若脾氣不滯則飲食運化津液流通雖熱甚不必有胎也此理宜知略具如下純白舌傷寒白滑胎舌為熱初入內猶帶表證表劑中加清涼之品又有胃中虛冷寒飲結聚膈上成白滑胎者又脾閉甚則白如積雪又有臟結證詳傷寒論近言而胎白滑者須辨溫熱病一發便壯熱煩渴舌正赤而有白胎者雖滑即當用白虎治其內熱而表自解切不可用表藥時疫初起胎白如積粉白雜色舌傷寒熱入胃則白胎中黃白多黃少而滑尚帶表證仍宜於解表藥中加清涼之品黃多白少乾澀無表證者或清或下有夾食痰血而滑須下者參下黃雜色舌條若燥裂生芒刺則必下無疑溫熱時疫則雖潤滑亦宜涼膈白虎承氣之屬以清熱攻裡萬不可發表也純黃舌潤滑者須審若熱尚未結聚不可便攻若在夏月便宜攻下不必待胎燥乃攻也黃雜色舌根黃硬尖白中不甚干亦不滑短縮不能伸出譫妄煩亂者此挾痰食大承氣加生薑半夏治之舌色青紫而胎卻黃厚甚則紋裂但覺口燥舌仍不幹者此陰證挾食也脈或沉細而伏或虛大而澀按其心下或臍旁硬痛而時失氣者急宜大承氣另煎生附子佐大黃下之脈虛大者黃龍湯下之熱極煩躁者更加生地麥冬夏月尤宜此證若胎黃不燥在冬月宜附子理中湯合小承氣湯下之大抵舌有積胎雖見陰象亦是虛中有實急當攻下但與常法不同耳又中宮有痰飲水血者舌多不燥不可因其不燥而延緩至誤也中暑證夾血多有中心黑潤者勿誤作陰證治之純黑舌遍舌黑胎夏月或可救以炎令邪火內外燔灼黑胎易生也猶可攻治冬月得此舌必死黑雜色舌中黑邊黃承氣下之邊白大柴胡下之若生芒刺裂瓣不論邊系何色但看瓣底色紅活者急下之如俱黑者不治若腐爛捲縮亦不治發疱生蟲雖為濕亦屬肝傷俱為危候大抵尖黑尚輕根黑則重夏月中暑多黑舌邊紅中黑乾者宜白虎湯以上皆邪熱實熱然亦有虛熱者舌心雖黑或灰黑而無積胎舌形枯瘦而不甚赤其證煩渴耳聾身熱不止大便五六日或十餘日不行腹不硬滿按之不痛神不昏不得睡稍睡或呢喃一二句或帶笑或嘆息此為津枯血燥之虛熱宜大料六味丸合生脈散炙甘草湯誤與承氣必死若直中寒證始病不發熱舌心便黑色非由自黃變化雖黑而滑舌亦瘦小當急溫之赤色舌溫熱時疫熱毒內盛潤滑者未可便下黃連解毒白虎等湯干而有黃白黑等胎及芒刺紋裂坑爛起疱者皆下證也一種柔嫩如新生望之似潤而燥涸殆甚者為妄行汗下津液竭所致多不治宜生脈散等又紅痿舌痿軟不能動也及紅細枯長舌並難治紫色舌者兼酒毒所致其色必深紫而赤且乾涸若淡紫而帶青滑則又為直中寒證矣須辨灰色有寒有熱醬色焦黃為醬色夾食熱證也藍色木剋土敗之色及妊娠各舌面赤舌青子死母活俱青則俱死宜潤澤忌枯敗並當詳審總之舌胎不論何色但乾燥者必屬熱惟潤滑者須審察身身輕自能轉側者可治沉重不能轉側者難治足冷惡寒蜷臥向壁為陰證陽病者不能俯陰病者不能仰身目齒爪俱黃者疸病也脾病者色黃而肉蠕動肺病者色白而毛敗頭重視身此天柱骨倒也死搖頭以手捫腮者齒痛也坐而伏者短氣也身汗如油形體不仁乍靜乍亂喘而不休者死肉形脫者脈雖調亦死皮膚潤澤者生枯燥者死皮膚著者死皮膚枯燥著骨也察手足手足冷名厥在傷寒則有寒有熱初病即手足冷者直中寒證也爪甲青冷或過肘膝且常冷若先發熱以漸入內而手足乃冷者傳經熱證也爪甲紅乍冷乍溫不過肘膝此仲景之説也在雜證則手足冷者名寒厥手足熱者名熱厥此內經之説也詳厥逆門但足冷手不冷身發熱者為外感夾陰宜五積散不可汗下及小柴胡以有黃芩苦寒也又夏暑病濕溫人必足冷手溫多汗妄語宜蒼朮白虎合五苓不可用五積助熱有兩手逆冷而兩足熱如火烙者此陰氣衰於下則陽下乘之而足熱陽氣衰於上則陰上干而手冷陰陽痞隔之兆也若初起而腳膝耎弱或足脛赤熱腫痛當從腳氣治之手足冷至節而心痛甚者名真心痛旦發夕死循衣摸床撮空理線揚手擲足此神去而魂亂也死坐而下一腳者腰痛也坐久腰痛故下一腳以伸之行遲者表強也風邪束其筋絡故步履不隨肝熱者色蒼而爪枯搐搦者肝邪也搐抽搐手足頻頻伸縮也搦十指頻頻開合拳緊握也經曰肝病變動為握瘛瘲者虛而有風也瘛筋脈收引瘲筋脈弛縱脈急者尺之皮膚亦急急緊急也脈緩者尺之皮膚亦緩緩縱緩也脈小者尺之皮膚亦減而少氣脈大者尺之皮膚亦賁音忿大而沸起也而起脈滑者尺之皮膚亦滑脈澀者尺之皮膚亦澀尺膚滑而澤脂者風也熱風鼓其血液外見故滑澤尺膚澀者風痹也血少則內熱熱則生風尺膚粗如枯魚之鱗者水泆同溢飲也脾土衰而肌肉消水反乘之也尺膚熱甚脈盛燥者溫病也尺膚寒甚脈小者泄少氣掌中熱者胸中熱寒者胸中寒掌中為三陰脈所聚其臟皆在胸中臂多青脈曰脫血張景嶽云血脫則氣去寒凝故色見青黑言臂則他可知即診尺之義愚按此説乃血脫後方見青脈也然有先見青脈而後脫血者則氣虛寒凝不能攝血耳聞聲肝聲呼怒則叫呼或驚而呼也心聲言洪範言屬火笑狂笑為實熱微笑為虛熱脾胃聲歌輕顫如歌又為噦噦乾嘔詳嘔吐肺聲哭又為咳腎聲呻又為欠為嚏陽未靜而陰引之故欠陽欲達而陰發之故嚏聲清朗如平日者吉聲濁鼻塞者傷風也聲如甕中出者混濁不清之意必中濕也攢眉呻吟者痛也暴啞者風痰伏火或怒喊哀號所致也聲啞如破而咳者客寒裹熱也傷寒壞病聲啞而唇口有瘡者狐惑也聲啞形羸者勞瘵肺有瘡也驟然聲喑咽痛如刺而不腫不赤不發熱二便清利陰寒也驟然音喑而喉頸亦腫脹閉或發熱便祕龍火也鼻息鼾睡者風溫也診時吁氣者鬱結也噫氣以手撫心者中脘痛也搖頭言者里痛也少氣不足以息者氣虛也平人無寒熱而短氣不足以息者痰火也言而微終日乃復言者正氣奪也語言謇澀者風痰也言驟及多言者火也言語善惡不避親疏衣被不斂者神明亂也譫語者邪氣實也鄭聲者正氣虛也問證問寒熱凡平素無病而突然惡寒發熱多屬外感必有頭痛體痛拘急無汗或有汗等表證浮緊浮大等表脈可據若無表證表脈病由漸致者屬內傷外感則寒熱齊作而無間內傷則寒熱間作而不齊外感惡寒雖近烈火不除必表解乃已內傷惡寒得就溫暖即解外感惡風乃不禁禁禁當也一切風寒內傷惡風惟惡夫些小賊風又外感證顯在鼻故鼻息氣促而鳴壅盛有力不若內傷之息短而氣乏內傷證顯在口故口中不和飲食無味不若外感初則知味傳裡則不能食也又外感熱傳裡渴其飲甚多不若內傷液虧之渴略飲即止又外感則邪氣有餘故發言壯厲先輕而後重內傷元氣不足故出言懶怯先重而後輕又外感頭痛常常而痛內傷頭痛時作時止也外感手背熱手心不熱亦有背熱於腹內傷手心熱手背不熱亦腹熱於背背微惡寒者陽微不能勝陰也陽明中暍亦有此宜白虎加人參湯勞役內傷亦有此必乍寒乍止為陽虛內熱升陽散火湯濕痰證亦有此必身重體痛導痰湯凡脾胃素虛之人暑月飲食生冷冰水寒氣蓄聚陰上乘陽多見背寒冷如掌大宜溫惡寒蜷臥不發熱者陰證也壯熱而渴不惡寒反惡熱者溫熱證也來往寒熱有定期者瘧也無定期者傷寒少陽經證及內傷虛證也潮熱在日晡所者傷寒陽明證也在子午者內傷證問頭身傷寒太陽經頭痛自腦後上至巔頂項強腰脊痛陽明頭痛在額前連目珠鼻孔干不眠少陽頭痛在兩角及耳聾脅痛厥陰頭痛在巔頂收引頭角脈沉弦手足厥冷此為在經當歸四逆湯若在裡則乾嘔吐涎沫吳茱萸湯太陰少陰脈不上頭無頭痛證然太陰中濕亦頭痛鼻塞吐痰腹滿自利要知是濕濁之氣上干清陽之分使然耳少陰中寒亦有頭痛連腦齒爪甲青此真頭痛不治亦寒邪上攻使然溫熱病時疫病凡一切內火上炎之證皆頭痛內傷火升新産血虛皆有頭痛但時痛時止而無腦後痛者蓋火炎則痛在兩角血虛則痛連魚尾以其自內達外必由少陽是以痛見兩角者則有少陽風熱與虛火之別若痛在額前者亦有陽明與食積之殊其見腦後者必太陽無疑也頭痛如破者風火相煽也眩暈者痰火上升也頭傾視深目陷精神奪矣耳聾耳疼胸脅痛寒熱口苦者少陽經證耳聾舌卷唇青為直中厥陰耳鳴及痛火上衝也耳聾叉手冒心者汗多而陽虛也耳聾者耳內無聲竅常閉而不聞也耳鳴者耳內有聲竅不閉時聞時不聞也火動而上衝則鳴而不聞外聲火靜氣下則不鳴而聞面熱者足陽明病邪在肺則皮膚痛喘咳動肩背邪在肝則脅痛惡血在內抽掣舌卷卵縮為肝絶邪在脾胃則肉痛善飢熱也邪在腎則骨痛腰痛腰者腎之府也轉搖不能腎將憊矣傷寒太陽身痛但拘急耳若陰毒身痛則體勢沉重如被杖中濕身痛不可轉側骨節掣痛屈伸不利身重或腫汗出惡風不欲去衣中暑亦身痛汗後身仍疼邪未盡也然血虛者身亦疼頭痛身熱自汗與傷寒同而默默但欲眠鼻鼾語言難出四肢不收者風溫也不可發汗霍亂亦頭痛身痛惡寒發熱如傷寒而有吐利為異身熱惡寒頭項強急如傷寒而頭熱目脈赤面赤獨頭搖口禁齒齘背反張者痙也無汗為剛痙有汗為柔痙頭疼發熱與傷寒同而身不痛者傷食也必中脘痞悶噫氣作酸或惡聞食臭或欲吐不吐煩熱似傷寒而脈不浮緊頭身不疼不惡寒或煩時頭亦痛煩止而痛止者虛煩也身熱惡風自汗似傷寒但頭不痛項不強或亦頭痛而作止無常者痰也或胸滿氣上衝或目下如灰煙黑者是其候也發熱惡寒頭痛肢節痛嘔惡似傷寒而病自腳腳膝痛或腫滿或枯細者腳氣也身熱惡寒若有痛處者癰疽也發熱如傷寒小便自利口不渴按其心下或脅下或臍腹間有痛處或至手不可近者蓄血也凡勞逸七情房勞皆能瘀血不止一途勞損病劇忽身痛甚者此陰虛之極不能滋養筋骨也難治胸腹間脹悶而痛邪在中上二焦不可補若氣虛不運但痞滿者不可攻勿因其胃口不開妄行消導虛症須補而脹滿不受補者難治卒然仆倒昏不知人痰涎壅盛口眼喎斜手足癱軟或半身不遂者中風也若見口開手撒眼合遺尿痰聲如鋸不治卒倒而身體強直口噤不語或四肢戰掉發熱無汗者中寒也卒然悶倒昏不知人汗出面垢手足微冷或吐或瀉者中暑也中氣大類中風卒倒痰塞牙關緊急然中風口有痰涎身溫中氣口無痰沫身冷也中食亦似中風難辨須審其曾著怒氣否曾飲食否若在醉飽後著惱或感風寒食填胸中胃氣不行便致厥倒昏迷不醒其脈氣口急盛或沉伏宜鹽湯探吐之吐不出者死中痰者卒然麻眩舌本強直痰涎有聲四肢不舉重者不醒為痰中輕者自醒為痰厥心火暴甚熱氣怫鬱而卒倒無知輕者發過自醒重者陰氣暴絶陽氣後竭而死中惡者忽然手足逆冷肌膚粟起頭面青黑精神不守或錯言妄語牙緊口噤卒然暈倒昏不知人此是卒厥客忤飛尸鬼擊凡吊死問喪入廟登冢多有此證腹痛氣自下衝上者火也從上轉下趨少腹者寒也氣從少腹上衝者陰火也從兩脅上衝者肝火也少腹痛引腰背睪丸者疝病也肉瞤筋惕者血虛也身如蟲行者表虛也不能仰臥仰臥則咳者水氣也水氣上乘於肺則氣喘促身重難行胃主肉其脈下行於足水犯胃故肉重而足不能行口苦為膽熱口甘為脾熱口淡為胃中虛熱胃為一身之主淡為五味之本口酸為肝熱口咸為腎熱口中常覺血腥為肺傷口燥咽乾赤爛為內熱口辣為肺熱所謂內傷則口中不和飲食無味也問飲食外感邪未入里則知味而食如常入里則不思食矣喜冷者內熱也喜熱者裡寒也得食稍安者虛也得食更甚者實也虛人過食亦不安病由飲食而致者須問所傷何物熱者必渴喜冷飲飲必多若喜熱飲或冷飲而不多乃虛熱非實熱也火虛者必不能飲冷水虛者雖火燥津干然少得清潤即止以本虛不能勝水之冷氣故不能多飲也問二便大小便不禁為腎敗腎開竅於二陰腎敗則失其閉臟之職小便清白而長者必非熱證亦有火在上焦者導之使下則反黃矣黃赤而短者熱也然勞倦生火或思慮動火或瀉利忘陰或陰虛內熱等證小便多黃雖亦為熱然是虛熱非實熱也津液由於氣化氣病則小便不利氣上脫者必無小便氣閉者亦無小便小腹硬痛小便不利為溺澀利而大便黑為蓄血瀉而腹滿者死大便閉結腹堅滿痛不可按者熱結也大便瀉利為寒然亦有熱者經所謂暴注屬熱也火性急速不及傳化即出也其勢急迫辟辟有聲如蟹沫然若熱隨瀉去痛隨利減可不治又有純瀉清水者謂之熱結旁流內有燥矢結成彈丸擋住糟粕止於其旁漏下清水也必極臭皆熱證也又大便鴨溏者為寒色如黴醬黏膩不見糟粕顆粒也為熱所爍化之故極臭者又為熱問汗液及血外感身熱有汗為傷風無汗為傷寒盜汗為邪初傳陽明又為陽入擾陰自汗為陽明邪實手足心腋下皆汗又為表虛不固自汗分重鼾睡為風溫服藥後得汗表應解不解是汗未徹也必汗出至足乃為徹頭有汗身無汗若小便不利熱渴則發黃小便利而大便黑則為瘀血若胸滿咳喘則為水氣大抵陽明實熱不得發越者多頭汗多可下之證關格證小便不通頭汗出者死額上及手足冷汗者陰毒也汗多則津脫而亡陽凡熱汗必澀肌肉熱而澀也冷汗必滑肌肉冷而滑也汗味淡而不咸綴而不流者為絶汗即死心為汗肝為淚肺為涕脾為涎腎為唾婦人病須問經候若經水適來或適斷而病熱者熱入之名曰熱入血室其證胸脅下滿晝日明瞭夜則譫語如見鬼狀嘔吐血皆由胃出若傾盆成塊而來或紫黑為瘀血或鮮紅為新血此太衝腎二經合行肝經之血由胃並出者也雷火勢暴故大出若止數口或一二鍾或紅或紫或黑此胃經血自出者也胃雖多血然其熱不若雷火之暴故所出比之略少咳血者因咳嗽而出痰中見血絲血點此乃熱傷肺絡肺少血雖少亦出恐致肺枯難治又肺病久及腎腎與衝脈並經出入血從腎沖咳出者其血必多腎雖血少合沖則多須知其來喉必癢或有聲響或有硬氣自下衝上咯唾血者或隨氣逆火炎而唾不用力或隨痰而咯用力痰中有血散漫者是此肺腎之血也上焦血浮中焦血不沉不浮下焦血沉以水試之可見衄血詳血門太陽經血有從鼻嗅出者其經從背上腦注鼻不衄則嗅出也腸風血鮮臟毒血黯溲血痛為血淋不痛為尿血皆與尿同出若不與尿同出者乃從精竅出也漱水不咽小便利大便黑多是蓄血蓄於上善忘時鼻血蓄於中下心腹腫痛如狂譫語發黃好酒者陽明多蓄血問晝夜輕重陽虛則畏寒而惡陰故旦安而暮亂至夜則寒也陰虛則畏熱而惡陽故夜寧而朝爭晝則熱也此正虛之候也陽邪實者遇陽而愈旺故朝熱而暮輕陰邪實者逢陰而更強故夜寒而晝減此邪實之候也陽虛而陰邪乘於陽分則氣行陽二十五度而病發故日寒而夜息陰虛而陽邪陷於陰分此證頗多則氣行陰二十五度而病發故夜熱而晝涼觀瘧疾或日發或夜發可見矣此正虛挾邪之候也其有晝夜俱熱甚者為重陽無陰晝夜俱寒甚者為重陰無陽晝寒夜熱者乃陰陽交錯也其有久病虛弱無分晝夜作止不時者以正氣不能主持而陰陽相乘勝復無常也若壯實人初病見此又為邪正相攻不時擾動之故觀傷寒少陽證往來寒熱初無定期可見矣問證見先後先瀉後痢為脾傳腎先痢後瀉為腎傳脾之類問七情肝氣虛則恐實則怒怒傷肝以悲勝之肝火乘心則動而驚心氣虛則悲實則喜笑不休喜傷心以恐勝之脾為思思傷脾以怒勝之肺為憂憂傷肺以喜勝之腎為恐恐傷腎以思勝之怒則氣上又云氣逆喜則氣緩悲則氣消恐則氣下驚則氣亂思則氣結切脈脈之部位脈者血氣經隧合而成名者也非血則不充非氣則不行非經隧則散漫而不就軌以經隧乃脈之道路猶水之有渠人身無處非血無處非氣如地無處非水而必注於江河乃有其流動可見故診脈必於經隧也人身血脈流行之路大者為經小者為絡經如正河絡如支河但有其外見之處即皆可診內經分三部九候出素問三部九候論上部天兩額之動脈當頷厭之分足少陽膽經脈氣所行以候頭角之氣上部人耳前之動脈即和窖之分手少陽三焦經脈所行以候耳目之氣上部地兩頰之動脈即地倉大迎之分足陽明胃經脈氣所行以候口齒之氣中部天手太陰也即寸口肺經脈氣所行以候肺中部人手少陰也即神門心經脈氣所行以候心中部地手陽明也即合谷大腸經脈氣所行以候胸中之氣下部天足厥陰也氣衝下三寸五里之動脈肝經脈氣所行臥而取之女子取大沖在足大指本節後二寸陷中以候肝下部人足太陰也魚腹上越筋間箕門之動脈沉取乃得之脾經脈氣所行也若候胃氣者當取足跗上之衝陽以候脾胃之氣下部地足少陰也即太溪腎經脈氣所行以候腎按上部以候頭則下部以候足可知以本臟之經脈候本臟則亦以本腑之經脈候本腑可知古人多以互文見意當善會之再按臟腑經脈共十二以止九候故遺手太陽小腸手厥陰心包足太陽膀胱三經不知當診何處又胃經之人迎與寸口並診而不列九候之中皆不可曉此後人之所棄而不講也內經診寸口寸口即氣口內分寸關尺三部解見下文素問脈要精微論曰尺內即尺部兩旁則季脅也季脅小肋也尺部所主臟腑其於身之兩旁則當季脅蓋肝候於關而主脅則腎候於尺當主季脅也尺外以候腎外謂浮也里以候腹里謂沉也下文內外仿此中附上言附尺之上而居中即關部也左左關外以候肝內以候膈胸之下腹之上為膈右右關外以候胃內以候脾上附上言附中部之上而居上即寸部也右右寸外以候肺內以候胸中左左寸外以候心內以候膻中即心包在兩乳間謂之氣海按心肺肝腎臟也反候於外胸中膻中膈腹包里此藏者也反候於內恐傳寫之誤當以胃外脾內例之易其位為是前寸也以候前前身面後尺也以候後後身背此分候身之面背下文分候身之上下皆就軀體言與上文分候臟腑對講上竟上者竟盡也胸喉中事也頭面可推下竟下者少腹腰股脛足中事也言寸不獨候胸尺不獨候腹也按內經謂脈皆伏行於分肉之間深不可見所常見者皆絡脈惟手太陰肺經脈外見於寸口此其獨診寸口之故也後人宗此皆惟寸口是求而古之診分三部九候者不復講矣所謂寸口者合寸關尺而為名者也何謂寸關尺曰自手肘中橫紋至魚際橫絞得一尺一寸所取診者止長一寸九分前不及魚際橫紋一分後不及肘中橫紋九寸古人於此一寸九分分為三部下部在一尺之內故名為尺上部在一寸之內故名為寸中部為上下交界之處陰陽出入之所故名之曰關也寸口又名氣口何也以此為肺經肺肺為氣主故曰氣口又曰脈口問人身有臟有腑此獨候五臟而六腑止候胃何也曰內經原以人迎候陽以氣口候陰腑陽臟陰此五臟所以候於氣口也而兼候胃者則以五臟皆稟氣於胃五臟之氣不能自致於手太陰必因胃氣乃至故胃氣當並察也問膽膀胱大小腸命門三焦諸腑當候何處曰內經無明文故後人之論不一有謂小腸與心為表裡從心候於左寸大腸與肺為表裡從肺候於右寸者此難經之説非出高陽生也有謂小腸候於左尺大腸候於右尺者又有謂小腸為丙火當從命門之火候於右尺大腸屬庚金母隱子胎當從左腎之水候於左尺三説不同今人多從後二説以大小腸在腹中位居至下經言尺內以候腹應候之於尺不應與位處至高之心肺同候於寸也愚謂臟腑相移如心移熱於小腸則小便赤大便不通則肺氣壅之類上下相關診之於寸亦無不可況二腸位雖居下而其經脈皆上行則候經於寸候腑於尺前説未可廢也如膀胱府居腹下而寒傷太陽六脈皆浮豈徒左尺胃府居中而邪在陽明六脈俱大豈獨右關可泥定哉後二説當以左小腸右大腸為是蓋臟腑相配本因經絡相聯相聯乃相配相配乃有庚金丙火之稱名實相衡當從其實從其所聯所配為左右可也膽同肝候於左關膀胱同左腎候於左尺從無岐議惟右尺所候其説不一有謂三焦命門右腎三者各別均於右尺候之有謂右腎即命門與三焦同候説者紛紛難經謂腎有二枚左名腎屬水右名命門屬火後人非之謂左腎為形水右腎為氣水總皆屬水兩腎之中乃為命門按二説雖異然皆謂腎有水又有火所用補火之藥無殊則亦無庸分別矣愚謂右尺所候只一命門盡之不用更舉三焦右腎名色何則三焦若以位言則即經之所謂胸中膈中腹中也若以三焦之元氣言則即命門之真火耳蓋此火宅於命門布乎三焦隨藏發而異名豈有二火哉則言胸膈腹即言三焦之部位言命門即言三焦之元陽而三焦之名可不立矣兩腎既皆屬水則當統於左腎而右腎之名固可不立況命門為火氣居中而親右陽能生陰氣能化水診命門之火氣即是診右腎之水源右腎之名益可不立矣蓋左尺以候先天之真陰右尺以候先天之真陽百川總歸一海千炬無非一燈何必多立名色以滋惑亂哉問臟腑之部位何如曰腑陽臟陰陽浮陰沉不易之理也難經謂三菽之重為肺脈則候胸中當輕於三菽可知六菽之重為心脈則候膻中當輕於六菽可知九菽之重為脾脈則候胃當輕於九菽可知矣又胸中膻中均即上焦候於兩寸腹中即下焦候於兩尺則膈中即中焦亦當兩關並候可知矣然此但言其理耳實則何可泥哉何則部位雖分氣脈實貫寸口三部僅長寸許除浮沉大小不能無異外其餘遲數等脈大概無殊從未見有寸遲而關數寸滑而尺澀者假令診得六脈俱數而斷為五臟六腑皆熱可乎哉則必從心肺俱浮肝腎俱沉脾胃在中之説以察之始可以知為何臟何腑之熱詳脈配四時五臟條而手法之輕重一差則以腑為臟以臟為腑固有之矣即不謬而浮主表病亦主裡虛沉主內邪亦主陽陷其為虛熱實熱內因外因非參合四診安能細辨而但從區區之部位為斷何異膠柱以鼓瑟也如胃停冷食而六脈皆遲肺被火刑而六脈皆數不獨見之右關右寸必分疆畫界以求之則固矣問子言六脈數則俱數遲則俱遲則經言七診謂獨小獨大獨疾即數獨遲獨熱獨寒謂手捫之而覺有一處獨熱獨寒也獨陷下者謂沉伏不起皆病其説非歟曰此以三部九候言非言寸口也按即以寸口言亦得如診得數脈兼浮浮在寸部即謂之寸數可也觀下心肺俱浮何以別之條自明脈之形體脈之形體長而圓如以水貫蔥葉中有長有短有大有小有虛有實有緩有緊長短以縱言大小以廣言虛實以蘊積言緩緊以張弛言長溢出三指之外為長短歉於三指之中為短按寸口之脈由胸中行至大指端非有斷截本無長短可言然脈體有現有不現不現者按之止見其動於三指之內現者見其長出於三指之外則長短宜分矣高鼓峰云有形體之長有往來之長往來之長謂來有餘韻也按高説甚善長短雖本言形體而凡脈之以神氣悠長為貴者固可因此説而想見其狀矣大大而盛於浮分名洪大而散漫滲開脈與肉無界限名散小與大相反一名細細甚無力名微虛虛不實也虛甚則中空名芤實實結實之謂實如按豬筋虛如按燈心芤如按蔥舊謂浮中沉皆有力為實皆無力為虛浮沉皆有力惟中無力為芤雖未嘗不是然尚非正解實如蔥中水充實虛則不充芤者尤其不充者也緩柔軟之意甚則失之軟弱而名軟名弱舊以緩屬遲蓋緩兼兩義也緊即搏急與緩相反如張弦如引繩兩頭牽緊必挺徑抗指緊不甚名弦弦緊而大者名革牢長短有得於稟賦者筋現者脈怕長筋不現者脈怕短也有隨時令變異者則春脈長而秋脈短也有因病而變異者則邪氣長而脈長正氣短而脈短也大小有得於稟賦者世所謂六陽六陰也生成脈大者名六陽脈小者名六陰脈有隨時令變異者時當生長則脈大當收斂則脈小也有因病而變異者邪有餘則脈大邪氣壅滿正不足則脈小也血氣衰少虛實亦有得於生成者肉堅實者脈多實虛軟者脈多虛也亦有變於時令者春夏發泄雖大而有虛象秋冬斂藏雖小而有實形也若因病而異則大而實不特壅滿而且積實小而虛者不特衰小而且空虛可驗正邪之主病俱盛邪盛俱衰正衰大而虛氣有餘血不足如蔥中少水但吹之使脹也小而實者血能充而氣衰不鼓可驗陰陽之偏枯緊緩有得於生成者皮膚繃急者脈多緊寬鬆者脈多緩也其變於時令則天氣嚴凝而筋脈收引天氣暄熱而筋脈弛縱也其因病而變者則或外感風寒或內傷生冷寒勝故脈收引而緊急有力或熱或濕筋脈縱弛而軟弱無力也附洪散微芤弦革牢軟舊作耎又作濡弱各脈洪洪即大耳舊以洪為來盛去衰是大之盛於浮分者也散脈形本圓斂今散漫不收似大而實非大蓋虛甚而四散者也微古以微屬浮細屬沉分微為陽衰細為血少本集各脈皆直指本義故以細甚無力為微芤脈虛而且中空者芤慈蔥名如臥蔥管於指下輕取重取皆有而中取則無此為失血之脈弦似緊而略遜但稍見抗指即是不若緊之搏手凡弦緊之脈由外邪而致者猶易為治由正虛而致者則難為功蓋脾胃虛敗中和之氣化為徑急土敗木賊不可救矣古人有時以長為弦如謂春脈弦而言其軟弱直長是弦即長也今分為二則弦自有急徑之意不僅長而已革牢弦大遲而浮虛者為革如按鼓皮內虛空而外繃急也弦大遲而沉實者為牢寒氣深痼如牢獄也軟弱皆柔緩之甚而無力者舊以軟屬浮弱屬沉脈之行動脈之行動如以氣鼓蔥葉中之水使之流動也有浮有沉有遲有數有澀有滑浮古人於一身中分三部九候後人亦於寸口中分三部九候寸關尺三部也部各有浮中沉三候三而三之九候也是故候之於皮毛間而即得之者謂之浮候之於筋骨間乃得之者謂之沉候之於皮毛之下筋骨之上適當肌肉之中而得之者謂之中沉沉之極名伏數疾也躁也一息六至數而跳突名動遲與數相反一息三至內經謂人一呼出氣也脈再動動即至也一吸入氣也脈再動呼吸定息一呼一吸為一息定息者前息已盡後息未起之時也脈五動閏以太息數息必有一息略長者名太息如月之有閏也一呼一吸本止四動有五動者則以其為太息也診時當別令一無病人調定呼吸默數得十息診者亦默數得四十五至為平脈命曰平人一呼脈一動一吸脈一動曰少氣即一息二至也此遲之甚一呼脈三動一吸脈三動即一息六至此為數而躁即數疾意尺熱尺即手臂曰溫病溫病熱證一呼脈四動即一息八至以上曰死脈絶不至不特遲且不至曰死乍疏疏即遲乍數曰死滑滑即滑溜之謂言其行動往來之流利也在平脈則為血充在病脈則為血熱鼓動痰氣流注澀糙澀也與滑相反往來黏滯者是浮沉有得於稟賦者趾高氣揚之輩脈多浮鎮靜沉潛之士脈多沉也又肥人多沉瘦人多浮有變於時令者春夏氣升而脈浮秋冬氣降而脈沉也其因病而致者則病在上人身之上部也在表在腑者其脈浮上表腑皆屬陽浮脈亦屬陽陽病見陽脈也在下在裡在臟者其脈沉也問浮則外有脈而內無脈謂之裡虛沉則內有脈而外無脈謂之表虛可乎曰不由稟賦時令與外感內傷無故而浮沉謂之虛可也以浮為陰失守沉為陽內陷也有故則不可如以為可則四季之月無病之人脈本和平常居中候亦可斷為表裡兼虛乎然則古人謂浮為裡虛又謂浮脈舉之有餘按之不足其説非歟曰謂浮為虛者必浮而兼虛者乃名之非浮即可名虛也謂浮為虛於裡者必有裡虛之實乃名之非浮則必虛其里也至脈體之為虛為實本不因浮沉而變實則浮沉皆有餘虛則浮沉皆不足而輕取之與重按勢有不同則夫脈之實者愈按愈實虛者愈按愈虛蓋重按則脈被遏抑實者鼓擊有力故愈形其實虛者無力鼓擊故愈形其虛是則舉之有餘按之不足止可言浮而虛者不可言浮而實者也或曰如子言浮而實者愈按愈實是三候皆有又何以名之為浮乎曰浮脈本浮按抑之而後沉不按之則仍浮故曰浮也又問亦有脈浮而言表虛何也曰外感發汗太過或內傷自汗太多皆令表陽虛氣外越故浮也遲數得於稟賦則性急躁者脈多數性寬緩者脈多遲變於時令則晴燠而脈躁陰寒而脈靜也至其應病則亦如之矣仲景以遲為臟寒數為腑熱可不泥以腑亦有寒臟亦有熱也滑澀亦有得之稟賦者乎曰富貴之子神氣通暢則脈亦流暢貧賤之子神氣沮抑則脈亦蹇滯此即太素以脈之滑澀論窮通之意也若夫時令則肝脈屬春而微滑肺脈屬秋而微澀矣至其應病則本乎氣血之通塞耳附伏動脈伏沉極為伏按至骨乃見或竟有不見者動跳動之意大驚多見此脈蓋驚則心胸跳突故脈亦應之而跳突也必帶數故上文系之數脈條下張仲景曰若數脈見於關觀若字則關是偶舉可知非動脈止見於關也上下無頭尾狀其圓而突耳非真上不至寸下不至尺也如豆大厥厥動搖者名曰動脈之歇止脈之歇止者有三結脈來遲時一止而復來者曰結如人之徐行而歇也促脈來數時一止而復來者曰促如人之疾行而蹶也數亦名促此之促指歇至言須分別觀之代結促之止無常數代之止有常數常數即下文四十動三十動之數代又為更代之稱別見胃氣條義與此異須分別觀之內經曰脈一日一夜五十營營運也經謂人周身上下左右前後凡二十八脈共長一十六丈二尺五十運計長八百一十丈呼吸定息脈行六寸一日夜行八百一十丈計一萬三千五百息按此偽説也人一日夜豈止一萬三千五百息哉五十動而不一代者代歇至也五臟皆受氣四十動一代者一臟無氣腎氣先盡也其吸不能至腎止至肝而還景嶽曰觀此則下文所謂二臟三臟云云者當自遠而近以次而短由腎而肝而脾而心而肺故凡病將死者必氣促僅呼吸於胸中數寸之間而已三十動一代者二臟無氣二十動一代者三臟無氣十動一代者四臟無氣不滿十動一代者五臟無氣豫之短期此皆死在旦夕而王氏脈經謂一臟無氣後四歲死二臟無氣後三歲死云云恐非脈配四時五臟內經曰春脈如弦如弦則非過弦可知通指六脈言非單指左關下仿此春脈者肝也東方木也萬物之所以始生也故其氣來耎同軟弱和柔之意輕虛向浮之意而滑端正也直以長曰弦其氣來實而強堅徑也此謂太過病在外外感也邪盛故脈強不實而微此謂不及病在中內傷也正虛故脈弱按長弦緊三脈相似而不同蓋弦而軟者為長強者為緊也此所言如弦者實即長所言太過乃弦而且緊觀虛軟實強字可見勿以此弦字與他處弦緊弦字同論夏脈如鉤鉤曲也脈來洪盛如湧起而曲也言其大而有力夏脈者心也南方火也萬物之所以盛長也故其氣來盛來盛浮大也凡脈自骨肉之分出於皮膚之際曰來去衰曰鉤凡脈自皮膚之際還於骨肉之分曰去衰減也浮取有餘沉取不足時當發泄大而有虛象也其氣來盛去盛大且實也此謂太過病在外其氣來不盛去反盛浮取不足沉取有餘是沉意反多於浮此謂不及病在中不言來不盛去不盛而言來不盛去反盛者以來不盛去反盛似為有餘於內不知此乃反浮為沉火失其職即為不足也秋脈如浮如浮則非過浮可知秋脈者肺也西方金也萬物之所以收成也故其氣輕虛以浮來急收引之意去散散漫之意浮取則收斂重按則散漫蓋秋令收而未藏故脈體如此故曰浮其氣來毛義取毛之輕浮浮之太過者也而中央堅兩旁虛虛猶散也惟兩旁散而中央不散與上所謂去散者異矣而中央曰堅則亦非但收斂而已亦與來急異也此謂太過病在外其氣來毛而微此謂不及病在中冬脈如營如營壘之固也內守意冬脈者腎也北方水也萬物之所以合藏也故其氣來沉以搏堅實擊指故曰營其氣來如彈石者彈擊也如擊手以石堅實之甚也此謂太過病在外其去如數者沉取似數也數本屬實熱而真陰虧損之脈亦多數愈虛則愈數原非實熱之數故云如數此謂不及病在中脾脈者土也善者不可得見蔡西山所謂不長不短不疏不數不大不小應手中和意思欣欣難以名狀者也惡者可見其來如水之流滑而動也此謂太過病在外如鳥之喙鋭而短也此謂不及病在中按四時之升降動靜發斂伸縮相為對待者也極於二至平於二分故脈子月極沉午月極浮至卯酉而平觀經又謂秋脈中衡如衡之平又謂夏脈在膚皮也秋脈下膚冬脈在骨則秋之不當以浮言可知也特以肺位至高其脈浮秋金配肺故亦言浮耳夫秋初之脈仍帶夏象言浮猶可若於酉戌之月仍求浮脈不亦惑乎夫於春言長滑則於秋言短澀可知於冬言沉實則於夏言浮虛可知書不盡言言不盡意是在讀者之領會耳難經曰初持脈如三菽大豆也之重與皮毛相得者肺部也如六菽之重與血脈相得者心部也如九菽之重與肌肉相得者脾部也如十二菽之重與筋平者肝部也按之至骨舉指來疾者腎部也又曰心肺俱浮何以別之然浮而大散者心也心主血脈位在肺下按至血脈而得者為浮稍加力脈道粗大為大又稍加力脈道散開為散浮而短澀者肺也肺主皮毛位居最上按至皮毛得者為浮稍加力脈道不利為澀不見長出指外為短腎肝俱沉何以別之然牢即沉弦而長者肝也肝主筋位在脾下按至筋上為沉脈道如弦為長按之濡舉指來實者腎也腎主骨在肝下按至骨上得之為沉又重按之脈道無力為軟舉指來疾滑利而充實曰實脾者中州故其脈在中脾主肌肉位在心下按至肌肉脈道和柔而緩又稍加力脈道敦實而大王宗正謂診法當從心肺俱浮肝腎俱沉脾胃在中之説王叔和但守寸關尺分臟腑位部者非其説甚是然二説亦不相悖蓋寸關骨高肉薄尺骨低肉厚故寸關恆浮尺恆沉假如診得三部俱浮之脈亦必兩寸較尺更浮故可從其大概通言亦可從其甚者獨舉不相悖也若弦緩遲數各脈則三部僉同有不可分指者矣問脈氣當隨時令變更則夏月脈浮不特心肺浮即肝腎亦浮矣最浮為肺次心次脾次肝次腎冬月脈沉不特腎沉即心肺亦沉矣最沉為腎次肝次脾次心次肺何必泥定肺脈常在皮毛腎脈常在骨上乎曰夏浮冬沉特微浮微沉耳其變更固不遠也按肺較心更浮肝較脾略沉是右寸關比左寸關差浮也以例兩尺亦應右浮於左蓋右腎為水中之火左腎為水中之水自應少異耳合而言之右三部皆浮於左古人謂右屬氣左屬血氣浮血沉不亦宜乎脈無胃氣則死經曰人無胃氣則死此言脈以有胃氣為主也胃屬土其德中和其氣之達於脈也不剛不柔不疾不徐不大不小不浮不沉有雍容和平之狀無過不及之傷者也春胃微弦曰平雍容和緩中略帶弦意也弦多胃少曰肝病肝邪勝胃氣衰也但弦無胃曰死胃氣已絶故也胃而有毛猶云得秋脈曰秋病金剋木也春木旺尚無傷至秋則必疾矣毛甚曰今病目下即病也夏胃微鉤曰平鉤多胃少曰心病但鉤無胃曰死胃而有石曰冬病石甚曰今病石者沉實之意冬脈也長夏胃微耎弱曰平長夏未月也土濕則軟故微軟弱即緩脈也弱多胃少曰脾病猶言脾胃自病也但代無胃曰死代更代也春弦夏鉤秋毛冬石脈體隨時而更但見其所更者而不見胃氣則死矣不言但弱無胃曰死以弱但正氣不足非有邪氣相乘且弱止可言胃氣衰不可言胃氣絶也何則胃脈雖曰中和而長夏土濕則略近柔軟一邊可云柔軟之甚為弱不可云但弱無柔軟也耎弱有石曰冬病土氣衰而水反乘之故至冬必病矣弱當作石甚曰今病春夏以克我者言此下皆以我克者言互文以見例也又春言胃有毛夏言胃有石此及下文變胃言軟弱毛石亦互文也秋胃微毛曰平毛多胃少曰肺病但毛無胃曰死毛而有弦曰春病弦甚曰今病冬胃微石曰平石多胃少曰腎病但石無胃曰死石而有鉤曰夏病鉤甚曰今病真肝脈至此下皆言真臟脈真猶言純真肝脈者言此為純乎肝脈毫無胃氣者也蓋肝弦肺澀心浮腎沉各得一偏惟胃氣六脈不弦不澀不浮不沉中和合德有以化四者之偏故肝雖乘春令以呈其弦象而中和柔軟之胃氣即與之偕行而胃之和緩意多肝之弦意少是為平脈若弦多胃少即為病脈矣況毫無胃氣而純乎弦徑耶此蓋胃絶使然故凡病真臟脈現者必死也餘臟仿此論之如循刀刃如按琴瑟弦皆挺徑之意真心脈至堅而搏如循薏苡子堅實之狀纍纍然見手指下也真肺脈至大而虛如以毛羽中人虛浮無力之意真腎脈至搏而絶絶陡絶無餘韻也如指彈石堅實真脾脈至弱而乍數乍疏各脈主病病非表則里非熱則寒非虛則實耳故序浮沉遲數虛實六脈於先餘脈於後長大實滑等有餘之脈主證多同短細虛澀等不足之脈為病相類當會通觀之非入於此者即不入於彼也如頭痛身熱隸之浮數豈他脈便無此二證哉覽者但取其意勿泥其文便觸類旁通引伸不盡矣浮陽脈也陽外陰內故浮主表沉主裡又陽上陰下故浮主上部沉主下部以外感言之凡六淫之邪中於表清邪中於上脈必浮也以內傷言之裡氣失守而虛邪外越腎陰失守而浮陽上衝脈亦必浮也浮遲為表冷浮主表遲主寒也傷濕表中濕邪滯其經絡中風虛風內發故浮內虛寒故遲若兼風邪中表滯其經絡則亦浮遲也浮數為頭痛運眩吐衄皆風熱上攻所致表熱瘡陽結能食不大便胸滿肩背痛浮虛為表陽虛傷暑大熱傷氣汗出過多故虛勞倦喘咳血浮實為表邪實六淫之邪或痰凝血滯之在表者皆是也脹滿胃熱氣逆痛肺熱膚痛瘡浮大為風熱癮疹風熱噓血沸騰於外也身癢名泄風熱蒸汗出為風所閉故癢也表邪盛痂癩即癘風風熱久不散鬱而為濕相蒸生蟲肌肉潰爛也氣高氣實血虛失血燥結陽厥關格浮為正虛大為邪實邪實正虛不能運化故關而不得小便格而不納食也為癲疾浮小為表陽衰浮緩為傷風傷風有汗內熱得泄故脈不緊傷濕濕傷肌表肌肉血脈緩弱如土濕則軟也浮緊為傷寒身痛浮弦為頭痛吐食風飲浮滑為風痰衄血吐逆浮澀為麻木身熱無汗肺燥汗多津傷血虛氣浮浮長為頭痛風癇浮短為喘乏沉主裡主下部七情鬱結痰血停滯凡屬內邪脈必見沉若不因內邪而見沉則為陽氣內陷為裡虛不能外達分別觀之沉遲為裡寒泄瀉氣血滯蓄水沉數為內熱外寒內熱反覺外寒熱聚於內不達於外也便難消穀食多而便少也蓋為熱所消化熱厥厥手足冷也熱聚於內不達於四肢故冷又有手足熱者詳醫碥厥門沉虛為裡虛瀉血下利沉實為積聚血瘀煩心熱乘心咳唾熱乘肺沉緩為里濕蓄水沉緊為冷痛奔豚腎中陰寒之氣從小腹上衝心若豚奔突瘕疝瘕積塊也疝為小腹有形之病皆寒邪之凝聚而成者腰脊痛腎附背腎寒則氣滯而脊痛沉弦為脅下有積弦為肝脈肝主脅腹少腹痛內飲疝沉滑為食痰便膿血沉澀為血滯精傷不月不孕內疽沉大為內邪盛沉細為血少洞泄亡陰遲主寒以寒則氣少而行慢也屬水遲大為寒邪頑痹遲細為寒瀉遲虛為虛寒遲實為寒積遲緩為寒濕遲緊為寒痛寒滯氣不通故痛為筋急筋寒則收引故急遲澀血寒而滯數主熱以熱則氣盛而行速也屬火數大為煩躁渴癍疹脹滿數虛為虛熱怔忡虛損按虛熱者脈必虛數無力固矣然有過服寒劑寒熱搏擊或肝邪剋土脈反弦大有力者投以溫補之藥則數者靜弦者緩大者斂矣此最當知又有虛寒而逼火浮越者真陽欲脫者脈皆數甚者亦弦大有力皆當以證參之勿誤也數實為實熱癰瘡煩躁譫妄數滑為熱痰血熱渴數澀為熱灼血乾虛為正氣不足虛滑為正虛挾痰虛澀為血液不足氣滯虛弦為虛損少食虛痛虛緩為虛弱泄瀉虛細為氣血不足虛大為血虛實為邪氣有餘不作正氣充實論以正氣止有不足無太過太過即為邪氣也參長脈條坎中滿離中虛水脈多實火脈多虛實滑為痰結為宿食實大為邪盛而實實大浮數為腫胸脅壅滿不小便氣有升無降緊為寒邪為木邪微者不過抑遏正氣甚則戕賊中州為真臟見緊遲為肝氣寒滯緊數為寒鬱熱咳嗽外寒束熱攻肺痛寒熱相搏故痛緊大為寒邪盛下利土敗木賊難治緊實為有形之邪瘕疝瘀血之類緩主濕邪土濕則泥濘而軟也問緩本和柔之名乃脾胃之正氣何以謂之病脈曰脾胃脈本中和不緊不緩原無緊緩可名今曰緩即非不緊不緩之中和矣蓋凡有可名者即非中和即為病脈也舊謂四至為緩三至為遲濕滯故脈遲緩亦通蓋緩有兩義一對數言一對緊言以主濕則亦有兩義一為濕滯之而遲一為濕浸之而軟也緩大為濕盛緩細為正虛挾濕緩數為濕熱肉痿不能行動曰痿肌肉四肢並見軟弱也脾主肌肉四肢濕熱盛則困倦經謂脈緩多熱蓋對脈急多寒言寒則筋脈收引故緊熱則筋脈弛縱故緩也然必兼見熱證乃為熱不可不知緩浮數為多汗緩數大為狂笑心熱則笑濕熱壅脹緩長數為喜嘔濕熱挾肝火上逆水瘕水積也土受木克不能制水水鬱成熱也痹麻木不知痛癢也土受木克不能行痰聚於肌膚故痹痹而不行鬱滯成熱故數緩滑為濕痰緩澀為解㑊困倦意氣血衰弱使然長為邪氣長問經曰長顯氣治是長本佳脈何以云病曰長大實滑皆有餘之脈短小虛澀皆不足之脈不及太過皆為失中故長大不作正氣有餘實滑不作血氣充足也然衰弱之病脈由短而漸長則為佳兆諸脈之變異皆當以此推之吉凶自見也長數為熱熾寸長為足脛痛陽盛陰傷也格寸脈長九分過此為太過遂上魚名溢格不納食也陽盛於上胃中血枯故食不得入逆氣喘息尺長為關尺脈長一寸過此為太過名覆關不得小便也熱結在下故不得小便尺寸俱長大為陽明病傷寒熱在陽明則脈大而長短短為正氣短短澀為肺燥寸短為頭痛陽不足則陰氣得而上干之大為邪氣盛經謂大為病進乃指大而有力者其病為實邪邪加盛則脈加大也仲景謂大為虛又謂大為勞乃指大而無力者其病為虛邪虛則氣散勞則氣張故脈亦應之而虛大也當分別觀之陰靜而斂陽動而張故火旺者脈必大而浮數虛豁水足者脈不必大即大亦沉靜而有力也小為正衰血氣皆少形體消瘦陽不張則小水不足亦小兼遲則火尤衰兼數則水更損細數為血虛發熱虛勞得此難治芤為失血芤數為亡血發熱身體瘦肌肉甲錯甲錯枯燥也芤遲為氣虛脫血芤動微緊為男子失精女子夢交弦為肝邪傷脾為痛為飲皆脾氣被傷而停滯之故甚則與緊同論弦遲為寒瘧慢驚風弦數為熱痛急驚風正氣大虛弦實為肝實善怒不樂肝鬱不暢眩冒肝火上衝故眩乘心故冒巔病肝脈會於巔火上衝故痛弦大為肝邪盛弦小為虛損弦滑為痰飲滑流動屬陽主風熱熱氣如風吹血流動主痰飲凡物乾涸則澀濕潤則滑故滑為血盛痰多主胎孕滑大為多痰多血滑緩為痰濕滑緊為寒痰冷食澀血少而滯屬陰澀大為火盛血枯此經所謂陽有餘也澀小為血氣俱少少食心痛血少不養心痹氣滯血澀瘛攣血不養筋噎膈反胃腸結微濡弱皆血氣衰微之脈微浮為陽氣微微緊為虛損多汗陰寒逼陽於外短氣陰寒逼陽浮上微澀為體痹氣滯血澀寒栗咳逆唾腥濡弱為亡血發熱煩心厥逆陽氣不能四達故手足冷弱澀為精冷無子散為脫為眴僕牢為痼寒㿗疝陰病睪丸連少腹急痛瘕癥革為寒盛男亡血失精女半産漏下並寒不攝血動陰陽相搏虛者則動陽動見於寸陰動見於尺陰動為發熱血崩陽動為汗出驚痛陰陽相搏氣不順故痛伏不過一時偶伏乃暴病久元氣調即通為霍亂痛劇陰陽痞隔氣閉血滯忿怒氣逆戰汗傷寒服藥後煩躁冒瞀脈忽伏不見寒戰此正邪相爭欲作汗宜靜待勿倉皇誤治伏澀為吐逆血枯不能納食水穀不化氣滯不運結為寒滯七情鬱結氣血滯疽癖促為熱壅癰毒便膿血癰毒不成則下泄也若非熱壅則為氣脫代為臟絶霍亂跌打悶絶暴絶瘡痛極胎氣阻按以上所列脈病略舉大概難以執泥如浮主表沉主裡而內傷發熱大類外感脈亦浮數寒邪初感遏郁表氣脈不能外達反見沉緊不細辨則以表為里以里為表而誤治矣脈數為熱然陰虛發熱陽虛發熱者脈皆數愈虛愈數一當滋陰一當補陽而概以實熱治之可乎嘗見實熱之脈多緩軟不數故經以緩為熱宜知脈遲為寒然熱滯於內者脈亦壅滯似遲以為寒誤矣有邪盛而正未衰者有邪盛而正已衰者脈見實則不見虛既無虛脈可參則正之已衰者又何由而見乎按此當以兼緊兼緩辨之又以形氣之盛衰參之凡此皆當參伍求之而不可刻舟求劍者況一脈而數病亦一病而數脈即欲膠執言之又烏可得哉人迎氣口按內經謂寸口主中寸口為太陰肺經脈肺為臟故以此通候五臟之氣人迎主外陽明胃經脈也胃為腑故以此通候六腑之氣腑陽臟陰陽外陰內故寸口以候內人迎以候外人迎本在頸下夾結喉旁一寸五分後世既廢古人三部分診之法遂改候人迎於左手關脈而名右手關脈為氣口與之相衡謂氣口大於人迎為內傷飲食以右關屬胃也此有理人迎大於氣口為外感風寒以左關屬肝肝主風也然內風與外風無涉於理未的分主表裡雖與經意無異而部位不同矣猶之足少陰腎氣本於太溪診之在足內踝後五分筋骨上動脈陷中今則診於兩尺足陽明胃氣本於跗陽即衝陽在足跗上去陷谷二寸高骨間動脈中診之今則診於右關也張仲景每以寸口跗陽腎少陰並言喻嘉言謂即寸關尺再按結喉旁人迎脈怕大於兩手寸口脈數倍從無寸口反大於人迎者經謂平人春夏人迎微大秋來氣口為大恐非此後人所以改候人迎於左關以與右關較大小也男女脈同異古謂男脈左大於右女脈右大於左驗之不然蓋人之右手比左手略大脈亦應之而右大於左不論男女皆然也惟男兩尺怕虛女兩尺怕實差不同耳胎孕脈經曰婦人手少陰動甚者任子也少陰脈指神門言今則診於左寸矣動甚流利滑動也舊説謂心生血血旺故能胎按手少陰全元起作足少陰謂太溪脈準繩從之陰搏陽別舊注謂陰尺陽寸尺脈搏手與寸殊別淮繩從之謂之有子子男女通稱按叔和王氏曰左疾為男右疾為女疾者滑利之意又曰左尺偏大為男右尺偏大為女又曰左沉實為男右浮大為女蓋左屬陽右屬陰陽道實故脈實而沉陰道虛故脈浮而虛也觀坎離二象可見大字含有虛意而滑伯仁則云左尺洪大為男右尺沉實為女與叔和相反滑説恐非再按胎孕之脈六部皆滑疾而兩尺尤甚不求於尺而求於寸亦誤信經語矣經言心生血謂血色之赤自心火來耳豈真血生於心哉準繩曰妊娠初時寸微小呼吸五至三月而數尺滑疾重按之散者胎已三月也不散但疾不滑者五月也胎至五月則乳頭乳根必黑乳房亦升發更為實據脈經云尺脈按之不絶妊娠也羸弱之婦不必脈皆滑實但按尺中應指源源不絶便是滑伯仁謂三部浮沉正等無他病而不月為胎妊亦此意其脈離經經常也與常日脈異者是一説離經謂歇至及大小不勻如雀啄者是而腹痛引腰背為欲生也腹不痛痛不引腰脊俱未産當靜待之張路玉云胎形如抱甕按之冰冷而脈乍大乍小乍有乍無浮沉動止早暮不同為鬼胎又有如風雨亂點忽去忽來或指下見兩岐者為夜叉胎又云孕脈沉細弦急憎寒壯熱唇青黑是胎氣損也胎若不動反覺上搶心悶絶按之冰冷者是胎已死脈有順逆脈得四時之順曰病無他脈反四時曰病難已春夏而脈瘦小也秋冬而脈浮大曰逆四時春得秋脈夏得冬脈長夏得春脈秋得夏脈冬得長夏脈命死不治春不沉春脈宜弦然春初尤帶冬沉今但弦不沉也余仿此夏不弦秋不數冬不澀是謂四塞為病脈沉甚弦甚數甚澀甚曰病參見曰病復見曰病未去而去曰病去而不去曰病反者死按脈與時違須問有病無病無病而得此誠為可虞無病何因脈變非無病也不見其病耳如受蠹之木如磨刀之石不見其損日有所虧不無枝葉未壞本實先撥之憂耳若因病而致不過難治非必死也如秋月病熱脈得浮洪為脈證相合寧可斷為必死乎形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死經又云形氣有餘脈氣不足死脈氣有餘形氣不足生當參看形氣相得者生參伍不調者病三部九候皆相失者失常死上下左右相應如參舂此來彼去如參舂者之彼起此落也不可數者死中部獨調中部在手即寸口衆臟相失者死上部在頭下部在足所候各臟若失常中雖調亦死中部獨減者死上下部雖調而中部獨衰減亦死脈從陰陽謂陽病見陽脈陰病見陰脈也病易已逆陰陽病難已脈從而病反者何如曰脈至而從按之不鼓諸陽皆然陽證見陽脈為脈至而從矣然使按之無力不能鼓指便非真陽證不可作熱治凡諸脈之似陽非陽者皆然也諸陰之反何如曰脈至而從按之鼓甚而盛也陰證雖見陰脈然鼓指有力則亦非陰熱病汗出而脈尚躁盛者死溫病時疫皆以數盛有力為順細小無力為逆汗後脈靜身涼為順脈仍躁身仍熱為逆風熱而脈靜泄脫血而脈實病在中邪內結也脈虛病在外外感也脈澀堅皆難治以上皆經語諸卒僕暴厥證舊名中風張景嶽易名非風皆元氣素虧故爾卒倒不省人事脈宜小弱不宜數盛中毒宜浮大數實浮則毒尚活動可行散不宜微細虛澀正被毒傷矣勞倦傷脈以虛大弱緩為順緊數大汗出熱不止者死飲食傷以滑大為順若胃停生冷則兼緊霍亂吐利後搏大者逆太微遲者逆未吐利前脈伏或歇至不妨以氣滯不行也吐利後脈歇亦不妨以氣暴虛不能接續也噎膈脈浮滑而大便潤者順不過痰氣阻逆數弦澀大便燥結者死氣血枯結也腫脹宜浮大有力忌短澀虛細肺痿虛數為順肺癰過於洪數者逆已潰宜緩滑失血證脈宜虛弱弦實數者逆加以身熱不得臥必死蓄血脈實大可攻為順痢疾為里證宜沉惡浮與發熱久痢虛陽外越也若初病兼表邪者不在此論宜緩細有神惡強弦頭目痛脈浮滑為風痰上攻可治短澀為血虛火逆難治卒視無所見者死清陽失守邪火僭逆於上也瘕疝積聚之類沉實有力可治虛弱者死癲狂宜滑大忌澀小癰瘡未潰浮滑數大為順沉細遲澀者逆痙病浮弦為陽沉緊為陰然過於堅強者不治胎脈宜和滑流利忌虛澀新産及崩漏宜緩弱忌弦數大抵新病陽病凡屬邪氣有餘之證法當攻伐者須見盛大有餘之脈乃可受攻若見細微不足之脈則邪盛正衰攻邪恐傷乎正仲景謂陽病見陰脈者死雖未盡然然亦難為力矣久病陰病凡屬正氣不足之證法當培補者須見虛弱不足之脈乃可受補補之而脈之弱者漸大虛者漸充是陰脈轉為陽脈此仲景所謂陰病見陽脈者生也若見強實有餘之脈則土敗木賊任補不應或反以助邪不可救矣凡敗證脈脫治後脈氣以漸生復為佳若陡然而出如復元者必復脫不可救矣此燈將滅而復明之義也再按陽病而得盛大之脈須察其胃氣之虛實必盛大而和緩方任攻伐若弦多胃少或形氣不足俱不可攻若癥瘕積聚脈本帶弦亦須看弦中胃氣仍在且形氣未損又處不得不攻之勢方可議攻病去六七即已所謂大積大聚衰其大半而止也脈證從舍凡脈證不相合必有一真一假須細辨之如外雖煩熱而脈見微弱者必虛火也腹雖脹滿而脈見微弱者必胃虛也虛火虛脹其堪攻乎此宜從脈之真虛不從證之假實也其有本無煩熱而脈見洪數者非火邪也本無脹滯而脈見弦強者非內實也無熱無脹其堪瀉乎此宜從證之真虛不從脈之假實也如寒邪內傷或食停氣滯而心腹急痛以致脈道沉伏或促或結此以邪閉經絡而然既有痛脹等實證可虜則脈之虛乃假虛當從證不從脈又若傷寒四肢厥逆寒戰而脈見數滑此由內熱格陰何以知之以病由傳經漸致並非直中陰經從無熱證轉寒之理既有數滑之脈可據則外證之虛為假虛亦從脈不從證也南北政辨內經謂少陰所在其脈不應謂沉細不應指也歷驗不然此偽説也不必為其所惑附奇經八脈診法岐伯曰前部寸也外者外謂浮候足太陽也膀胱經脈內者沉候足厥陰也肝經脈中部關也外者足陽明也胃經脈內者足太陰也脾經脈後部尺也外者足少陽也膽經脈內者足少陰也腎經脈前部中央不浮不沉為中候直者直對斜言觀下文自明手少陰心經脈太陽也小腸經脈中部中央直者手厥陰也心包絡經脈後部中央直者手太陰肺經脈陽明也大腸經脈按此與素問脈要精微論不同殊無理蓋內經乃後人所撰非出一手故互異但此為下文奇經八脈章本存之前部橫於寸口丸丸者橫如連橫之橫浮中沉一體無異也説詳下文丸丸猶動脈所謂如豆也詳動脈橫於寸口丸丸者謂寸口脈團結滑動如丸浮中沉皆然也任脈也脈經則云寸口緊細實長下至關為任脈此與岐伯異參察可也三部俱浮督脈屬陽故浮直上直下者直謂不斜觀下文自明督脈也三部俱牢沉實也沖為血海陰盛故沉實直上直下者衝脈也前部陽蹺屬陽故候於寸左右兩手也彈者弦緊彈指陽蹺也後部陰蹺屬陰故候於尺左右彈者陰蹺也中部帶脈居中故候於關左右彈者帶脈也從足少陰猶言尺沉分即上文所謂後部內為足少陰也斜至足太陽者足太陽上文屬前部外乃寸浮分也從尺沉分上至寸浮分與督脈三部俱浮衝脈三部俱沉實皆直上直下者不同故曰斜也陽維也屬陽故始沉終浮從足少陽上文言後部外者足少陽乃尺浮分也斜至足厥陰者上文言前部內者足厥陰乃寸沉分也陰維也屬陰故始浮終沉甲寸浮候乙關浮候丙尺浮候丁寸中候戊關中候巳尺中候庚寸沉候辛關沉候壬尺沉候橫於寸部丸丸者任脈也橫於寸部甲丁庚也借算書勾股法譬之甲乙丙直線為股甲丁庚橫線為勾庚戊丙斜線為弦任脈見寸口三部如勾之橫寸關尺俱浮者督脈也甲乙丙也如股之直寸關尺俱沉者衝脈也庚辛壬也亦如股之直從足少陰斜至足太陽者陽維也即從尺沉斜至寸浮乃壬戊甲也如弦之斜從足少陽斜至足厥陰者陰維也即從尺浮斜至寸沉乃丙戊庚也亦如弦之斜按李瀕湖則以脈常行之道為中而有時偏於外而近臂廉有時偏於內而近臂中筋間為圖明之所謂從足少陰斜至足太陽者乃從尺內斜至寸外也所謂從足少陽至足厥陰者乃從尺外至寸內也所謂左右彈者即內外彈也與愚説不同未知孰是請質高明再按奇經之病當以證診勿專恃脈其病證詳針灸奇經病篇

body:
  text: 卷之四雜症鼻肺開竅於鼻胃脈起鼻兩旁筋亦結鼻兩旁交頞即山根大腸脈夾鼻孔小腸脈抵鼻膀胱筋結鼻下兩旁氣出於鼻氣熱且郁則蒸成水而為涕但熱不郁則干且痛而帶辛鼻塞一由腦冷而氣化液下凝於鼻如天寒呵氣成水也腦暖立通一由氣熱蒸涕壅塞固矣乃極力去其涕而仍不通者則竅之外皆涕液之所浸淫肉理脹滿竅窄無縫故也風寒外束氣不外越止從鼻竅上出則鼻氣盛而喘息有音初時氣勢上壅之甚故化水速而多且清後則勢略緩故涕不即出久蒸而成濁然濁涕有不由外感者素問謂膽移熱於腦則辛頞鼻淵鼻流濁涕如泉不止也傳為衄蔑衄蔑鼻出血也熱甚所致瞑目暗也血因衄而虛不能養目由膀胱脈絡腦受腦之熱注於胃脈薄於頞中故鼻辣痛而濁涕下蓋腦液下滲也俗名腦漏防風湯衄血詳血症門偶感風寒鼻塞者自作風寒治若平日常常鼻塞不聞香臭或值寒月或略感風寒即塞者乃肺經素有火鬱喜熱熱則行散故喜之惡寒故略一感寒即發氣壅不舒熱鬱於腦鼽淵瘜痔皆由此生清金降火為主桑白皮不可少佐以通氣之劑氣有餘為火固矣亦有脾胃氣虛不能升發鬱而成火者補中益氣湯見氣主之外治瓜蒂細辛麝為末棉裹塞鼻或萆麻仁和棗搗塞每日易之常流濁涕名鼻淵六味丸見虛損甘菊薄荷玄參蒼耳子腦屬腎故用六味又有腦痛鼻出臭黃水俗名控腦砂有蟲食腦用絲瓜藤近根者三五寸燒存性酒服二錢立效外用桃葉作枕鼻淵又見傷風門常流清涕名鼻鼽肺熱者肺熱則氣盛化水成清涕其不為稠濁者火性急速隨化隨流不及濁也桔梗山梔薄荷麥冬玄參辛荑甘草若因腦冷所致腦冷則氣化液下溜若天寒呵氣成水也蒼耳子乾薑升麻藁本辛荑川芎肉桂瘜肉痔癰鼻中肉贅臭不可近痛不可搖此濕熱壅盛所生如地濕熱而蒸成芝菌也清肺飲羌活勝濕湯見傷濕或白茯桔梗山梔黃芩辛荑白芷木通柴胡防風蒼朮薄荷外用白礬末加硇砂少許吹之或瓜蒂細辛麝香為末棉裹塞鼻即化黃水桃葉嫩心亦可塞又雄黃白礬苦丁香為末霜梅肉搗膏作條入鼻內亦效鼻瘡黃連大黃麝香為末擦鼻中辛荑膏亦可內服烏犀丸肺熱鼻乾無涕心神煩亂犀角散桑根白皮散鼻痛葛根竹葉青黛薄荷防風石膏升麻石斛外用宣腦散取鼻中黃水食物卒從鼻中縮入介介痛不出以牛脂或羊脂如指頭大內鼻中吸入須臾脂消則物與同出鼻紅赤或紫黑陽明血熱多得之好酒熱氣熏蒸肺葉故鼻紅赤若為寒冷所搏凝結不行則瘀濁而變為紫黑治須融化滯血滋生新血去風熱丹參生地當歸紅花山梔桑白防風薄荷煎服或酒製四物湯見血加酒炒片芩陳皮生甘草酒紅花生薑煎調五靈脂末形肥氣弱者加酒黃耆臨服入好酒數滴為引若素不飲酒則為肺家風熱前一方加荊芥亦或臟中有蟲用去蟲藥外用杏仁二十個去皮油胡桃二個連皮瓦上焙不可焦大楓肉三個水銀三分唾津手研成黑水塗之三兩次愈鼻氣臭非瘜痔其人病重者乃臟壞氣臭不治口脾開竅於口胃筋脈夾口胃經血氣少兩吻多紋畫大陽脈夾口交人中口苦心熱黃連生地麥冬丹皮必用膽熱則膽汁上溢亦苦柴胡龍膽草生甘草棗仁茯神生地口淡胃熱石斛石膏竹葉青黛濕盛加白朮半夏茯芩又大瀉後多有口淡者不可作熱治口甘脾熱白芍山梔蘭草花粉黃連口咸腎熱六味湯見虛損加玄參知柏口酸肝熱柴胡黃連膽草逍遙散越鞠丸並見郁口辛肺熱桔梗山梔黃芩桑皮二冬沙參口常流涎脾胃熱津溢也清胃散見齒亦有脾虛不攝者六君子見氣加益智妙亦有腎熱者六味丸見虛損加知柏口乾澀火盛津虛大忌五苓星半五味為君加二冬白芍生甘草人參烏梅又用黃芩葛根生津防風薄荷二味疏風按風即熱也栝蔞去痰不用星半而用此取潤惡燥也又生津方神效口瘡熱與痰上盛也口舌狀如無皮曰口瘡糜爛曰口糜實熱者可用寒涼金花丸涼膈散見發熱升麻飲之類西瓜漿最妙冬月西瓜皮燒灰噙黃連散去熱涎亦有虛熱者脾胃氣虛下陷鬱而成火上炎所致補中益氣湯見氣加竹葉花粉若下焦虛寒逼其無根之火上炎者八味丸引火歸元外用生附子末唾調塗足心若腎水虛火炎者六味丸加知柏晡熱夜熱血虛也八物並見虛損加丹皮五味麥冬口破色紅腮舌腫乾渴涼膈散見發熱赴筵散色淡白不渴由思煩多醒少睡虛火所發滋陰四物湯柳花散口瘡連牙根爛痛玄參散久不愈以五倍末擦之使收斂鵝口初生小兒滿口生白屑也心脾熱所致先用綿蘸水洗去後用冰硼散吹之內服涼膈散口疳多食肥甘積熱所致用口疳藥吹之口苦無皮中氣虛熱清熱補氣湯口臭竹葉石膏湯見煩躁加減甘露飲胃火之臭必穢濁若臭而餿腐則食停不化之臭當辨口腥臭肺熱也桑白皮地骨皮黃芩知母五味子麥門冬桔梗懸癰生上齶發紫泡者是銀針挑破吹口疳藥碧丹見咽喉亦可口菌生牙肉上隆起形如菌紫黑或生舌上俱口疳藥吹或用茄母蒂燒灰鹽拌醋調時擦唇脾之榮在唇四白胃脈環唇肝脈環唇內三經熱盛則唇紅甚寒則青黑氣血兩虛則黃白血液虛熱則乾燥燥甚則裂風動則瞤唇動不止也驗臟腑之寒熱莫便於此唇乾生地麥冬山藥當歸白芍人參蜜冬月唇乾折裂血出用桃仁搗豬脂調塗唇裂石膏黃連當歸生地石斛竹茹生甘草蜜風熱者白芷升麻防風黃芩甘草唇瞤柴胡防風荊芥山梔生甘草當歸赤小豆薏苡唇青黑理中湯見中風唇繭腫起白皮皺裂如蠶繭亦有唇下腫如黑棗者亦有不腫縮緊小起白皮者名緊繭皆燥熱所致治須潤燥清火消風大概以養血為要腎虛者內熱口乾吐痰體瘦濟陰地黃丸肝火柴胡清肝散胃火清胃散見齒脾經風濕瀉黃飲子唇瘡蟲食喉則上唇瘡聲啞食肛則下唇瘡咽乾黃連犀角烏梅木香雄黃桃仁煎服亦有氣鬱生瘡甑上滴下汗傳之如神白荷花瓣貼之亦效小兒燕口瘡燕窠土擦發灰擦並效大抵唇口舌諸瘡暴發赤腫痛者多實熱涼膈散見發熱梔子金花湯可用若日久色淡瘡白時痛時否多屬虛熱清心蓮子飲見赤白濁四物湯見血加知柏丹皮少佐肉桂補中兼清可也若服涼藥久不愈者以七味地黃湯見虛損冷服引火歸元甚則加附子齒取牙男子八歲腎氣實而生齒三八而真牙生五八則齒槁八八而齒去矣女子亦然以七為數蓋腎主骨齒乃骨之餘髓之所養故隨天癸為盛衰又胃經之支者入於上齒大腸經之支者入於下齒故腎髓足腸胃實則齒堅牢虛則齒搖動齒痛者皆齒之根肉痛也由風熱濕之邪入聚為液為涎與齒間之氣血相搏擊而痛濕熱盛則痛且腫風熱盛則痛而不甚腫又濕熱生蟲蝕其牙根則亦痛又風熱盛搏擊於血則血出甚則氣血腐化為膿出臭汁名齒齲齦肉消蝕則齒根露而挺出名齒挺腎熱則齒色黑而槁腎竭則面亦黑齒痛腎虛無熱者但搖動不痛痛必因風火與蟲風有外風有內風內風即熱氣外風則外感之風寒也內有火為外風所鬱則益烈故痛甚亦有頭腦感受風寒腦痛連齒者羌活附子湯發散之此腎經虛而犯風寒也齒屬腎腦亦屬腎寒邪犯腎為傷根本宜急治緩則不救真頭痛者必死是也白芷散亦可此證必喜熱齒亦不腫不蛀蓋暴病也與素病齒者異若不連腦止連頭項者乃外風鬱熱於內也立效散濕熱甚而痛者承氣湯見大便不通下之輕者清胃散六鬱而痛者越鞠丸見郁風熱而痛者獨活散不愈茵陳散中氣虛而痛清陽不升而濁火上炎也補中益氣湯見氣此證多有齒縫脹不能嚼者腎經虛熱者六味丸見虛損諸證未能細辨且與消風散見頭痛揩抹又並宜香附炒黑三分炒鹽一分研擦又石膏胡椒為末擦立愈牙痛用清涼藥反甚者從治之蓽茇川椒薄荷荊芥細辛樟腦青鹽為末擦則熱散而不郁得熱則痛得涼則止常欲吸冷風者以黃連梧桐律之苦寒薄荷葉荊芥穗之辛涼治其濕熱更以升麻引入胃經以羊角灰引入腎經加麝香少許為末擦又以調胃承氣湯見大便不通去芒硝加黃連下三五次胃熱致痛不可忍連頭腦滿面發熱大痛其齒喜寒惡熱清胃散亦有得寒而反痛者熱被郁也亦有惡風寒者熱已為風寒所郁故惡也金沸草散見咳嗽齒縫有紅肉努出者消風散見頭痛臨臥茶點服仍入荊防白芷蜂房之屬煎頻漱口亦有寒熱並惡者寒熱之邪混雜作痛也宜當歸龍膽散益智木律散惡寒之情多於惡熱者寒多熱少也草豆蔻散惡熱之情多於惡寒者熱多寒少也立效散麝香散上牙疼升麻散惡熱者灸足三里下牙疼白芷散惡寒者灸三間腎虛牙浮長動搖欲脫而痛者六味丸八味丸並見虛損黑錫丹見厄逆擇用齒長漸至難食名髓溢蓋腎水不藏而浮泛之故白朮煎湯漱服長用刷牙牢牙散白牙散羊脛散齲蛀數年不愈當作陽明蓄血治之桃仁承氣湯見血料丸服好酒者多患此參血證齒衄蛀牙痛蘆薈白膠香塞蛀孔內松脂鋭如錐者塞孔中少頃蟲出脂上溫米醋漱出蟲愈天仙子燒煙用竹筒抵牙引煙燻之蟲即死水瓦片置油拌韭子燒煙閣在水碗上以漏斗覆之熏牙蟲如針者皆落水中蟲出穴空而痛者乳香炙軟實之樟腦川椒各五分研碎放銅杓內茶鍾蓋稠面封四圍勿令走氣微火升之少頃覺聞樟腦氣取起地上候冷揭開藥俱升在鍾底入瓷器收貯每用少許塞痛處立愈牙齦宣露蔓荊子生地黃地骨皮青蒿各一兩郁李根皮二兩每用五錢水煎熱含冷吐蚯蚓屎水和為泥火煅赤研如粉臘月豬脂調敷日三次牙齒動搖還少丹地黃丸見虛損陰虛內熱者甘露飲牙齒不生黑豆三十枚牛糞火燒令煙盡取出細研入麝香少許研勻先以針挑破不生處令血出乃塗藥不可見風忌酸鹹物露蜂房散川升麻散牙槽風齒痛不已齦肉連頰浮腫紫黑出血腐爛口疳藥內加牛黃倍珍珠兒茶頻吹久不愈牙縫出膿甚則齒落名牙漏上邊龍門牙落不治外吹疳藥內用滋陰降火之劑又牙槽風潰後腫硬不消出臭血而不出膿者名牙疳臭穢難近清胃散有風加防風甚則用蕪荑消疳湯數下之牙疳爛黑防穿腮蘆薈消疳飲外用人中白散疳速者一日爛一分兩日爛一寸殺人最速名走馬疳鼻梁發紅點如朱及上唇龍門牙落者死口疳藥見口加牛黃小兒痘後毒發多此證或用緑礬一塊安鐵繡器上燒乾先用青絹蘸濃茶攪口淨乃敷之若惡寒喜熱胃氣傷者補中益氣見虛損牙癰俗名牙蜞初起齦肉或上或下或內或外腫硬成條是也口疳藥吹之牙咬牙盡處腫也初起勢盛夜尤痛甚清陽散火湯外用金碧二丹吹並見咽喉若牙關緊閉用黃熟香削釘漸漸撬進牙關漸開即吹之牙肉腫如豆大或內或外無定處先用金丹後用口疳藥穿牙疔先二日牙痛發寒熱後痛更甚齦上發一紫塊齦肉皆紫黑者是主金丹加碧丹吹之內服涼血清火解毒之劑破者口疳藥加牛黃小兒馬牙齦上有白色如脆骨者是將發此毒即打嚏日日以針挑之牙楚因食酸所致胡桃解之滿口牙出血枸杞為末煎湯漱之然後吞下立止又馬糞燒灰存性擦之立止欲取牙鳳仙花子為末糝牙根自脫干玉簪花根亦效舌舌為心苗脾脈連舌本散舌下腎脈挾舌本膀胱三焦筋並結舌本肝脈絡舌本舌胎見四診察舌條舌衄詳血門舌腫痛舌下腫似又生一小舌名重舌腫硬不柔活名木舌皆心脾胃經蘊熱涼膈散見發熱梔子金花湯見唇玄參升麻湯熱而痰盛者清熱化痰湯重舌外治桑皮殭蠶發灰醋調敷舌下金丹見咽喉吹更妙並用黃連犀角山梔丹皮生地木通赤芍麥冬連翹生甘草木舌腫甚色如豬肝滿口脹塞先於舌尖或兩旁刺之又看舌下有如螻蛄臥蠶腫突者刺出紫血棉蘸甘草水潤之用百草霜細研醋調敷舌上下或同鹽等分井花水調塗凡舌腫脹宜刺舌尖或舌上或兩旁出血惟舌下廉泉穴屬腎經慎刺恐出血太過則喑按木舌有不痛者痰濕盛於熱也又有麻舌火噓痰沸故麻或血虛氣澀亦麻理詳痹門舌強舌腫必強即木舌之不能柔活也牛黃散又用蛇蛻燒存性全蠍等分為細末敷之又有痰涎滯其筋脈不能轉運而強者詳中風門又有熱極燥血不能榮其筋脈拘急而強者詳中風門甚則為捲縮舌捲縮肝經熱極血枯不能榮筋故捲縮又傷寒直中陰經寒甚筋脈收引亦捲縮並詳傷寒然經謂邪客三焦之絡喉痹舌卷口乾心煩又謂大腸筋病轉筋舌卷則不止肝之一經為然可知亦不止傷寒一證為然可知矣風寒濕所中而舌強捲縮小續命湯見中風挾熱升麻湯加桔梗漱之碧雪敷之舌出不收熱甚縱長之與腫大一也故皆為熱甚珠末冰片等分敷之內服黃芩殭蠶膽星烏藥竹瀝等去痰清熱傷寒熱毒攻心及傷寒愈後不能調攝陰陽易常有此與中毒大驚産後俱有之甚有出數寸者用巴豆一枚去油取霜紙捻卷之內鼻中舌自收此治傷寒後不調攝者産後者硃砂末敷舌令作産子狀以二女掖之乃於壁外潛纍盆盎觸倒作聲聲聞而舌收矣余者雄雞冠血浸舌或冬青濃汁浸舌縱流涎涎從舌下廉泉穴出乃腎火盛而逼津液上出也神龜滋陰丸見痿芩連梔柏竹瀝薑汁等可用舌乾裂花粉散瀉心湯舌生瘡甘露飲口舌生瘡體倦食少清熱補血湯不應補中益氣湯見氣加五味子思慮太過血傷火動者歸脾湯見血加柴胡梔子丹皮舌下生水泡初起一漸至七八枚名連珠疳吹口疳藥見口咽喉咽在喉後主納食胃之系也喉在咽前主氣出入肺之系也胃腎肝三脈循喉任脈至咽喉靈樞謂手陽明大腸手太陰肺經之正循喉嚨足少陽膽經之正挾咽脾脈挾咽心脈支者挾咽小腸脈循嗌咽按咽喉為飲食呼吸之路居臟腑之上不論何經之邪皆得上干之觀經謂邪客手少陽三焦經之絡令人喉痹可知不必其經脈之循於咽喉者乃能為病矣咽喉之病皆屬火有上焦火盛者有下焦火沖者以致痰涎氣血聚結腫痛閉塞蛾喉腫痛在咽喉兩旁者名雙乳蛾形若蠶蛾故名亦有形若棗栗者在一邊者名單乳蛾如白星上下相連者名連珠蛾但張口可見者吹藥易到針刺易施深而不可見者頗難治俱宜服清咽利膈湯吹冰硼散見口易見者膿熟針之難見者桐油餞探吐膿血若痰壅氣急聲小探吐不出者危急用三稜針刺少商穴在大指甲內邊去甲韭葉許刺深二分出血仍吹服前藥緩緩取效若形如圓眼有紅絲相裹或單或雙生於喉旁有頂大蒂小者不犯不痛名為喉瘤由肺經鬱熱多言損氣而成忌針益氣清金湯外用消瘤碧玉散點之喉痹痹者閉塞之謂飲食難入語言難出喉中或有瘡或無瘡或有塊如丸如拳若初起即發寒熱勢盛而急且痛且癢繞頸紅腫痰涎壅塞聲如拽鋸即名纏喉風須臾不救急令張口針其喉中腫處並刺兩手少商穴出血或以桐油餞探吐其痰隨用甘草湯漱口以解桐油之氣為上策若牙關緊閉用巴豆油紙捻蘸燃吹滅令鼻吸其煙即時口鼻流涎牙關自開或水化解毒雄黃丸吹鼻達咽即吐牙關亦開隨用上法以通其閉塞頻服喉痹飲或清咽利膈湯吹金碧二丹或冰硼散見口藥內須加牛黃功效乃速準繩急喉痹有聲如鼾痰涎響者此為肺絶之候宜參膏用薑汁竹瀝開服或先煎獨參湯救之遲則不及豫按此證屬風火急暴痰涎壅塞致氣閉塞以死非氣虛也不務撩痰出血而補氣何也及見醫貫引此有注云類中風多此證又觀景嶽全書論陽虛喉痹謂非喉痹因於陽虛乃陽虛由於喉痹緣患喉痹而過服寒涼或艱於飲食致中氣虛寒暴脫聲如鼾痰如拽鋸宜人參湯救之云云乃知準繩所言不為初起實證立法勿誤會也腫發項外膿脹痛者防透咽喉不可輕針急用皂角末吹鼻取嚏其腫即破或兼用皂角末醋調厚敷項腫凡喉證皆由內火熾盛若兼感風寒則火被寒束其性更烈有舌脹出口攪動者名弄舌喉風治法大概相同凡兼外感者切忌膽礬等酸收之藥吹點斂熱不散又忌硝黃等下劑致陽下陷凡同時多病此而惡寒者屬時行之寒疫也即為外感當用甘桔湯加黃連殭蠶荊芥半夏鼠黏子根薄荷等發之挾虛者加人參當歸輩水漿不入者先用解毒雄黃丸四五粒極酸醋磨化灌令吐痰上言不可用酸收此用醋者為吐痰計也吐痰須收斂在一處乃吐之既吐則醋亦隨出矣又醋能消積血更用生薑汁灌之一以散寒一以去用醋之澀卻用上藥咽喉證最忌半夏生薑以內火得辛散愈熾也惟兼外感可用若風寒結熱先於耳前聽會穴起形如瘰癧漸攻咽喉腫痛者宜速用牛黃清心丸兼服清咽利膈湯吹冰硼散見口若純是內火不兼外寒則酸澀之品硝黃之劑正當用矣大約撩痰出血為此證急務按此證有無兼外感最難辨何則外感必發熱惡寒脈浮而此證急者初起亦發寒熱脈浮若初起一二日不發寒熱三日後乃發者則為緩證故難辨也須問其有無受風受寒及有無時行證同細細察之大抵無外感者必先一二日見胸膈氣滯痰壅後見喉痛乃身發寒熱若因外感者必先發寒熱後見胸膈氣滯痰壅咽喉痛也以上皆言急證若緩證便宜緩治喉痹飲徐徐頻與不可過用寒涼恐痰結胸中得寒則凝滯不運漸至喘塞不治其有氣急閉甚者殭蠶為末薑汁調下立愈或馬蘭根苗搗汁鵝翎蘸探吐或飲汁亦妙或以汁和醋含漱皆可此證必問二便便利者浮游之火上攻宜消風熱降氣解毒喉痛連胸紅腫而痛恐是肺癰必用蜜調藥加百草霜桔梗為要婦人喉證先問月經閉者用通經藥一服愈此證雖因於火而火有虛實實火因過食煎炒濃酒厚味蘊積熱毒其證煩渴便閉宜用重劑潤下泄其積熱大便通後乃用去痰解熱之藥清和上焦然元氣有餘可用硝黃弱者須滋燥潤腸或蜜導虛火由勞心好色七情內傷以致腎水虧損火上炎午後痛甚者宜滋陰降火此證初起有覺咽喉乾燥如毛草硬物刺梗微紅腫痛甚者日久紫暗不鮮頗似凍榴子色其後破爛腐衣疊若蝦皮聲音雌啞臭腐延蝕妨礙飲食宜知柏地黃湯見虛損若吐酸甜涎者甘露飲見齒加黃連便燥者煉過豬油白蜜各半挑服二匙日三五次腫吹紫雪散腐吹八寶珍珠散此治腎水虛火炎者若腎陽衰虛下焦陰寒之氣逼其無根之火上衝者亦午後痛甚須八味丸見虛損料大劑煎湯冰冷與飲引火歸原乃可救切不可用寒涼人之咽喉如曲突曲突火炎若以水自上灌下突爆裂矣惟灶床下以盆水映之上炎即熄所謂上病療下也亦忌發汗針砭出血又有中焦陽衰虛浮之火上炎而咽痛面赤喉干口舌生瘡過勞更甚或午前甚者其脈必浮大理中湯見中寒加山藥以上降之山茱萸以下降之理見六味丸注或補中益氣湯見氣加麥冬桔梗牛蒡子若面唇俱白不寐懶食歸脾湯見血加酒炒川黃連俱用冰硼散見口一錢加燈草煅灰存性者三分吹之立效凡紅腫無形者燈草灰最宜凡屬虛證其勢必緩其色亦淡其腫亦微喉癬喉間生紅絲如戈窯紋又如秋海棠葉背乾燥而癢久則爛開有小孔如蟻蛀故又名天白蟻由過食辛熱致胃火上炎灼肺所致癆證亦多此皆屬火盛水虛觀其乾燥不腫可知矣宜廣筆鼠黏湯未潰吹礬精散已潰吹清涼散須精心寡欲戒厚味發物庶可保全若至喉啞或爛開疊起腐衣形如蟻蛀多不救喉菌狀如浮萍色紫憂鬱氣滯血熱使然婦人多患之初用碧丹五金丹一後則碧三金二吹之噙清靈膏服喉痹飲喉瘡層層如疊不痛日久有竅出臭氣枸杞葉燒酒頓服久嗽喉痛烏梅肉五分柿霜天冬麥冬硼砂各二錢玄參一錢蜜丸含化會厭痛詳下喑門喉柱腫痛燒鹽枯礬研勻箸頭點之即消內服甘桔射干湯禁針傷命凡喉證已碎破損也者先吹長肉藥後用碧丹痰不出用金丹加制皂角少許倘至穿爛多用口疳藥見口加龍骨珍珠凡喉證無痰者不治水涸也且無可去閉從何通故難凡喉證舌腫滿口色如胡桃茄子硃砂紙不治最忌口渴氣喘痰如桃膠一頸皆腫面紅紫或青白無神皆惡候凡喉證急切無藥牙皂一個蜜調和水煎服凡喉證用諸冷藥不效者宜薑汁然已破損者用薑汁則辣痛且散而難收又在所禁矣喉痛則呼吸難通言語難出咽痛則不能咽唾納食喉痹必兼咽痛咽痛未必兼喉痹咽中結塊飲食不通此危證射干牛舌葉汁海藻俱治此然不若百草霜蜜丸芡實大新汲水化服甚者不過兩丸咽痛必用荊芥陰虛火上炎者必用玄參氣虛人參加竹瀝血虛四物見血加竹瀝實熱三黃丸見發熱或黃連荊芥薄荷為末薑汁蜜調噙或山豆根噙風熱表散之散之下已則收之或單用硼砂或和膽礬白殭蠶白霜梅噙不宜過用寒藥栝蔞一個白殭蠶微炒五錢桔梗七錢甘草炒二錢為末每用少許吹之紅腫可用此散一錢加朴消一錢吹之咽津有小白頭瘡者此散一錢加白礬五分吹之咽痛諸藥不效者非咽痛也乃鼻中生一紅絲懸一黑泡如櫻珠垂掛到咽門礙飲食用生牛膝根直而獨條者洗淨加好醋三五滴同研細就鼻孔滴二三點入去則絲斷珠破立安若潰腐久不愈由楊梅毒者須以萆薢土茯苓為主咽喉中有物不能吞吐如毛刺如絮如膜如梅核如肉臠均名梅核氣由氣結生痰日久恐成噎膈木香四七丸蘇子降氣湯四七湯二方見氣或人參官桂枇杷葉各五錢杏仁二錢五分蜜丸彈子大含化以愈為度或膽礬硼砂牙皂雄黃棗肉丸芡實大噙化溫黃酒一杯過口清咽屑更加諸物哽喉三因方煮薤白令半熟以線縛定手執線頭少嚼薤白咽之度薤白至哽處便牽引哽即出矣祕方用傾銀爐上倒掛灰塵砂糖和丸咽之自下骨哽槿樹葉油馬屁勃砂糖三味熬膏為丸噙化苧麻杵爛丸如彈子大將所哽物煎湯化下禽獸骨哽以犬吊一足取其涎徐徐咽之剪刀草如野茨菰生籬塹間其根白研之則如膠用順水吞下即吐出骨不過兩三口效研萱草根順水下亦佳朴硝研對入雞蘇丸如彈子大含化不過三四丸南硼砂井花水洗滌含化最軟骨貫衆濃煎一盞半分三服連進片時一咯骨自出魚骨哽以皂角少許入鼻中得嚏哽出細茶五倍子等分為末吹入咽喉立愈食橄欖即下或用其核為末順流水下魚骨在肚中刺痛煎吳茱萸汁一盞飲之則骨軟而出雞骨哽用水簾草搗汁飲之其骨自消野苧麻洗淨搗爛如泥每用龍眼大如被雞骨所傷雞羹化下魚骨所傷魚湯化下稻芒糠谷哽喉將鵝吊一足取涎徐徐咽下即消或取薦頭草嚼亦妙吞釘鐵金銀銅錢等物但多食肥肉自隨大便而下吞錢及鐵物在喉不得下南燭根燒細末湯調一錢下之吞鐵或針用飴糖半斤濃煎艾汁調和服或用磁石磨如棗核大鑽眼以線穿令吞喉間針自引出磁石須陰陽家用驗者吞錢燒炭末白湯調服數匙即出或服蜜升許或食荸薺茨菰其錢自下或用艾一把水五升煎至一升頓服即下或用百部根四兩酒一升漬一宿溫服一升日再吞叉取薤白曝令萎黃煮使熟勿切食一棗大即出吞錢叉及鐶飴糖一斤漸漸食之吞發纏喉不出取自亂髮作灰白湯調服一錢陳無擇云凡治哽之法皆以類推如鸕鷀治魚哽磁石治針哽發灰治發哽貍虎治骨哽亦各從其類也金鑑魚骨用河中養畜之鴨倒掛取涎仰臥頻灌喑一曰舌喑乃舌不能轉運言語而喉嚨聲音如故也婁全善云人舌短語不清乃痰涎閉塞舌本之脈而然蓋腎脈挾舌本脾脈連舌本心脈別系舌本三脈有虛則痰涎入之脈道閉塞不能運舌矣以參蓍朮歸陳皮竹瀝薑汁治之半月愈若三脈亡血筋枯縮亦喑經云刺舌下中脈太過血出不止為喑又云脈澀甚為喑是也前方加補血藥又風寒客之則急縮經云脈搏堅而長即弦徑意病舌卷不能言是也大秦艽湯見中風又熱則脈弛緩亦不能運宜清熱經云脾脈病舌本強視盛虛熱寒陷下取之又云手太陰之別曰通里去腕下一寸五分別而上行入於心中系舌本虛則不能言取之掌後一寸産後敗血迷心竅心氣不通脈亦不行舌強者七珍散妊娠喑者其言啞細無音由腎脈為胎盛阻絶不能上通舌本也不必治一曰喉喑但喉中聲啞而舌則能轉運也由勞嗽久而然蓋聲出於肺凡物中空有竅者能鳴肺有竅而虛者也喉為道路勞病日久火刑肺金金傷破則不鳴又火盛則痰壅痰塞肺竅是為金實亦不鳴也若熱壅成瘡肺癰喉爛則更甚矣不甚者聲止嘶破甚則竟不出聲也此屬內傷又有外感風寒入肺鬱熱成痰痰火窒塞肺竅不利聲亦嘶啞重濁又有大聲疾呼謳歌失音者亦金破之義也平常痰火上壅香附童便浸透為末調服以疏通上焦訶子泡去核以消痰降火開音木通以降火清肺導熱由小腸出桔梗以利肺氣童便以降火潤肺故諸方通用之發聲散開結痰橘紅煎湯化痰甚捷寒包熱者解表鬱金生地阿膠知母杏仁桔梗沙參蟬蛻牛蒡子童便寒痰結滯五粉丸積血作痛失音蛤蚧丸血為熱壅結滯肺竅勞證血枯火盛青黛蛤粉蜜調服狐惑聲啞詳傷寒氣虛感濕痰涎凝肺補虛去濕風寒鬱熱暴咳失音杏仁煎或灸豐隆二穴各三壯照海二穴各一壯立效仍藥之又有寒客會厭而卒喑吞吐不利者生附子去皮臍切大片蜜炙噙之勿咽一云咽津忌苦寒藥恐成瘡難消難潰皮毛鬚髮肌肉筋骨四肢二陰皮毛經曰肺之合皮也其榮毛也又云肺主皮毛肺氣不榮則皮毛焦津液去爪枯毛折皮膚痛屬火邪傷肺經云夏脈太過則病身熱膚痛為浸淫濕熱小瘡皮膚索澤枯索而不潤澤也由精血枯涸清燥潤肺可也牛骨髓真酥油合煉一處每日空心熱酒調服三匙治皮膚枯燥如魚鱗糙澀如鱗甲之相錯曰甲錯仲景謂勞傷虛極羸瘦內有乾血兩目黯黑肌膚甲錯大黃䗪蟲丸見虛勞主之又云咳有微熱煩滿胸中甲錯為肺癰葦莖湯主之皮膚麻木詳痹證門傷寒論曰身如蟲行汗多亡陽也可見麻由氣虛氣虛則運行不能流利噓其痰液紛然沸動有如蟲行若為風邪所湊痰被風噓如波浪沸騰其麻更甚矣先用生薑為嚮導枳殼以開氣半夏以逐痰羌防以散風木通牙皂以通經絡又殭蠶為治麻聖藥麻在手臂加桑條在股足加牛膝待病減用補中益氣見氣加參耆暑天熱傷元氣手與背麻參耆升柴白芍五味甘草空心服手摩患處午前又一服經年纍月無日不木乃死血凝滯於內外挾風寒用附桂為嚮導烏藥木香行氣當歸桃仁紅花阿膠活血木通牙皂穿山甲通經絡待病減用八珍見虛損補氣血必效渾身麻木八仙湯當歸茯苓川芎熟地陳皮半夏羌活白芍人參秦艽牛膝白朮桂枝柴胡防風炙草煎服四肢面目皆麻補中益氣見氣加木香炮附麥冬羌防烏藥但在腿麻木沉重黃耆甘草五味升柴當歸紅花陳皮青皮澤瀉名除濕益氣湯瘀血麻木四物見血加桃仁紅花韭汁因氣麻木紫蘇陳皮香附烏藥川芎羌活蒼朮南星半夏當歸桂枝甘草身麻有痰黃連半夏栝蔞仁黃芩茯苓桔梗枳殼陳皮天麻細辛南星甘草煎口舌麻木吐涎者並治皮膚癢痛癢皆屬火火甚則痛微則癢觀火近灼則痛遠烘則癢可見或以為風者風即火氣非有二也此內風也亦有火氣欲散忽感外風鬱火不得外散進退皮膚間擾動作癢者仲景傷寒論太陽篇有脈浮遲面熱赤不能得小汗身必癢之文可參也若無外風不得誤用風藥以證既屬火則血必虛風藥燥血不可用也但宜清火養血血行風自滅又火與元氣不兩立火之盛氣之虛也然瀉火便是補氣不必用補中四君並見氣等大抵遍身瘙癢由肺家血虛火盛而生風宜四物見血加二冬桑枝蟬蛻殭蠶牛蒡刺蒺藜威靈仙外用蒼耳葉地膚子浮萍煎水浴遍身搔癢起疙瘩俗名風疙瘩紅者名血風血分風熱也白者名白膜氣分風熱也廣州名風落瘼魚罾煮水浴或羊桃葉火燂熱擦並效此與赤白遊風相類所異者彼遊走而此痞耳又與發斑異此無病而陡發彼因病而後發也暑月痱子癢痛苦參四雨菖蒲二兩水五瓢煎數滾添水二瓢蓋片時臨洗和入公豬膽汁四五枚洗之不三次痊愈若抓破者緑豆粉一兩滑石五錢黃柏三錢輕粉二錢搽之遍身青紫斑點色若葡萄初起用羚羊角防風玄參麥冬知母黃芩牛蒡各八分甘草二分發須經曰腎之合骨也其榮在發多食甘則骨痛而發落又曰女子七歲腎氣實齒更髮長五七陽明脈衰面始焦發始墮丈夫八歲腎實髮長齒更五八腎氣衰發墮齒槁又曰衝任皆起於胞中上循胸裡為經絡之海其浮而外者循腹上行會於咽喉別絡唇口婦人數脫血衝任之脈不榮口唇宦者去其宗筋傷其衝任血瀉不復唇口不榮故須不生有人未嘗有所傷不脫於血其須不生何也曰此天之所不足也稟衝任不盛宗筋不成有氣無血唇口不榮故須不生張子和曰年少發早白落或頭起白屑者血熱太過也世俗止知發者血之餘以為血衰不知血熱發反不茂火多水少木反不榮火至於項炎上之甚也大熱病汗後勞病後發多脫落豈有寒耶用䤵針刺神庭上星囟會前項百會出血次調鹽油以塗髮根甚者至再至三少白可黑落髮可生按子和所論甚是嘗見人年三四十後頂發脫落者其人必躁動多火常患目疾頂發茂密者其人必沉靜少火從不病目可驗也丹溪治一少年發盡脫飲食起居如常脈微弦而澀輕重皆同此厚味成熱濕痰在膈間又平日多吃梅故脈弦澀酸味收濕熱之痰隨氣上升熏蒸髮根之血漸成枯槁故脫髮處以補血升散之藥用防風通聖散見中風去朴硝嫌其速下也大黃三度酒炒使上行瀉熱兼四物湯見血酒製合和作小劑治上故小其服煎以灰湯灰可治梅酸入水頻與之在上之藥不厭小而頻也兩月後診其脈濕熱漸解停藥淡味調養二年髮長如初甜瓜葉搗汁塗即生麻葉桑葉泔煮沐發七次可長六尺三青膏可染須肌肉經曰脾主肉邪在脾胃則病肌肉痛邪溢氣壅脈熱肉敗營衛不行必將為膿濕傷肉風勝濕甘傷肉酸勝甘又云多食酸則肉胝䐢而唇揭久坐傷肉形樂志樂病生於肉治之以針石筋骨經曰肝主筋筋病無多食酸酸傷筋辛勝酸又云多食辛則筋急而爪枯爪為筋之餘又云久行傷筋諸筋皆屬於節手屈而不伸者病在筋也伸而不屈者病在骨也轉筋皆屬血熱四物見血加黃芩紅花蒼朮南星因於熱者用此攣急疼痛松節二兩細銼如米粒乳香一錢共放銀石器內慢火炒出火毒研末每服一二錢熱木瓜酒調下因於寒者用此婁全善謂轉筋之時當隨其所痛之處燔針刺之以知為度愚謂用燈心蘸油燃焠可也因寒因熱俱可用余詳霍亂門腎主骨寒則堅熱則腐骨病無多食甘食甘積熱傷骨故過食甜而齒病齒者骨之餘又苦走骨骨病無多食苦久立傷骨四肢經謂四肢為諸陽之本又云陽受氣於四肢又云陽氣者起於足五趾之表其說可疑人身陰陽之氣皆從臟腑外達至於四肢故四肢為末今反以為本謂陽受氣於此起於此可乎若雲手之三陽從手走頭則足之三陽又從頭走足矣此等疑義千古莫晰何也陽實則肢腫熱腫也陽虛則肢滿寒脹也脾主四肢脾實則四肢不舉濕熱盛也脾虛則四肢不用氣困乏也風淫末疾故四肢顫掉五臟有邪留於肢節經云肺心有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪心有邪其氣留於兩髀腎有邪其氣留於兩膝是也手心熱屬心與包絡手熱赤癢掌皮厚裂脾熱肝風也脾主四肢風淫末疾加味逍遙散加鉤藤熟地手足心腫風也花椒鹽醋和敷之手足抽掣動搖弄舌吐沫不可遽作風火痰治其脈沉弱即是脾虛生風之證宜大補歸脾湯最妙臂發熱四物湯加秦艽丹皮白朮茯苓鉤藤甘草柴胡亦有怒動肝火小柴胡加川芎當歸亦可用加味逍遙散膝屬脾腎肝凡人逸則痿軟無力勞則痛如針刺脈洪數有力皆肝腎陰虛所致痿軟無力真病之形作痛如錐邪火之象六味加牛膝車前此證多疑其風痰而用發散者是促其危也有飲食過當腿足或臂內酸脹浮腫作痛又責之脾胃補中益氣加茯苓半夏足腿熱漸至腰胯蒼朮二兩酒黃柏熟地各一兩川牛膝歸尾萆薢防己各五錢酒糊丸腳弱無力及小兒不能行走天麻白附牛膝木鱉子各五錢烏頭炮一錢羌活五錢地龍一分乳香沒藥各二錢硃砂一錢酒煮南星末為丸每十丸薄荷湯下一切腿痛乳香官桂血竭丁香麝香各六分杏仁一分四釐蘄艾一兩木香六分沉香四錢檀香四錢各為粗末捲紙捻用油蘸點著烏滅照穴道針之腨㾓足肚痠疼也㾓音淵足太陽膀胱病防風羌活紫蘇蔓荊之類腳赤腫痛潰膿足三陽濕熱下注可治微赤微腫膿清足三陰虧損難治若黑暗不腫痛不潰膿煩熱作渴小便淋漓陰敗未傳急證急用八味丸著肉灸亦有生者濕熱下注隔蒜灸解壅毒次服補中益氣六味丸自愈又四肢皆稟氣於胃胃血氣盛則善步胃血氣少足少肉善寒漸成痿厥足痹故足疾必用補中益氣不可不知足跟痛足跟屬膀胱腎熱痛乃陰血虛極聖愈湯生地熟地當歸人參黃耆又經驗方牛膝一兩苡仁一兩五錢蒼朮七錢五分杜仲黃柏當歸石斛萆薢木瓜秦艽木通各五錢足心屬腎或熱或癢痛是水虛或麻或腫脹是火虛皆腎虛六味八味消息之又有足心如中箭發歇不時腎不虛而熱盛也此腎之風毒瀉腎則愈余詳臂痛厥逆攣抽搐顫振腳氣各門二陰詳泄瀉痢二便不通小便淋數黃赤遺尿不禁交腸關格赤白濁遺精陰痿陰縮陰縱疝脫肛穀道癢痛各門厥逆仲景所謂厥逆與內經所言不同蓋仲景單就傷寒言以陰邪直中寒入三陰而手足冷者為寒厥陽邪傳經熱入三陰而手足冷者熱深入陽內陷不達於四肢故冷也為熱厥蓋主外邪言不論寒熱證皆手足冷者也內經則指內傷言以上盛下虛氣血逆沖而上暴僕卒倒者為厥逆厥者盡也逆者上衝也言正氣虛竭上衝而欲脫也又分熱厥者手足熱寒厥者手足寒其不同如此仲景所謂寒厥熱厥及蛔厥臟厥等已詳傷寒論此篇止就內經所論言之經云內奪而厥則為喑痱此腎虛也詳中風門又云氣血並走於上則為厥暴死氣復反反於下也則生不反則死又云脈至如喘急促之意曰暴厥不知與人言即中風不識人證又云陽並於上則火獨光陰並於下則足寒又云陽氣者煩勞則張氣高喘也精絶熱耗水虛闢積於夏使人煎厥闢積即襞積衣褶也有疊積意疊積至夏令則益熱而如煎如熬矣即中暑證又云大怒則血菀於上血隨氣上壅也使人薄厥薄者相迫之謂言氣血亂於胸中相迫而厥即中氣證也又云偏枯痿厥肥貴人則膏粱之疾也即中食證又云衝脈者臟腑之海其上者出於頏顙滲諸陽灌諸精其下者並於少陰之經滲三陰下循跗故別絡結則跗上不動不動則厥厥則寒詳靈樞逆順肥瘦篇愚按衝脈實通身經絡之所會歸故又稱血海與任督二脈並起胞中胞中即丹田在女子謂之胞在男子為精室乃性命之根本也根本一敗諸經皆敗然則卒厥暴僕豈止一經一臟之所致哉又云邪客於手足少陰太陰足陽明之絡此五絡皆會於耳中上絡左角左額角也五絡俱竭謂脈為邪阻不至也令人身脈皆動而形無知也所謂形如死人其狀若尸曰尸厥鬄即剃其左角之發方一寸燔治即燒灰存性也飲以美酒一杯血餘通血酒通氣氣血通則蘇不能飲者口噤也灌之立已此即中惡證也以上經文與諸中篇中所言無異是經所謂厥逆者明以暴僕卒倒為言初不繫於手足之為寒為熱也此其與傷寒論所稱固大異矣然經亦有以手足寒熱為言者詳下文厥論謂陽氣衰於下則為寒厥以陰氣起於五趾之裡而聚於膝陰氣勝則從趾至膝上寒由此人質壯以秋冬奪於所用於秋冬陽氣收藏之時妄行耗散其陽如被奪去也陽氣衰損陰氣獨在故手足寒也陰氣衰於下則為熱厥以陽氣起於足五趾之表陰脈者集於足下而聚於足心故陽氣勝則足下熱由其人數醉若飽以入房氣聚於脾中不得散酒食在胃因房事傷其精氣不能運行也酒氣與穀食相搏熱盛於中遍於身內熱則溺赤腎氣日衰水受火耗陽氣獨勝故手足為之熱也詳此經文熱厥則手足熱寒厥則手足寒亦與仲景不論寒熱厥皆手足寒者異矣治法煎厥人參固本丸薄厥蒲黃湯尸厥二十四味流氣飲蘇合香丸見諸中菖蒲末吹鼻寒厥四逆湯六味附子湯灸陽輔絶骨或酒水各半溫漬至膝熱厥六味地黃丸見虛損小便三升溫漬手足另有痰厥即中風篇丹溪所云因於濕熱生痰者也若是寒痰迷悶四肢逆冷而卒倒姜附湯見中寒又氣厥分氣虛氣實虛者即中風篇東垣所謂因於氣虛者也實者即中氣篇所言者是也又有血脫之厥大吐大崩多致卒倒宜先掐人中或燒炭沃醋熏鼻以收其氣急用人參一二兩煎湯灌之然後依血證門用藥有色脫之厥淫欲過度立即脫死者急掐人中令陰人摟定用口相對噓暖氣通接之切勿放脫隨灸氣海數十壯飲以獨參湯如遲至三兩日乃脫者精去於先而氣脫於後也亦灸氣海飲參湯酒厥葛花解酲湯見傷飲食大醉則上盛下虛故卒厥食厥過飽適有感觸胃氣不行陽並於上上半身熱下半身冷即中食上部有脈下部無脈證擁爐不暖誤行溫補則死此陽明氣逆故兩手不冷平胃加減保和丸並見傷食攣攣者久不伸錮則難醫非如抽搐拘急暫病可比其理不外寒則收引熱則干縮二端而寒者易治熱者難治何則寒雖收引而筋脈不枯但用溫熱之劑以去其寒則陽回凍解而縮者以舒不難治也亦有日久寒氣聚沫結痰包裹堅凝藥不能攻者然尉洗烙灸法皆可施也惟熱而干縮者日久槁枯已定雖極力滋潤終難復元耳熱者多虛血液枯也亦有實者或為風寒所閉或為痰涎所滯血脈不得流通火性不受遏郁激而暴發陡然攣曲如蛇之動而攣曲是其象也觀腳之轉筋抽縮可見矣寒者多實血液痰濕為寒所凝滯亦有虛者陽氣不足也丹溪治一村夫背僂足攣已成廢人脈沉弦而澀用張子和煨腎散治之吐瀉兩月餘而愈抽搐準繩謂即瘛瘲瘛拘急也瘲弛縱也抽搐屬瘛然亦微異蓋拘急者筋脈拘束緊急不得伸舒觀腳指受寒筋急可見抽搐則頻伸頻縮也抽搐者手足頻頻伸縮也或言搐搦者搦謂十指頻頻開合兩拳緊捏也證屬風火風火為陽邪主動而不寧其不為躁擾而為搐搦者血枯筋急也若妄加灼艾或發其表則死不旋踵小兒急驚風多此證宜瀉木火涼驚丸主之血虛續斷丸肝邪盛宜救脾者小建中湯見勞倦加減熱傷元氣人參益氣湯見痹血氣虛弱內火盛兼中外風風火相煽則不得不加發散之品續命煮散兼心神昏憒者獨活湯産後血虛發熱熱盛生風得此八珍湯見虛損加丹皮鉤藤以生陰血不應兼補脾胃以生血小兒吐瀉後脾胃之陰氣虧損成慢驚風者亦多見此為虛風虛熱若更陽氣虛陷其風火尤為無根之虛焰虛者十全大補見虛損加桂附陷者補中益氣湯見氣加桂附此等陽虛之證肢體惡寒脈微細為真狀若脈浮大發熱煩渴為假象不可泥於證屬風火一語以為實邪也若戴眼反折汗出如珠不治按血枯筋急恐未盡然觀御痛者恆握拳咬牙與小兒驚搐咬牙捏拳形狀相同可知此證必因風火內攻有難於禁當者故有此抵禦情狀風火忽動忽息故搐搦有作有止若果由血枯筋急則應縮多伸少兩拳常捏且不必有咬牙情狀矣抽搐風木曲直之象也握搦咬牙病人禁當之情也顫振顫搖也振戰動也亦風火搖撼之象由水虛而然水主靜虛則風火內生而動搖矣風木盛則脾土虛脾為四肢之本四肢乃脾之末故曰風淫末疾有頭搖動而手足不動者木氣上衝也風火盛而脾虛則不能行其津液而痰濕亦停聚當兼去痰子和治馬叟風搐三年掉顫抖搜之甚如線引傀儡以防風通聖散見中風汗之繼服湧劑吐痰一二升又下行五七次數日又再湧去痰三四升又下數行乃愈但覺極寒蓋衛氣未復也以散風導氣藥調之不用溫熱恐又動火故也風火交盛者摧肝丸氣虛者參朮湯氣虛不能周四肢為虛風所鼓故動心血虛者補心丸挾痰導痰湯見痰加竹瀝老人戰振定振丸腳氣酒風腳腳腕瘡腳跟注孔腳氣之名始於晉蘇敬上古所無然其腫痛頑麻即經所謂痹也縱緩不收即經所謂痿也甚而氣上衝心腹即經所謂厥逆也病由濕致或水濕外侵或水飲內注其初多寒止見頑麻其後濕鬱成熱遂為腫痛濕熱蒸發則腫血氣壅滯則痛也若加以風寒外襲則熱愈不得泄而痛益甚矣兩腳之氣血既壅滯不行則周身之氣血亦不宣通鬱而發熱氣不宣通則不周於表故灑灑惡寒而證類傷寒矣縱緩不收者筋得濕熱則軟而無力也凡物之濕熱者必軟甚而上衝者下不通則反干乎上也治法須分濕熱多寡濕多熱少則腫甚而痛微濕少熱多則腫微而痛甚亦有單濕而無熱者但腫脹而不痛俗名濕腳氣單熱而無濕者但熱痛而不腫甚者枯細俗名乾腳氣雖曰無濕亦必有老痰惡涎凝聚不散初起止覺冷凍頑麻而腫灸患處二三十壯以引濕氣外出更飲驅濕藥酒以通經散邪用藥宜麻黃川烏薑附之屬麻黃髮散使濕從外泄川烏辛熱走而不守以通行經絡薑附以散其寒羌防升麻葛根輩以升散之風勝濕也二術以燥之土剋水也兼用二苓澤瀉輩以利之此治寒濕之大法也苡仁酒獨活寄生湯可用若初起止覺熱痛不腫乃三陰血虛陽邪下陷成熱不散血脈不通而痛也無濕故不腫治宜清熱養血四物見血六味見虛損並加牛膝黃柏知母又用補中益氣湯見氣以升提陽氣之下陷此治虛熱之大法也實熱則兼濕痰腫而痛也便結者羌活導滯湯微利之後服當歸拈痛湯見身痛身有寒熱者加味敗毒散後服當歸拈痛湯見身痛疼如火燎熱至腰胯加味二妙丸痛不可忍者五積散見中寒加全蠍三個酒煎大抵濕熱壅塞治宜宣通活絡丹見中風最妙邪深伏者非此不能透達若壅塞既成須砭惡血以殺其勢而後藥之此證須分經用藥前廉為陽明白芷升麻葛根為引後廉為太陽羌活防風為引外廉為少陽柴胡為引內廉為厥陰青皮川芎吳茱萸為引內前廉為太陰蒼朮白芍為引內後廉為少陰獨活為引又須察其有無外感感風則自汗感寒則無汗並加發散之品風加羌活防風寒加麻黃細辛若病甚而上攻少腹不仁或見食嘔吐腰脊身體俱痛胸脅痛則為重證但見少腹不仁不過二三日即上攻心心煩氣喘嘔逆頭痛眩冒不得眠譫妄目額黑汗大出脈短促而數左寸乍大乍小乍無尺絶者皆不治所謂衝心即死也今列數方於左丹溪用四物湯見血加炒黃柏另以附子末津調敷湧泉穴安艾灸之以引熱下行血虛熱上衝者宜之金匱八味丸見虛損治腳氣上入少腹不仁腎寒濕氣上衝者宜或茱萸丸茱萸木瓜湯檳榔為末童便調服大腹子散三脘散桑白皮散以上實者宜之犀角散熱者宜之沉香散無熱者宜之紫蘇葉三兩桑白皮炒二兩前胡去蘆一兩每服八錢檳榔二枚杏仁去皮尖二十粒生薑五片水煎湯服蘇子降氣湯佐以養正丹或四磨飲並見氣以上氣喘急者宜之八味平胃散見嘔吐畏食者生料平胃散見傷飲食並加木瓜一錢半夏散橘皮湯以上嘔逆噁心者宜嶺南人嗜酒者每多病此名酒風腳由酒之濕熱傷脾不能運化因而下墜結為痰涎不得解散所致其痛不可忍雖蚊蠅著腳重若石壓治此鮮有效者蓋利濕清熱易而去結痰難也準繩載治廉平章患此初用當歸拈痛湯見身痛二服效後食濕面復發以羌活辛溫透關節去濕為君當歸辛溫散壅枳殼苦寒消食為臣大黃苦寒導濕面下行並利留結老血為使全愈又云控涎丹見痰加胭脂一錢檳榔木瓜各一兩卷柏半兩先以鹽水煮半日又用白水煮半日同為丸每服三十丸加至五十丸利下惡物立效又云威靈仙為末蜜丸桐子大酒下八十丸利出惡物如青膿桃膠當仿其意用之先去其濕熱使氣血得通次以升柴等輕清之藥提拔痰涎上行以控涎丹及諸軟堅消結之品取之更砭去惡血可見活人書云腳氣忌服補藥禁用湯淋洗按此為邪氣壅實者言故忌補又為濕氣太盛將欲上衝者言恐淋洗蒸動其濕助之升騰也若濕正沉墜在腳不能外達正宜淋洗以導之外出用防風荊芥威靈仙草烏川椒白芷烏藥蒼朮紫蘇之屬煎湯熱洗可也兩腳須常護令暖有微汗仍不時令人按揉飯後常自行動以散泄其濕熱為佳夜飯宜少不食更好蓋夜食難消最能壅滯氣血也腳氣有腿腕生瘡者腫痛用漏蘆白蘞五加皮槐白皮甘草各七錢半蒺藜子二兩水煎去渣於無風處洗之心煩亂者犀角散腳跟注一孔深半寸許每下半日痛異常以人中白火上煅中有水出滴入瘡口赤白濁有精濁有便濁精濁出自精竅與便濁之出於溺竅者大異其出不因小便竅端時常牽絲帶膩如膿如眵頻拭頻出莖中或癢或痛甚如刀刮火炙大抵初起火盛則痛日久火微則癢而小便自清不相混也多由房事時精已離位或強忍不泄或被阻中止離位之精化成敗濁流出竅端故如膿如眵其氣臭腐又不泄則腎火鬱而不散敗精挾鬱火以出故莖腫竅澀而痛也日久敗精盡出則止矣而不止者雖火勢已衰但病久滑脫已敗之精與未敗之精相引而出故源源不絶也若火勢不衰或反盛者則並其未敗之精亦鼓之使出甚者精已枯竭並其未及化精之血亦出故有赤濁也精為血化觀天癸初至之子強力好色所泄半精半血可見矣其後火勢亦衰證轉虛寒者有矣舊分赤濁為熱白濁為寒非也若寡欲之人患此多因濕熱流注精房精為所逼不得靜藏所致與濕熱遺精同理熱者清心蓮子飲寒者萆薢分清飲虛勞者滋其陰胃弱者參朮加升麻柴胡濕熱流注二陳見痰加白朮升柴感暑熱者四苓見傷濕加香薷麥冬人參石蓮肉白濁初起勢甚敗精結塞竅道澀痛異常五苓見傷濕妙香散合清心蓮子飲白濁清火為主補次之赤濁補為主清火次之清心健脾滋腎固脫缺一不可清濁飲主之便濁多是胃中濕熱下流傷氣分則白即膏淋也便濁飲主之傷血分則赤即血淋也多者為尿血治詳淋證及血門溲血條遺精精者一身之至寶原於先天而成於後天者也精者水也天一生水原於有生之初而成於水穀之滋長五臟俱有而屬於腎靜則藏動則泄靜者水之德動者火之用火不勝水故在平人雖動而非與內接則亦不至於泄也若水極虛火極炎則心有所感雖不交亦泄矣夫必交乃泄者亦必寐且夢交乃遺可知也不必交亦泄者亦不必夢交與寐乃遺可知也故有不寐之遺與寐而不夢之遺寐而夢交之遺宜分別論之夢交何也曰相火客於陰器也陰器為客火所動動則舉舉則欲交故夢接內也使火不客於陰器則但為他夢矣然有有欲無欲之分焉無欲念而夢交者氣一則動志也有欲念而夢交者志一則動氣也氣動志者夢不必遺志動氣者夢無不遺相火獨肝腎乎曰足三陰陽明之筋與衝任督三脈之所會諸筋皆結聚於陰器則諸經之火皆得客之矣豈特肝腎為然哉以腎主精肝主泄故歸重此二者耳治者當審其所由致可也有腎水虛而火炎者滋陰降火為主有肝氣鬱滯而火盛者散郁升陽為主有脾胃濕熱下流者除濕清熱升清為主有用心過度而火熾者清心養血為主有肺感外邪或悲哀所傷而動火者散邪清肺為主此皆易治有久曠之人盛滿而溢者更不用治惟思慕色欲者為難非斬斷情根滌除妄念雖藥亦無濟也若乃不寐亦遺欲念一萌即泄與才寐不待夢交即遺則精滑之至也或房事過多而滑或夢遺日久而滑或虛寒不固而滑氣不攝精比之夢遺為甚矣然其治法亦無異也鎖精丸固本丸金櫻丸鳳髓丹固真散用心過度心不攝腎者遠志丸用交感湯加蓮肉五味子吞下仍佐以靈砂丹見嘔吐思色不遂精以離位客於陰器至臥而夢泄者四七湯見氣吞白丸子見中風甚者耳聞目見聞見其所思者之聲容也其精即出名曰白淫妙香散見赤白濁吞玉華白丹色欲過度下元虛憊泄滑不禁鹿茸丸見血山藥丸見腰痛大菟絲子丸見咳嗽固陽丸之類按此等皆熱劑非虛寒勿輕用五倍澀精敏於龍骨牡蠣交通心腎菖蒲遠志蓮子等不可少古方多治鬱滯庸醫誤用澀劑一少年遺濁少腹有氣衝上肝氣逆也每日腰熱腎火鬱也知其有郁先用滾痰丸見痰大下之次用加減八物湯吞滋腎丸見小便不通百粒若稍用蛤粉等澀劑則遺濁更甚遂改用導赤散見發熱大劑煎服遺濁皆止又一男子夢遺與澀藥更甚因與神芎丸見腫脹大下之卻制豬苓丸與服而愈脾胃濕熱下流者蒼白二陳湯見濕加黃柏升柴欲火大熾者清心使火不妄起遠志丸茯神湯一人勞心讀書致此臥時陰器但著被與腿即夢交而遺懸空則不夢蓋用心太過血虛火炎腎水亦竭火客下焦鼓其陰房精不得藏陰器著物如得接然故作淫夢而遺上則補心安神中則調其脾胃升舉陽氣下則益陰固精病隨安此等當以六味歸脾補中之屬主之一人年六十患瘧嗽誤治致濕熱下盛脈數而有力與補中益氣見氣加涼劑續與黃柏丸尺脈頓減問之曰夜來夢交否曰然幸不泄曰年老精衰固無可泄然火之結於精房者得藥已散走於陰器之竅病可減矣再服二日又夢其瘧嗽全愈亦有鬼魅相感者其狀不欲見人如有晤對時獨言笑或時悲泣如癡如呆是也脈乍大乍小乍有乍無左右互異治以硃砂雄黃麝香鬼箭虎頭骨之屬喻嘉言治祟方亦佳方見中惡門論末以澀治脫不止不如瀉心瀉心不止不如升陽升陽最妙腎氣獨沉者宜升脾濕下流者宜升肝鬱者宜升不止一途也思想氣結成痰迷於心竅豬苓丸之類利其痰經絡熱而得者作虛寒治則愈甚清心丸一人至夜脊心熱夢遺用珍珠粉丸豬苓丸遺止終服紫雪見篇末脊熱始除又有腰熱遺精者用滾痰丸下之又用導赤散見發熱治其火乃愈知身有熱而遺者多為熱遺也心神浮越水火不交而滑泄者鎮固之祕真丸八仙丹之屬命門火衰精脫玉關不閉者急用八味丸或金鎖正元丹遺證初起未有不由火盛者久則火衰氣虛而精滑矣若因過服涼劑而致寒者脈多緊澀寒鬱火於下焦也當先升提若脈沉遲是下元虛冷惟亟與溫補仍升提以挽其下趨有一種肝經濕熱甚者莖中作痛或挺縱不收白物如精隨溺而下此筋疝也龍膽瀉肝湯主之此為白濁之類紫雪方黃金百兩石膏寒水石磁石滑石各三斤碎共用水一斛煎至四升去滓入犀角屑羚羊角屑青木香沉香各五兩玄參升麻各一斤甘草炒八兩丁香一兩煮取一斗五升去滓入朴硝精者十斤消石四升如無芒硝亦可每升重七兩七錢半微火煎柳木攪不住手候煎至七升投水盆中半日欲凝入麝香當門子一兩二錢半飛硃砂三兩攪勻候冷成霜雪紫色冷水調服一二錢小兒量減能治煩熱狂躁兼解諸熱藥毒及小兒驚癇等證按咽喉門有紫雪散與此大同小異當參之陰痿陽動則舉險靜則痿雖無欲亦然觀小兒子夜䘒作可知況有心者乎然而不舉者則氣不從心也其故有六一則天稟使然而不可強者也一則有所恐懼而氣餒也一則神搖火飛氣上不下也此皆無病之人也一則濕熱太盛下注宗筋弛縱不收也一則耗散過度命門火虛也一則腎水虛衰熱盛壯火食氣也薛立齊所謂如木得露則森立遇酷暑則痿瘁也蓋水火和平則舉有水無火有火無水及水火淫盛為濕熱者亦不舉也參痿門自明此有病之人也火虛者附桂八味丸水虛者知柏八味丸並見虛損濕熱固真湯柴胡勝濕湯其證多有陰汗臊臭兩股熱者或反冷陰頭兩丸如冰者不可誤認為寒蓋濕熱在臟腑熱親上而濕流下故證如此也火上炎不下交者降之恐懼者鎮之陰縮隊縱陰受寒則縮受熱則縱傷寒囊縮陰證固有之熱證亦有以熱灼筋燥故縮也但以平人論則縮必因寒觀夏月囊軟縱冬月囊硬縮可知矣丹溪治鮑姓莖挺長腫痿皮拓濕潤磨股不能行兩脅氣上手足倦弱以小柴胡見寒熱加黃連大劑行其濕熱略加黃柏以降其逆上之氣挺腫收減但有堅塊未消又以青皮為君佐以散風之藥末服外以絲瓜汁調五倍末敷之愈濕熱腫挺朴硝荊芥煎湯浸洗甚者三一承氣湯見大便不通下之疝睪丸連小腹急痛曰疝或無形無聲或有形如瓜有聲如蛙小腹陰囊睪丸皆肝經部分蓋肝經筋脈環陰器而上抵小腹也故張子和謂此為肝經之病肝主筋睪丸非肝筋環引與玉莖無由伸縮經謂足厥陰之經筋聚於陰器傷於寒則陰縮入傷於熱則縱挺不收又言足厥陰之別曰蠡溝循脛上睪結於莖其病氣逆睪腫卒疝可見矣俗稱膀胱冷或曰腎冷腎氣通於外腎膀胱系與睪丸系會也或曰小腸氣皆非也膀胱為水府小腸為水道專主滲泄通流腎統二水皆與筋無涉雖經有言邪在小腸連睪系屬於脊貫肝肺絡心系氣盛厥逆上衝腸胃熏肝散於肓結於臍取之肓原以散之刺太陰以平之取厥陰以下之取巨虛下臁以去之此其初雖言邪在小腸至其治法必曰取厥陰以下之乃知疝必關於厥陰無疑又謂三陽膀胱經為病發寒熱其傳為㿗疝此亦言膀胱非受病之處必傳於厥陰部分乃為疝也又言脾風傳腎病名曰疝瘕小腹冤熱而痛出白精濁也風者熱也精得濕熱為敗濁一名曰蠱強中入房女所惑也曰風則屬之肝木可知矣以上言疝非膀胱腎小腸之病又云厥陰滑為狐風疝滑為陽邪熱則生風也少陰滑為肺風疝心火乘肺太陰滑為脾風疝陽明滑為心風疝金燥則熱熱屬心也太陽滑為腎風疝膀胱與腎為表裡也少陽滑為肝風疝皆言風者厥陰木氣之所主也又云心脈滑為心疝肝脈腎脈滑甚為癃㿉亦以滑為疝也意謂上條言滑乃風疝之脈則此條之滑亦為風脈可知也又云脈大急則為疝心脈滑搏為心疝肺脈沉搏為肺疝搏急非肝邪而何又云督脈生病從少腹上衝心而痛為沖疝蓋足厥陰與衝任督俱會於前陰也然則疝為肝病豈不明哉以上言諸經之疝皆歸於肝也按子和以疝病屬肝部分甚是然各臟腑經脈相通有由肝經自病者則亦有由諸經之病傳注者其論中所舉已自可見況經又有云足陽明之筋病㿉疝腹筋急足太陰之筋病陰器紐痛小腸病者小腹痛腰脊控睪而痛腎下則腰尻病不可以俯仰為狐疝寸口脈沉而弱曰寒熱及疝瘕少腹痛黃脈之至也大而虛有積氣在腹中有厥氣曰厥疝其詞不一而足此當細察蓋肝經為朝宗之地少陰太陰陽明少陽太陽諸經亦會於小腹前陰各經為發源之區源流並究可耳再按張子和以疝屬之肝趙以德則又屬之任脈謂衝任二脈起於胞中諸經皆受氣於此因以海名之二脈通則陽氣下降陰氣上行塞則陽壅於上陰結於下其所以閉塞者或任脈之自病偏寒偏熱或各經病邪相犯致任脈結滯陰氣不化使然引經任脈為病男子內結七疝女子帶下瘕聚為據其說甚有理然衝任督同體何不並舉乎竊謂諸經之邪皆得傳注衝任督三脈而結於肝經部分為疝則諸說皆會通矣再按趙以德謂疝有二不必小腹痛引睪囊乃名疝但心腹痛即名為疝引巢氏七疝為據一曰厥疝厥逆心痛飲食吐不下也二曰症疝腹中氣乍滿痛氣積如臂也三曰寒疝飲食寒冷即脅下腹中痛也四曰氣疝腹中乍滿乍減而痛也五曰盤疝腹中痛在臍旁也六曰胕疝腹中臍下有積聚也七曰狼疝小腹與陰相引而痛也趙氏蓋以上六疝止言腹脅痛而不及睪囊故謂心腹痛即名為疝庸詎知其非省文乎今定以小腹痛引陰丸為疝庶免岐惑又子和謂遺癃滑濁陰痿胞痹皆男子之疝血涸不月經後腰膝上熱足躄嗌乾癃閉小腹有塊或定或移前陰突出後陰痔核者皆女子之疝但女子不曰疝而曰瘕蓋皆肝經任脈之病故云爾疝病之由人皆以為經絡得寒收引不行而作痛丹溪謂是始於濕熱鬱遏又感外寒濕熱被郁作痛其初致濕熱之故固太勞而火起於筋醉飽而火起於胃房勞而火起於腎大怒而火起於肝火鬱之久蒸為盛濕濁液凝聚併入血隧流於厥陰肝火性最急暴為外寒所束宜其痛暴而甚也痛者熱氣之衝擊腫而重墜則濕之為耳虛亦腫但不甚墜耳左丸屬血諸寒收引則血泣故左丸痛多而腫少右丸屬氣諸氣鬱蒸則濕聚故右丸痛少而腫多張子和分七疝一曰寒疝囊冷結硬如石陰莖不舉或控引睪丸而痛得於坐臥濕地或寒月涉水久而無子宜以溫劑下之二曰水疝腎囊腫痛陰汗時出或囊腫如水晶或囊癢搔出黃水或小腹按之作水聲得之飲水醉酒使內過勞汗出遇風寒濕之氣結於囊中宜以逐水之劑下之三曰筋疝陰莖腫脹或潰或膿或痛而裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下得於房勞及邪術淫方所致宜以降心火之劑下之四曰血疝狀如黃瓜在小腹兩旁橫骨兩端約文中俗云便癰得於重感春夏大燠熱則血流溢勞動使內氣血流溢滲入脬囊結成癰腫膿多血少宜以和血之劑下之五曰氣疝上連腎區下及陰囊或因號哭忿怒則氣鬱而脹過後氣散則消者是也宜以散氣之藥下之小兒亦有此疾得於父已年老或年雖少而多病陰痿精怯勉強入房有子此胎中病不可治也築賓穴言之六曰狐疝狀如瓦臥則入小腹行立則下入囊中狐晝出穴夜入穴與相似故名今人帶鉤鈐者是也宜以逐氣流經之藥下之七曰㿗疝陰囊腫墜如升如斗不癢不痛者是也得之地氣卑濕所生潮濕之鄉多感此疾宜以去濕之藥下之女子陰戶突出雖亦此類乃熱則不禁固也不可便謂虛寒而澀之燥之本名曰瘕宜以苦下之堅之按子和於七疝皆言下之者以內有濕熱結聚不通也然必有此實證乃可下耳不可泥趙以德云豫嘗病脾肺濕熱流入右丸腫大寒熱交作雖張子和言疝病在下當下不當吐然脾氣下陷必升舉之因先服調胃之劑一二帖次早注神使氣至下焦嘔逆而上覺肋下積動到中焦則吐而出之腫減半次早復吐吐後和胃氣疏通經絡而愈凡用此法治傷酒水注右丸腫者輒效治法內寒者當歸溫疝湯外寒入腹者烏桂湯外寒內熱者川烏頭炮梔子仁炒各三錢煎服濕熱受外寒十味蒼柏散水疝尿不利茴楝五苓散瘕硬血疝大黃皂刺湯沖疝厥疝奪命湯氣疝諸疝走注痛者青木香丸神效狐疝及一切疝茴香楝實丸婦人産後血分受寒疝者羊肉湯諸疝灸大敦穴即安尊生書謂治法斷不宜補薑橘同煎補肝細辛閉肝氣必禁虛亦須補此太泥疝脈必弦急忌微弱亦有挾虛者脈雖沉緊必豁大無力其痛亦輕但重墜牽引耳人參牛膝可用余皆作實治破疝湯主之木香玄胡橘核荔枝核茴香川楝子沒藥地膚子青皮馬鞭草根煮汁煎寒疝加吳萸附桂亦有睪丸升上入腹者加飛鹽沉香或用雞鵝蛋殼燒灰空心酒下三錢二服壓至故所亦有脅旁動氣橫入陰處響聲如蛙墜下照前方去鹽沉水疝有一丸漸小竟消盡成獨丸者沉沉牽小腹作痛水疝湯白茯苓萆薢澤瀉石斛車前各二錢臨臥及五更各一服外用帶須蔥一大把煎湯洗睪丸頻添熱湯以手挪之即在湯內撒尿其病易去若囊破水流灶心土糝之狐疝晝病夜安氣病血不病也不宜辛香流氣之劑補中益氣湯見氣加知柏虎骨治之血疝睪丸偏大宜和血四物見血加桃仁玄胡橘核於夜分時一手托下一手按上由輕至重丸弄百回彌月瘀血盡散筋疝莖筋挈痛得之房術者宜解毒緩急甘草梢黑豆五倍同煎服㿗疝五苓散見傷濕加蔥白茴香鹽若丸腫如斗不癢不痛者得之有生之初無治法又有木腎頑痹硬大或痛或不痛者是也由寒冷凝滯當溫散破疝湯加海藻昆布川椒附子外用艾炒熱裹丸冷則頻換疝由小腸經得者舊名小腸氣又名橫弦豎弦繞臍走注小腹刺痛喝起湯救痛散由膀胱經得者舊名膀胱氣毛際上小腹作痛五苓散見傷濕加川楝子形如瓜聲如蛙木香神效散偏墜不拘左右川楝木香茴香蒼朮石菖蒲為丸每服三錢空心鹽湯下安臥片時微汗既止左邊痛不可忍茹神散外腎脹大麻木痛硬七治金鈴丸偏墜藥不愈用萆麻子每歲一個研爛貼頂門以繩縛兩足中指合縫處艾如麥粒大灸七壯即時上去隨去萆麻肛門陰囊腎莖癢甚抓破好了又癢人言熬醋洗立愈外有發熱忽生痄腮痄腮愈睪丸脹者耳後屬膽膽受風熱生痄腮移熱於肝故睪丸腫加味逍遙見郁入防風荊芥青皮脫肛氣虛不能收者宜補氣以升提之血虛加血藥寒者以香附荊芥等分煎湯洗若大腸受熱而突出者朴硝煎湯洗之腸風者涼血清腸散虛寒者不痛其脫而出托而入必滑實熱者必痛而腫突而出托而入必澀虛而挾熱者槐花散薄荷散日久不愈常宜服收腸養血和氣湯更須澀之龍骨散澀腸散外用五倍末糝蕉葉上托之數次即不復脫生鐵三斤水一斗煮取五升洗內服磁石散一法鱉頭燒灰塗穀道癢痛多因濕熱生蟲欲作痔瘻以雄黃入艾棉燒煙燻之並納蜣螂丸蜣螂七枚五月五日收去翅足炙為末新牛糞五錢肥羊肉一兩炒香共為丸如棗肉大炙令熱新棉裹納穀道中半日莫吃飯蟲即出三五度瘥杏仁搗膏敷杵桃葉一斛蒸極熱納小口器內坐熏之蟲即死木鱉子肉四五枚研如泥沸湯沖洗另用少許塗患處怒陽為陰閉不得伸則怒如雷之奮於地也震為雷陽在陰下陰雨則雷動陰雨以氣言之則寒也以象言之則水也水者有形之物也故人身陽氣或為無形之寒氣所閉或為有形之痰血所遏皆不得伸而鬱為怒經謂血並於上氣並於下則善怒是也東垣以食填太陰為木鬱用吐以達之亦此理也陽氣主升屬肝膽故雷發於春陽主舒遇怫逆之事則不得舒而怒亦郁遏之義也怒而不得發者發之怒而屢得發者平之經曰悲勝怒太息經曰憂思則心系急急則氣道約約結而不行也憂思鬱結則氣不行志為氣帥自然而然何必推說到心系急乎此真形骸之論後人之僞說耳故太息以出之舒之也氣盛而鬱則為怒氣不盛而鬱則為太息觀經謂膽病者氣不得升故為膽病善太息口苦嘔汁可知太息之與怒同屬於郁矣喜笑不休笑由於喜喜屬心則笑亦屬心經曰心藏神神有餘則笑不休神即心火也觀於火燔爍甚則鳴笑可知也燭笑而光搖人笑而氣浮子和以燒鹽滄鹽二兩火燒通赤放冷研細河水煎服探吐熱痰及黃連解毒湯而愈水剋火寒勝熱也悲悲屬肺悲則氣降肺主降故屬肺也仲景云婦人臟躁則悲傷欲哭象如神靈所作無故而哭即本人亦不自知故如鬼神所憑也小麥一升大棗十枚水煮服子和診一婦人問曰娘子常欲痛哭為快否婦人曰然子和曰火灼肺金金受屈制無所投告肺主悲故欲痛哭也投黃連解毒湯見喜而愈喻嘉言診姜宜人大腸血枯燥曰病中多哭泣否曰然蓋大腸與肺為表裡大腸燥則火熱干肺也驚遇事而驚者由於外也因病而驚者動於中也心為熱所乘則動而驚而屬之肝膽者以肝主動而膽虛則善驚也膽小及膽大而虛者皆善驚由血液不足也血液者水也水主靜水足則靜而不易動故不驚心肝賴血以養血虛則心之神無所依肝之魂亦不藏五臟之熱皆得乘心而致驚經謂陽明病者惡人與火胃熱則惡人之擾與火之熱不得安靜清涼也聞木音則惕然而驚木生火而主動故也舉陽明可概其餘矣內火之驚脈多浮數外事之驚脈多浮動動脈如豆搖搖不定是也黃連安神丸驚則氣上以重墜之藥鎮其浮越丹砂龍骨之類由於火盛血虛者甘寒滋潤之劑以瀉心補血驚則心神出而舍空液入成痰拒其神不得歸而驚不能已十味溫膽湯養心湯壽星丸見狂癲控涎丹見痰加辰砂遠志驚由於火而致火多端有五飲停蓄郁成火者五飲湯丸見痰飲由濕鬱成熱者羌活勝濕湯見傷濕因寒而鬱成熱者散寒火自退熱鬱有痰寒水石散氣鬱有痰加味四七湯睡臥不安時時驚覺者溫膽湯加棗仁蓮肉以金銀同煎吞十四友丸或鎮心丹遠志丸驚者平之子和謂平乃平常之義如聞響而驚者常擊物作響使習聞如平常則不驚矣悸即怔忡悸者心築築惕惕然動而不安也俗名心跳一由血虛血虛則不能養心心氣常動幸無火熱相乘故不至於驚而但悸也若血不虛而動者則為心火盛亦有腎火上衝者火主動也幸血不虛故但動而不驚此驚與悸之別也一由於停飲水停心下心火為水所逼不能下達而上浮故動而不安也必有氣喘之證腎水上泛凌心義亦如之而治有異飲食所停之水宜疏導腎陰上泛之水宜益火但思慮即動者屬血虛時作時止者痰因火動有失志之人由所求不遂或過誤自咎恨嘆不已獨語書空則心不息不安時常勞動而怔忡作矣溫膽湯見驚去竹茹加人參柏子仁各一錢下定志丸仍佐以酒調辰砂妙香散見心痛有痞塞不思飲食心中常有所歉愛處暗地或倚門後見人則驚避似失志狀心常跳動此為卑惵之病以氣血兩不足也人參養榮湯見虛損飲食少者嘉禾散見瘧加當歸黃耆各一錢恐恐者心有所怯也蓋心氣虛使然而屬之腎者恐則氣下故屬腎也經曰精氣並於腎氣本觀上今因虛而下與精血並居腎部則恐是也又屬之肝膽者以肝膽之氣旺則上升虛則下降今恐而氣下是肝膽之氣不足也故勇者謂之膽壯怯者謂之膽小張子和曰驚者不自知因外有所觸而卒動恐者自知不能獨坐安臥必須人為伴侶驚由血虛恐因氣怯此大概也恐亦有由血虛者熱傷腎陰水涸血虛復為火所擾則志昏惑而不定腎藏志志者心之定向也腎屬水水清故鑑物分明明則不惑慧生定也火擾之則濁濁則昏暗又火為熒惑故昏惑也不定則不靜故恐恐亦心之動也故孟子言不動心以無懼為訓驚恐常相因恐則驚矣驚則恐矣驚則安其神恐則定其志心之神下交則腎有所主而志定即坎中之一陽也腎之精上奉則心有所滋而神安即離中之一陰也丹溪治周本心病恐如人將捕之夜臥不安口乾飲食不知味以參朮當歸為君陳皮為佐鹽炒黃柏炙玄參各少許煎服月餘而安經云恐傷腎恐則精卻而走失蓋腎精方欲化氣而上因恐則退卻而下則精傷矣精傷則腎氣亦虛而陰痿骨酸等證皆作矣故用柏玄引之入腎以補之人參散茯神散補膽防風湯皆治膽虛健忘水清明而火昏濁此智愚之別水靜而神藏火躁而消亡此存亡之殊故性靜則心如止水情動則心如亡猿煩擾外馳存乎中者幾希矣存乎中者幾希則語後便忘不俟終日縱復追憶邈若山河惟當夜半雞鳴牿亡之餘靈明覆蘖日間所作所言所誦皆歷歷能記由是言之藥雖有安心養血之功固不若自為存養之為得耳七情五志動即為火皆足擾我安靜之神而痰閉血鬱又無論矣若乃精神衰短心惛然不能須臾苟非老而遺忘何以天奪其魄牿之反覆夜氣不足以存此孟氏所為致嘆於牛山之木也思慮過度心血耗散不任思索每一追憶心火即動如油竭之燈倏然焰大即滌慮凝神收斂久之乃略寧息歸脾湯見血有痰加竹瀝痰迷心竅者導痰湯見痰吞壽星丸見狂癲精神短少者人參養榮湯見虛損讀書勤政勞心者安神定志丸心腎不交者朱雀丸孔聖枕中丹菖蒲一茯苓茯神人參各五遠志七為末服如上法商陸花陰乾百日為末暮服方寸匕汪軔菴曰金正希先生嘗言人之記性皆在腦中凡人外見一物必有一形影留在腦中小兒腦未滿老人腦漸空故皆漸忘愚思凡人追憶往事必閉目上瞪而思索之此即凝神於腦之意也案此說甚善腦者髓之海腎之精也在下為腎在上為腦虛則皆虛此證之為腎虛信矣易曰智以藏往智於五行配水屬腎腎虛故不能藏也煩躁煩者心煩亂不安躁者手足擾動不寧也大概皆火之為病五臟之火皆令煩躁故或言心熱或言脾熱肺熱腎熱肝熱也而有分煩為陽躁為陰者以陽火內生心為熱所乘惡其擾亂故煩悶非甚而狂越則不必手足之擾動蓋火在內而不在外也若陰寒內生逼陽於外中寒而外則熱熱在外而不在內故但手足躁擾而心不必煩也此陰陽以寒熱分也又心火為陽火盛則煩腎火為陰火炎則躁此陰陽以心腎分也又人將死則手足擾亂急遽毫無和緩之象此與真臟脈弦強挺徑毫無胃氣同理是名鬼躁亦陰象也煩有實有虛虛煩者或氣虛或血虛也血虛則無以養心而怔忡不寧不得寐則煩矣氣虛則火旺東垣所謂邪火與元氣不兩立此衰則彼旺是也故乘心而煩也治法熱在心肺起臥不安宜梔子豉湯竹葉石膏湯竹茹湯硃砂安神丸下利後更煩梔子豉湯身熱汗出煩不解名風厥太陽傷風則發煩熱曰風少陰之熱亦上衝故汗出不解曰厥經謂表裡刺之太陽為表少陰為里飲以湯止其上逆之氣也仲景麥門冬湯之煩不煩而心手極熱喜居陰處脈沉口渴妙香丸下其熱痰不得眠溫膽湯見驚酸棗湯見不得臥津耗者生其津血耗者補其血腎水竭者滋腎産痘滯下後血液耗散心煩不安危矣猛進獨參湯心中蘊熱清心蓮子飲見赤白濁虛煩有身熱與傷寒相似但頭身不痛不惡寒脈不緊為異陰躁欲裸衣坐井中以熱藥治之四逆見厥理中見中寒之類嘈雜俗名心嘈其證似飢急欲得食心中擾擾不寧如酸如辣似慌張由肝火乘於脾胃土虛不禁木搖故煩擾不安火盛則谷易消食已則飢得食則安少頃又飢又復嘈矣此為火嘈宜清火若有痰飲停聚似飢非飢欲食而不能多食脈滑為痰嘈宜化痰若兼吞吐酸水乃痰飲與火所為清火去飲兼治總以補土為主六君子湯見氣加減久不愈者養血以火盛則血虧也故思慮血虛五更嘈者及婦人嘈雜恆用四物見血加減不得臥臥屬陰屬靜陰虛有火則動擾故心煩而不得臥也經謂衛氣日行於陽則寤夜行於陰則寐因厥氣逆氣也諸逆衝上皆屬於火即陰火也客於臟腑則衛氣不得入於陰不得入息故目不瞑又曰胃不和或熱或痰則臥不安皆此義也虛勞虛煩不得臥酸棗仁湯骨蒸煩心不得眠酸棗仁一兩水一大盞半研絞取汁下米二合煮粥候熟下地黃汁一合更煮過不拘時服以上補血溫膽湯見驚治大病後虛煩不得眠流水千里外者八升揚之萬遍取其清者五升煮以葦薪火沸入秫米一升北人謂之黃米可以釀酒製半夏五合炊熟去滓飲一小杯日三以上去痰不寐有二有大病虛煩及高年人陰虛陽孤不寐有痰舍心經神不歸舍不寐虛者六君子湯見氣加炒酸棗仁炙黃耆各一錢痰者溫膽湯減竹茹一半加南星酸棗仁各一錢下清靈丹或導痰湯見痰加石菖蒲五分喘不得臥治其喘厥不得臥治其厥咳嗽不得臥左屬肝脹宜清肝右屬肺脹宜清肺多臥經謂其人腸胃大則衛氣之入於陰者留久皮膚濕分肉不解膚腠因濕而密緻也則衛氣之行於陰者遲則其還於表者亦遲可知留久而行遲其氣不精氣鈍而不精靈也視出陽入陰爽利而不滯者異矣故多臥大抵精明之人臥少昏濁之人臥多飽食終日無所用心靜而不擾則多臥若因濕盛而然者則必怠惰四肢不收或大便溏泄脈緩去濕為主亦有屬熱者火主動本應不得臥然火盛瀰漫壅閉閉則不通不通反不擾精神為熱所耗而昏故沉困嗜臥也然必臥不能安除熱為主熱病愈後陰氣得復必恬睡醒則清爽與熱證昏睡醒亦沉迷者不同食入則困倦欲睡者脾弱得食不能即運不運則靜矣靜故欲睡也六君見氣加麥芽山楂神麯之類狂癲癇狂者猖狂剛暴裸體詈罵不避親疏甚則持刀殺人逾垣上屋飛奔疾走不問水陸多怒不臥目直叫呼時或高歌大笑妄自尊貴妄自賢智者是也癲者如醉如囈或悲或泣或笑或歌言語有頭無尾穢潔不知左顧右盼如見鬼神有時正性復明深自愧沮少頃狀態覆露者是也癇者發則昏不知人卒倒無知口噤牙緊將醒時吐痰涎甚則手足抽搐口眼相引目睛上視口作六畜之聲醒後起居飲食皆若平人心地明白亦有久而神呆者然終不似癲狂者常時迷惑也諸中卒僕似之而僕時無聲醒時無涎沫內經論狂為陽證其詞不一而足病為火邪無疑觀傷寒熱入胃府往往發狂可見然傷寒乃暴病不過一時火熱乘心心神狂越熱除則已若經年纍月病狂不省者則豈徒火之為哉必有痰涎迷留心竅乃成固疾也蓋火氣乘心則心血必虛兼之心神浮越不守其舍以故痰涎得乘虛入踞耳癲亦同此而痰火不甚不似狂之火盛而暴也癇病亦屬痰熱而有發有止則痰未入心不過伏於心下氣動則發而上乘氣平則止而下退與癲狂之痰常迷心竅者異矣三證各別皆屬於熱而難經以癇為癲有重陽者狂重陰者癲之說於是後人以癇為陰寒之證亦有分癇為陰陽二證以陰癇為寒者夫癇證或因誤治而轉為虛寒者有之未有初起即屬陰寒者劉宗厚謂陰陽癇如小兒急慢驚陽癇不因吐下由痰熱客心胃間因驚而作舊有胎癇之說謂兒在母胎母受驚恐驚氣傳子生後尚未即發因遇大驚與所受於母之驚氣相搏而作作則神越舍空痰得入心而成此疾劉氏說本此若熱盛雖不驚亦作治宜寒藥陰癇亦本痰熱因寒涼攻下太過變而成陰宜溫平補胃燥痰之藥若謂不因壞證而有陰陽之分則是指痰熱所客臟腑表裡淺深而言癇病豈本有陰寒者哉按難經謂脈居陰部尺也沉分亦是而反見陽脈者常見浮滑長大數脈為陽乘陰也陰虛陽入乘之主發熱脈雖時浮滑而長此為陰中伏陽也陽脈雖暫時一見不如乘陰之常見然此為陰中伏陽至夏必病矣脈居陽部而反見陰脈者為陰乘陽也主惡寒脈雖時沉澀而短此為陽中伏陰也至冬必病原文錯簡今訂正重陽者狂重陰者癲不論陰陽部皆見陽脈為重陽皆見陰脈為重陰其說如此然難經又云癲病始發意不樂直視僵仆癲只癡呆無直視僵仆直視僵仆乃癇證也難經以癇為癲故其詞如此其脈三部陰陽俱盛是也既云三部陰陽俱盛則重陰者癲一言固未可泥定矣治狂內經謂宜奪食以食入於陰長氣於陽也生鐵落飲抱膽丸陽明實則下之當歸承氣湯見大便不通後用黃連解毒湯見喜吐痰瓜蒂散下痰清心滾痰丸並見痰病久而虛者寧志膏一醉膏靈苑辰砂散蓋此病少臥衛氣不行於陰故陽盛陰虛今昏其神使得睡則衛氣得入於陰陽不偏盛陰不偏虛陰陽均平矣經謂悲哀動中則傷魂魂屬陽主動主升悲哀則斂抑違其性故為傷故狂當以喜勝之又謂喜樂無節則傷魄魄主靜主降喜則氣浮越故傷故狂當以恐騰之按此係舉七情之致狂者言耳夫致狂亦多端矣治癲星香散見中風加石菖蒲人參和竹瀝薑汁下壽星丸或湧去痰涎後服寧神之劑因驚而得者抱膽丸思慮所致者酒調天門冬地黃膏多服取效鬱金七兩明礬三兩為末簿荷汁丸桐子大每服五六十丸湯水任下最能去心竅郁痰孫兆治一僧令食鹹物使渴與藥調酒飲之愈問其治法曰醫能安神矣而不能使神昏得睡此乃靈苑辰砂散也人不能用耳若脈乍大乍小乍有乍無忽而如平人忽而如雀啄屋漏遐遊魚翔此鬼祟也秦承祖灸鬼法及針鬼宮等十三穴見針灸治癇趙以德曰癇疾淺者止在經脈氣不通眩運仆倒深者入腎邪留於陰不行不行則陰氣蓄滿鬱極乃發發則相火自下逆上填塞其聲音惟迫其羊鳴者一二聲而出遍身之涎沫皆迫而上胸臆流於口諸經脈筋骨皆不勝其沖逆故卒倒無知少頃火氣退散乃醒不治則邪不散遂成常證經謂癲者內經亦以癇為癲宜當癇字看氣下泄及發如狂者死蓋邪入於陰者陰氣滿閉塞於下而逆上令氣下泄則腎氣下脫故死又心之陽不勝其陰氣之沖逆陽氣暴絶故如狂亦死也然不可一概論蓋陰脫者尺脈不應如狂者寸脈不應若尺寸俱盛則是陰陽俱實不可斷為必死也先身熱瘛瘲驚啼叫呼乃發脈浮病在腑也為陽癇易治先身冷不驚掣不啼呼忽然而發脈沉病在臟為陰癇難治久則有六畜之聲反折上竄聲如犬吠屬肝目瞪口呆聲如羊叫屬心直視腹滿聲如牛叫屬脾驚跳反折聲如雞鳴屬肺如尸吐沫聲如豬叫屬腎然治法則一總以行痰為主逐痰飲南星半夏竹瀝薑汁栝蔞殭蠶天麻龍齒石菖蒲遠志加附子少許犬加柴胡羊加黃連牛加白芍雞加黃芩豬加知母痰盛必用吐先一餐勿食次早搗茶子煎湯束小腹飲之即葉虛者先補後攻妙功丸久而有蟲亦用此丸妙香散見心痛牛黃丸楊氏五癇丸選用晝發灸陽蹺夜發灸陰蹺為二蹺能行下焦之氣也二蹺為病主癲癇見奇經八脈各二七壯凡灸癇必須先下之乃可灸否則氣不通能殺人平旦發者足少陽晨朝發者足厥陰日中發者足太陽黃昏發者足太陰人定發者足陽明半夜發者足少陰加引經藥愈後痰熱藥中加養血寧神之品脈虛弦屬驚沉數屬實熱虛者脈宜虛緩若急實沉小或虛而弦急皆難治

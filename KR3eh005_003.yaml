body:
  text: 卷之三雜症腫脹腫脹有二一因於水水氣停蓄於肌膚或臟腑因而肌膚浮腫肚腹膨脹也其色鮮明潤澤其皮光薄甚則如水晶其肉腐其身重其腫不速每自下而上腫有分界按其手足上如糟如泥成窟不起按而散之猝不能聚也肢體如是腹未必然以腹中氣盛水多水挾氣能鼓起也一因於氣氣熱壅滯作脹所謂諸腹脹大皆屬於熱也或氣寒不運作脹所謂胃寒則䐜脹臟寒生滿病也或氣實作脹實者邪氣實也如氣因痰食蟲血七情鬱滯而壅盛作脹所謂脾氣實則腹脹胃氣實則脹也或氣虛作脹虛則不能運所謂氣虛中滿太陰虛則鼓脹也其色蒼老皮厚肉堅其脹或連胸脅或倏然而脹者陽性急速也或自上及下者陽本乎上也或通身盡脹者氣無不至也以手按之隨手即起者如按氣囊也兩足或有按之不能猝起者以氣蒸成水氣親上水就下故也證既不同施治亦異然水與氣本一物觀噓氣成水蒸水成氣可知矣病常相兼水蓄氣必滯氣鬱水亦停則治水當兼理氣氣行水自行治氣當兼行水水行氣亦通治水當分陰陽陰水無火之水也或益脾肺之陽或補命門之火陽水有火之水也隨火之所在而治之少年縱酒濕熱內蓄最多此證遍身腫煩渴小便赤澀大便多閉此屬陽水輕宜四磨飲見氣添磨生枳殼兼進保和丸見傷飲食重則疏鑿飲子利之以通為度亦有雖煩渴而大便已利者宜用五苓加木通大腹皮以利小便五苓見傷濕遍身腫不煩渴大便自調或溏泄小便雖少而不赤澀此屬陰水宜實脾飲小便如常至晚有微赤卻無澀滯亦屬陰也不可遽補木香流氣飲見氣繼進復元丹若大便不溏氣息息疑急脹滿宜四磨飲下黑錫丹見厄逆陰水雖宜補陽然小火不能勝大水必先瀉去其水乃用暖藥以補元氣陰水雖寒久亦鬱而成熱寒本也熱標耳金匱分五水曰風水皮水正水石水黃汗風水脈浮骨節疼痛水流關節或重而酸水在肌膚也發熱無汗惡風外感風邪面目腫大目下微腫如蠶如新臥起狀目下屬太陰又胃細筋散目下土虛則水反克循胃脈而上注也頸脈動人迎脈也水浮氣上逆故動時時咳水氣侵肺當發汗脈浮而洪浮則為風洪則為氣氣鬱熱也風氣相搏風強風多於熱也則為癮疹身體為癢癢為泄風言癢者名為泄風也熱為風所閉欲泄不得泄故作癢久為痂癩即養成癘瘋以風熱久不散鬱而為濕風熱濕相蒸生蟲肌肉潰腐也氣強則為水熱多而不得外泄則蒸氣成水也難以俯仰水浸淫於肌膚筋脈中也風氣相擊身體浮腫汗出乃愈此為風水此句上有惡風則虛句下有不惡風者小便通利上焦有寒其口多涎此為黃汗之文當是錯簡刪之風水脈浮身重汗出惡風者防己黃耆湯主之固表以散風水腹痛加芍藥加芍藥甘草以調中風水惡風一身悉腫脈浮不渴續自汗出無大熱越婢湯主之惡風汗出而惡風則為表陽虛加附子皮水皮受水濕也脈浮水在皮膚故浮胕腫濕邪從下受故足跗浮腫按之沒指不惡風非風邪也其腹如鼓如鼓則非鼓也以水在皮膚不在腹內故外有脹形而內無滿喘也不渴在表故不渴當發汗渴而不惡寒者此為皮水獨有水而無風故不惡風寒渴者蓋皮水亦有淺深之分深而近里亦足以抑遏陽氣不化津液故渴也皮水為病四肢腫水氣在皮膚中防己茯苓湯主之里水當依金鑑作皮水越婢加朮湯主之甘草麻黃湯亦主之正水腎臟之水自盛也其腹如鼓脈沉遲喘水泛於上故喘石水脈沉腹滿不喘陰盛結於少腹如石之下沉也惟其下沉不上干故不喘黃汗汗出沾衣如黃柏汁濕土為熱所蒸故色黃如此脈沉遲身發熱濕滯陽氣不行故鬱而成熱胸滿四肢頭面腫不愈必致癰膿濕熱久而愈盛氣血被其壅塞而成癰膿身腫而冷狀如周痹胸中塞不能食濕滯也反聚痛熱為寒濕所郁相攻擊故聚痛聚結也暮躁不得眠暮則寒濕愈盛熱愈郁故躁不得臥此為黃汗黃汗身體腫發熱汗出而渴狀如風水皆面目浮腫也脈自沉以汗出入水中浴水從汗孔入得之水寒遏郁汗液於肌內為熱所蒸而成黃汗然汗出浴水亦舉隅之論耳當推廣之黃耆芍藥桂枝苦酒即醋湯主之金鑑謂桂枝散邪黃耆固衛白芍苦酒止汗以攝營氣營衛調和自愈愚按此方無清熱去濕之品徒取固斂得無壅乎此方恐是錯簡終不可用按風水皮水皆水之在表者以感風受濕為別故有惡風與不惡風之分正水石水皆水之在裡者以上浮下沉為別故有喘與不喘之異黃汗雖狀如風水而風水脈不沉汗不黃自不同也黃汗當參黃疸門又按正水水之上浮者必干肺故喘然肺自有水病故金匱謂痛在骨節咳而喘不渴者此為肺脹本文作脾脹今從金鑑改之其狀如腫似腫非腫蓋肺脹於中未形於外也發汗則愈越婢加朮湯又謂肺水其身腫皮膚浮腫小便難肺氣為水所壅不能通調水道下輸膀胱時時鴨溏水糞相雜也肺合大腸水趨之是也又按石水水之下沉者即金匱所謂腎水者腹大臍腫腰痛不得溺陰腫陰腫舊在心水下今從金鑑移此陰下濕如牛鼻上汗其足逆冷面反瘦言不若他水之面目浮腫也是也又金匱謂肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通水氣上逆下降故津液有時生小便有時通蓋肝喜沖逆主疏泄氣得上下時通也心水者身重少氣即短氣不得臥煩而躁脾水者腹大四肢苦重津液不生脾濕穀氣不運不升故津液不生但苦少氣則小便難氣弱不化是各臟皆有水也水在肝部則名肝水隨所在而名之外水腰以下腫當利小便宜用貼臍等法巴豆去油四錢水銀粉二錢硫黃一錢研勻成餅先用新綿一片布臍上內餅外用帛縛時許瀉下惡水三五次去藥白粥補住弱者隔日取一次一餅可救三五人一法鮮赤商陸根搗貼帛縛定水自小便出一法田螺四個大蒜五個車前子末三錢研成餅貼定帛縛少時尿利則愈或內服沉香琥珀丸即苦葶藶子郁李仁防己沉香陳皮琥珀杏仁蘇子赤茯苓澤瀉麝香也腰以上腫當發汗越婢湯加蒼朮喘急不得臥者蘇子葶藶等分棗肉丸四肢腫宜五皮飲五皮飲不論陰陽水俱可先用或除濕湯加木瓜腹皮如未效四磨飲兼吞桂黃丸仍用赤小豆粥佐之感濕者腰以下腫尤甚五苓散見傷濕吞木瓜丸見中風間進除濕湯見中濕加木瓜腹皮萊蔔子炒惟面與足腫早則面甚晚則足甚者風水也風上行則面腫蓋濕氣非風不能上面也濕下墜則足腫視大便之硬溏別其證之陰陽除濕湯見中濕加木瓜腹皮白芷可通用或以蘇子降氣湯見氣除濕湯各半貼煎服單面腫則獨用蘇子降氣湯單足腫則用除濕湯內水腹大小便不利脈沉甚可下之十棗湯濬川散神佑丸禹功散舟車丸之類蓋水可從小便利亦可從大便泄也病輕者枳實白朮湯白朮補土枳實破堅張元素治痞變此湯為丸以彼屬食積所傷故用丸以消磨之此水飲所作故用湯以蕩滌之水脹冬瓜宜長吃鯉魚重一斤以上者煮取汁和冬瓜蔥白作羹食之青頭鴨或白鴨去腸雜細切和米煮粥空腹食之老鴨十年者佳殺取血俟凝銀簪劃片燒酒熱泡食之鴨身去毛雜燒酒頓爛空心食俱不著鹽服後小便利腫立消忌鹽三年水腫外散內利峻劑疏鑿飲子和劑茯苓導水湯醫貫胃虛不能制水者以補土為主補中益氣湯六君子湯等二方並見氣實脾飲亦可脾氣旺則水自行不必加行氣利水之品若腎火虛三焦之氣化不行關門不利水聚不出惟濟生腎氣丸見虛損最驗若腎水虛火炎水從火溢上積於肺喘不能臥腹大臍腫腰痛兩足先腫小水短澀面赤或腫口渴大便反燥六味見虛損加麥冬五味牛膝車前以上論水腫氣脹又名鼓脹以其外雖堅滿中空無物止氣作脹耳有似乎鼓也若兼中實有物食痰蟲血之類盤踞臟腑如木之藏蠹如皿之聚蟲則又名蠱脹又有中毒而腹脹者曰蠱毒鼓脈必浮革蠱脈必牢實治蠱如大黃芒硝牽牛檳榔三稜蓬朮俱可用一味地栗干最妙氣實作脹宜厚朴等以破滯氣虛中滿宜補氣加芍藥等以收其散渙更分寒熱虛而寒者寒脹中滿分消湯虛而熱者熱脹中滿分消丸七情脹五膈寬中散見反胃木香流氣飲沉香降氣湯並見氣大怒而脹分心氣飲憂思過度而脹紫蘇子湯大病後浮腫白朮三錢參耆各一錢半白茯二錢陳皮半夏曲白芍木香各一錢炙草大腹皮各五分薑棗煎久瀉後脹者六君子見氣加白蔻蘇梗當歸服後脹益甚勿疑久自效因氣而成水腫分氣香蘇飲老人虛寒脹厚朴炮附木香因飲食所傷者氣必滯胸滿噯氣消導寬中湯失飢傷飽痞悶停酸早食暮不能食早晨陽氣長谷易消暮則陽氣微谷難化也大異香散蓄血作脹腹皮上見青紫筋脈芤澀婦人多有此先以桃仁承氣湯勢重者抵當湯下之或代抵當丸並見血虛人不可下者且以當歸活血散調治血脹多有煩躁漱水不咽迷忘如狂痛悶喘急大便黑小便利虛汗氣為血鬱熱蒸成汗厥逆等證人參歸芎湯痰能滯氣勿謂不能作脹故古人治氣為痰鬱作脹加味枳朮湯氣水血三者病常相因有先病氣滯而後血結者如婦人先病氣鬱後致月經不行者是也有病血結而後氣滯者如婦人先病月經不通致氣滯脹滿是也有先病水腫而血隨敗者水積日久滲透經絡灌入隧道血亦化水有先病血結而水隨蓄者血結則氣滯而熱蒸成水婦人月經不利化水腫脹皮肉赤紋椒仁丸人參大黃湯須求其本而治之積聚相攻疼脹初用七氣消聚散日久弱者參朮健脾湯少佐消導藥蟲聚作脹治法詳蟲門以上論氣脹食血痰蟲積聚雖非因氣滯使然亦必因此滯氣並以理氣為主故皆屬之氣也臟腑外胸腹中邪充塞則胸腹脹矣經絡營衛氣無不到則血脈皮膚無不脹矣故有脈膚脹之名脈脹者筋起絡色變木香流氣飲治膚脹加撫芎薑黃治脈脹而欲知為何部之邪則先脹處與脹甚處是也脾胃受邪則先從胃脘痞塞起又屬脾胃者則飲食少屬他臟腑者則飲食如常又脹在皮膚經脈者飲食亦如常在腸胃間者則飲食少皆宜細察更須分虛實其臟腑之氣本盛被邪填塞不行者為實氣本不足因邪所壅者為虛虛中亦有挾實以其邪為食痰血濕等有形之物也實者驅之虛者補之寒者熱之熱者寒之結者散之留者行之邪從外入內而盛於中者先治其外而後調其中陰從下逆上而盛於中者先抑之而調其中陽從上降而盛於中者先舉之而調其中手足不腫獨腹脹謂之單腹脹俗名蜘蛛蠱難治以病全聚於臟腑不分散於四肢也實者厚朴散虛者調中健脾丸服藥後手足腫病自內達外也不久愈若從手足腫至腹為從外入內難治男自下而上男陽盛邪不易犯今乃以漸上犯則邪盛陽虛可知女自上而下女陰盛邪不易侵今亦以漸下侵則邪盛陰虛可知皆難治男止下腫女止上腫皆不足慮不在難治之例譬如草寇竊發原易撲滅若直逼京師重地乃可危耳子和治一婦水腫四肢不舉令以草貯布囊高支兩足而臥乃服上湧汗下泄瀉之藥自腰以上水覺下行自足跗以上水覺上行會於臍下泄瀉而出病大減此法宜知勝於升提也診法內水脈沉外水脈浮氣脹浮沉無定氣時外行時內聚故也總以有神和緩有力也為佳最忌弦細微弱水腫鼓脹死證腹脹身熱陽盛也而失血則陰亡矣四末清冷也脫瘦也陰盛可知瀉數行中亦脫矣腫先四肢後入腹見前利旋腫滿服下利之藥而旋消旋脹腹筋青青脹高起唇黑肝傷臍突脾傷陰囊腐腎傷缺盆脊背足心平缺盆平心傷背平肺傷足平腎傷掌腫無紋心傷脈虛澀虛澀為血氣敗腫脹逢之總可驚黃疸病由濕熱蒸發如罨曲相似遍身頭目爪甲皆黃小便黃赤不利有色如薑黃者有外感鬱熱與素有之濕相蒸或外感於濕與素有之熱相蒸而發黃者宜從汗解詳傷寒論有內生之濕熱相蒸者在上則吐之在下則下之利之然有陽黃陰黃之分蓋熱勝則為陽黃濕勝而寒則為陰黃不可概用寒藥內因有由於停食者仲景所謂谷疸寒熱不食言其人先有寒熱之病則胃不和故不能食也食即頭眩強食不化濁氣上升使然心胸不安久之發黃食鬱成熱蒸濕而發茵陳蒿湯主之又謂穀氣不消胃中苦濁濁氣下流小便不通濕熱瘀矣身體盡黃是也內經謂已食而飢者胃疸乃熱盛濕少故能消穀乃胃熱非食滯也與此不同此陽黃也又謂陽明病脈遲胃寒食難用飽飽則發煩飽則不消而煩頭眩小便難此欲作谷疸始雖寒久亦成鬱熱雖下之腹滿如故以脈遲故也詳傷寒論陽明篇中此陰黃也有因於酒者酒性熱而質濕濕熱內瘀多發黃仲景所謂鼻燥心中熱脈浮欲吐者吐之愈病屬上焦又謂心中懊憹或熱痛不能食梔子大黃湯主之病在中焦又謂或無熱無外熱也觀或字知有外熱者矣譫語小腹滿脈沉者下之病在下焦又謂酒疸下之久久為黑疸病在上焦者應吐若誤下則傷其血分故血敗而見黑色目青面黑舉面目以該周身也心中如淡蒜虀狀辛味刺心大便黑瘀血之色皮膚爪之不仁血痹於皮膚也是也有由於房勞者致腎水虛相火炎不特蒸濕成黃並瘀血變黑仲景所謂黃家日晡發熱濕屬脾土故熱發日晡所而反惡寒傷寒陽明證發熱者必不惡寒乃濕與熱瘀痹於內表陽不宣故惡寒也此乃辨證之法此為女勞得之膀胱急少腹滿身盡黃額上黑額最高火氣之所熏故黑足下熱因作黑疸先則額黑後則周身皆黑其腹脹如水狀大便必黑時溏此女勞病非水也腹滿者難治脾腎皆病矣故難治消石礬石散主之消石鹹寒除熱礬石除痼熱在骨髓大麥粥調服恐傷胃也然此方難用又謂額上黑微汗出濕欲外泄手足中熱薄暮即發陰熱故暮發膀胱急血瘀急痛小便自利可知膀胱之急乃由血瘀曰女勞疸是也其餘所因尚多而古人止分谷疸酒疸女勞疸及總名之黃疸與五水中之黃汗詳水腫篇為五然不必泥當推廣之仲景謂疸而渴者難治熱盛不渴易治發於陰部其人必嘔陰者里也裡氣逆故嘔發於陽部表也其人振寒而熱濕勝則寒熱勝則熱又謂腹滿舌痿濕痰壅塞舌本之筋不得轉掉也或曰舌當作身濕熱傷筋故痿躁不得睡又謂諸黃疸但利其小便茵陳五苓散主之脈浮當汗解桂枝加黃耆湯主之此方不可輕用又謂肚熱熱在裡當下之又謂腹滿小便不利而赤自汗出為表和裡實當下之大黃消石丸此皆言陽黃也又謂小便色不變欲自利腹滿而喘此為寒氣痞滿浮熱上壅不可除熱除熱必噦乾嘔也虛陽為寒所閉上噦而有聲小半夏湯主之散寒降逆此言陰黃也陰黃小便清白大便不實喜靜能臥脈遲弱無力身冷自汗當以虛寒治之仲景所謂男子黃小便自利與小建中湯見勞倦王海藏謂中州寒生黃用大小建中見勞倦不必茵陳皆氣虛之陰黃也氣虛則脾不運久瘀於裡則脾敗而色外見故黃其黃色必淡戴復庵謂失血後多面黃或遍身黃但不及耳目血不榮也如竹木春夏葉潤則緑至秋則干黃宜養榮湯見虛損十全大補湯見虛損妨食者四君子見氣加黃耆扁豆此血虛之陰黃也此為干黃小便利四肢不沉重也以上所論黃疸證準繩謂是暴病言其黃驟然而見也故仲景以十八日為期仲景謂治之十日以上瘥反劇者難治十八日乃脾土寄旺於四季之期十者土之成數逾十日不瘥則旺氣就衰故難愈也然可不泥另有一種病黃者其黃以漸見久而不愈者名食勞疳黃或由食積或由勞倦或由疳積所致或名黃胖胖者腫也大小溫中丸棗礬丸暖中丸上前三方以針砂醋之類伐肝以朮米之類助脾後一方以礬醋之酸瀉肝濕熱蒸而發胖如饅頭蒸而起發礬醋收斂使之瘦縮凡收斂即屬伐肝以棗肉之甘補脾虛人佐以補劑按此即今人所謂黃腫與黃疸分別處在腫而色帶白眼目如故不如黃疸之眼目皆黃濕盛則但黃而不亮熱盛則鮮明如橘子干黃則枯稿不潤蓋色潤者屬水色光者屬火若色如煙燻黃黑晦滯枯稿無光為危證舊説濕勝如熏黃黑晦存參按黑晦即不亮也然未必枯若並不潤則是瘀敗之死水難治矣而不帶白且無腫狀似不必以暴漸分又黃腫多有蟲與食積有蟲必吐黃水毛髮皆直或好食生米茶葉之類用使君子檳榔川練雷丸之類食積則用消食藥劑中不可無針砂消積平肝其功最速治法亦與黃疸有別也又有溫疫發黃詳溫疫門又有瘀血發黃身熱小便利大便黑脈澀桃仁承氣湯見血下盡黑物愈又有身不黃獨目黃者經云風氣自陽明入胃循脈而上至目眥其人肥風氣不得外泄則為熱中而目黃青龍散主之按此亦舉隅之論耳治法丹溪謂五疸不必細分概以濕熱治之養胃化疸湯茵陳蒼朮木通澤瀉豬苓山梔白茯苓薏苡仁食滯加神麯山楂麥芽酒疸加苜蓿葛根女勞疸加當歸紅花活血有神驗方黃蠟香油攤膏長六寸箸頭卷濕面二指厚大如掌中以指穿一孔對臍貼將膏捲入孔燃火熏最久者九條立愈谷疸紅丸子見傷飲食寶鑑茵陳梔子湯谷疸丸酒疸梔子大黃湯葛根煎湯或梔子仁煎湯調五苓散見傷濕或生料五苓散加乾葛一錢或葛花解酲湯見傷飲食酒疸變成腹脹漸至面目周身俱腫霍脾飲加木香麥芽各五分女勞疸加味四君子湯大便不健者宜滑石散小便不利者宜腎疸湯病後脾氣虛而黃者異功散見氣加黃耆扁豆各一錢黑疸多危急用土瓜根一斤搗碎絞汁六合頓服當有黃水從小便出再服之目黃不除瓜蒂散見傷飲食搐鼻取黃水消渴此為渴而且消之證其尋常止患渴者附後河間謂由水虛火炎燥熱之甚故渴而飲水多子和亦謂心火太盛津液耗涸在上則為膈消甚則消及肺臟在中則為腸胃之消甚則消及脾臟在下則為膏液之消甚則消及腎臟在外則為肌肉之消甚則消及筋骨四臟皆消則心自焚而死矣治此者但調之而不下則小濡小潤固不能殺炎上之勢下之而不調亦終不能沃膈膜之干下之調之而下減滋味戒嗜欲節喜怒亦病已而復作證分上中下皆從火斷之上消者大渴飲多甚者舌亦赤裂經謂心移熱於肺傳為膈消者是也二便如常知其燥在上焦白虎加人參湯見發熱主之小便少者乃熱消爍其水也此消之一義也亦用前湯加生津滋燥之藥如花粉北味麥冬乾葛之屬若小便不利者不利非少也蓋有水而不利耳前湯合五苓散見傷濕子和謂恐變為水腫者是也若小便利者所謂飲多溲亦多也詳見下文前湯加辛潤之品以開通腠理可也上消大概心火盛黃連一味煎湯候冷遇渴煩飲久而自愈若用心過度致此者黃耆六一湯加蓮肉遠志各一錢吞玄兔丹仍以大麥煎湯間下靈砂丸糯谷炒爆桑根白皮等份每服一兩水煎渴即飲之使水穀之氣上蒸於肺化為津液此金生水之義二物皆肺藥又淡滲故取之繅絲湯能引清氣上朝於口又蠶與馬同屬午火心也作繭成蛹退藏之義故能抑心火而止渴也治上者劑宜小而服宜頻東垣謂消渴未傳能食者必發腦疽背瘡不能食者必傳中滿鼓脹蓋能食者為實火火盛則血壅於經絡故生疽瘡痛甚而不潰或潰出赤水不能食者為虛寒虛寒則氣不運故脹滿而所以致虛寒者何曰以寒治熱固如繩墨之不能廢然臟腑有遠近心肺位近宜制小其服肝腎位遠宜制大其服使之適至病所而止否則或過或不及皆為誅罰無過如上消而制大則速過病所而寒其中下焦因致脹滿之病所謂上熱未除中寒復起也是以處方宜審故曰心肺之藥莫厭煩而少中消者善食而瘦熱能消穀也此消之一義也瘦熱灼肌肉消削也此消之有一義也渴自汗大便硬小便頻數黃赤是胃熱盛叔和所謂口乾飲水多食飢虛成消中者是也子和釋經二陽之病發心脾男子少精女子不月其傳為風消謂二陽乃胃與大腸病熱心受之則血不流故女子不月脾受之則味不化故男子少精風火消涸腸胃此腸胃之消也調胃承氣湯見大便不通或三黃丸見發熱生地白蓮藕各自然汁牛乳各一斤熬膏和黃連末一斤丸如桐子大白湯下三五十丸日十服黃連豬肚丸清涼飲子見傷燥下消者煩渴引飲小便如膏面色黧黑耳輪焦枯兩腿消瘦此腎熱也又名腎消六味地黃丸見虛損主之多因色欲過度服金石藥腎水涸竭虛陽上炎不交精出小便淋濁陽道常堅古謂之強中也按三消在河間子和以為熱證而金匱謂消渴小便反多飲一斗溲一斗腎氣丸主之又內經謂心移寒於肺為肺消飲一溲二者死不治是三消固有寒證乎曰此雖亦名消渴而實不當以消渴名者也蓋金匱所言乃因其人命門火衰不能蒸動腎水與脾胃中谷氣以上達於肺故上焦失潤而渴其所飲之水未經火化直下膀胱故飲一溲一其味不咸腎氣丸即八味丸用附桂以壯其命門之火如釜底加薪則水穀之氣上騰蒸為潤澤也然此證止因水不上滋而渴非如盛火之焚灼則其渴不甚飲亦必不多其謂飲一斗溲一斗者乃合算之詞非言每飲必一斗也其與熱證之大渴引飲不止者安得無殊哉腎熱則小便如膏腎寒則小便清白又自有辨也至若內經所言心火衰微反為水冷金寒之化不特所飲之水無氣以化且並身中之津液亦無氣提攝相併下趨而成飲一溲二之證則肺氣之消索已甚尚何大渴大飲之有此皆不當名消渴致後人涇渭不分動手即從溫補熱證逢之不死何待此河間子和二公所謂大聲疾呼而痛詆其非也河間謂飲多而小便多者非虛寒無火不能制水乃燥熱太甚腸胃三焦之腠理怫鬱結滯緻密壅塞水液不能滲泄於外如水沃石過而不留故溲多也此消之又一義也當除其燥熱濟津液之衰使道路散而不結氣血利而不澀即前所謂以辛潤之品開通腠理也又謂常有陽極似陰者下部覺冷兩足如冰乃心火不降宜寒藥下之三五次則火降水升寒化自退其言可謂名通子和謂心為陽火先受寒邪火鬱傷肺火與寒皆來乘肺肺外為寒所薄陽氣不得泄內為火所燥故皮膚消索溲溺與積濕頻並飲一溲二膈消不為寒所薄陽得宣散故可治肺消為寒所薄陽氣自潰於中故不治亦一説也三消通治好黃連治淨為末冬瓜自然汁和成餅陰乾再為末再和如是者七次仍用冬瓜汁丸桐子大每服三十丸大麥仁湯入冬瓜汁送下尋常渴一服效小便既多大便必祕宜常服四物湯見血調之糯米泔折二亦可冷進三消久而小便不臭反作甜氣在溺桶中湧沸其病為重更有如豬脂浮在溺面如桕燭淚濺在桶邊此精竭也難治水在天地與人身皆有甘有咸甘者生氣咸者死氣小便死水也本咸而反甘是生氣泄也脾胃之生氣下陷矣參汗門脫汗味淡更明三消久之精血虧或目無所見或手足偏廢如中風須滋生精血愈後須防發癰疽黃耆六一湯下忍冬丸末傳鼓脹水氣五皮飲見腫脹送濟生腎氣丸見虛損東垣中滿分消諸方見腫脹可選用坎乾水也氣也小而井大而江河也兌坤水也形也微而露大而雨也一陽陷於二陰之中為坎坎以氣潛行萬物之中為受命之根本故潤萬物莫如水一陰徹於二陽之上為兌兌以形普施於萬物之上為資生之利澤故説萬物莫説於兌三焦為形之火制以有形之水者兌澤也可暫者也吾身自有上池真水氣也天一所生也以無形之水沃無形之火常而可久者也是為真水火升降既濟渴自止矣尋常消渴飲食勞倦氣虛發熱致津液不足而渴不可與五苓見傷濕宜補中益氣湯見氣加五味子葛根無病自渴與瘥後渴參朮飲四君子湯見氣縮脾飲見中暑俱加乾葛久病陰虛黃耆飲四物湯見血加人參木瓜或七珍散去朮加木瓜産婦血虛渴宜益血酒渴乾葛飲調五苓散多食果子致渴藥中加麝香停飲致渴詳痰飲門痿發於夏者俗名注夏痿者手足軟弱無力縱緩不收也即俗所謂手攤腳軟之意蓋熱而兼濕使然觀物之寒而乾者必堅硬收引熱而濕者必柔軟弛長可見濕屬土胃為水穀之海主潤筋脈胃病則不能運行水穀濕停筋脈中不為潤而為潦與熱相合故治痿獨取陽明也五臟皆有熱熱者火也火屬心而傷肺又制火者水金為水之源源傷則流絶重其源之傷故總歸於肺熱也然此證之有熱無寒則然矣其有濕與否則須細辨若無濕而概用燥藥以利水則火益燥烈筋脈反致枯乾攣縮求為弛長緩縱而不可得矣治者審之無濕亦有痿者以津液為熱所灼尚未即干雖不弛長亦未短縮但困弱柔軟而不能行動也觀草木遇烈日而枝葉萎軟可見矣內經分五痿肺熱葉焦皮毛虛弱急薄著皮乾緊與肉相搏而著於肉也而生痿躄足不能行其證色白而毛敗心熱則下脈厥而上三陰在下之脈因心熱而逆上上則下脈虛虛則脈痿樞折挈膝腕似折而不能提挈也脛縱而不任地其證色赤而絡脈溢肝熱則膽泄口苦筋膜乾筋膜乾則筋急而攣發為筋痿其證色蒼而爪枯脾熱則胃干而渴肌肉不仁發為肉痿其證色黃而肉蠕動腎熱則腰脊不舉骨枯髓減發為骨痿其證色黑而齒稿又論其致熱之由謂有所亡失所求不得則發肺鳴咳嗽也肺熱葉焦五臟因肺熱葉焦發為痿躄悲哀太甚則胞脈絶絶則陽氣內動心下崩數溲血大經空虛發為肌痹傳為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫筋痿者生於肝使內有漸於濕漸漬也以水為事如舟居者之習於水居處相濕肌肉濡漬痹而不仁發為肉痿得之濕地有所遠行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎水不勝火骨枯髓虛故足不任身發為骨痿細詳經意是言五臟各有自致之痿有他病傳變之痿觀肌痹傳為脈痿句可知而總歸於肺熱所發也至其致熱之由或言七情或言房色或言傷濕或言勞倦乃互文以見內外諸邪皆足生病未見有歸重於濕之意但本證論治謂陽明為臟腑之海主潤宗筋束骨而利機關與衝脈衝脈又名血海合於宗筋屬於帶脈陽明虛衝脈無所稟則亦虛則宗筋縱帶脈不收所謂虛則不能行濕不為潤而為潦也一切筋脈皆緩縱可知故足痿而不用所以治痿獨取陽明又生氣通天論云濕熱不攘大筋緛短小筋弛長大筋亦有弛長小筋亦有緛短勿泥緛短為拘弛長為痿是此證固以濕熱言不以乾熱言也故古人方中多用朮苓澤瀉及諸風藥但此證屬乾熱者畢竟多然則滋陽明水穀之氣以潤宗筋壯北方少陰之精以沃涸澤尚憂無濟反敢利其濕哉治法熱者補陰丸東垣取黃柏為君以滋水清熱嵩崖謂風藥及香燥溫補之劑斷不可用童便一味最妙清燥湯詳傷暑用黃連黃柏麥冬五味生地當歸以清金滋水養血人參黃耆甘草以補肺氣有濕用二朮二苓澤瀉濕在下部者加升柴升提以利之飲食少進用陳皮神麯肺熱宜黃耆二冬石斛百合山藥犀角桔梗枯芩梔子杏仁之屬有濕加木通秦艽心熱黃連苦參牛黃龍齒牡丹皮地骨皮犀角肝熱生地天冬白芍柴胡龍膽草白蒺藜黃芩黃連脾熱痰濕二術二陳霞天膏等甚則三化湯見中風調胃承氣湯見大便不通下之控涎丹見痰取之腎熱六味見虛損加知柏濕熱健步丸加黃柏蒼朮黃芩或小胃丹見痰飲攻之濕痰二陳加蒼朮黃柏竹瀝薑汁血虛四物見血加減氣虛壯火食氣補中益氣見氣加蒼朮黃柏死血桃仁紅花歸尾赤芍之類若但兩足痿軟病在下部屬腎膀胱經謂恐懼不解則傷精傷腎亦多端矣舉恐懼以該其餘勿泥也精傷則骨酸痿厥精時自下腎傷精脫則水虛可知水虛則火炎熱而筋弛可知又謂三陽即膀胱太陽經為病發寒熱下為癰腫熱勝可知及為痿厥是也又屬脾濕經云凡治痿厥肥貴人猶言富貴人則膏粱之疾也濃酒厚味積為濕熱又云秋傷於濕秋為燥令而云傷濕者以見秋亦有傷濕耳勿泥發為痿厥是也東垣治黏合公三十二歲病此尻陰皆冷陰汗臊臭精滑不固此醇酒厚味滋火於內逼陰於外醫誤作寒治十旬不愈脈沉數有力以滋腎大苦寒之劑制之以急寒因熱用再服而愈當是滋腎丸神龜滋腎丸之類左經丸續骨丹治濕痰汙血阻礙經絡而致者兼表邪越婢加朮湯見腫脹肺痿肺癰金匱問曰熱在上焦者因咳為肺痿火刑金因咳壯火食氣故肺熱葉焦手足困弱而不用曰痿肺痿何從得之師曰或從汗出言汗出過多也或從嘔吐或從消渴小便利數或從便難血已燥矣又被快藥下利重亡津液以上數者皆亡津液之由可推廣之故得之津液亡則陰不濟陽而熱甚矣曰寸口脈數其人咳口中反有濁唾涎沫者何津液既傷則熱為乾熱何故反有唾沫吐出故疑之師曰此為肺痿之病肺熱則清肅之令不行水精不四布留貯胸中化為涎沫不但不濡他臟並肺亦不滋乾者自干唾者自唾也若口中辟辟燥咳即胸中隱隱痛脈反滑數此為肺癰肺痿病在氣分故津液隨氣分化為涎而出諸口肺癰病在血分故津液隨血分凝為膿而不出諸口然亦有唾濁者觀下文便知滑為痰涎之診既乾燥無痰涎則脈應澀何以反滑以血熱也然初雖數滑後則數實矣咳唾膿血癰潰膿血從咳唾出脈數虛者為肺痿壯火食氣則氣虛津液亡則陰虛數實者為肺癰氣壅血滯為實問曰病咳逆何以知此為肺癰曰寸口通三部言脈微金鑑云微當作浮下同而數微則為風數則為熱微則汗出數則惡寒此以外感言故脈浮數而身熱有汗惡寒風中於衛熱過於營過入也外感風寒內郁成熱由淺入深呼氣不入句舊在熱過於營句上今移此吸而不出言呼吸之氣出入不利也即下喘滿意風傷皮毛熱傷血脈風舍於肺由皮毛入肺其人則咳火刑金肺癢故咳口乾喘滿咽燥不渴熱尚在表未遽傷其津液故不渴以初病時言時唾濁沫即傷風痰嗽也時時振寒即惡風寒意熱之所過血為凝滯時時振寒則表久不解而熱不散於是日漸深入而血凝滯蓄結癰膿吐如米粥潰後吐膿如米粥始萌可救膿成則死亦有不死者觀下文便知此條舉外感而言而內傷之致此者可例矣咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭可知肺癰亦有唾涎沫者矣由此推之則肺痿亦必有不吐涎沫者矣必泥上條所云以辨證得毋誤乎再按肺痿有乾熱有濕熱而以乾熱為主即有涎沫亦吐者自吐乾者自干況無涎沫可吐者其為乾涸又何待言乎合痿門詳看其理自見矣熱得濕而後壅腫成癰則肺癰多為濕熱故時吐濁其不唾者乃凝結在裡之故謂肺癰無濕恐非情理久之吐膿如米粥者為肺癰桔梗湯主之以解毒排膿上條言死此條言不死蓋證有輕重之別也肺癰喘不得臥葶藶大棗瀉肺湯主之大苦大寒峻瀉肺邪恐稍遷延膿成則死矣肺癰胸滿脹一身面目浮腫濁氣不得下降之故鼻塞清涕出熱氣上蒸成水也不聞香臭酸辛肺熱攻鼻故酸辛濁氣充塞故不聞香臭咳逆上氣喘鳴迫塞葶藶大棗瀉肺湯主之肺痿吐涎沫而不咳者肺痿咳而吐涎沫本證也今止吐涎沫而不咳則似肺痿而實非肺痿矣其人不渴必遺尿小便數所以然者以上虛不能制下故也此為肺中冷肺冷則氣寒不能攝津液故上則吐沫下則小便不禁也必眩經謂上虛則眩是也多唾涎甘草乾薑湯以溫之若服湯已渴者屬消渴小便多而渴者為消渴小便多而不渴者為肺冷然消渴病初起亦有不遽渴者誤作肺冷治之遂見渴證此仲景教人辨別肺痿肺冷消渴之法喻嘉言曰才見久咳先須防此兩證肺癰由五臟蘊崇之火與胃中停蓄之熱上乘乎肺肺受熏灼血為之凝痰為之裹遂成小癰日漸長大則肺日脹而脅骨日昂乃至咳聲頻並痰濁如膠憎寒發熱日晡尤甚面紅鼻燥胸生甲錯甲錯謂枯索粗糙如鱗甲相錯也始先苟能辨其脈證屬表屬裡極力開提攻下無不愈者逮至血化為膿肺葉朽爛傾囊吐出十死不救嗟無及矣又云金匱治法貴得其大要多方圖之生胃津潤肺燥下逆氣開積痰止濁唾補真氣以通肺之小管散火熱以復肺之清肅亦能復起可不致力乎尊生肺痿舉肺湯桔梗甘草竹茹二冬阿膠沙參百合貝母肺癰手掌皮粗氣急顴紅脈數鼻煽不能飲食不治肺癰清金飲刺蒺藜苡仁橘葉黃芩花粉牛蒡貝母桑皮桔梗咳吐稠痰胸脹喘急發熱玄參清肺飲玄參柴胡陳皮桔梗茯苓地骨麥冬苡仁甘草檳榔煎成入童便一盞服重者不能臥寧肺桔梗湯桔梗貝母當歸栝蔞仁黃耆枳殼甘草節桑白防己百合苡仁五味甜葶藶地骨知母杏仁身熱加柴胡便祕加熟大黃勿論已成未成通用金鯉湯鯉魚一個重四兩去腸勿經水貝母末二錢入魚腹內線縫童便一碗浸重湯煮至魚眼出為度去鱗骨淨肉仍浸童便內頓熱連便服之日三次效速已吐膿後排膿散黃耆白芷五味人參各等分痹麻木內經謂風寒濕三氣雜至合而為痹痹閉滯也身中血氣為三者之邪所閉滯風氣勝者為行痹風善行動噓其寒濕走注不定故痹痛亦走而不定寒氣勝者為痛痹血氣痹滯無不痛者而寒之痛為甚以寒則凝其滯而不通比風濕尤甚故痛若虎咬世呼為白虎風是也濕氣勝者為著痹不如風勝者之流走但著而不移亦不如寒勝者之痛甚但略痛或但麻木不仁蓋濕如水而寒如冰腠理之松滑與緊澀有異則氣血之行其為阻滯衝擊者固有微甚之分也是名三痹經又分以冬得之為骨痹骨重不舉而痠疼春得之為筋痹筋攣不伸夏得之為脈痹血脈不流而色變長夏得之為肌痹肌肉不仁不知痛癢秋得之為皮痹皮逢寒則急逢熱則縱雖麻木尚知痛癢是名五痹又謂五痹久不愈重感於邪則各傳其臟如見胸滿煩喘咳嗽是皮傳肺為肺痹也嘔吐痰涎心下痞硬四肢懈惰是肌傳脾為脾痹心煩心悸嗌乾善噫厥氣上則恐如腎寒衝心則恐悸之類是脈傳心為心痹多驚善怒脅脹多飲小便數是筋傳肝為肝痹善脹尻以代踵足攣不伸也脊以代頭傴僂不直也是骨傳腎為腎痹痹入五臟則死矣又謂傳腑數飲而小便不通中氣喘急時作飧泄不瀉則脹不脹則瀉為腸痹大小腸也舉腸該胃小腹膀胱按之痛若沃以湯澀於小便上為清涕為胞痹胞即膀胱詳淋證門不言膽者缺文也又有衆痹周痹之名謂各在其處歇而復起左右相移更發更休名衆痹若在血脈之中止隨脈以上下而不左右相移名周痹周痹似中風之偏廢然有痛而無口眼喎斜為異矣按以上諸痹總皆風寒濕三氣為患特以其受病之所在區別言之耳要其病本則一也再按風即寒也説見瘧論雖曰風寒濕實寒濕二者足以盡之氣為寒濕所閉氣盛而寒濕微者則走注而不甚痛若氣盛而寒濕亦盛者則不甚流走而痛劇氣弱而寒濕甚者則著而不行亦不甚痛或但麻木也經所謂風勝為行痹者風有外風內風以外風言即寒之淺者止傷於衛風勝猶云邪偏勝於衛不甚閉遏故能流走而不甚痛若以內風言則即人身之氣矣是經言風即兼言氣可知矣至寒之痛必由於氣盛衝擊濕之著必由於氣弱不運固可推而得之耳麻者非痛非癢如千萬小蟲亂行如麻之亂也觀於腳麻可知木者不癢不痛並不麻頑然一物自己肌肉如他人肌肉按之不知搔之不覺如木之無知也河間論麻謂是氣澀東垣謂是氣虛蓋氣盛能行不麻全無氣不行亦不麻惟氣衰不能運行流利停滯此處噓其津液痰涎紛亂沸動所致也若血液燥涸者氣行不得滑利紛然而竄走其空隙亦麻或言風者誤也觀人之久坐而起則腳麻及繩縛久釋之則亦麻豈非氣久不行得起得釋而微通噓其久滯之血液而然哉李正臣夫人病麻晝減而夜甚又閉目則甚開目則否蓋晝與開目則陽行於外氣得流通故減也再按外感之寒濕能痹豈內生之寒濕獨不痹乎寒能滯氣澀血濕能停痰聚液觀之瘀血痰飲之為痹而初無外感者可見矣不特此也內生之風亦為痹內風者熱氣之慓疾者也熱盛亦生濕生痰矣熱甚則血枯死血阻塞經隧則亦不通而痹矣又忍尿亦成痹尿不行則氣亦不行而乍痹必膝冷支飲臂麻木一隅三反是在明者治法虛人痹者小續命湯見中風加減風勝倍防風寒勝倍附子濕勝倍防己皮痹加黃耆或桂枝皮脈痹加薑黃或紅花肌痹加葛根或白芷筋痹加羚羊角或續斷骨痹加虎骨或狗脊有汗減麻黃便溏減防己寒勝減黃芩加乾薑熱勝減附子加石膏壯者增味五痹湯風痹以羌防為主寒痹麻黃附子為主濕痹防己羌活為主皮脈等五痹加藥照前條三痹通用木通不見水者二兩以長流水二碗煎一碗熱服取微汗昔有人夢得此方而痹痛愈此謂通則不痛也不愈再三服視所勝照前方加味不得過三錢三痹湯獨活寄生湯並治各痹久不已乘虛入臟五苓散見傷濕加附子治胞痹加蒼朮治腸痹氣虛麻木黃耆益氣湯冷痹身寒無熱四肢厥冷蠲痹湯熱痹身熱如火升陽散火湯見勞倦加犀角羚羊角又行痹黃耆蒼朮各酒炒二錢薑一片煎調威靈仙酒炒末羚羊角灰芥子末溫服走注與歷節不同歷節是支節疼痛未必行也今將治走注諸方開後如意通聖散虎骨散桂心散仙靈脾散沒藥散小烏犀丸沒藥丸虎骨丸十生丹骨碎補丸定痛丸八神丹一粒金丹乳香應痛丸外貼用牛皮膠一兩水熔成膏蕓薹子安息香川椒附子各半兩為細末和貼亦有痰涎走注變生諸疾但察並非風寒濕外感而忽然肢體上下走易作痛神昏多睡或飲食無味痰唾稠黏夜間喉有痰聲者是也但用控涎丹見痰數服即愈痛痹上部痛羌活桂枝皮桔梗威靈仙臂痛加桑枝薑黃下部痛牛膝防己木通黃柏加烏附以引經關節痛穿山甲虎骨松節上部腫痛五積散見中寒烏藥順氣散加薑蔥發汗下部腫痛五苓散見傷濕八正散見淋大橘皮湯見腫脹加燈心竹葉利小便腫而大便不通大柴胡湯見瘧防風通聖散見中風筋痛緩筋湯渾身筋骨痛立效散覺冷者甘草附子湯覺熱者當歸拈痛湯見身體痛歷節腫痛犀角湯再服茵芋丸肢節痛大羌活湯外用尉法三年釅醋五升煎三四沸入蔥白二三升再煎一沸濾出布裹乘熱尉之又方芫花桑白川椒各二錢桂心一兩柳蛀五錢麥麩一升醋炒熱青布裹尉樟木屑一斗滾水泡熏洗勿令氣入眼著痹白米半碗薏苡仁數錢生川烏末四錢熬粥宜稀薄下薑汁蜜各二三茶匙空心啜之然非有風川烏不宜用張子和以苦劑吐去濕痰次用白朮茯苓寒加附薑煎服著痹大概氣必虛四君子見氣為主加去邪之品痙痙強直也謂筋之收引緊急而不舒縱也其所以致此者有二一曰寒筋得寒則血凍而堅凝故緊急觀物之寒凝者必強硬可見所謂寒則收引也濕亦寒之屬故經謂諸痙皆屬於濕也一曰熱熱甚則灼其血液乾枯乾枯則短縮觀物之乾者必縮可見也又經謂諸強直皆屬於風者風有內外內風則從乎熱外風則從乎寒也經言痿屬濕熱是濕與熱合故筋脈緩縱詳痿門痙則濕與熱分故筋脈短縮蓋濕有寒濕有熱濕寒濕如水之冰凝故堅強熱濕如膠飴之熔化故柔軟無濕而熱則筋干有熱而濕則筋潤也金匱痙證謂身熱惡寒傷寒證頸項強急面赤目赤陽明證頭熱足寒陽性上升也獨頭動搖此下乃痙證所獨有故用獨字以別之卒口噤背反張者痙病也太陽脈循背上頭陽明脈挾口寒客二經故筋脈急致此按此乃以寒則收引言然熱為寒鬱而傷血液筋枯致此者多矣又謂太陽病無汗惡寒為剛痙此寒傷營寒勝血凝筋脈收引之證也有汗不惡寒為柔痙汗出不惡寒溫病也此血枯筋干縮之證又謂太陽病無汗而小便反少內氣虛寒不化液也氣上衝胸寒氣上逆口噤不得語寒氣盛故牙關緊急欲作剛痙葛根湯主之以發散太陽陽明之寒又謂胸滿裡熱壅也口噤臥不著席反張甚也腳攣急齘齒牙緊甚也可與大承氣湯見大便不通攻其熱以救液又謂太陽病其證備身體強𠘧𠘧然俯仰不能自如之象脈反沉遲應浮數而反沉遲是表裡皆寒矣加栝蔞根何為遲當作數為是不浮而沉數則內熱津干故加栝蔞根也此為痙栝蔞桂枝湯主之解太陽之表加栝蔞根以生津潤燥又謂太陽病項背強𠘧𠘧太陽脈下項循肩挾脊陽明脈循喉嚨入缺盆無汗惡風此寒傷營證葛根湯主之有汗惡風此風傷衛證桂枝加葛根湯主之較葛根湯少麻黃一味以上身體強背項強將欲成痙故用解表之劑使鬱熱得伸以免焚灼筋縮也又謂太陽病發汗太多因致痙又謂風病下之則痙又謂瘡家不可發汗指潰後言汗出則痙皆血液傷損涸燥意又謂痙病有灸瘡難治血被灸益枯也合而觀之不出寒熱二端虛實兩途治者取衷焉可也按寒熱雖皆足以致痙而多由於熱以熱者火之有餘也火之有餘由水之不足故血液枯竭之人汗下過多亡其津液産後失血後大病後血虛小兒陰血未足多患此以水虛無以制火火盛而水愈虧也此為內傷之證若外感風寒濕氣不過為發熱痹痛等證何遽致筋脈急縮竟至頭搖齒齘腰反折之甚哉仲景所言外感寒證自不多見辛溫發散之劑勿輕用也準繩謂內熱因外寒所鬱則愈甚甚則津液乾燥而無汗大小筋俱受熱灼而枯縮故曰剛痙若柔痙則為濕熱相兼經謂濕熱大筋短小筋長又謂肺移熱於腎傳為柔痙注云柔謂筋柔無力痙謂骨強不隨則仲景所謂柔者豈非小筋得濕而弛長所謂項背強反張者豈非大筋得熱而強直乎後人乃以無汗為表實有汗為表虛而用薑附溫熱等劑寧不增大筋之熱歟其説雖未盡合仲景之意亦自可取醫宗金鑑云六經皆有痙身背屬太陽凡項背強急脊腰反張髀不可以前曲膕如結者太陽也身前屬陽明頭面動搖口噤齒齘缺盆紐痛肘膝相構陽明也身側屬少陽口眼喎斜手足搐搦兩脅拘急半身不遂少陽也至若腹內拘急因吐利後而四肢攣急非太陰乎尻以代踵脊以代頭腳攣不能行背曲不能伸意俯而不能仰者非少陰乎睪丸上升少腹裡急囊縮舌卷非厥陰乎按經言足少陰之筋主癇瘛及痙在外者外背也腎筋之行於背者不能俯在內者內身前也腎筋之行於身前者不能仰又曰腎脈為病脊強反折然則反張亦屬腎痙不獨太陽為然矣不獨能俯不能仰也仲景謂痙脈按之緊如弦直上下行又謂寒濕相搏發汗已其脈如蛇柔曲而不弦直為欲解脈如故反伏弦者痙從金鑑訂定治法火盛血虛者當歸芍藥生地紅花黃連鉤藤鉤兼氣虛加人參兼痰加竹瀝金衰木旺壯火食氣也先用瀉青丸見中風後用異功散見氣獨肝火旺者先用加味小柴胡湯見寒熱次用四物湯見血加柴胡丹皮山梔鬱熱用加味逍遙散見郁若脾土受克補中益氣見氣加芍藥山梔脾土濕熱三一承氣湯見大便不通腎虛六味丸見虛損太陰寒濕凝結腹痛桂枝加芍藥防己防風湯手足厥逆附子散桂心白朮湯汗汗者水也腎之所主也內藏則為液上升則為津下降則為尿外泄則為汗而所以外泄則火之所蒸發也火屬心故謂汗為心之液火盛者雖表固亦出不盛者必表疏乃出自汗者非因發表而汗自出也其出無時火退乃已傷風傷寒皆熱蒸汗出中暑病濕亦然五志過極則生火亦汗出如驚則心神浮動飛越汗隨出可見勞動則生火飲食則長氣經云食入於陰長氣於陽氣屬於陽氣有餘便是火也房事則精泄於下火散於上故皆汗出火在裡則汗隨臟腑出火在表則汗從經脈出如太陽傷風熱在皮膚則翕翕汗出乃肌表之汗也陽明胃實則蒸蒸汗出乃胃府之汗也翕翕蒸蒸皆熱貌翕字為合羽其身如合羽所覆捫之自溫蒸蒸則如炊籠騰越捫之熱氣透手也春夏氣浮汗出肌膚秋冬氣沉汗出骨髓故筋骨之疾宜汗者當於冬至後發之自汗舊雲表虛然不可概論如傷寒其始無汗後傳陽明即自汗豈前者表實後者表虛乎前之無汗則陰邪凝固使然無論其人平素表實無汗即表虛亦無汗後傳陽明熱盛蒸越無論其人平素表虛有汗即表實亦有汗問太陽傷風有汗用桂枝湯非表虛乎曰傷風有汗有汗則表疏故謂之虛是因有汗而表虛非因表虛而有汗也因表虛而有汗則重實表因有汗而表虛則重散熱其用桂枝是發散風邪非固表也固表乃其兼能耳有實火有虛火陽虛即東垣補中益氣證陰虛即血虛腎陽虛腎陰虛皆發熱皆虛火也火炎則身溫汗熱而膚澀陽虛則身涼汗冷而膚滑陽衰則衛氣不固又陽虛則不能內守而易於浮越也然亦有熱極而反出冷汗者蓋熱聚於內肌膚反冷膚冷故汗亦冷也或汗過多陽從汗脫所致然熱甚汗多而脫者其汗必先熱後乃冷耳丹溪謂熱極反汗冷乃火盛兼水化其説牽強盜汗者寤時無汗寐時汗出如盜乘人睡熟而出也人寤則氣行於陽寐則氣行於陰若其人表陽虛者遇寐而氣行於里之時則表更失所護而益疏即使內火不盛而陽氣團聚於裡與其微火相觸發亦必汗出若內火素盛兩陽相搏陰液被擾雖表固者亦必潰圍而出矣其人陰虛尤易動及其醒覺則陽氣還出於表而汗自止傷寒之盜汗亦然蓋邪在半表半裡時寤則氣挾邪還於表陰得安靜不擾故無汗寐則氣挾邪入於裡陰被擾而不寧故汗出也丹溪謂雜證之盜汗有陽虛有陰虛大病後陰氣未復遺熱未清或勞役七情色欲之火或飲食積熱皆足耗損精血陰氣既傷陽火獨旺內蒸成汗也心孔汗別處無汗獨心孔一處有汗由思慮過多心神浮越使然頭汗別處無汗熱不得外越但上蒸也或因黃郁未發或因濕家誤下或因水結胸蒸或因火劫熱迫或因陽明蓄血或因熱入血室並詳傷寒論手足汗別處無汗脾胃之熱達於四肢也脾胃主肌肉四肢熱達於肌肉則體汗若達於四肢則手足汗耳冬月足多汗氣降也又有手足汗屬脾胃虛寒不能運行津液乘虛陽外越虛陽被寒所逼外越而橫溢於四肢者如陰盛而淫雨滂沱其汗必冷與實熱之汗其汗必熱不同脫汗陰盛格陽汗從陽脫味淡不咸久藏之液則咸若才經氣化之液則淡咸者已經出盡並新化之液亦出則津隨氣脫可知矣如珠不流無繼故也為絶汗不治淋漓如雨拭揩不及及液涸而火正炎熬煎如膠之黏者皆難治治法自汗屬熱者宜清火胃實者宜下涼膈散白虎湯並見發熱承氣湯見大便不通酌用氣虛者生脈散見中暑補中益氣湯見氣加麻黃根浮麥血虛者當歸六黃湯加地骨皮血氣並虛者黃耆建中湯見勞倦自汗畏冷雖炎天必棉衣乃火鬱伏於內不達於表故外畏寒而內實熱也防風湯濕痰自汗須去痰導濕每飲食即汗出益胃散不論冬夏額上長有汗出因醉後當風致之名曰漏風漏風湯病後汗常出察其人精神飲食日增是餘邪欲散也不須治之若陰氣未復邪熱尚存須與清理陽虛陰乘陰寒之氣一逼則虛陽浮越而汗隨出矣因自汗而厥者黃耆建中湯見勞倦加附子或耆附湯盜汗當歸六黃湯主之無內熱者表虛者即內無火而寐時陽氣入里久亦擾陰汗出防風湯白朮散肝火當歸龍薈丸見脅痛有身熱加地骨皮柴胡黃耆秦艽肝虛加酸棗仁實加龍膽草右尺實大黃柏知母脾虛參朮白芍山藥白扁豆浮麥經霜桑葉末茶調服心虛熱而陰氣不斂者睡則多驚酸棗仁湯心實熱者多煩當歸六黃湯加連翹丹皮竹茹虛勞盜汗青蒿散嘔吐噦噁心有聲無物為噦於月切乾嘔也又內經以噦為厄逆義別有物有聲為嘔無聲有物為吐病在胃趙以德則以有聲無物或有水為嘔有物無聲為吐有物有聲為嘔吐謂胃分三脘上脘法天為清陽屬氣分主動下脘法地為濁陰屬血分主靜雖陽中有陰陰中有陽然上脘終是氣多血少下脘終是血多氣少中脘則氣血相半飲食入胃亦分清濁水飲物之清穀食物之濁而清中有濁故清之清者上輸於肺布為津液清之濁者下輸膀胱出為便溺濁中有清故濁之濁者為糟粕由大腸出濁之清者淫精於血脈若邪在上脘之陽則氣停水積飲之清濁混亂為痰飲涎唾胸中阻礙不快清氣不升激而成嘔故嘔為氣病法天之陽動而有聲與水俱出猶雷震而雨注也邪於下脘之陰則血分滯而食停吐法地之陰靜而無聲食從吐出猶萬物之吐於地也若邪在中脘則嘔吐並作飲食皆出矣潔古謂中焦吐者屬積由食與氣相假為積或先痛而吐或先吐而痛亦清濁相雜之義氣清食濁也又謂下焦吐屬寒朝食暮吐則亦屬陰之義也東垣亦謂少陽多氣少血有聲無物陽明多氣多血有聲有物太陽多血少氣有物無聲皆同此意但氣血多少不以胃之三脘分而以三經分耳勿泥也然上脘非不吐食也設陽中之陰亦病如上脘有痰血積滯是有形之物即屬陰則食入即吐不得入於胃見下篇非若中脘之食已而後吐下脘之食久而後吐也下脘非不嘔也設陰中之陽亦病如雷龍火上衝則吐與嘔齊作但嘔少於吐不若上脘之嘔多於吐也水穀入胃若脾氣不運清濁不分下趨大腸則為泄上壅則為吐故吐與瀉對講其義便明水就下火炎上知嘔吐從於火化而屬熱者為多則知瀉利從於水化而屬寒者為多且可知小便淋澀乃為火氣所持不得降諸義皆明矣是故外感邪入而嘔者胃陽被鬱而上衝也治宜辛散生薑所必用也不因外感而內熱胃火上衝者治宜清降石膏所必用也痰濕鬱滯成熱上逆者陳皮半夏茯苓所必用也食鬱氣滯而上逆者枳實麥芽等所必用也二便熱結下不通而反干乎上者大黃滑石等所必用也此治實熱之例也若夫胃氣虛衰不運鬱熱而嘔者則推揚胃氣寒冷不運壓火而嘔者則溫中散寒胸中虛熱久不食而嘔者但得五穀之陰以和之則立止此治虛熱之例也熱固火逆而嘔寒亦鬱火上逆而嘔故嘔無不本於火者但不得一概治以寒涼耳又若翎叉之探撩舟車之搖撼惡臭劣味之觸犯皆能擾動胃氣而致嘔夫擾動屬陽火之化也此雖不可以火治而未始不可云火若因其不可以火治而謂之非火且反謂之寒則誣矣一切病證皆同此論之不特嘔吐為然也或問傷寒論金匱明言嘔吐為胃寒而子必歸之火何也曰如但陰寒凝結而氣不上逆何以致吐氣即火也寒為本寒鬱氣致上逆為標仲景特言其本耳熱嘔喜冷惡熱煩渴引飲脈洪數二陳湯見痰飲加黃連炒梔子枇杷葉竹茹乾葛生薑入蘆根汁服胃熱惡食而吐聞食氣即嘔藥下亦嘔並用蘆根汁下焦實熱二便不通氣逆不續嘔逆不禁病名走哺人參湯身背熱臂肋牽痛膈間厭悶食入即先嘔而後下或作後瀉病名漏氣此因上焦傷風鬱熱入里麥門冬湯嘔苦水乃膽熱汁泄取足三里陽陵泉經曰諸嘔吐酸皆屬於熱平時津液隨上升之氣鬱積胃上濕熱不宣故作酸即酒糟熱則酸之理鬱極則上湧而吐甚則牙齒酸澀不能相對此為吐酸平木湯少用吳萸為從治若不能吐湧而出伏於胃中咯不得上咽不得下此為吞酸肌表得風寒則內熱愈郁而酸味刺心若肌表得暖腠理開發內熱得泄或得香熱湯劑津液行散亦可暫解東垣謂酸味為收氣乃金旺寒水乃金子子能令母實故用辛熱之劑以治寒瀉肺其意亦謂太陽經外感於寒則皮毛閉而束熱於內耳太陽屬寒水皮毛屬肺金故以金水言之然熱劑終不可過用丹溪用黃連吳茱萸各制炒隨時令迭為佐使蒼朮茯苓為輔為小丸吞之黃連湯作丸亦可有宿食亦酸如穀肉在器濕熱則酸也生料平胃散見傷食加麥芽神麯有痰者開鬱湯怒氣吐逆胸滿膈脹不食常飽食則吐逍遙散見郁豫嘗病乾嘔服生薑少止誤以為寒屢治不效者十餘年後悟為胃熱用清熱生津藥而愈如果胃寒則必喜熱惡冷脈遲尿白理中見中寒吳茱萸等湯自可用昔人患胃寒吐用附子理中湯加丁香到口即吐後去乾薑白朮只用參附加丁香木香沉香立止蓋乾薑白朮滯故耳又熱藥有須冷服者若熱服則吐此熱因寒用之法羅謙甫云服諸熱藥不愈者紅豆丸神效嘔吐諸藥不效當用鎮重之品以墜其上逆之氣痰氣結在咽膈間粥藥不得下到咽即吐薑蘇湯下靈砂丹俟藥可進治之嘔膿胃脘癰也不必治嘔膿儘自愈嘔蟲蟲動則噁心故嘔藥入則蟲必動動則嘔蟲不出而藥反出非計也必於藥中入炒川椒十粒庶蟲見椒則伏而不動泛泛兀兀心中怏漾欲吐不吐名噁心氣與痰壅非烏藥不開大半夏湯或小半夏茯苓湯見痰飲仲景云欲吐者不可下之以氣方上湧不可逆之使下致抑塞憒亂也又云食已即吐火也大黃甘草湯下之者以既吐矣吐而不已有升無降當引令下行也嘔吐津液既出必渴宜生津嘔吐大痛色如青菜葉者死反胃噎膈吐而不已至每食必吐名反胃胃脘枯稿梗澀難入飲食噎塞迎逆於咽喉之間名噎噎塞迎逆於胸膈之間名膈過此乃得入胃醫貫謂噎膈年高者有之噎則水飲可入食物難入入亦不多膈則食雖可入亦不能多良久復出二者皆難於納勉強吞下終帶痰涎或白沫酸水或如醬汁者而出反胃非不能納原能多食乃不能容受朝食暮吐暮食朝吐或一二時而吐或積至一日夜腹中脹悶不安而吐亦有食已即出者原物酸餿不化男女老少皆有之丹溪謂得之七情六淫遂有火熱炎上之化多升少降津液不行積為痰飲被劫時以熱藥劫治也暫得快津液得辛熱暫行散不久復作前藥再行積成其熱血液衰耗胃脘乾枯大便祕少如羊矢然火盛糞干堅小又腸亦干小故屎不潤不大也必外避六淫內節七情飲食自養滋血生津以潤腸胃則金無畏火之炎腎有生水之漸脾氣健運而食積傳化矣王太僕云食入即出是無水也噎膈反胃皆有之食久反出是無火也反胃有之噎膈無此無水者壯水之主六味主之無火者益火之原八味主之並見虛損火逆衝上食不得入脈洪數有力者滋陰清膈飲加枇杷葉二錢蘆根一兩又有一種肝火鬱而不伸亦嘔不納食亦心痛但所嘔者酸苦青藍水大小便多不祕亦有乍祕乍泄者用吳茱萸黃連濃煎細細呷之再服逍遙散見郁愈後六味丸詳郁門痰飲阻隔食才下便為痰涎裹住吐出者以八神來復丹控其痰涎見痰飲血稿者地黃麥冬當歸煎膏入韭汁乳香童便蘆根汁桃仁泥細呷之大便祕澀加桃仁泥玄明粉但食物下咽覺屈曲自膈而下梗澀微痛多是瘀血用前藥後以代抵當丸見血行之瘀血在膈間阻礙飲食代抵當丸芥子大三錢去枕仰臥細細咽之令搜盡停積天明利下惡物將息自愈五靈脂為末黃犬膽汁和丸龍眼大每服一丸好黃酒溫服三次亦行瘀之妙劑也有蟲者秦川剪紅丸取之此丸亦取瘀血噎病喉中如有肉塊是食滯於此不下也麥昆煎童便降火竹瀝行痰薑汁佐竹瀝韭汁行血人乳牛乳補虛潤燥蘆根汁止嘔茅根汁涼血甘蔗汁和胃驢尿殺蟲仍入燒酒米醋蜜各少許和勻隔湯頓溫服得藥不吐切不可便與粥飯食物每日用人參五錢陳皮一錢作湯細啜數日後方可飲陳米湯及粥糜張子和曰內經謂三陽結為膈三陽手足太陽小腸經膀胱經也結謂結熱也小腸結熱則血脈燥膀胱熱結則津液涸二便祕塞下既不通必反上行所以噎食不下經又曰少陽所至為嘔湧食不下又云肝移寒於心為狂膈中蓋陽氣與寒相搏故膈食中不通非獨專於寒也醫者不察妄用熱藥人言可下退陽養陰張眼吐舌恐傷元氣惟劉河間三一承氣湯見大便不通獨超千古假如久閟慎勿陡攻縱得攻開必慮後患宜先潤養小作湯丸纍纍加之關扃自透其或涎痰上阻輕用酸苦微湧因而治下藥勢易行設或不行蜜鹽下導始終勾引兩藥相通結散陽消飲食自下一官病此十年大便澀燥小便黃赤豫以四生丸下三十行燥矢腸垢何啻數升其人昏困一二日頻以冰水呷之漸投乳酪芝麻飲數日外大啜飲食而愈有極力呌呼氣喉損破氣並胃管喉破氣不能從喉管行故從胃管行壅塞致吐法在不治牛喉管焙乾服之酒客多噎膈飲熱酒者尤多以熱傷津液咽管幹澀觀其口舌乾澀可知食不得入也霍亂霍言其手足之擾動如揮霍也亂言其內之邪正變亂也其證心腹卒痛或吐或瀉或吐瀉交作甚則兩足轉筋轉筋甚而從足入腹或通身筋皆轉舌卷囊縮者死若無吐瀉而止轉筋腹痛者名乾霍亂即俗所謂攪腸痧也病由邪氣結滯中焦阻隔上下正氣不通上之陽氣不得下通於陰則上壅故吐下之陰氣不得上通於陽則下迫故瀉也此言陽上陰下之阻隔也亦有陰上陽下者又有陰陽參錯清濁邪正混淆寒熱互爭彼此拒格不通者於是血氣營衛之行失次彼順此逆搏擊於中矣上吐下瀉則中焦之邪得以分消有不藥亦愈者若邪氣熾盛吐瀉適足虛其正氣邪愈結而不運矣轉筋由筋中素蘊火邪血液久虛所致然未遽然也若因霍亂吐瀉頓亡津液則血液之虛者愈虛或不因吐瀉而外冒風寒腠理閉密熱氣怫鬱激發則火邪之烈者愈烈乾霍亂之轉筋及尋常轉筋以此於是攣縮急痛而不可忍矣觀其情形急暴屬火無疑或以為寒謂寒則收引不知收引特拘急牽強耳與轉筋之攣痛異常者不同烏可混哉或疑轉筋多在足明屬陰寒蓋足居下部屬陰多寒又感風寒筋脈收引徑急霍亂不論寒證熱證皆邪結中焦陽氣不能下達兩足必冷故每轉筋若果由火熱則是筋皆轉矣何獨足乎此論足獨轉筋由於寒亦有理然謂一於寒而中無火邪則非矣若無火邪則陰凝而靜斷無躁急轉戾之理且霍亂乃脾胃病故足獨轉筋不可謂必由於寒也丹溪治遍身轉筋入肚作極鹹鹽湯於槽中暖浸以潤其燥血熱也寒而徑急者亦可用以軟堅治霍亂當審其為何邪河間謂為熱甚所致火性躁暴也凡暴病暴死皆屬於火也準繩謂以脾濕為本脾濕盛則亦鬱而生熱也張子和則以風濕熱三氣合而為邪蓋脾濕土為肝風木所克肝木清氣為濕所遏不得升不升則濕愈不行若受木克者然郁為熱而暴發發則心火上炎故吐脾濕下流故瀉也王海藏亦謂風濕熱與食相合為邪明理論則謂他病霍亂多由飲食所傷若傷寒霍亂則由邪入中焦胃氣不和因之陰陽痞隔而致諸公之論當兼採之不可執一説以誤人也大抵夏秋之交最多此證蓋夏月人多食冷飲水其寒濕之氣與暑熱之氣交摶胃中是為寒熱不和即無所郁遏亦將久而病發若外感風寒內傷飲食則閉滯不行其發也暴矣病之將作必先腹中㽱痛痛高近心則先吐痛下近臍則先瀉因冒風則惡風有汗因冒寒則惡寒無汗冒濕則身體重著傷暑則心神煩躁問其曾否食過何物曾否七情動氣更分寒熱虛實治之氣少唇青肉寒四肢拘急畏冷喜熱脈沉遲人事清醒者寒也霍亂暴證原屬於火但火由寒激發則火泄而寒獨存也理中湯見中寒脈絶者通脈四逆湯見厥吐利不止元氣耗散格陽於外或口渴喜冷得水則不能飲或發熱煩躁欲去衣被不可誤以為熱宜理中湯甚則附子理中湯並見中寒不效則四逆湯見厥並宜放十分冷服轉筋者理中湯去朮加生附子一枚或理中湯加凍膠銼炒一錢血為寒凝狀如凍膠故加此治之且以潤其燥或煎濃鹽湯浸仍縛系其腿脛勿令入腹或灸承山二十七壯神效一法男子手挽其陰女子手牽乳近兩旁身熱煩渴氣粗口燥喜冷畏熱心神悶亂脈洪數者熱也若更四肢重著骨節煩疼者兼濕也中暑霍亂宜香薷飲見中暑井底沉極冷頓服桂苓白朮散亦妙濕盛者除濕湯見中濕訶子散暑濕相搏者二香散熱多飲水者五苓散見傷濕轉筋者木瓜煮汁飲之或香薷煮汁亦可或燒梔子二十枚為末熟水調下煩渴者吐瀉後津竭也止渴湯增損縮脾飲茯苓澤瀉湯小麥門冬湯霍亂後下利不止腹中㽱痛恐作痢宜黃連丸霍亂後下利見血止血湯赤石脂湯按寒熱諸症疑似難決必參諸脈然霍亂氣閉脈多沉伏不見或澀滯歇至須辨其應指有力無力則亦難辨矣切不可妄投藥且先以陰陽水分理之刮痧法最妙乾霍亂尤宜法用瓷碗之精細者湯溫之香油抹邊令滑不傷肉刮脊兩旁俞穴引出臟腑之邪又刮手足灣引之四散熱血隨刮透出起紅紫疙瘩紅者輕紫者重黑者更甚蓋氣結則血凝血凝而氣愈滯血散氣行則立愈矣七情鬱結者七氣湯脅下痛者木剋土也建中加柴胡木瓜湯兼外感風邪者六和湯見傷暑倍藿香煎熟調蘇合香丸見諸中大抵蘇合香丸藿香正氣散見中風最能通關理氣所必用也霍亂非有邪不致有邪即為實雖虛人亦不得純補惟吐瀉後當細察之若已透暢人困弱脈虛軟是邪已去而正虛也若吐瀉未透脈仍澀滯有力人仍煩躁不寧是邪尚未盡也須別之吐瀉不止頭目暈眩肢冷轉筋須臾不救者吳茱萸湯汗出厥逆不解者四逆湯見厥吐瀉後小便利汗出者即內外熱亦宜溫之吐瀉後二便不通胃中實痛者結糞留滯四君子見氣加大黃一兩吐瀉後胸膈高起痞塞欲絶理中湯見中寒加枳實茯苓吐瀉已透而余吐余瀉未止腹有餘痛宜一味報秋豆葉煎服乾者尤佳羅謙甫治一人傷酒肉潼乳霍亂吐瀉脈沉數熱未去也按之無力所傷之物已去以新汲水半碗調桂苓白朮散徐服之少安又於牆陰掘地二尺許入新汲水攪之澄清名地漿再調服之而愈牆陰土重陰也暑熱躁甚非此不除又治一人年八十中暑霍亂吐瀉昏迷頭熱如火足冷以桂苓甘露飲瀉熱補氣墜浮火以安神明加茯苓以分陰陽冰水調灌之而愈再以參朮調中湯調理平復妊娠産後霍亂不外上法但須顧胎防虛乾霍亂不得吐瀉則邪結中焦用溫熱立死炒鹽入新汲水乘熱多飲探吐之不吐更服吐乃飲三吐乃止大抵邪盡即止勿泥此法極妙凡欲吐而不得吐及吐不透者並宜之須極咸乃妙吐後心腹㽱痛頻欲登圊苦於不通藿香正氣散見中風加枳殼一錢生者更速多下來復丹見中暑若瀉則不可用此丹不效須用神保丸見傷飲食但此丸必到大腸乃行若隔於上則轉服轉祕須用來復丹研末湯調吞養正丹見氣百粒庶可引前藥到下戴復庵法先服濃鹽湯探吐次調蘇合香丸吞來復丹仍進藿香正氣散加木香枳殼厚朴湯活命散冬葵子湯頂心有紅髮急拔之取青蒿汁和水飲愈或刺委中穴並十指頭出血亦妙火甚者藥須反佐古方煎鹽湯調童便入藥取其下降以通陰也兼能行血凡霍亂切不可與粥飲蓋邪滯未化穀食一入益結滯不行往往致死並忌酒薑湯蒜烏梅梅醬熱湯一切收斂溫熱之藥泄瀉泄瀉之症水穀或化或不化腹痛或不痛並無努責亦無膿血及裡急後重惟覺困倦耳故與痢疾異飲食入胃下小腸得氣運行則清濁以分水滲膀胱谷趨大腸二便調矣何泄之有若氣不運化水穀不分歸併大腸一路則瀉矣而氣之所以不運則六淫七情種種之邪皆得而滯之略具如下或因於風經曰春傷於風夏為飧泄言春時傷於風寒由皮膚而經絡傳入腸胃腹脹腸鳴風氣往來腸胃間衝擊作響也因而飧泄也泄出原食不化此風非汗不出始為寒氣久則鬱熱又肝木之氣亦名為風春時肝氣宜升為邪所傷鬱而下陷郁久成熱熱久蒸化為濕遂至飧泄此宜升清除濕二證皆腸鳴肝風內煽亦鳴響脈弦泄時或閉而不下下多白沫辟辟有聲其氣不甚臭穢以完穀不化也夏以久言勿泥或謂春木當令雖不能升亦不肯下趨但郁成熱至夏熱盛蒸濕如雲蒸而雨降故至夏乃泄亦通或因於寒蓋寒則氣凝無以運行水穀故泄也寒氣攻刺腹中綿綿作痛腸鳴暴下無聲水穀不化所下清冷如鴨屎之溏大便如水中有少糞也小便白脈沉遲身冷脈細心虛皮寒肺虛氣少肝虛前後泄利腎虛飲食不入脾虛為五虛難治用參朮補劑早救之遲則不能挽矣或因於熱蓋火性急迫逼其水穀下注往往不及傳化即出勿因其完穀不化誤作虛寒其脈洪數小便赤澀腹中痛刺痛一陳瀉一陳口燥渴糞出辟辟有聲肛門熱痛熱瀉固由火性急迫亦有熱氣壅滯不行不但寒不能運也所下多垢黏色黃赤腹中悶痛或因於暑與熱瀉同理證則面垢多汗煩渴或因於濕濕盛而小便不利水走腸間漉漉有聲腹不痛脈沉緩體重軟弱治濕宜利小便若氣虛下陷而利之是降而又降也當升其陽所謂下者舉之也升陽用風藥風藥又能勝濕或因於食蓋傷食則脾滯不能運行水穀故泄噫氣如敗卵臭腹中絞痛痛一陳瀉一陳下過稍寬少頃又痛所下臭穢黏膩前食既滯則後食繼停陳陳相因久而乃出故臭穢色黃或傷於酒每天明時瀉一二次酒質濕夜氣陰寒不能久攝故至明必瀉或因於飲渴而飲飲而瀉瀉而復渴復飲復瀉也或因於痰痰滯氣不行故水穀不分腹中隱隱微痛或覺冷下如稠飲時瀉時不瀉或多或少不食不飢昔肥今瘦脈滑有脾虛不能受食食畢即腸鳴腹滿必瀉出所食方快不食則無事名脾瀉每天明時瀉一二次名腎瀉腎火虛寒也有肝氣滯兩肋痛而瀉者名肝泄有患口舌糜爛而瀉者乃心脾二經之熱心開竅於舌脾開竅於口其熱上攻故糜爛若移其熱於胃與小腸則運化失職故泄也名口糜泄久瀉不已名滑瀉又名洞泄大孔如竹筒飲食入口直出無禁氣將脫矣飲食不進則無救矣治法風瀉升陽益胃湯見惡寒寒瀉理中湯見中寒漿水散熱瀉益元散見傷暑加芩連燈心竹葉止瀉湯去白朮加黃連滑石扁豆熱止在上膈渴而引飲水入胃中胃本無熱不能行水致瀉灸第一椎下陷中五苓散見傷濕亦可暑瀉青六丸見痢玉龍丸濕瀉胃苓湯五苓散升陽除濕湯吞戊己丸止瀉湯寒濕加薑桂熱濕加黃連葛根食瀉平胃散見傷飲食加枳實審其曾傷何物仍燒此物存性調服三五錢形氣實者下之酒瀉理中湯見中寒加乾葛吞酒煮黃連丸見傷暑或葛花解酲湯見傷飲食飲瀉實者神佑丸見腫脹虛者春澤湯見傷濕白朮調中湯痰瀉止瀉湯加半夏海粉實者吐之下之虛者六君子湯見氣脾瀉快脾丸腎瀉四神丸早晚二服肝泄止瀉湯加柴胡青皮若因肝氣不斂致脾氣散而不運加白芍口糜泄其證上發則下止下泄則上愈當口糜發時用瀉心導赤散滾湯淬服若當泄瀉時則早晚用參苓白朮散糯米湯服若小便少利不止乃水走大腸用茯苓車前子各等分煎湯代茶若服寒涼藥口瘡不效則為虛火上泛理中湯加肉桂大倍茯苓降陽利水陽降則口糜愈水利則泄瀉止久泄八柱散或四君子見氣加肉果升麻仲景云下利不止以理中與之益甚理中者理中焦此利在下焦赤石脂禹餘糧湯丸主之瀉久不止多變為痢詳痢門實者以厚朴枳實湯預防之虛寒者四神丸收澀之劑固腸丸訶子散皆治熱瀉扶脾丸桃花丸訶子丸赤石脂禹餘糧湯皆治寒滑泄瀉久不止不可離甘草芍藥為脾病也不可離白朮為濕也忌枳殼為能寬腸也忌當歸為能滑腸也用補中益氣者白芍代之瀉已愈至明年此月復發者有積也熱積大承氣湯見大便不通虛者保和丸見傷飲食加三稜蓬朮之屬寒積備急丸見傷飲食理中見中寒加茯苓黃連名連理湯寒熱雜合而瀉者最宜如暑瀉兼內傷生冷或熱邪已解而瀉仍不止疑似之證皆可服之凡瀉津液既去口必渴小便多赤澀未可便作熱論必初起即渴即赤澀乃為熱陰陽已分瀉已止而小便少者此肺氣虛不能生水補中益氣湯見氣加麥冬五味或腎陰虛而水自涸六味丸見虛損加麥冬五味或腎陽虛而陰無以化八味丸見虛損若再行滲利則小便益不行而水入不消腫脹之證反作矣瀉脈必沉宜細小不宜大數實下泄上吐痰皆不已為上下俱脫死腹大脹手足厥利不止形脫死腸鳴大抵氣與水液相沖擊而成聲氣多則響高水多則響沉或無水而有痰食之閉塞氣閉忽通則鳴也氣有寒有熱熱則氣盛其衝擊必有力寒則氣不足不足本不能衝擊然鬱積久之則亦必通觀寒凝腹痛者以炒蔥薑鹽尉腹則腹響而氣行痛止可見也是故氣之和平而流暢者不鳴也必其或熱或寒有塞有通而後鳴經謂熱淫所勝病腹中雷鳴氣上衝胸治以鹹寒又謂中氣不足腸為之鳴脾虛腹滿腸鳴飧泄食不化是也胃寒泄瀉腸鳴升陽除濕湯見泄瀉加益智仁半夏棗薑火擊水者二陳見痰加芩連梔子水氣客於大腸疾行則鳴濯濯如囊裹水之聲河間葶藶丸痢痢由濕熱所致或飲食濕熱之物或感受暑濕之氣不論外感六淫內傷七情飲食勞倦皆能致濕熱積於腸胃不論何臟腑之濕熱皆得入腸胃以胃為中土主容受而傳之腸也則正為邪阻脾胃之運行失常於是飲食日益停滯化為敗濁膠黏腸胃之中運行之機益以不利氣鬱為火與所受濕熱之氣混合為邪攻刺作痛此痢症所以腹痛也舊謂肺金之氣鬱於大腸間蓋以氣屬肺為言耳不必泥定是肺氣也實熱者火性急迫不得宣通其痛必甚虛寒則痛微蓋寒閉則痛甚寒開則痛微痢者雖滯而不暢終是開而非閉虛者少氣不甚壅故痛微邪能傷正傷在血分則便血曰赤痢當與腸風參看傷在氣分則便膿曰白痢膿有二一則胃中津液一則水穀汁漿均為邪火煎熬成膿觀飯食腐敗往往化為白膿可見而津液稠濁上出為痰下出為膿尤其明著景嶽謂是腸間脂膏剝刮而下不思腸胃之裡並無脂膏止有涎沫觀豬腸可見矣又大腸合肺主氣小腸合心主血故古謂血從小腸來膿從大腸來不必泥也若血氣並傷則赤白兼見又或濕盛血敗而色如豆汁或熱極而色見紫黑黑而光如漆者為瘀血有血絲者亦然或久痢而元氣虛弱濕痰敗濁色塵腐如屋漏水中原蓋屋用泥故漏水塵濁晦黑或證轉虛寒色如魚腦如鼻涕如凍膠色同白痢但有初起後劇及寒熱不同或臟腑敗壞面色如死豬肝雞肝其色青黯此痢之所以有各色也氣既鬱滯腸中則欲升不升欲降不降忽而下逼火性迫促竟若不及更衣然欲降而不能降雖就圊卻無所出氣鬱不宣則膠固之積不出即日食之糟粕亦銷鑠膠黏所出無幾不降而偏欲降才淨手又要更衣急迫頻並最是惱人是為裡急邪迫肛門氣凝血聚因而重墜亦有脫滑者必病久乃見是為後重痢本濕熱痢久陰傷濕熱轉成燥熱肛門如火廣腸血枯雖極力努責責求也努力以求其出也而糟粕乾澀欲出不能但虛坐而無所出是為虛坐努責瀉痢皆由於濕而濕有寒熱皆能作瀉痢則因濕熱若是寒濕即當洞泄無結滯不通欲出不出等證謂痢有因寒濕者謬也均之濕熱而或瀉或痢何也曰瀉因濕熱驟盛火性急速遽迫水穀暴下不及蒸為腐敗傾盆而出腸胃即清故無膠固垢積積滯既無氣行弗礙濁降而清隨升故無裡急後重病發既速則血氣未傷故無赤白血膿痢則初起濕熱尚微積漸乃盛盛而後發為日既久遂蘊釀出如許證候耳有先瀉後痢者因濕少熱多濕已瀉出熱尚未除且瀉久亡陰陰虛又復生熱濕火轉成燥火刮逼腸垢與血而下故轉而為痢也古謂此為脾傳腎以脾惡濕腎惡燥此證先濕傷脾後燥傷腎故曰脾傳腎也其病為進賊邪也有先痢後瀉者因濕多熱少痢久熱去而濕猶存火與元氣不兩立邪熱既去則正氣得復正不容邪所餘垢積與濕至是盡行掃蕩熱邪在中肺氣被壅熱去則肺氣下行化水四布有若時雨溝澮皆盈垢積盡蕩矣故轉為瀉也此為腎傳脾其病為退微邪也夏時受邪至秋病發或瘧或痢其流雖異其源則同蓋夏月感受風涼喜食生冷風寒客於肌膚邪正雜處生冷停於腸胃濕熱相蒸其時腠理開通未至鬱閉胃氣升發未至遏抑至秋而氣斂火降邪在肌膚者被斂而內蒸為瘧在腸胃者被降而下迫為痢也瘧痢並作者如瘧止痢甚加腹痛飲食少進此虛寒也瘧之止非真止乃陰勝而陽不敢與爭耳補中益氣湯見氣加薑桂一服愈如痢止瘧復作乃陽得補而漸伸能與陰爭故瘧復作吉兆也再服前方以助微陽之力加附子五錢一證併除按此説甚是然豈無熱陷於裡不與陰爭又豈無熱勝寒衰陰不敢爭故瘧止痢甚者乎一隅三反是在明者再按瘧痢並作必先治瘧以表有風寒宜先解表若先治痢恐虛其里致表邪內陷也瘧後痢乃餘邪內伏或脾氣虛下陷使然謂之似痢非痢痢後瘧乃氣血兩虛氣虛則惡寒血虛則發熱故寒熱交爭謂之似瘧非瘧二者俱作虛治並用補中益氣湯凡痢證有身熱者為重若兼外感者外感風寒鬱為濕熱致痢不在此論苟非外感而初起身熱是毒盛於裡而達於外也久痢身熱是陰虛而陽越於外也故皆為重證嘔逆為火邪上衝亦不宜見此即防噤口噤口有因積垢壅滯有因宿食不消有因熱毒上衝有因停飲上逆有因兜澀太早邪反上干有因過服寒劑傷敗胃氣以致飲食與藥俱不能入入即吐此為危候胃憊氣陷絶不思食者不治屢止屢發經年不愈者名休息痢多因兜澀太早積熱未清或過服寒涼元氣下陷腎虛不固所致時行疫痢當求其時氣而治之蓋必有彼此相同之證候即其氣也如皆見身腫即為時氣之濕也凡痢初起必無寒證然其人平素陽虛元氣衰弱又復過食生冷以致火鬱蒸成濕熱其標雖熱其本則寒治當求本若夫病久氣虛或過服涼劑轉為寒證固甚多矣所當細察如始見煩渴引飲喜冷畏熱小便赤澀面色黃赤手足溫暖脈見數盛久之則心不煩口不渴即渴而喜熱飲小水由赤而黃由黃而白面色亦轉青白手足不溫而冷脈變虛弱則證轉虛寒無疑虛實當辨如腹痛拒按者為實喜按者為虛膿血稠黏數至圊而不能便者為實不及拈衣而即泄出者為虛未經瀉蕩而後重者為實已經瀉蕩而仍後重者為虛邪實之重糞出少減名糞前墜滯也少頃又重邪未盡也虛滑之重糞出愈甚名糞後墜少頃略可較愈甚時略鬆也氣復升故也凡痢中所有之證如煩渴咽乾舌黑腫脹悉有虛實之殊無得概指為實當細別之脈法痢為里證脈宜沉惡浮有表邪者不在此論宜細惡大初起邪盛者不在此論宜緩惡弦治法初起宜利濕清熱疏通積滯若久痢亡陰濕轉為燥則利濕又在所禁不特此也濕不盛者初起亦不可利恐致津液乾涸邪熱愈熾不救本寒標熱證見陽虛則寒劑又在所禁舊積已去新積旋生則下劑又在所禁矣積去而復生者血氣凝滯故也但當調其血氣耳不特此也舊積而挾虛亦不可下丹溪治葉氏先補完胃氣而後下之再按積垢膠固腸胃與溝渠壅塞相似刮磨疏通則可木香檳榔丸之類是也輕用硝黃牽牛巴豆等闢以清水蕩壅塞之渠安得疏暢必壯實人初起始可以一下而愈胃氣弱者不宜利濕五苓散見傷濕益元散見傷暑等清熱香連丸白頭翁湯等蕩積承氣湯見大便不通芍藥湯利積丸導氣湯脈浮大忌下調氣霍香正氣散見中風加木香吞感應丸見傷飲食血痢加黑豆三十粒黃連阿膠丸白頭翁湯香連丸蘇合丸見諸中和血芍藥湯腹痛紫參湯肺氣鬱於大腸苦梗發之或食粥稍多或飢甚方食在中作痛白朮陳皮各半煎湯和之仍奪食傷冷水瀉變痢腹痛食減躁熱困軟茯苓湯脈弦或澀或浮虛建中湯見勞倦當歸芍藥甘草能和腹痛裡急宜行氣清火後重宜調氣木香檳榔宜下其積滯下墜異常積中有紫黑色又痛甚為死血桃仁泥滑石粉行之蕩積後仍重為大腸滑墜餘邪未盡者升消散兼升兼消已盡宜御米殼等澀之加升麻以升其陽按東垣云裡急後重數至圊而不能便或少有膿血慎勿利之宜升陽除濕防風湯見血此當是濕熱鬱閉上氣不通所致故升其陽而便自下古云大便不通用升麻即此意也虛坐努責血虛腸燥不能出當歸為君生血藥佐之滑脫桃花湯斷下湯養臟湯白朮安胃散固澀藥中須加陳皮為佐恐太澀能作疼甚者灸天樞氣海凡痢初起邪實當去積滯俟腹不痛即愈不愈可用鴉膽丸止之脫肛訶子皮散磁石末二錢空腹米飲下外用鐵鏽磨湯溫洗大孔痛熟艾黃臘訶子燒熏之食淡味自安大孔不閉蔥和花椒末搗爛塞穀道中御米殼訶子皮各一錢為末米湯下噤口以脈證辨之如脾胃不弱頭疼心煩手足溫熱未嘗多服涼藥者此乃毒氣上衝心肺所以嘔而不食宜下之或用敗毒散見傷濕每服四錢陳倉米一百粒薑三片棗一枚水一盞半煎八分溫服若其脈微弱或心腹膨脹手足厥冷初病不嘔因服罌粟殼烏梅苦澀寒冷太過以致聞食先嘔者此乃脾胃虛弱用山藥一味銼如小豆大一半入瓦銚內炒熟一半生用同為末飯飲調下又方石蓮捶去殼留心並肉研為末每服二錢陳米飲調下此疾蓋是毒氣上衝心肺藉此以通心氣便覺思食丹溪用人參黃連薑汁炒濃煎汁終日細細呷之如吐再吃但一呷下咽便開痢亦自止神效人參黃連石蓮煎湯徐呷外用黃瓜藤莖葉經霜者燒灰香油調納臍中即效仁齋用參苓白朮散見泄瀉加石菖蒲末以道地粳米飲乘熱調下或用人參茯苓石蓮肉入些少菖蒲與之愚謂莫妙於問病者所欲食之即開挾暑自汗發熱面垢煩渴嘔逆小便不通香薷飲見中暑加黃連益元散見傷暑腹痛食不進六和湯見傷暑藿香正氣散見中風各半服挾寒外感風寒先宜發表倉廩湯汗之次乃治痢酒痢葛根湯久痢或瘀血或食積或頑痰或元氣虛弱當隨證治之丹溪治族叔病雖久而神不瘁小便澀少而不赤兩手脈俱澀而頗弦自言胸微悶食亦減因悟必多年沉積癖在腸胃詢其平生喜食何物曰喜食鯉魚三年無日不用此積痰在肺肺為大腸之臟宜大腸之不固也當與澄其源而流自清以茱萸陳皮青蔥蔍苜根生薑煎濃湯和以砂糖飲一碗許自以指探喉中吐痰半升如膠其夜減半次早又服又吐痰半升而痢自止又與平胃散見傷飲食加白朮黃連旬日而安愚按小便澀而不赤非熱也非熱而澀則肺氣為痰所滯合之胸悶食減脈澀弦知痰在肺也休息痢宜四君子湯見氣加陳皮木香吞駐車丸兜塞太早有餘積者利積丸去之後用神效參香散經年纍月愈而復發補脾不效此係寒積在大腸之底諸藥不能到故無愈日用巴豆一味研炒蠟丸桐子大空腹米湯送下七八丸一服永不再發感應丸見傷飲食亦佳喻嘉言治周信川休息痢陽邪陷入陰分以布條捲成鵝蛋狀墊肛門厚被圍坐熱飲人參敗毒散見傷濕良久又飲遂覺皮間微有津潤令其努力忍便不得移身約二時久病者心躁畏熱不能忍始令連被臥病即減改服補中益氣湯見氣旬日愈蓋內陷之邪須提出之以挽其下趨之勢又須緩緩透出方為合法凡久痢久瘧久熱等症皆須識此意勞痢痢久不愈致虛五心發熱如勞證蕷蓮飲蓮肉山藥各等分赤多倍蓮肉白多倍山藥愈後異功散見氣或平胃散見傷飲食加參苓清陽下陷始則飧泄久則腸澼亦見裡急後重膿血相錯專用補中益氣見氣痢不治而自止不效是無火也急用八味丸見虛損大瘕泄亦見裡急後重紅白雜便則痛欲小便大便先脫欲大便小便自遺或小便澀痛或不通或大小便牽痛急用八味丸見虛損加故紙肉蔻阿膠治之不可用痢門藥也説詳醫貫瀉利門中參下淋症似淋非淋條刮腸諸病壞證久下膿血或如死豬肝色或五色雜下頻出無禁有類滯下俗名刮腸此乃虛脫之證若投痢藥則誤六柱散去附子加益智仁白芍藥或可冀其萬一痢後風足痛或痹軟或脛腫或膝腫名痢後風因痢後下虛感受風濕留滯關節所致獨活寄生湯見腰痛吞虎骨四斤丸見腳氣或大防風湯外以杜牛膝杉木節白芷南星萆薢煎湯熏洗若惡血痢下未盡留滯經絡作痛叫號者日久恐成鶴膝四物湯見血加桃仁紅花牛膝黃芩陳皮甘草煎生薑汁研潛行散入少酒飲之數十帖又刺委中出血又方松明節一兩乳香二錢炒焦存性蒼朮黃柏各一兩紫葳一兩半甘草五錢桃仁去皮不去尖一兩為末每服三錢生薑同杵細水蕩起二三沸服若由下多亡陰而致者補脾胃生血忌用風藥用藥禁忌初起忌溫補即胃氣虛弱亦不宜黃耆尤禁用之則發脹忌兜塞亦禁升麻非元氣下陷而用之升毒上干速死之道忌利小便非濕盛小便不通而利之致津竭熱熾必劇忌發汗非表證而妄汗致津涸熱盛必劇禁酒痢時酒則難愈愈後酒則復發大便不通有熱結者熱耗血液乾燥故結也脈洪數能食即仲景所謂陽結麻仁丸四順飲子吞潤腸丸若燥實堅腹滿痛承氣湯見中氣治之有寒結冷氣橫於腸胃陰凝不運津液不通故結也脈沉遲不能食腹痛即仲景所謂陰結也寒而實者備急丸見傷飲食溫脾湯寒而虛者半硫丸薑汁調乳香吞之或八味丸見虛損外用握藥有氣祕氣壅滯不通不升不降其人多噫實者破結導滯木香檳榔枳殼陳皮杏仁等類虛者氣虛不運故壅滯補而行之不宜破散人參多用若氣阻隔不通而見噎膈反胃等證者人參利膈丸四磨湯見氣選用仍分虛實治之若氣少氣弱無力推送則惟有助氣而已肺主氣肺與大腸為表裡氣祕治在肺丹溪云肺氣不降則難傳送用枳殼沉香訶子杏仁等老人虛人津液少宜滑之用胡麻麻仁阿膠等有血祕老人老人後門固壽之徵産婦産後有祕至數十日者勿亟通之血液乾枯或病後血虛或發汗利小便以致津涸津亦屬血均宜潤劑蓯蓉潤腸丸更衣丸四物湯見血麻仁杏仁辛潤之品又腎司二便腎水虛燥宜以六味見虛損滋水少佐辛味以潤之若跌打損傷瘀血凝滯致氣不行而大小便不通者破瘀導滯為主有風祕其人腸胃素有風風能燥濕燥血故大腸不潤而結搜風順氣丸見中風滋燥養榮湯老人氣血多虛察其脈浮虛者氣虛也沉虛者血虛也凡結實難下之證可用穿結藥及妙香丸見煩躁燥屎巨硬結在肛門難出名直腸結從導法治之導法以蜂蜜煉成條大如指黏皂角末油抹入便門寒結者加草烏頭末以化寒消結熱結者以豬膽汁導大小便不通證在危急韭地中蚯蚓泥搗和水澄清飲之立通又方大黃滑石皂角各三錢為末如小便勢急倍滑石大便勢急倍大黃又推車子七個土狗七個新瓦上焙乾為末以虎目樹即虎杖皮向東南者煎濃湯調服又皂角末蔥白連須加麝香二分蜜少許搗貼臍下至毛際濕熱痰火結滯脈洪盛肢節煩疼濕熱也涼膈散見發熱通聖散見中風吐逆二便不通導氣清利湯痰隔中焦氣聚上焦不下二陳見痰加木通先服後吐燒皂角灰為末粥清調服皂角去皮弦琥珀各一錢麝少許神麯為丸作二次服用升提分利藥送下之立通少頃未通探吐之無不通者小便不通點滴不出小腹脹痛由氣道閉塞六淫七情痰食血氣內外諸邪皆能閉氣氣分上中下三焦上焦之氣肺主之肺熱則氣不下行治宜清降中焦之氣脾胃主之濕盛或熱盛而氣滯不行須治濕熱若氣虛而下陷不運須升清以降濁下焦之氣肝腎主之腎移熱於膀胱無陰則陽無以化須純陰之劑滋腎丸肝脈過陰器肝火鬱不伸則癃閉肝火疏泄則為遺溺治取肝經俞穴又下焦脈在膀胱經前膽經後出於膕中外廉曰委陽膀胱經絡也下焦火盛則癃閉虛則遺溺又督脈女子入系廷孔男子循莖下至篡其病癃閉遺溺治取督脈俞穴不取膀胱俞穴者以膀胱但臟溺其出溺皆從三焦督脈及肝也丹溪云肺熱不生水清金乃隔二之治也脾濕不運清不升濁不降故肺氣壅閉不下行燥濕健脾乃隔三之治也若不關脾肺但膀胱有熱直瀉膀胱乃正治也東垣分在氣在血以渴不渴為辨渴者熱在肺屬氣分用淡滲之藥茯苓豬苓澤瀉琥珀燈心通草車前瞿麥扁蓄等氣薄之品氣薄為陽中之陰從陽而下降者也不渴者熱在下焦屬血分須用純陰之劑無陰則陽無以化黃連黃柏知母滑石之類淡滲之品乃陽中之陰非陰中之陽勿用熱實者八正散見淋加木香腹痛不可忍木通湯上喘紅秫散腎虛寒氣不化者甚而轉筋不救腎氣丸見虛損此為下元冷祕常有用桂附乃通者氣虛不化而不急滿惟倦怠懶言春澤湯見傷濕津液藏於膀胱氣化乃能出故用沉香橘紅之屬或用吐法以提其氣氣升則水自降如滴水之器上竅開下竅乃通也氣虛而不升化用參耆等藥先服後吐之痰多閉氣用二陳先服後吐之更推類以盡其余或由大便不通而小便漸閉者通大便則小便自行瘀血閉氣者宜多用牛膝實者桃仁煎代抵當丸見血牛膝膏見淋渴而腹冷水氣也水蓄腹中故冷停蓄不運清氣不升津液不生故渴不降故小便閉栝蔞瞿麥丸主之便利腹溫為度小便不通及轉胞危急諸藥不效用豬尿脬一個底頭穿一小孔貫一通透翎筒線扎緊翎筒口塞以蠟從脬口吹氣滿七分線扎緊再用手捻緊翎筒根令不泄氣乃去筒口之蠟將筒口插入莖物竅內放手放開捻筒根之手也卻捻豬脬使氣透入膀胱小便即出小便不通嘔逆飲食不得入名關格若頭汗出者陽脫死脈細澀者知陰亦竭亦死蔥白一斤碎切入麝香五分拌勻分二包先用一包置臍上以炭火尉斗尉之半炷香久換一包以尉斗盛冷水尉之互相換尉以通為度或以木通老蔥煎湯服頃時探吐再服再吐以通為度或身無汗以蔥湯入木桶內令病者坐杌上沒臍為度匝腰繫裙以覆之少時汗出尿亦出即於桶中溺之勿出桶恐氣收而尿又回也孕婦胎滿逼壓尿脬胞轉翻傾側胞系了戾不得小便名轉胞須舉其胎令穩婆香油抹手入産戶托起其胎溺出如注次以人參白朮陳皮升麻加入四物湯見血內煎服頃時以指探吐如此三四次則胎舉矣一法令孕婦臥榻上連榻倒豎起尿自出勝手托男子亦有轉胞婦人轉胞不必盡由胎壓多因尿急脬脹而驟馬馳車飛跑疾走致脬攧翻或水溢中焦食滿腸胃下壓膀胱無處退避以致閃側翻轉熱攻氣迫者可推並須吐法滑石散金匱婦人病飲食如故病不在胃煩熱不得臥倚息喘也不下通則上干故煩喘不得臥陽被迫浮越故熱此轉胞不得溺也此由虛寒氣不化溺急胞脹重墜翻轉腎氣丸即八味丸見虛損淋一滴不出名閉即小便不通點滴而出名癃即淋二證皆由氣閉澀其理已見上篇淋證大概腎虛膀胱熱五臟六腑所受內外諸邪熱皆得入膀胱腎虛則火動常欲泄而不能藏火動欲泄則屬之肝故上篇言肝火疏泄為癃故數膀胱熱則水道枯澀故滲出澀滯數而且澀莖中痛淋瀝不宣故謂之淋腎虛膀胱熱則水液少子和治一人令頓食鹹魚少頃大渴令恣意飲水然後以藥治之立通曰淋者無水故澀也脈實大宜分理之脈虛細澀精血敗壞難治治法行滯氣解邪熱通水道其大綱又在平心火此證最忌發汗淋證屬熱耗津液發汗則愈涸無水可出則動血矣汗之則尿血準繩謂暑月多此證以汗多小便常赤澀也治用五苓散見傷濕斂其外發之汗意謂內有白朮桂枝能斂汗也恐未必不如去桂合生脈散佳使液聚於內又從而導下之然有虛勞汗出而赤澀者乃津液枯燥又不宜滲利矣斂汗清熱滋液可也失血亡精者同此論之淋證莖中必痛若先痛後癢則火退矣或是實證轉虛氣淋初起為氣淋以氣滯而澀痛也白茯苓甘草稍白芷山梔木通豬苓澤瀉車前地膚子蔥白生料五苓散見傷濕加阿膠或五苓益元見傷暑各半服火府丹佐以導赤散見發熱石韋散或四苓見傷濕加木通滑石瞿麥燈心肺熱清肅之氣不下降加味八正散氣虛八物湯見虛損加杜牛膝黃芩膏淋久為膏淋及砂石淋膏淋濕熱傷氣分水液渾濁如膏如涕如米泔實熱八正散加蒼朮虛熱鹿角霜丸精尿俱出精塞尿道欲出不能而痛海金砂散菟絲子丸鹿茸丸見血土牛膝地膚葉汁白茯苓澤瀉山梔甘草梢琥珀鬱金萆薢砂淋尿為熱所煎熬成砂石如煮海水成鹽八正散神效琥珀散如聖散石燕丸獨聖散石首魚腦中石十個煆滑石二錢琥珀三分為細末每服一錢木通湯下螻蛄七個鹽一兩新瓦上鋪蓋焙乾為細末每服一錢溫酒下冬葵子滑石瞿麥琥珀土牛膝車前澤瀉山梔地膚葉汁必斷鹽乃效一則淡食能滲利一則無鹽不作石也血淋熱傷血分莖中必痛不痛為尿血見血門歸尾土牛膝赤芍玄胡車前澤瀉鬱金山梔劉寄奴主之血瘀則小腹硬痛加紅花五靈脂血熱則色鮮紅脈數有力加生地血虛六味見虛損加車前牛膝血冷則色黯面枯尺脈沉遲腎氣丸見勞損死血牛膝膏牛膝根莖葉酒煮服治小便不利莖中痛欲死及婦人血結堅痛如神但虛人不宜用當同補藥用之免損胃側柏葉生藕節車前草等分搗汁調益元散見傷暑發灰散小蘇子飲並見血立效散瞿麥散痰淋痰鬱氣成熱所致七氣湯見氣青州白丸子見中風勞淋勞則動火熱流膀胱所致脾勞勞倦所傷補中益氣見氣合五苓見傷濕腎勞色傷陽虛腎氣湯陰虛知柏地黃湯並見虛損心勞思慮所傷清心蓮子飲見赤白濁熱淋火府丹益元散見傷暑導赤散見發熱五淋散榆白皮散冷淋由冷氣客於下焦滿於脬中水道為寒所凝不得宣通故先寒戰而後便數成淋邪正相爭正氣怯邪氣之冷故寒戰又為冷氣相激則鬱熱而成淋進冷劑愈甚者是也宜地髓湯下八味丸見虛損或用生料鹿茸丸見血肉蓯蓉丸澤瀉散沉香散若下元虛冷水寒冰凝小便不通或淋瀝證見轉筋喘急欲死不問男女胎産急用八味丸料煎服緩則不救蓋寒得熱則流通非附桂何能直達膀胱使雪消春水來耶又有似淋非淋者老人陰萎而思色則精不出而內敗火雖動而氣已衰不能送精使出也小便澀如淋敗精流入莖竅二便牽痛精傷血枯燥故大便亦痛愈痛則愈便愈便則愈痛精傷血敗氣亦下陷大便紅白似痢小便白濁如淋因其痛而欲便以求通因便多而氣愈墜故痛更甚大菟絲子丸見咳嗽鹿茸丸見血腎氣丸見虛損又有胞痹一證小腹按之痛水閉故按之痛若沃以湯水閉氣蒸成熱小便不利上為清涕由風寒濕三氣客於胞中痹而不通故氣不化風寒由足太陽入太陽經絡腦下鼻故流清涕治以腎著湯見傷濕茯苓丸見小便不禁巴戟丸此本痹證而兼淋者也小便數頻數無度似淋而莖中不痛故另分一篇數而少且澀則似淋以不痛故異多且不澀又似不禁然可忍為異證由腎虛有火火動欲出水不得藏腎虛六味丸有火五苓散數而少者茯苓琥珀湯利之免致澀痛成淋數而多者薯蕷蓮肉益智仁之屬收之然此證固屬有火亦有下元虛冷腎不攝水者菟絲子丸八味丸見虛損鹿茸丸見血中氣不足數而多補中益氣湯見氣夜多小便益智仁二十個為末鹽五分水一碗煎臨臥溫服或蓯蓉丸小便畢少頃謂已盡忽再出些少或尿後又急者多由忍尿行房所致忍尿則水不下行行房則火炎氣升而不降水不下而氣不降後雖便亦不暢其去未盡故情狀如此宜生料五苓散見傷濕加阿膠吞加減八味丸見虛損心移熱於小腸致小便數大喜動心火多有之分清散見赤白濁四七湯見氣仍以辰砂妙香散見心痛煎吞小菟絲子丸見赤白濁大便硬小便數者名脾約麻仁丸見大便不通説詳傷寒陽明篇天暖衣厚則氣上升而外泄故多汗天寒衣薄則氣內斂而下降故多尿不在病論遺尿小便不禁不知而出為遺知而不能忍為不禁比小便數為甚故另為一篇多由肺腎虛寒氣不能攝補中益氣湯見氣送腎氣丸見虛損大抵上虛補氣下虛固脫睡著遺尿大菟絲子丸見咳嗽豬脬炙碎煎湯下韭子丸六味丸見虛損去澤瀉加故紙四兩益智仁人參各三兩肉桂一兩老人尿不節山茱萸一味最妙産後不禁血氣兼虛八珍湯見虛損以上皆言虛寒之證亦有熱甚神昏尿出不知者即傷寒論所謂直視失溲也此為死證熱甚陽邪盛也失溲陰失守也故死河間謂熱甚客於腎部干於肝經廷孔鬱結之極氣血不能宣通神無所用故遺尿不禁肝主疏泄鬱極則泄愈甚後人又推廣之謂各臟腑之熱皆能令小便不禁皆熱證也實熱者神芎導水丸見腫脹每服百丸空心白湯下一服利即止後服薛立齋治因勞發熱作渴小便自遺肝火疏泄或時閉澀肝血虛故澀氣鬱故閉也作肝火血虛陰挺不能約制午前服補中益氣湯見氣升散其鬱加山茱山藥午後服六味丸見虛損滋陰養血月餘悉退此虛熱也有洗手足尿即急不能忍者豈房勞傷腎尿為火持不下得水則陽得陰化故尿出乎又豈腎冷不攝得水則益其冷而即出乎然陰性遲火性急似當以前説為是大抵內水與外水相感應之理小便黃赤小便白則無火是黃赤乃有火也黃柏知母主之然有實火虛火之分如天熱多汗或陰分枯涸則小便短少短少則必黃此為虛火不得專用寒涼交腸大小便易位而出也糞出前竅尿出後竅乃藏氣乖亂所致或因醉飽或因大怒氣亂於中腸胃失職不循輸化之常道故也法當宣吐以開提其氣如走錯路者仍令回至原處則不再誤也使闌門清利得復司泌別之職則愈矣吐後宜五苓散見傷濕木香調氣散見中氣各一錢加阿膠末一錢湯調服或研黃連阿膠丸為末加木香少許湯送下此皆除濕熱之劑蓋氣亂由於郁不鬱則順道而行何亂之有惟鬱極暴伸勢必肆行橫決不循常道氣鬱則為濕熱也嗜酒者血必瘀濕熱所傷也四物見血加海金砂木香檳榔木通桃仁薑宜人二便俱從前陰出以為交腸用五苓喻嘉言曰非也交腸乃暴病驟然而氣亂於中此證乃久病以漸而血枯於內先由脾不攝血下行有若崩漏胞門子戶之血漸亡轉吸大腸之血亦盡又轉吸胃中之血亦盡下脫之血始無源而止血盡則氣孤而無偶為拳為塊奔迫散亂水穀舍故趨新水道闢為穀道江漢兩渠並歸一路與交腸易位而出不同安可用五苓再劫其陰其説甚辨録之夏子益奇疾方治婦人因産病交腸用舊幞頭燒灰酒服仍間服五苓散分利之如無幞頭舊紗帽可代以受頭氣日久取陽氣上衝之義即用吐升提意故又治血崩取漆能行敗血也關格關格之説不一而各有理經謂寸口即手寸關尺之總名主中寸口本肺脈屬臟以候內人迎在結喉旁乃胃脈屬腑以候外主外兩者相應大小齊等春夏人迎微大秋冬寸口微大曰平人説見四診人迎一盛大於氣口一倍也下仿此病在足少陽一盛而躁病在手少陽二盛病在足太陽二盛而躁病在手太陽三盛病在足陽明三盛而躁病在手陽明四盛且大且數數即躁也名曰溢陽陽盛而溢為外格拒飲食不得入寸口脈一盛病在足厥陰一盛而躁病在手厥陰二盛病在足少陰二盛而躁病在手少陰三盛病在足太陰三盛而躁病在手太陰四盛且大且數名曰溢陰為內關溲溺不通皆死不治人迎寸口俱盛四倍以上命曰關格與之短期按此皆以躁數為言是主熱立論乃舉隅之詞觀其又一條云必審按寒熱以驗臟腑之病可知此證有寒有熱矣又謂五臟不和則七竅耳目口鼻不通氣不通矣六腑不和則留結為癰故邪在腑則陽脈不和不和則氣留而陽盛矣氣太盛則陰脈不利此二句當依難經云邪在臟則陰脈不利接下不利則血留而陰盛與上文邪在腑對講今雲陽太盛則陰不利者以見陰陽相關彼此脈絡傳注之理古人文字往往如此不利則血留而陰氣盛矣陰氣太盛陽氣不能榮也氣血相和則榮茂今血不行而邪聚於陰經則陽氣不能與通故曰關陽言閉關不使陽入也陽氣太盛則陰氣不能榮也故曰格陰拒格其陰不得入也陰陽俱盛不得相榮故曰關格不得盡期而死按經言陰陽之邪偏盛或俱盛則其經脈不和而見於人迎寸口如此後世獨診寸口故秦越人以上魚為溢陽被陰格脈從寸溢上魚際也為外關內格外陽為內陰所拒格不得下通如被關閉然入尺為覆陰被陽格脈從尺覆向臂上覆退卻之義為內關外格陰被格不上通如被關閉也仲景則謂寸口脈浮而大浮為虛正氣內虛故外浮越大為實邪氣實也在尺為關在寸為格關則不得小便格則吐逆此與越人同意越人以脈之長而有餘言仲景以脈之大而有餘言皆邪盛也又謂下微本大者下謂沉分本謂尺言沉分脈微小惟尺略大也則為關格不通不得尿沉而微小陰虛尺大寒邪盛虛寒無陽則不化故小便不能出不言格食者省文也頭無汗者可治有汗者死陽脫也又謂趺陽脈伏而澀伏則氣不行澀則血不流無以出納施化伏則吐逆水穀不化澀則食不得入血枯胃腕稿也名曰關格不言小便不通亦省文也上二條以尺寸言此以趺陽言也詳此二家所云各有其理亦推廣內經未盡之意也又云岐子謂關格為陰陽易位蓋陽上陰下定位也今寒反在胸中舌有白胎而水漿不下熱在丹田而小便不通曰關格上寒治以熱下熱治以寒若兼有寒熱分主客治之治主宜緩治客宜急此亦一説也由此論之則夫陽極於上陰極於下否隔不交者當通其陰陽轉否為泰可知矣又張景嶽謂內經謂人迎盛四倍以上為有陽無陰寸口盛四倍以上為有陰無陽二者俱盛四倍以上為陽極於上下焦無陽陰極於下上焦無陰陰陽離絶多由酒色傷其精氣以致陽飛於上陰走於下脈浮豁無根散大躁動如此為欲脫危候凡見六脈如弦如革洪大異常而且躁數脈動則身亦動乳下之虛里及臍旁皆有動氣舂舂築築與脈相應上氣微喘動作則甚肢體無力謂為虛損則本無咳嗽失血等證謂為痰火則又無實邪發熱等證此真陰敗竭元海無根最危之候也彼不納食不得小便自有本證與關格何涉哉其説雖與前人異然理甚精按諸家皆就吐食不溺之證言而無一定之脈景嶽則指定大數之脈言而無吐食不溺之證各如其説施治可也頭痛頭為清陽之分外而六淫之邪相侵內而臟腑經脈之邪氣上逆皆能亂其清氣相搏擊致痛須分內外虛實實者其人血氣本不虛為外邪所犯或蔽覆其清明或壅塞其經絡或內之實火上炎因而血瘀涎滯不得通行而痛其痛必甚此為實虛者其人氣血本虛為外邪所犯或內之濁陰上干雖亦血瘀涎滯不能通行而搏擊無力其痛不甚此為虛準繩謂真氣虛寒遇外之寒濕所侵血澀脈寒捲縮緊急引其小絡而痛得暖則痛止實者邪氣實而正氣不虛可任攻虛者正氣自虛而邪氣自實補正仍須治邪若邪亦不實但補正則邪自退六淫外邪惟風寒濕三者最能郁遏陽氣火暑燥三者皆屬熱受其熱則汗泄非有風寒濕襲之不為患也然熱甚亦氣壅脈滿而為痛矣內邪不一皆統於風風即氣之飄揚上升者以高巔之上惟風可到也故不論內外邪湯劑中必加風藥以上引之風藥味之薄者陰中之陽自地升天者也升麻薄荷之類痛如破不能忍蔓荊子風在太陽巔頂連頸強痛脈浮緊君羌活加薑蔥蔥白宜連須用風在少陽頭角痛口苦脈弦細君柴胡加薑蔥風在陽明額痛連目脈浮長君白芷加薑蔥少陰太陰脈至胸頸而還故無頭痛惟厥陰脈會巔頂故巔痛君藁本如脈沉足冷乾嘔吐沫加吳茱萸附子用風藥者由風木虛不能升散土寡於畏得以壅塞而痛猶言少陽清氣不升脾濕上壅不降耳故用風藥以散之若疏散太過服風藥反甚發散太過清陽之氣愈虛濁陰終不降且表虛易招外侮宜補氣實表順氣和中湯凡外感頭痛詳傷寒論頭痛久不愈者名頭風頭風頭面多汗惡風時止時發先風一日則痛甚至風日則少愈清陽之氣被郁故喜通而惡塞風者天氣之通者也先郁後通先風一日正鬱極欲通之候也欲通不通故擾動而痛甚至風日則天氣通而人氣應之亦通故少愈也由內有鬱熱或痰火毛竅常疏風易入外寒束內熱閉逆為痛醫用辛溫之藥散其標寒雖暫效以熱濟熱病益深宜瀉火涼血佐以辛散南星蒼耳子石菖蒲天麻最當頭風久不愈恐損目邪害空竅清空膏主之有痰加半夏諸般頭痛並治惟血虛頭痛詳下不宜正巔頂痛者亦勿用內傷頭痛氣虛者耳鳴目眩清氣不升陰火上衝九竅不利氣不能達於九竅也自覺空虛惡勞動動則痛更甚脈虛大必包裹其頭乃少寧四君子湯見氣加風藥血虛頭痛魚尾眉尖後近髮際終日星星如細筋抽引痛不甚脈芤或數善驚惕當歸川芎連翹熟地各二錢水煎泡薄荷末二錢鼻吸其氣候溫服安臥效或四物湯見血加風藥氣血俱虛者調中益氣湯見勞倦加川芎蔓荊子細辛神效陰虛發熱兩太陽穴作痛此相火自下衝上六味九見虛損産後血瘀頭痛膈熱上干也熱厥頭痛雖嚴寒猶喜風寒在暖處或見煙火則甚宜清上瀉火湯後用補氣湯頭目赤腫胸膈煩悶大便微祕身半以下寒足䯒尤甚此條詳寒熱篇上熱下寒條既濟解毒湯見寒熱痰厥頭痛暈眩煩亂噁心欲吐半夏白朮天麻湯見眩暈虛風內作非天麻不治痰非半夏不除黃耆實表止自汗人參補氣二朮澤瀉茯苓除濕橘皮調中升陽炒曲麥芽消食蕩胃乾薑除寒黃柏酒炒治伏火發燥濕熱作痛必昏重欲吐兼眉稜骨痛二陳見痰加風藥傷食頭痛胸膈痞塞咽酸噫敗卵臭惡食治中湯加砂仁一錢或紅丸子或平胃散並見傷飲食加枳實傷酒頭痛噁心昏冒眩暈葛花解酲湯見傷飲食頭痛巔疾下虛上實也寒濕上干過在足少陰太陽甚則入腎寒濕自經而入臟也腎主骨髓髓通腦寒入骨髓逆上至腦阻礙清陽故腦痛連齒亦骨之餘也此几几乎真頭痛矣濕熱上乾者必以苦吐之輕者透頂散搐鼻取涎頭重如裹由濕氣在頭頭者輕清象天清故輕也濕者地之濁氣濁故重也外濕矇蔽故如裹宜微汗勿大汗恐汗去濕留紅豆搐鼻散外有嗅毒頭痛吃炒香附一味愈真頭痛手足寒至節全腦連齒皆痛旦發夕死不治與黑錫丹見厄逆灸百會猛進參沉烏附或可生然天柱折者必死真頭痛與真心痛皆寒證陰滅陽也偏頭痛舊分右屬熱與痰熱用黃芩痰用半夏蒼朮以陽明胃腑居右多熱多痰也分左屬風屬血虛以肝木主風居左又左屬血也風用荊芥薄荷血虛用川芎當歸菊花然不必泥定生蘿蔔汁仰臥注鼻中左痛注右左痛則左壅塞雖注之亦不通右通故可注從右透左則並通矣右痛注左蓽茇散熱豬膽清熱搐鼻川芎散細辛散川芎柴胡為主佐以蔓荊子蒼耳葉升麻甘草蔥薑大便祕大黃下之外用萆麻子五錢大棗十五枚搗成泥塗綿紙上箸捲成筒去箸納鼻中良久下涕痛止又石膏二錢牛蒡子二錢為末酒下飲大醉立愈雷頭風頭痛而起核塊或頭中如雷鳴風動作聲如籟之發清震湯或不省人事地膚子生薑搗爛熱酒沖服取汗愈子和用茶調散見傷飲食吐之後用神芎丸見腫脹下之再服烏荊丸見血及愈風餅子之類弱者用涼膈散見發熱消風散熱痰熱生風作響半夏牙皂薑汁煮過一兩大黃酒浸透濕紙包煨如是者三次二兩白殭蠶連翹橘紅桔梗天麻各五錢片芩酒炒七錢薄荷葉三錢白芷青礞石粉草各一錢為末水浸蒸餅丸緑豆大臨臥茶吞二錢以痰利為度後服清痰降火之藥氣挾肝火作響加味逍遙見郁最當亦有如蟲響者名天白蟻茶子為細末吹鼻大頭痛頭腫如斗俗云大頭瘟天行疫氣所發頭面赤腫或發疙瘩先發鼻額屬陽明先發耳前後屬少陽先發腦後及項屬太陽若三陽俱受邪則各處併發治戒急下恐遺高分之邪當先緩後急退熱芩連等消毒連翹鼠黏子板藍根之類緩緩治之細口呷或食後服或酒炒使上升不速下皆緩之義候大便熱結上焦之邪熱皆降聚於中州乃下之三承氣見大便不通選用此毒若結塊不散必成膿外用柏葉和蚯蚓糞泥搗敷或井底泥調大黃芒硝末亦可赤腫結核扉針出血愈頭搖掉眩屬風熱風火主動也羌活川芎白芷藁本蒼朮細辛甘草天麻若因肝腎二經血虧致火炎生風須養血又凡人內有痛則頭搖心絶則頭搖狀如煙煤直視者死痙病亦頭搖頭風屑羅謙甫謂肝風盛金來克之使頭有雪皮難解大抵風熱上蒸其液干則化為白屑耳大便實瀉青丸見中風虛者人參消風散眉稜骨痛或外邪郁成風熱上攻於腦從目系過眉骨下注於目目繫上屬於腦過眉骨也或內之風熱濕痰上攻選奇湯主之風熱者清上散痰二陳加酒芩白芷風寒羌烏散肝虛者才見光明眼眶骨痛生熟地黃丸肝血虛火旺也肝經停飲發則眉骨痛眼不可開晝靜夜劇濕為陰邪故夜病甚導痰湯見痰或小芎辛湯加半夏橘紅南星茯苓眩暈眩惑亂也從目從玄玄黑暗也謂眼見黑暗也虛人久蹲陡起眼多黑暗是也暈與運同旋轉也所見之物皆旋轉如飛世謂之頭旋是也此風火上衝使然經以掉眩屬風木風即火氣之飄忽者風從火生火藉風煽觀焰得風而旋轉可見矣外風內風熱風冷風皆能煽火經言五臟六腑之精氣皆上注於目然則目之能視者乃臟腑之精氣靈明為之也此上注之精氣必安靜不搖而後蠋物有定若為風火所煽而旋轉則所見之物亦旋轉矣此乃目之精氣為病非目睛之轉動也然經謂目系屬於腦出項中邪邪指風邪言中項入深隨目系入腦則腦轉腦轉則引目系急目系急則目轉眩趙以德謂順靜寧謐者水之化動擾撓亂者火之用頭以腦為主腦者髓之海目之瞳子亦腎之精二者皆屬腎水喜寧靜而惡動擾寧靜則清明內持動擾則散亂昏惑故目眩腦轉云云則風火煽動固有腦轉系急而目轉眩者乎六淫七情飲食痰水諸邪皆能動火生風風火盛極即然雖壯實人亦有之不必虛弱也但虛者多耳昧者定歸之虛試觀醉人眼花與虛何涉哉劉宗厚以為上實經以為上虛非相悖也蓋虛者血與氣也實者風火與痰涎也正自虛而邪自實也痰涎隨風火上壅濁陰乾於清陽也故頭風眩暈者多痰涎丹溪謂無痰不作眩必搐去而後愈治法氣虛者補中益氣湯見氣血虛者補肝養榮湯或四物湯見血加荊芥穗腎陽虛八味丸見虛損或黑錫丹見厄逆腎陰虛六味丸見虛損中脘伏痰嘔逆旋覆花湯痰閉不出者吐之獨聖散見傷飲食吐訖可用清上辛涼之藥防風通聖散見中風加半夏等青黛散搐鼻取涎神效痰涎盛而大小便結利下之但見有吐涎者知其有痰半夏橘紅旋覆等風痰南星殭蠶因停水眩暈者詳水腫門因濕者頭重不起虛人更甚五苓散見傷濕除濕湯見中濕因熱者煩渴梔子黃連甘菊實者大黃酒炒三次為末茶調每一二錢因氣鬱者則志氣不舒逍遙散見郁加薄荷菊花虛寒者宜三五七散或芎附湯見血生料正元飲加鹿茸一錢下靈砂丹見嘔吐或正元飲加炒川椒十五粒下茸珠丸不效則獨用鹿茸一味每服五錢無灰酒煎入麝香少許服緣鹿茸生於頭故治頭眩也瀉多脫陰虛陽上浮時時眩暈或視物不見者危眩暈非天麻不治不可缺項強痛多由風寒邪客三陽亦有痰滯濕停血虛閃挫久坐失枕所致感冒風寒者驅邪湯痰盛者消風豁痰湯濕盛者加味勝濕湯血虛火盛筋燥者項強急動則微痛左為甚脈弦而澀疏風滋血湯閃挫久坐失枕而致項強不可轉移多由腎虛不能生肝肝血虛無以養筋六味丸見虛損常服胸痛缺盆下曰胸當與痹滿門胸痹條參看五臟及膽心包絡七經筋脈俱至胸是諸經之邪皆得為胸痛而胸者肺之部分則其痛尤多屬肺可知乃醫書多以肝病為言此舉隅之論耳勿泥須知胸為清陽之分其病也氣滯為多實亦滯虛亦滯氣滯則痰飲亦停宜行氣除飲此治在肺分肺主氣宜下降不宜上壅者也至氣有餘為火而屬心痰本於濕而屬脾其義可兼舉矣若乃肝氣實而上衝因載血以上或肝虛而清陽不升濁陰不降此則病在肝膽痛必連脅矣至肝火之上炎由腎水之竭肝氣之虛寒由腎火之衰亦可推治法於上下篇參之經云春脈如弦其氣不實而微此謂不及令人胸痛引背兩脅脹滿此肝虛也補肝湯見脅痛金匱肝中寒者此下有兩臂不舉舌本燥七字醫宗金鑑謂是衍文刪之善太息胸中痛不得轉側則脅亦痛可知食則吐肝性條達為寒所郁不得伸故太息以舒之食則吐者氣上逆也而汗出也又云肝著氣著滯不行也常欲蹈其胸蹈者按摩之意先未苦時但欲飲熱寒則凝滯熱則流通故喜飲熱旋覆花湯主之方用旋覆花三兩蔥十四莖新絳少許水三升煮一升頓服金鑑謂與證不合疑誤愚謂此乃停飲而陽氣不宣故用此逐飲通陽加絳以和血也此肝實也素問曰陽明所謂胸痛短氣者水氣在臟腑也輕者五苓散見傷濕重者用張子和法取之木香鬱金二味氣鬱痛者倍木香血鬱痛者倍鬱金為末每服二錢老酒下虛者加人參痰飲痛輕者小陷胸湯重者大陷胸丸治之若痰唾稠黏者則用控涎丹見痰飲心痛心包絡痛胃脘痛心為君主義不受邪若邪傷其臟而痛者謂之真心痛其證卒然大痛咬牙噤口舌青氣冷汗出不休面黑手足青過節冷如冰旦發夕死夕發旦死不治不忍坐視用豬心煎取湯入麻黃肉桂乾薑附子服之以散其寒或可死中求生如但見爬床搔席面無青色四肢不厥聲尚能出即非真心痛乃心包絡受邪作痛也而包絡之邪皆由各臟腑經脈傳來如從胸痛至心是肺心痛從胃脘痛至心是胃心痛從脅痛至心是肝心痛從腰痛至心是腎心痛可類推之蓋五臟六腑任督各支脈皆絡於心其邪氣自支脈而乘心者不易人於心而但犯其包絡也於是氣血為邪所滯邪正相擊故痛矣心包絡痛在胸下𩩲骬骨處稍下即為胃脘痛胃上脘名賁門在臍上五寸去𩩲骬骨三寸而痛每相連故世俗總以心痛呼之且有九種心痛之説曰蟲飲食風冷熱悸疰去來痛丹溪云心膈痛須分新久若明知身受寒氣口食寒物於新得之時當與溫散或溫利之仲景九痛丸潔古煮黃丸之類病久則鬱蒸成熱若用溫散溫利恐助火須加山梔仁氣鬱即痛不必待成熱也而概以火鬱言之者以氣屬陽即屬火耳此義宜知寒痛寒氣客於腸胃卒然而痛二陳見痰飲草果乾薑吳茱萸扶陽助胃湯草豆蔻丸之類熱痛清中湯黃連龍膽草之屬痰積痛星半安中湯海蛤丸或吐之痰痛濕痰嘈雜不寧如飢如飽欲吐吐即寬二陳加草蔻蒼朮清痰流飲漉漉有聲攻走腰肋胃苓湯見泄瀉寒痰一月一發或兩發或二三月一發發時痛極悶死偶怒或勞乘勢湧起平胃見傷飲食加乾薑草蔻枳殼咳逆上氣痰飲心痛海蛤粉煅栝蔞實帶穰等分為末米糊丸氣攻刺作痛加味七氣湯沉香降氣散此及下方並見氣正氣天香散但忍氣即發者是也死血作痛脈必澀發作時飲米湯下或作厄有時氣逆騰如蟲攪唧唧有聲勿誤作蟲壯人用桃仁承氣湯見血弱人用歸尾川芎丹皮紅花蘇木玄胡索桂心桃仁泥赤曲番降香通草穿山甲之屬煎成入童便韭汁大劑飲之或失笑散蟲痛如咬面有白癍又面色乍青乍白乍赤唇紅吐清水或清黃水時痛時止能食或食即痛以蟲得食而動故痛也飽後痛即止化蟲丸見蟲川楝子苦練根使君子檳榔黃連雷丸烏梅不可用花椒太辣恐大驚跳治詳蟲門食痛如有物礙纍纍不下時噯腐氣略傷食悶悶作痛平胃散見傷飲食加枳實半夏檳榔舊有酒食痰積一遇觸犯便痛挾風寒者參蘇飲見發熱加蔥薑挾怒氣者二陳見痰加青皮山梔曲糵山楂草果挾火熱者二陳加枳實黃連薑汁炒山梔脈堅實不大便心下滿痛不可按者實也大柴胡見瘧三承氣見大便不通下之痛不可按為實可按為虛虛者補而行之或純補丹溪治許文懿公食積痰飲往來如潮湧上則為心脾痛降下則為胯痛以制甘遂末入豬腰內煨食之即張子和煨腎散方峻勿輕用連泄七次足便能步然多年鬱結一旦泄之徒引動其猖獗之勢仍以吐劑達其上焦連用瓜蒂黎蘆苦參等俱吐不透仍用附子尖三枚和漿水以蜜飲之方大吐膠痰一桶然後治及中下二焦以朴硝滑石黃芩石膏連翹等一斤濃煎冷飲之四日服四斤腹微痛二便祕脈歇至於卯酉時乃陽明之應胃與大腸積滯未盡也乃作紫雪見遺精論末三日服至五兩腹稍安後又小便閉痛飲以蘿蔔汁得吐立通又小腹滿痛以大黃牽牛等分水丸服至三百丸下如爛魚腸者二升許脈不歇又大便迸痛與前丸下穢物如柏油條尺許自病至安脈皆平常弦大次年行倒倉法見積聚全愈此得於張子和無膽識者敢乎腹痛小腹痛經脈有正有別其別分絡臟腑部位邪在正經則注於別絡而從臟腑所虛之部位而入焉胸為心肺部位肚腹脾胃部位胠脅小腹肝膽部位腰脊腎部位也邪入則氣停液聚痰血不行脈絡皆滿邪正相搏故痛六淫七情飲食勞倦皆能致之不獨寒也痛脈多緊急河間謂急脈固屬寒象然寒脈當短小而遲若兼洪數則為熱痛之脈分寒熱虛實氣血飲食痰蟲施治寒痛綿綿無增減喜熱惡寒口中和二便清利脈沉遲乾薑肉桂吳萸草蔻木香厚朴陳皮香附之屬諸寒痛得熱即止者用熟艾半斤隔白紙鋪腹中又以憨蔥數枝批作兩半片鋪艾上再用紙蓋之慢火尉斗尉之冷則易覺腹中熱腹皮熱難當仍用帛裹緊將冷乃解一法用炒鹽尉房事後受寒腹痛灸神闕氣海等穴或炒薑蔥尉之內服理中見中寒四逆見厥等湯熱痛時痛時止口乾舌燥二便結澀喜冷惡熱脈洪數白芍黃芩黃連山梔甘草之屬寒亦有實熱亦有虛熱實者寒藥下之三承氣等寒實者熱藥下之備急丸等辨虛實法不一而可按屬虛拒按屬實尤其顯著者治虛分氣血痛時常覺虛豁似飢非飢呼吸無力氣虛也六君子見氣加木香若偎偎作痛似細筋抽引不寧又如芒刺牽引屬血虛四物見血加陳皮甘草木香氣滯作痛則腹脹脈沉木香順氣散七氣湯見氣此為氣實又飲食痰濕死血蟲作痛皆為實食痛欲大便便後痛減脈沉滑或弦食得寒則凝得熱則行平胃散見傷飲食加枳實草蔻半夏保和丸枳朮丸二丸並見傷飲食之屬酒積痛三稜蓬朮香附蒼朮厚朴陳皮茯苓木香檳榔丸主之多年敗田螺殼煆存性加三倍於木香檳榔丸中更加山梔茵陳其效甚速痰痛脈必滑眩運吐涎或下白積或小便不利痰礙氣道也或得辛辣熱湯則暫止二陳見痰飲加蒼朮香附撫芎枳實薑汁死血作痛脈必澀痛有定處元胡歸尾五靈脂蘇木桃仁沒藥赤芍等或桃仁承氣湯見血虛者加歸地蜜丸服以緩除之蟲痛心腹懊憹往來上下痛有休止或腹中塊起噁心吐清水食厚味或飽即止面色青白赤不定蛔蟲攻咬面必黃參看心痛門雞汁吞萬應丸見蟲雄黃白礬飯丸亦可感濕而痛小便不利大便溏泄脈必細胃苓湯見泄瀉感暑而痛吐利並作脈必虛豁十味香薷飲六和湯並見傷暑詳霍亂門失笑散見心痛治心腹痛神效劉寄奴末六錢玄胡索末四錢薑汁熱酒調服亦佳皆通理氣血之劑也中脘痛太陰也理中見中寒建中見勞倦之類臍腹痛少陰也四逆見厥真武之類景東陽謂心脾筋結臍胃筋脈挾臍當臍明屬脾胃其腎之筋脈從腰貫脊並不及臍當臍痛用腎經藥太誤愚謂腎附於脊正與臍對又胎胞初結中起一莖形如蓮蕊一莖即臍蒂蓮蕊即腎是臍乃腎之根蒂而位又正對則當臍痛雖與少陰經無涉而謂與腎臟無關亦不可也小腹痛厥陰也重則正陽散回陽丹之類輕則當歸四逆湯見厥之類小腹痛因小便不利者五苓散見傷濕若小便利者審是血證桃仁承氣見血之類若肝氣鬱痛者青皮柴胡之屬亦以可按為虛拒按為實氣寒血結威靈散氣滯血凝當歸散若連陰作痛按之即止為肝經血虛四物見血加牛膝人參炙草又白膠香一味最妙其有青筋見於小腹及大腹乃肝火乘脾小柴胡見寒熱合四物加膽草山梔若因睪丸腫疼牽引而痛乃疝氣病也霍亂腹痛必吐利兼作亦有不吐利者名乾霍亂又腸癰腹痛小腹痛並小便數似淋身甲錯腹皮急按之軟如腫狀或繞臍生瘡可辨也又有胞痹一證小便不利小腹按之痛若沃以湯詳痹及淋二門腰痛膀胱脈抵腰腎脈入腰又經曰腰者腎之府也轉搖不能腎將憊矣是腰痛乃腎與膀胱之病也太陽經虛則風寒濕諸客邪皆得為患而腎虛之所患尤多腰肢痿弱身體疲倦腳膝痠軟脈或洪或細皆無力痛亦悠悠隱隱不甚是其候也分寒熱二證脈細無力氣怯弱小便清利為陽虛宜腎氣丸見虛損橘香丸生料鹿茸丸見血之類仍以茴香炒研豬腰切片勿令斷糝末其內紙裹煨熱黃酒下脈洪而無力小便黃赤虛火時炎為陰虛東垣所謂醉以入房損其真陰則腎氣熱熱則腰脊痛不能舉久則髓減骨枯發為骨痿六味丸見虛損滋腎丸見小便不通封髓丹見遺精之類瘧痢後月經後痛者多屬虛於補氣血藥加杜仲側柏葉丹溪云久腰痛必用官桂開之痛方止脅腹痛亦然有風有寒有濕有熱有閃挫有瘀血有滯氣有痰積傷於風脈必浮或左或右痛無常處牽引兩足羌防秦艽必用感寒而痛腰間冷如冰脈必緊得熱則減得寒則增薑附湯見中寒加辣桂杜仲外用摩腰膏傷於濕如坐水中脈必緩遇天陰或久坐久坐則濕凝必發身體腫滲濕湯腎著湯並見傷濕體重腰冷飲食如故小便自利名腎著寒濕之氣凝著不行治宜除濕兼溫散風濕獨活寄生湯濕熱蒼朮湯獨活湯羌活湯閃挫或跌撲損傷而痛乳香趂痛散五積散見中寒加桃仁大黃蘇木各一錢倍當歸或以茴香根同紅曲擂爛熱酒調服若因勞役負重而痛和氣飲見腫脹或普賢正氣散瘀血脈必澀轉側若刀錐之刺大便黑日輕夜重桃仁酒調黑神散或四物並見血加桃仁紅花之屬氣滯脈必沉烏藥順氣散見中風人參順氣散痰注脈必滑或沉弦二陳見痰加南星香附烏藥枳殼威靈仙治痛要藥為末每用二錢糝豬腰內煨吃熱酒下微利為度杜仲薑汁炒斷絲黑醜破故紙桃仁炒去皮尖玄胡索等份為末酒煮麵糊胡桃肉和丸桐子大空心溫酒或白湯下五七十丸宜下者用之腰痛雖屬腎與膀胱然有子病纍母者故鬱怒傷肝亦致腰痛宜調肝散有土病及水者故憂思傷脾亦為腰痛沉香降氣湯見氣和調氣散見中氣腰痛面忽紅忽黑為心腎交爭難治之證也背脊強痛督脈主脊經云督脈之別名曰長強別走太陽實則脊強取之所別也刺灸之大腸筋挾脊心脈與脊裡細筋相連貫故心痛有連背者脾筋著脊腎筋脈貫脊脊髓空則痛膀胱筋脈挾脊上項為風寒濕所襲則倔強不能屈伸取本經膕中血絡背上兩角為肩解小腸脈出之肩解下成片肉為肩胛大小腸筋脈俱繞之又肩背屬肺部分太陽中風濕經脈不行脊痛項強不可回顧羌活勝濕湯見傷濕兼氣實鬱滯者則常常作痛加木香陳皮香附氣虛鬱滯者則時止時痛加升柴參耆血虛郁痛者則夜甚時止加歸芍血瘀郁痛者則夜痛不止加薑黃靈脂紅花風盛項背強加威靈仙濕盛肩背重加二術痰氣凝滯則嘔眩本湯送青州白丸子見中風看書封奕久坐而脊背痛者補中益氣湯見氣或八珍見虛損加黃耆喘咳氣逆肩背痛汗出肺實也熱也肺虛亦痛覺寒少氣不足以息當補氣腎氣上逆先背痛後及肩和氣飲見腫脹加炒鹽小茴當肩背一片冷痛而用神保丸者見傷飲食此有積氣故也素虛人或病後或發汗過多心隔間痛引乳脅或肩背此氣上逆當引使歸元有患肩胛縫一線痛起上跨肩肩背屬小腸經至胸前側脅止膽經晝夜不息丹溪謂因思慮傷心心血虛而火動移於小腸及慮不能決又歸之膽膽火亦動子來乘母為實邪以人參四錢思慮則氣結不行故補其氣以行之木通二錢引火從小腸出煎湯下龍薈丸見脅肋痛除肝膽火而愈脅肋痛腋下為胠胠下為脅脅下為肋肋下為季脅季脅下為䏚肝膽脈布脅而心包絡筋脈亦挾脅肝脈布肋而脾筋亦結肋膽筋脈乘季脅而肺筋亦抵季脅膽脈乘䏚是脅肋痛未必盡由肝膽而肝膽為多大概分氣血食痰四種而怒氣瘀血居多治者須分左右審虛實左痛多留血或肋下有塊右痛多氣鬱氣鬱則痰亦停然左血右氣亦難泥定大抵瘀血按之痛不按亦痛痛無時息而不膨脹氣痛則時止而膨得噯即寬以此辨之脅痛火實者忌陳皮生薑細辛能令肝脹火盛忌熱藥三者性熱而味又辛散火得風而益熾也故忌之龍薈丸柴胡青皮必用肝火鬱甚用黃連龍膽草等苦寒直折火愈郁愈烈用大栝蔞一枚連皮搗爛加粉草二錢妙栝蔞甘寒潤滑於郁不逆又如油之洗物未嘗不潔也詳準繩氣實痛枳殼青皮薑黃香附甘草有痰加蒼朮半夏白芥子枳殼乃治脅痛的劑必用死血阻滯必日輕夜重午後發熱脈短澀桃仁承氣湯見血加鱉甲青皮芎歸之屬痰飲痛脈沉弦滑導痰湯見痰食痛凡痛有一條扛起者是也煮黃丸見心痛治脅下痃癖痛如神悲哀傷肝氣引兩脅疼痛枳殼煮散房勞傷腎氣虛血滯胸脅多有隱隱作痛宜補腎加芎歸之類和血酒色太過脅下一點痛不止名干脅痛甚危惟大補氣血而已虛冷作痛不宜疏散須辛熱補劑肝虛視物不明筋脈拘急面青爪甲枯脅引小腹痛補肝湯凡痛而脅骨偏舉者肝偏傾也臂痛腋腫臂痛有六道經絡究其痛在何經以行本經藥行其氣血氣血通則愈矣以兩手伸直臂貼身垂下大指居前小指居後而定之其臂臑之前廉痛者屬陽明經以升麻白芷乾葛行之後廉痛者屬太陽經以藁本羌活行之外廉痛者屬少陽經以柴胡行之內廉痛者屬厥陰經以柴胡青皮行之內廉痛者屬太陰經以升麻白芷蔥白行之內後廉痛者屬少陰經以細辛獨活行之並用針灸法臂為風寒濕所搏或飲液流入或因提挈重物致痛或腫或不腫除飲證外其餘並可五積散見中寒及烏藥順氣散見中風或蠲痹湯見痹審知是濕蠲痹湯每服加蒼朮末三匙防己四分挈重傷筋者琥珀散劫勞散或和氣飲見腫脹每服加白薑黃五分以薑黃能入臂故也薄桂味淡能橫行手臂引藥至痛處亦不可少痰飲臂痠痛軟麻導痰湯見痰加木香白薑黃各五分重者控涎丹見痰加去油木鱉子一兩桂枝五錢每服二十丸加至三十丸血虛不榮於筋者蠲痹湯四物湯見血各半帖煎服氣血凝滯者舒筋湯腋屬心包經肝經腋前屬肺經腋後屬心經腋下屬肝經經氣熱則腋腫察其部位治之身體痛身體拘急體痛謂一身盡痛傷寒太陽表證六脈俱緊發汗後痛為氣血不和脈弦遲陰毒傷寒陰毒痛如被杖霍亂吐瀉腹痛中暑汗太多脈虛濕痹濕流關節一身盡痛風濕相搏重痛不可轉側脈緩虛勞氣血虛損脈弦小或虛數皆有之寒者甘草附子湯熱者當歸拈痛湯內傷勞倦飲食兼感風濕者補中益氣湯見氣加羌防升麻蒼朮藁本治之春月寒濕鬱遏清陽不得升火伏下焦浮而躁熱雖在陰室中亦汗出壯火食氣困乏懶言以麻黃復煎湯漸漸發之令寒濕去陽氣升困倦乃退遍身痛如勞證者參耆甘草附子炮羌活木香知母芍藥川芎前胡枳殼桔梗白朮當歸茯苓半夏制各五錢柴胡鱉甲醋炙各一兩桂心酸棗仁各三錢杏仁炒五錢為末每服四錢薑三片棗二個烏梅三個蔥白三寸水煎空心調服少年虛損冷憊老人諸疾並治惟傷寒體痛不宜活血丹與四物蒼朮各半湯相表裡治遍身骨節疼痛如神身體拘急屬寒寒則收引也又屬濕濕亦寒也寒屬腎濕屬脾於二經取之面詳四診察面頰車蹉諸陽經皆上至於頭而胃脈起鼻交頞中俠口環唇循頰車上耳前過客主人故面部屬胃經按小腸脈別支從觀上䪼抵鼻絡顴亦面部也胃熱則面熱便燥結者先用調胃承氣湯見大便不通徹其本次用升麻加黃連湯以去其經絡中上行之風熱胃寒則面寒先以附子理中丸見中寒溫其中氣次以升麻加附子湯以散其經絡中上行之寒風熱甚則面腫痛白芷升麻葛根薄荷防風荊芥羌活蒼朮黃芩石膏外杵杏仁膏塗之腫如蛇狀青苔水調塗風水亦浮腫詳腫脹門腫與浮異風火上炎紅腫而痛此邪有餘而腫也脾肺氣虛不能運行上壅不降面目虛浮此正不足而浮也面瘡或粉刺或起白皮作癢但淺在皮膚者皆屬肺經風熱清肺飲面焦胃脈衰人參黃耆甘草白芍升麻葛根白芷面塵即晦暗陽氣鬱滯則無光水涸則不潤故晦暗如蒙塵土宜疏肝清肺滋腎面上黧黑斑水虛也女人最多六味丸見虛損外用甘松山奈細辛白芷白蘞白芨防風荊芥殭蠶天麻羌活陀僧川椒菊花獨活枯礬檀香各一錢棗肉七個肥皂肉一斤同為丸秋冬加生蜜五錢皮粗稿加牛骨髓三錢洗面面上黑子石灰醶水調稠糯米插入灰內留半截在外片時米色如水晶用以點之即落痄𤸛雞子清調赤小豆末加蝸牛飛面搗勻貼之又用靛缸底泥塗之即消面黑有胃陽虛腎寒侮土故黑色見於面唇唇者脾之華土不勝水故黑以升麻葛根防風白芷推揚胃氣而散其滯蒼朮散其寒白芍以斂脾陰參耆甘草薑棗以補其陽午前陽升之時服之數帖而愈又有登廁感非常臭氣而得者以沉檀焚於帳內熏之旬日而愈蓋臭屬腎水香屬脾土取其相勝也又有因吃斑鳩而得者鳩常食半夏苗有毒以薑汁解之而愈欠伸頰車蹉口開不能合醉以酒俟睡皂角末吹其鼻嚏即止耳經謂腎開竅於耳又謂心開竅於耳解者謂心本開竅於舌因舌無竅故借竅於耳肺絡會於耳膽三焦脈皆走耳前入耳中過耳後胃脈上耳前筋結耳前小腸膀胱脈俱結耳後完骨胃之支脈亦過耳後又素問謂心腎肺脾胃五絡皆屬之於耳中又謂肝病氣逆則耳聾耳聾聲有所蔽塞則不通在外之蔽塞與在內之蔽塞一也內氣本流通何以蔽塞則風火痰血之為之也在上為心肺之氣在下為肝腎之氣在中為脾胃之氣氣動而為火火動而為風壅於上焦擾攘不清則外入之聲為其所亂若更蒸液而痰凝傷陰而血瘀則耳竅蔽塞甚則為痛為腫結核停膿不但聾也不甚則為鳴氣上出於耳而作響也氣上盛則鳴甚不盛則鳴不甚上焦氣壅屬實下焦氣逆屬虛或陰虛而火上炎或陽虛而火上浮也中焦多屬濕熱酒食之所鬱積也各臟腑經脈皆能動氣生火作聲豈必拘定脈絡通耳者乃然哉此皆言內氣上壅者若氣虛下陷則亦聾以清氣自下濁氣自上清不升則濁不降也更有老年精脫氣衰不能上通者即無濁火上亂而精氣萎弱既不上通則竅遂漸閉如路久不行而茅塞也亦有沉靜之人收視返聽精氣退藏於密而上竅亦漸閉者乃高壽之徵也明此義而紛紛之説皆一以貫之矣耳聾治法熱者犀角飲子大便祕者加大黃壅熱生風犀角散兼外風者防風通聖散見中風兼痰者滾痰丸見痰鬱火防風通聖散加大黃酒煨再用酒炒三次又同各味通用酒炒加味逍遙散見郁厥氣上逆者多見眩暈之證沉香降氣湯蘇子降氣湯甚者吞養正丹並見氣以鎮墜之腎水虛精脫者必顴頰黑六味地黃丸見虛損本事地黃湯內有羌防二味為腎虛而兼受風邪也無風邪者去之腎虛寒者八味丸見虛損益腎散多恐為肝虛四物湯見血加羌防柴胡菖蒲伏神勞役傷房勞傷虛火上炎瘦悴昏瞶是為勞聾益氣聰明湯耳者宗脈之所附脈虛而外風襲使經氣閉塞是為風聾多見頭痛排風湯見中風桂心散磁石丸氣壅頭目不清清神散氣閉不通通氣散外治通神散通耳法追風散甘遂半寸綿裹插耳中口嚼甘草蒼朮長七分一頭削尖插耳內一頭平安艾灸覺耳中有熱氣效久聾萆麻子丸勝金透關散耳鳴經謂上氣不足又謂腦髓不足則腦轉耳鳴皆精氣虛弱之故也王汝言謂耳鳴甚者多是痰火上升又感惱怒而得若腎虛而鳴者其鳴不甚當見勞怯等證薛立齋云若血虛有火四物湯見血加山梔柴胡氣虛補中益氣湯見氣血氣俱虛八珍見虛損加柴胡若怒而鳴氣實小柴胡見寒熱加芎歸山梔虛用八珍加山梔若午前甚者陽氣實熱也小柴胡加黃連山梔陽氣虛補中益氣見氣加柴胡山梔午後甚者陰血虛也四物見血加白朮茯苓若腎虛火動哄哄然脛酸或痰盛作渴必用地黃丸見虛損甚者當鎮墜正元飲見眩暈咽黑錫丹見厄逆有熱者龍齒散腎者宗脈所聚竅於耳宗脈虛風邪乘虛隨脈入耳氣與之搏而鳴先用生料五苓散見傷濕加制枳殼橘紅紫蘇生薑同煎吞青木香丸見氣散邪疏風下氣續以歸芎飲和養之若更四肢抽掣痛睡著如打戰鼓耳內覺有風吹奇癢黃耆丸甚效耳腫痛生瘡鼠黏子湯柴胡清肝飲耳濕腫痛涼膈散見發熱加酒炒大黃黃芩酒浸防風荊芥羌活濕多外用枯礬吹入耳中耳濕結塊生豬脂地龍糞釜下墨研末蔥汁和捏如棗核綿裹入耳潤則換耳干痛亦用此方耳痛如蟲內走蛇蛻灰吹入立愈聤耳勞傷氣血熱氣乘虛入聚則生膿汁也內服柴胡聰耳湯蔓荊子散外用紅綿散壯人積熱者玉屑無憂散送解毒雄黃丸並見咽喉下三四次效出膿發灰吹之耳膿潰爛礬灰鉛丹吹又方陳皮燒灰一錢輕粉三分麝五釐吹入即干耳出血龍骨末吹即止按初起忌斂澀鉛丹礬不宜用紅棉散亦勿用也耳癢沈存中病赤目百治不瘥邱華問耳中癢否癢是腎風四生散見中風二三服即瘥如言服二次目反大痛更二服遂愈以語孫和甫孫曰嘗見呂吉甫目久病服透冰丹乃瘥透冰丹亦療腎風也聖惠云有耳癢直挑剔出血乃止者此腎虛浮毒上攻也宜透冰丹戒酒面雞豬之屬一月若不能戒者無效也蟲入耳生薑擦貓鼻即尿取滴耳蟲即出或用管入耳極力吸之蟻蜈蚣入耳生薑汁或蒜汁灌或炙豬肉雞肉置耳邊蒼蠅入耳皂角子蟲研爛生蟺血調灌耳中蚤蝨入耳菖蒲末炒乘熱棉裹著耳邊蜒蚰入耳鹽擦耳內或硼砂膽礬等分為末吹即化水水入耳薄荷汁點立效耳中有物不能出弓弦頭散處敷好膠入耳中黏之徐徐引出立效百蟲入耳用茶油一滴滲入耳內即效而安

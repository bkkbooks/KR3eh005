者皆難控制必得六味為之浚導乃能下行而無上僭之虞今人不明此理動稱桂附引火歸元離六味而用之以致酷烈中上爍涸三陰為禍大矣火欲少不欲壯故桂附各止一兩火少則生氣故金匱名此為腎氣丸裁八味為六味始自錢仲陽之治小兒以小兒稚陽純氣故去桂附也蘖立齋因之悟大人陰虛火動用丹溪補陰法不驗者用此立應丹溪用四物湯補陰乃補後天有形之血此則補先天無形之水故水虛者非此不可自是以來群推為滋陰之神方醫貫又推廣其義觸處旁通以應無窮之變而要之皆為根本虧敗而設若病不涉腎固可不用也今人未達醫貫之旨不論何病輒令服此延緩誤事故張介石謂醫貫以六味治傷寒其言如鴆而醫者病家反謂平穩亦可哂也六味地黃丸地黃砂仁酒拌九蒸九曬八兩山茱萸酒潤山藥各四兩茯苓丹皮澤瀉各三兩蜜丸空心鹽湯下冬酒下熟地滋腎君藥然遇氣藥則運用於上遇血藥則流行於經不能制其一線入腎也故以五者佐之山藥陰金也質重屬陰色白屬金也能助肺氣之下降山茱萸陰木也酸屬木潤屬陰能斂肝氣之迅升水火升降必由金木為道路二者為左右降下之主以制其旁軼且補其母而水出高原補其子茱萸補肝血也而不盜母氣又用丹皮瀉南以補北降火以滋陰茯苓之淡泄以降陰中之陽腎中之邪火也水虛者火必上炎茯苓藏伏地中為日最久沉陰可知故能降上炎之陰火用茯苓正取其淡泄昧者反以乳制之可笑澤瀉之咸泄以降陰中之陰膀胱中渾濁之水液也腎熱則水液渾濁瀉其腑正所以安其臟也補腎水乃滋其潤澤之氣無形之癸水也若有形之壬水須流行不蓄否則泛溢為災即不渾濁亦須導之或疑澤瀉泄腎昧矣五者色色皆降共挽地黃下趨所謂治下制以急也得力尤在苓瀉二味常常下泄則群藥為其所導味者嫌其滲泄而去之加入補腎群品久服氣積下泄無路勢必上湧矣故曰六味之苓瀉補中之升柴流濕就燥分道揚鑣皆必不可去者也補中升也清升則濁降故謂補中以升為降六味降也火降則水上升故謂六味以降為升水何以升水足則上潤也七味丸即六味丸加肉桂都氣丸即六味丸加五味子加減地黃丸即六味丸加五味子肉桂知柏地黃丸即六味丸加知母黃柏濟生腎氣丸熟地四兩茯苓三兩山藥萸肉丹皮澤瀉肉桂車前牛膝各一兩附子五錢蜜丸桐子大每服八十丸空心米飲下補肝湯當歸川芎白芍熟地酸棗仁炙甘草木瓜救肺飲當歸白芍麥冬五味子人參黃耆炙甘草百合款冬花紫菀馬兜鈴天王補心丹柏子仁炒研去油一兩五味子炒一兩茯苓五錢當歸酒洗一兩生地酒洗四兩桔梗丹參炒人參元參炒各五錢天冬炒麥冬炒各一兩遠志炒五錢酸棗仁炒一兩蜜丸彈子大硃砂為衣臨臥燈心湯下一丸或噙化三才丸天門冬地黃人參各等分為末煉蜜丸空心服豬肚丸牡蠣煅白朮各四兩苦參三兩上為細末以豬肚一具煮極爛銼研如膏和丸如桐子大每服三十丸米飲送下日三四服大黃蟅蟲丸大黃二兩半蒸黃芩二兩甘草三兩桃仁一升杏仁一升地黃十兩芍藥四兩乾漆一兩虻蟲一升水蛭百枚蠐螬一升蟅蟲半升上十二味末之蜜丸小豆大酒飲服五丸日三服百勞丸當歸炒乳香沒藥各一錢虻蟲十四個去翅足人參二錢大黃四錢水蛭十四個炒桃仁十四個浸去皮尖上為細末煉蜜為丸桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日百勞水杓揚百遍乃仲景甘瀾水也柴胡飲子黃芩甘草炙大黃芍藥柴胡人參當歸各等分銼散每服四錢水一盞薑三片煎至六分去滓溫服防風當歸飲子柴胡人參黃芩甘草防風大黃當歸芍藥各半兩滑石二錢上㕮咀每服五錢水一盞半薑三片煎七分溫服麥煎散赤茯苓當歸乾漆鱉甲醋炙常山大黃煨柴胡白朮生地黃石膏各一兩甘草半兩上為末每服三錢小麥五十粒水煎食後臨臥服傳尸將軍丸錦紋大黃九蒸曬焙麝香一錢管仲牙皂去皮醋炙桃仁去皮炒檳榔雷丸鱉甲醋炙黃各一兩蕪萸五錢上為末先將藁葉二兩東邊桃柳李桑葉各七片水一碗煎熟去渣入蜜一盞再熬成膏入前藥及安息香搗丸梧子大每服三十丸食前棗湯下芎歸血餘散室女頂門生髮一小團井水洗去油膩法醋浸一宿日中曬乾紙捻火燒存性真川芎半兩當歸三錢木香桃仁水浸去皮焙各二錢安息香雄黃各一錢全蠍二枚江上大鯉魚頭生截斷一枚醋炙酥上為末分作四服每服井水一大碗淨室中煎七分入紅硬降真香末半錢燒北斗符入藥月初五更空心向北目天咒曰瘵神瘵神害我生人吾奉帝敕服藥保身急急如律令咒五遍面北服藥畢南面吸生氣入口腹中燒降香置床底下午時又如前服藥北斗符敕忌念北斗咒硃砂書符鱉甲生犀散天靈蓋一俱男者色不赤可用女者色赤勿用以檀香煎湯候冷洗咒曰電公靈雷公聖逢傳尸即須應急急如律令咒七遍訖次用酥炙黃生鱉甲一枚去裙酥炙黃虎長牙二枚醋炙酥如無則用牙關骨半兩安息香桃仁水浸去皮尖焙檳榔雞心者各半兩生犀角木香甘遂降真香乾漆杵碎炒煙略盡存性阿魏酒浸研各三錢雷丸二錢穿山甲取四趾醋炙焦全蠍三個蚯蚓十條生研和藥上件為末每服半兩先用豉心四十九粒東向桃李桑梅小稍各二莖長七寸生藍青七葉青蒿一小握蔥白連根洗五莖石臼內同杵用井水一碗半煎取一盞入童子尿一盞內藥末煎取七分入麝一字月初旬五更空心溫服即以被覆汗恐汗中有細蟲軟帛拭之即焚其帛少時必瀉蟲以淨桶盛急鉗取蟲付烈火焚之並收入瓷器中瓦片傳雄黃蓋之泥和灰扎埋深山絶人行處八物湯白朮炒茯苓人參黃耆炙當歸芍藥炒川芎地黃上為散每服五錢水二盞煎至一盞
大黃二兩上三味以水一斗先煮茵陳減六升內二味煮取三升去滓分溫三服小便尚利尿如皂角汁狀色正赤一宿腹減黃從小便去也梔子大黃湯梔子十四枚大黃一兩枳實五枚豆豉一升上四味以水六升煮取三升分溫二服硝石礬石散硝石礬石燒等分上二味為散以大麥粥汁和服方寸匕日三服病隨大小便去小便正黃大便正黑是其候也茵陳五苓散茵陳蒿末十分五苓散五分先食飲服方寸匕日二服桂枝加黃耆湯桂枝白芍生薑各一錢五分黃耆甘草各一錢棗二個熱服須臾飲熱湯即汗若不汗更服大黃硝石湯大黃黃柏硝石各四兩梔子十五枚上四味以水六升煮取二升去滓內硝更煮取一升頓服小溫中丸針砂一斤以醋炒為末入糯米炒極黃為末亦用一斤醋糊丸如桐子大每米飲下四五十丸忌口輕者服五兩重者七兩愈大溫中丸香附一斤童便浸甘草二兩針砂一斤炒紅色醋淬三次苦參春夏二兩秋冬一兩厚朴薑炒黑五兩白芍五兩陳皮三兩山楂五兩蒼朮五兩青皮六兩白朮三兩茯苓三兩醋糊丸米飲下弱者白朮湯下忌一切生冷油膩葷發糍硬之物服過七日手心即涼口唇內有紅暈起調理半月愈虛人佐以四君子湯棗礬丸皂礬不拘多少置砂鍋內炒通赤用米醋點之燒用木炭上為末棗肉丸每服二三十丸食後薑湯下暖中丸陳皮蒼朮厚朴制三稜白朮青皮各五錢香附一斤甘草二兩針砂十兩炒紅醋淬上為末醋糊丸空心鹽湯下五十丸晚食前酒下亦可忌狗肉青龍散地黃仙靈脾防風各二錢半荊芥穗一兩何首烏二錢半食後服日三服沸湯下一錢寶鑑茵陳梔子湯茵陳葉一錢茯苓去皮五分梔子仁蒼朮去皮炒白朮各三錢黃芩生六分黃連去須枳殼麩炒豬苓去皮澤瀉陳皮漢防己各二分青皮去白一分上用長流水煎食前溫服谷疸丸苦參三兩龍膽草一兩牛膽一枚取汁上為末用牛膽汁入少煉蜜和丸如桐子大每服五十丸空心熱水或生薑甘草煎湯送兼紅丸子服亦可方見傷飲食霍脾飲乾葛枇杷葉去毛桑白皮霍香葉陳皮白茯苓枳椇子各等分水煎送酒煮黃連丸丸方見傷暑加味四君子湯人參白朮茯苓白芍黃耆扁豆各二錢炙草一錢薑棗煎滑石散滑石一錢半枯礬一錢為末大麥湯下腎疸湯升麻二錢半蒼朮五分防風二分半獨活白朮柴胡羌活乾葛各二分半茯苓豬苓澤瀉各一分半甘草一分半黃柏一分人參神麯各三分又方四苓散合四物湯去川芎加茵陳麥冬滑石甘草消渴黃耆六一湯黃耆六錢半生半炙甘草一錢半生半炙為末白湯點服二錢亦可煎服玄兔丹菟絲子酒浸通軟乘濕研焙乾別取末十兩五味子酒浸別為末七兩白茯苓干蓮肉各三兩上為末別碾乾山藥末六兩將所浸酒余者添酒煮糊搜和所得搗數千杵丸如梧子大每服五十丸空心食前米飲下靈砂丸製法詳丹溪心法附余水銀一斤硫黃四兩上二味用新銚內炒成砂子入水火鼎煅煉為末糯米糊丸如麻子大每服三丸空心棗湯米飲井花水人參湯任下量病輕重增至五七丸忌豬羊血緑豆粉冷滑之物黃連豬肚丸黃連去須粟米栝蔞根茯神各四兩知母麥冬去心各二兩上為細末將大豬肚一個洗淨入藥於內以線縫口置甑中炊極爛取出藥別研以豬肚為膏再入煉蜜搜和前藥杵丸如梧子大每服五十丸參湯下又方加人參熟地乾葛又方除知母粟米用小麥忍冬丸忍冬草不以多少根莖花葉皆可用之勿犯鐵器生者效速上以米麴酒於瓶內浸以粳火煨一宿取出曬乾入甘草少許為末即以所浸酒煮糊為丸如梧桐子大每服五十丸至百丸酒飲任下參朮飲人參乾山藥蓮肉去心白扁豆去皮薑汁浸炒各一斤半白朮於潛者二斤桔梗炒令黃色砂仁白茯苓去皮薏苡仁炙甘草各一斤上為細末每服二錢米湯調下或加薑棗煎服或棗肉和藥丸如桐子大每服七十丸空心用米湯送下或煉蜜丸如彈子大湯化下黃耆飲一方無栝蔞有天冬人參烏梅黃耆蜜炙茯苓去皮木栝蔞根麥門冬去心生地黃五味子炙甘草各一錢半水二鍾煎一鍾食遠服七珍散人參白朮黃耆蜜炙山藥白茯苓粟米微炒甘草各等分上為細末每服三錢薑棗煎服如故不思飲食加扁豆一兩名八珍湯乾葛飲乾葛二兩枳實去白麩炒梔子仁豆豉各一兩甘草炙半兩每服四錢水煎不拘時溫服痿補陰丸黃柏知母俱鹽酒拌炒熟地黃敗龜板酥炙各四兩白芍藥煨陳皮牛膝酒浸各二兩虎脛骨酥炙瑣陽酒浸酥炙當歸酒洗各一兩半冬月加乾薑五錢半上為末酒煮羯羊肉為丸鹽湯下健步丸羌活柴胡各五錢防風三錢川烏一錢滑石炒半兩澤瀉三錢防己酒洗一兩苦參酒洗一錢肉桂甘草炙栝蔞根酒製各半兩上為細末酒糊丸如桐子大每服十丸煎愈風湯送下空心愈風湯見中風神龜滋陰丸龜板四兩酒炙黃柏炒知母酒炒各二兩枸杞子五味子瑣陽各一兩乾薑炮半兩末之豬脊髓為丸如桐子大每服七十丸空心鹽湯下或滴水丸左經丸草烏白大者去皮臍木鱉去殼白膠香五靈脂各三兩半螌蝥五個去頭足翅醋炙為末用黑豆去皮生杵取粉一升醋糊共搜杵為丸如雞頭大每服一丸溫酒磨下續骨丹天麻明淨者酒浸白附子牛膝木鱉子各半兩烏頭一錢炮川羌活半兩地龍去土一分乳香沒藥各二錢硃砂一錢上以生南星末一兩無灰酒煮糊為丸如雞頭大硃砂為衣薄荷湯磨一丸食前服肺癰桔梗湯桔梗一兩甘草二兩上二味以水三升煮取一升分溫再服則吐膿血也葶藶大棗瀉肺湯葶藶熬令黃色搗一丸如彈子大大棗十二枚上先以水三升煮棗取二升去棗內葶藶煮取一升頓服甘草乾薑湯甘草四兩炙乾薑二兩炮水三升煮取一升五合分溫再服補遺瀉青丸當歸膽草羌活川芎梔子大黃煨防風各等分為末蜜丸如芡實大每服一丸煎竹葉湯入砂糖化下清上散酒黃芩二錢白芷一錢半羌活防風柴胡各一錢川芎一錢二分荊芥八分甘草五分水煎食後服

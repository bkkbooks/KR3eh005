body:
  text: 卷之六諸方上諸方門目上氣四君子湯人參白朮茯苓各二錢炙甘草一錢水煎服加薑棗異功散即四君子湯加陳皮六君子湯即異功加半夏黃耆四君子湯即四君以黃耆易炙甘草正氣天香散烏藥二兩香附米八兩陳皮紫蘇葉乾薑各一兩上為細末每服一錢匕鹽湯調服四七湯半夏湯泡五次一錢五分茯苓去皮一錢二分紫蘇葉六分厚朴薑製九分水一盞生薑七片紅棗二枚煎至八分不拘時服蘇子降氣湯紫蘇子炒半夏湯泡各二錢半前胡去蘆甘草炙厚朴去皮薑製陳皮去白各一錢川當歸去蘆一錢半沉香七分水二鍾生薑三片煎至一鍾不拘時服虛冷人加桂五分黃耆一錢木香流氣飲半夏湯洗七次焙二兩青皮去白厚朴薑製去粗皮紫蘇去梗香附去毛炒甘草炙各一斤陳皮去白二斤肉桂去粗皮不見火莪朮煨丁香皮不見火大腹皮制麥門冬去心檳榔木香不見火草果仁各六兩木通去節八兩白芷藿香葉赤茯苓去皮白朮乾木瓜人參去蘆石菖蒲各四兩上㕮咀每服四錢水一盞半薑三片棗二枚煎七分熱服分心氣飲紫蘇莖葉三兩半夏制枳殼制各一兩半青皮去白陳橘紅大腹皮桑白皮炒木通去節赤茯苓南木香檳榔蓬莪朮煨麥門冬去心桔梗辣桂香附藿香各一兩甘草炙一兩二錢半上銼散每服三錢水一大盞生薑三片棗二枚燈心十莖煎七分不拘時服補中益氣湯黃耆一錢當歸人參炙甘草陳皮升麻柴胡白朮此方東垣所制止有黃耆一錢其餘各三分薛立齋常用參耆各錢半白朮一錢當歸一錢陳皮七分升麻柴胡各五分東垣取清輕上升故分數少立齋每用以濟危急故隨證加多然亦相所主以為輕重進退加減神應無窮如病甚者參耆或三錢五錢隨證加用凡脾胃此方本主脾肺脾運則陽明之氣上達而胃開然不得肺藥之力則不能親上也喜甘而惡苦喜補而惡攻喜溫而惡寒喜通而惡滯喜升而惡降喜燥而惡濕此方得之東垣此方原為感證中有內傷一種故立此方以補傷寒書之所未及非補虛方也今感證家多不敢用而以為調理補虛服食之藥則謬矣調理補虛乃通其義而轉用者耳木香調氣散白豆蔻仁丁香檀香木香各二兩藿香葉炙甘草各八兩縮砂仁四兩上為細末每服二錢入鹽少許沸湯不拘時點服四磨湯人參檳榔沉香天台烏藥上四味各濃磨水煎三五沸放溫空心服或下養正丹尤佳本方去人參加木香枳實名五磨飲子白酒磨服養正丹水銀黑錫去滓淨稱與水銀結砂子硫黃研硃砂研細各一兩上用黑盞一隻火上溶黑鉛成汁次下水銀以柳條攪次下硃砂攪令不見星子放下少時方入硫黃末急攪成汁和勻如有焰以醋灑之候冷取出研極細煮糯米糊丸緑豆大每三十丸鹽湯棗湯下沉香降氣散沉香二錢八分縮砂仁七錢半甘草炙五錢五分香附子鹽水炒去毛六兩二錢五分上為極細末每服二錢入鹽少許沸湯調服不拘時淡薑湯下亦得青木香丸黑牽牛二百四十兩炒香取末一百二十兩補骨脂炒香華澄茄各四十兩木香二十兩檳榔用酸粟米飯裹濕紙包火中煨令紙焦去飯四十兩上為細末清水滴為丸如緑豆大每服三十丸菜湯熟水任下七氣湯人參去蘆肉桂去皮甘草炙各一兩半夏湯泡七次焙乾五兩上㕮咀每服三錢水一盞薑三片煎至八分食遠服人參黃耆散人參桔梗各一兩秦艽鱉甲炙茯苓各二兩知母三錢五分半夏湯洗桑白皮各一兩五錢紫菀柴胡各二兩五錢黃耆三兩上為粗末每服五錢水煎服血茅花湯茅花每服三錢水一盞半煎七分不拘時溫服止衄散黃耆六錢赤茯苓白芍藥川當歸生地黃阿膠各三錢上為細末食後黃耆湯調服二錢犀角地黃湯犀角丹皮各二錢半白芍一兩生地黃二兩五錢每服五錢水煎柴胡清肝散柴胡黃芩炒人參各三分山梔炒川芎各五分連翹桔梗各四分甘草三分水煎服四物湯地黃或生或熟三錢芍藥或白或赤二錢川芎一錢半當歸三錢水煎服加味四物湯即四物加梔子丹皮柴胡知柏四物湯即四物加知母黃柏六物湯即知柏四物湯四神湯當歸川芎赤芍藥各一兩乾薑五錢炮上為細末酒調服三錢槐花湯槐花炒側柏葉杵荊芥穗枳殼麩炒黃色各二錢五分水二鍾煎八分空心溫服芍藥黃連湯芍藥黃連當歸各半兩大黃一錢淡桂五分甘草炙二錢每服五錢水煎痛甚者調木香檳榔末一錢黃連湯黃連當歸各五錢甘草炙二錢半每服五錢水煎平胃地榆湯蒼朮升麻黑附子炮各一錢地榆七分白朮陳皮茯苓厚朴乾薑葛根各五分甘草炙當歸炒曲白芍藥益智仁人參各三分水二盞生薑三片棗二枚煎至一盞去渣食前溫服升陽除濕和血湯生地黃牡丹皮炙甘草生甘草各五分黃耆一錢白芍藥一錢半升麻七分熟地黃當歸身蒼朮秦艽肉桂各三分陳皮二分水四大盞煎至一盞稍熱空心服牛膝四物湯即四物湯倍加牛膝珀珠散琥珀末一錢珍珠末五分硃砂末五分滑石飛六錢甘草末一錢每服三錢引用整木通去粗皮黃色者煎湯調服若有熱尿澀導赤散加牛膝鬱金清之大便不通八正散加牛膝鬱金下之利後仍服此方自效抵當丸水蛭二十個虻蟲二十五個桃仁二十個去皮尖大黃三兩上四味杵分為四丸以水一升煮一丸取七合服之晬時當下血若不下者連服代抵當丸大黃川産如錦紋者去皮及黑心四兩芒硝一兩如欲穩以玄明粉代當歸尾桃仁麩炒黃去皮尖另研如泥六十枚生地黃穿山甲蛤粉炒各一兩桂三錢或五錢上為極細末煉蜜丸如桐子大蓄血在上焦丸如芥子大臨臥去枕仰臥以津咽之令停留喉下搜逐膈上中焦食遠下焦空心俱桐子大以百潦水煎湯下之用歸地者欲下血而不損血耳且引諸藥至血分也諸藥皆獷悍而欲以和劑緩之也如血老成績此藥攻之不動宜去歸地加廣朮醋浸透焙乾一兩肉桂七錢桃仁承氣湯桃仁五十個去皮尖桂枝二兩去皮大黃四兩芒硝二兩甘草二兩炙上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利黃耆六一湯黃耆六錢甘草一錢雞蘇丸雞蘇葉八兩黃耆防風去蘆荊芥各一兩菊花三錢片腦五分川芎生地黃桔梗甘草各半兩上為細末煉蜜和丸如彈子大每服一丸細嚼麥門冬去心煎湯下不拘時服五陰煎熟地山藥炒扁豆炒炙草白茯苓芍藥炒黃五味子人參白朮炒加蓮肉煎五福飲人參心熟地腎當歸肝白朮炒肺炙草脾水煎服歸脾湯人參白朮土炒茯神棗仁炒龍眼肉各二錢黃耆炙一錢半木香甘草炙各五分薑棗煎此嚴用和原方也薛立齋加遠志當歸各一錢以治血虛從肝補心從心補脾乃隔二之治也脾氣虛寒不能運血歸經故用參蓍朮草以補脾又用木香行之氣虛則易散故用棗仁以斂肝血不歸經則心失所養而不寧故用圓眼肉茯神以補心高鼓峰謂木香本以噓血歸經然香燥反動肝火而干津液故每去之而加白芍以追已散之真陰且白朮燥烈肺中有火者恐助咳嗽得芍佐之則術止為養榮之用而不上僭惟脾虛泄瀉者方留木香以醒脾甚有理加味歸脾湯即上方即加遠志當歸又加丹皮梔子天門冬湯天門冬去心遠志去心甘草煮黃耆去蘆白芍藥麥門冬去心藕節阿膠蛤粉炒生地黃當歸去蘆人參沒藥甘草炙各一錢水二鍾生薑五片煎至一鍾不拘時服黑神散黑豆炒半斤去皮干熟地黃酒浸當歸去蘆酒製肉桂去粗皮乾薑炮甘草炙芍藥蒲黃各四兩上為細末每服二錢酒半盞童便半盞不拘時煎調服小烏沉湯烏藥去心十兩甘草炒一兩香附子炒盆內淅去毛皮焙乾二十兩上為細末每服一錢不拘時沸湯點服補肺湯鍾乳碎如米粒桑白皮麥門冬去心各三兩白石英碎如米粒人參去蘆五味子揀款冬花去梗肉桂去粗皮紫菀洗去土各二兩上為粗末每服四錢水二盞薑五片大棗一枚粳米三十餘粒煎一盞食後溫服三炒丹吳茱萸去枝梗洗淨以破故紙一兩同炒草果仁一兩以舶上茴香一兩炒葫蘆巴以山茱萸一兩同炒俱候香熟除去同炒之藥以上各一兩上為末酒煮麵糊丸如梧桐子大每服六十丸不拘時鹽湯下百花膏款冬花百合蒸焙各等分上為末煉蜜丸如龍眼大每服一丸臨臥嚼薑湯下七傷散黃藥子白藥子各一兩半赤芍藥七錢半知母玄胡索各半兩鬱金二錢半當歸半兩山藥乳香沒藥血竭各二錢上為末每服二錢茶湯下或紅花當歸煎湯下大阿膠丸一方無卷柏生地大薊雞蘇有丹參貝母茯神杜仲阿膠微炒卷柏生地黃熟地黃大薊獨根者曬乾雞蘇葉五味子各一兩柏子仁另研茯苓百部遠志人參麥門冬防風各半兩乾山藥一兩上為細末煉蜜丸如彈子大煎小麥麥冬湯嚼下一丸食後七珍散人參白朮黃耆蜜炙山藥白茯苓粟米微炒甘草各等分為細末每服三錢薑棗煎服如故不思飲食加扁豆一兩名八珍散滋陰保肺湯黃柏鹽水炒知母各七分麥門冬去心三錢天門冬去心一錢二分枇杷葉去毛尖炙一錢五分當歸芍藥煨生地黃阿膠蛤粉炒各一錢五味子十五粒橘紅紫菀各七分桑白皮一錢半甘草五分水煎服白芨枇杷丸白芨一兩枇杷葉去毛蜜炙藕節各五錢上為細末另以阿膠五錢銼如豆大蛤粉炒成珠生地黃自然汁調之火上頓化入前件為丸如龍眼大每服一丸噙化白芨蓮鬚散白芨一兩蓮花須金色者佳側柏葉沙參各五錢為細末入藕節汁地黃汁磨京墨令黑調藥二錢如稀糊啜服芎附飲川芎二兩香附四兩上為細末每服二錢不拘時茶湯調服膠艾湯阿膠碎炒燥芎藭甘草炙各一兩當歸艾葉微炒各三兩白芍藥熟地黃各四兩每服三錢水一盞酒六分煎八分空心稍熱服鹿茸丸川牛膝去蘆酒浸鹿茸去毛酒蒸五味子各二兩石斛去根棘刺杜仲去皮炒陽起石煆川巴戟去心山藥炒菟絲子淘淨酒蒸附子炮去皮尖川楝子取肉炒各一兩沉香半兩另研磁石煆官桂不見火澤瀉各一兩上為末酒糊丸梧桐子大每服七十丸空心溫酒下鹿角膠丸鹿角膠半兩沒藥另研油頭髮灰各三錢上為末用茅根汁打麵糊為丸如桐子大每服五十丸鹽湯下枳殼散枳殼去瓤炒二十四兩甘草爁六兩上為末每服一錢空心沸湯點服斷紅丸側柏葉炒黃川續斷酒浸鹿茸火去毛醋煮附子炮去皮臍阿膠蛤粉炒成珠子黃耆去蘆當歸去蘆酒浸以上各一兩白礬枯半兩上為末醋煮米糊丸如梧桐子大每服七十丸空心米飲送下生地黃湯生地黃自然汁一升如無生地黃只用生乾地黃末一兩生藕自然汁半升如無藕用薊刺汁半升如無薊刺汁用薊刺末一兩藍葉一握切碎乾者末一兩虻蟲三十個去足翅炒黃大黃一兩銼如骰子大桃仁半兩麩炒水蛭十個上同一處水三升半慢火熬及二升以來放冷分三服投一服至半日許血未下再投之此湯比抵當湯丸為輕花蕊石散花蕊石煅存性童便酒各半女用童便醋各半煎調二三錢服能化瘀血成黃水當歸補血湯黃耆一兩當歸二錢酒洗上㕮咀作一服水三盞煎至一盞去滓溫服食前升陽除濕防風湯蒼朮酒浸去皮淨炒四錢白朮茯苓白芍各一錢防風二錢水煎空心服濕去泄止不止加風藥升陽蒼朮去濕白通湯蔥白四莖乾薑一兩附子一枚生去皮上三味以水三升煮取一升去滓分溫再服一字散雄黃細辛各半兩川烏尖生五個上為細末每服一字薑汁茶芽煎湯不拘時調服發灰散用亂髮灰入麝香少許每服一錢用米醋溫湯調下烏荊丸川烏炮去皮臍一兩荊芥穗二兩上為末醋糊丸如梧桐子大每服二十丸酒湯任下有疾食空時日進三四服無疾早晨一服小薊飲子生地黃四兩小薊根滑石通
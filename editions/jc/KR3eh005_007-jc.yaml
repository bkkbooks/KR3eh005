body:
  text: 卷之七諸方下諸方門目下痹行氣開痹飲羌活川芎防風蒼朮秦艽紅花肉桂細辛續斷在上加片薑黃桂枝威靈仙在下加牛膝防己萆薢木通筋痹加木瓜柴胡脈痹加菖蒲茯神當歸肉痹加白茯陳皮木香砂仁皮痹加紫菀杏仁麻黃骨痹加獨活澤瀉增味五痹飲麻黃桂枝紅花白芷葛根附子虎骨羚羊角黃耆甘草防風防己羌活水煎服加味五痹湯人參茯苓當歸酒洗白芍煨川芎各一錢肝心腎痹倍之五味子十五粒白朮一錢脾痹倍之細辛七分甘草五分水二鍾姜一片煎八分食遠服肝痹加棗仁柴胡心痹加遠志茯神麥冬犀角脾痹加厚朴枳實砂仁神麯肺痹加半夏紫菀杏仁麻黃腎痹加獨活官桂杜仲牛膝黃耆萆薢三痹湯肉桂甘草芍藥黃耆當歸川芎人參茯苓熟地黃牛膝秦艽續斷杜仲細辛獨活防風獨活寄生湯即上方加桑寄生去黃耆續斷黃耆益氣湯即補中益氣湯加紅花黃柏秋加五味夏加黃芩冬加桂枝補中益氣湯見氣人參益氣湯黃耆八錢人參生甘草各五錢炙甘草升麻各二錢五味子一百二十粒柴胡二錢芍藥三錢上㕮咀每服半兩水二鍾煎一鍾空心服服後少臥於麻痹處按摩屈伸少時午飯前又一服日二服蠲痹湯當歸酒洗赤芍藥煨黃耆薑黃羌活各一錢半甘草五分上水二鍾姜三片棗二枚不拘時服又方冷痹者用此附子當歸黃耆炙甘草官桂羌活防風如意通聖散當歸去蘆陳皮去白麻黃去節甘草炙川芎御米穀去蒂筋膜丁香各等分上用慢火炒令黃色每服五錢水二盞煎至一盞去滓溫服虎骨散虎脛骨酷炙敗龜醋炙各二兩麒鱗竭另研沒藥另研自然銅醋淬赤芍藥當歸去蘆蒼耳子炒骨碎補去毛防風去蘆各七錢半牛膝酒浸天麻檳榔五加皮羌活去蘆各一兩白附子炮桂心白芷各半兩上為細末每服二錢溫酒調下不拘時桂心散桂心漏蘆威靈仙芎藭白芷當歸去蘆木香白殭蠶炒地龍去土炒各半兩上為細末每服二錢溫酒調下無時仙靈脾散仙靈脾威靈仙芎藭蒼耳子炒桂心各一兩為末每服一錢溫酒調下無時沒藥散沒藥二兩另研虎骨四兩醋炙為末每服五錢溫酒調下無時日進二服小烏犀丸烏犀角屑乾蠍炒白殭蠶炒地龍去土硃砂水飛天麻羌活芎藭防風甘菊花蔓荊子各一兩乾薑炮麝香另研牛黃各半兩研虎脛骨醋炙敗龜醋炙白花蛇酒浸天南星薑製肉桂去粗皮附子炮去皮臍海桐皮木香人參當歸各七錢半上為細末入研令勻以煉蜜和丸如彈子大每服一丸用溫酒或薄荷湯嚼下沒藥丸沒藥另研五加皮山藥桂心防風去蘆羌活白附子白芷骨碎補蒼耳炒自然銅醋淬各五錢血竭另研二錢半虎脛骨醋炙龜板醋炙各一兩酒煮麵糊丸桐子大每服二十丸空心溫酒下日二服虎骨丸虎骨四兩醋炙五靈脂炒白殭蠶炒地龍去土炒白膠香另研威靈仙各一兩川烏頭二兩炮去皮臍胡桃肉二兩半去內皮搗研如泥為細末同研令勻以酒煮麵糊和丸如梧桐子大每服十丸至十五丸空心溫酒送下日進二服婦人當歸酒下打樸損傷豆淋酒下十生丹天麻防風去蘆羌活獨活去蘆川烏草烏頭去蘆何首烏當歸去蘆川芎海桐皮各等分並生用上為細末煉蜜為丸每丸重一錢每服一丸細嚼冷茶送下病在上食後服病在下空心服忌食熱物一日骨碎補丸骨碎補一兩半威靈仙草烏頭各一兩炒天南星薑製木鱉子去殼楓香脂另研自然銅煆醋淬地龍各一兩去土炒沒藥另研乳香另研各半兩上為細末同研令勻醋煮麵糊為丸如梧子大每服五丸用溫酒下不拘時日進二服定痛丸威靈仙木鱉子去殼川烏炮去皮臍防風去蘆香白芷五靈脂地龍各半兩去土炒水蛭糯米炒熟硃砂各三錢水飛上搗研為末酒煮麵糊丸如梧子大以硃砂為衣每服十丸空心溫酒送婦人紅花酒下八神丹地龍去土炒五靈脂炒威靈仙防風去蘆木鱉子去殼草烏頭各一兩炒白膠香另研乳香另研各三錢為末酒煮麵糊丸桐子大每服五七丸至十丸溫酒下不拘時一粒金丹草烏頭銼炒五靈脂各一兩地龍去土炒木鱉子去殼各半兩白膠香一兩另研細墨煆乳香各半兩另研沒藥另研當歸各一兩去蘆麝香一錢另研為細末以糯米糊為丸如桐子大每服二三丸溫酒下服藥罷身微汗為效乳香應痛丸乳香半兩另研五靈脂赤石脂各一兩研草烏頭一兩半炒沒藥五錢另研上為細末醋煮糊丸如小豆大每服十五丸空心溫酒送下日進二服烏藥順氣散麻黃去根節陳皮烏藥各二錢白殭蠶去絲嘴炒乾薑炮各五分川芎枳殼桔梗白芷甘草炒各一錢水二鍾姜三片棗一枚煎八分食遠服緩筋湯羌活獨活各二錢蒿本麻黃柴胡升麻草豆蔻生地黃當歸身黃芩黃柏各三分炙甘草各三分生甘草根熟地黃各一分蒼朮五分蘇木一分上粗末水二盞煎一盞去柤食遠熱服立效散當歸五錢生地三錢茯苓三錢木通三錢故紙鹽炒二錢枸杞四錢鹿茸炙五錢為末作四服酒調下甘草附子湯甘草白朮各二錢桂枝五錢炮附二錢秦艽二錢水煎服犀角湯犀角二兩羚羊角一兩前胡黃芩梔子仁射干大黃升麻各四兩豉一升上㕮咀每服五錢水二盞煎服茵芋丸茵芋硃砂薏苡仁各一兩牽牛一兩半郁李仁半兩為末煉蜜杵丸桐子大輕粉滾為衣每服十丸至十五丸五更溫水下到晚未利可二三服快利為度白粥將息大羌活湯羌活升麻各一錢獨活七分蒼朮防風去蘆甘草威靈仙去蘆茯苓去皮當歸澤瀉各半錢銼作一服水二盞煎一盞溫服食前一服食後一服忌酒面生冷硬物黃耆酒黃耆獨活防風細辛去苗牛膝川芎附子炮去皮臍甘草炙蜀椒去目併合口者炒出汗以上各三兩川烏炮去皮臍山茱萸去核秦艽去苗土葛根各一兩官桂去皮當歸切焙各二兩半大黃生銼一兩白朮乾薑炮各一兩半上銼如麻豆大用夾絹囊盛貯以清酒一斗浸之春夏五日秋冬七日初服一合日二夜一漸增之以知為度虛弱者加蓯蓉二兩下利者加女萎三兩多忘加石斛菖蒲紫石英各二兩心下多水加茯苓人參各二兩山藥三兩酒儘可更以酒二斗重漬服之不爾可曝滓搗下篩酒服方寸匕不知稍增之服一劑得力令人耐寒冷補虛治諸風冷神妙少壯人服勿熬煉老弱人微熬之痙葛根湯葛根四兩麻黃三兩去節桂枝二兩去皮芍藥炙甘草各三兩生薑三兩大棗十二枚上七味㕮咀以水一斗先煮麻黃葛根減二升去沫內諸藥煮取三升去滓溫服一升覆取微汗不須啜粥余如桂枝湯法將息及禁忌栝蔞桂枝湯枯樓根二兩桂枝三兩芍藥三兩甘草二兩生薑三兩大棗十二枚上六味以水九升煮取三升分溫三服取微汗汗不出食頃啜粥發之桂枝加葛根湯芍藥二兩桂枝三兩甘草二兩炙生薑三兩切大棗十二枚擘葛根四兩用水一斗先煮葛根減二升去上沫內諸藥煮取三升去滓溫服一升覆取微汗不須啜粥桂枝加芍藥防風防己湯桂枝一兩半防風防己各一兩芍藥二兩生薑一兩半大棗六枚每服一兩水三盞煎一盞半去滓溫服亦宜小續命湯見中風附子散桂心三錢附子一兩炮白朮二兩川芎三錢獨活半兩每服三錢水一盞棗一枚煎五分去渣溫服桂心白朮湯白朮防風甘草桂心川芎附子各等分每服五錢水二鍾姜五片棗二枚同煎七分去渣溫服汗當歸六黃湯當歸黃連黃芩黃柏黃耆此味倍用生地熟地各一錢水煎服防風湯防風荊芥羌活桂枝薄荷甘草水煎服益胃散黃連五味烏梅生甘草各五錢炙草三分升麻二分忌濕面酒五辛漏風湯黃耆六錢甘草一錢防風麻黃根桂枝各五分水煎服耆附湯黃耆去蘆蜜炙附子炮去皮臍各等分上㕮咀每服四錢水一盞生薑十片煎八分食前溫服未應更加之白朮散牡蠣煆三錢白朮一兩二錢半防風二兩半上為末每服一錢溫水調下不拘時候如惡風倍防風白朮如多汗面腫倍牡蠣酸棗仁湯酸棗仁當歸白芍生地知母黃柏茯苓黃耆五味子人參青蒿散天仙藤鱉甲醋炙香附子桔梗柴胡秦艽青蒿各一錢烏藥五分炙甘草一錢半川芎二錢半姜煎嘔吐人參湯人參黃芩知母萎蕤茯苓各三錢蘆根竹茹白朮梔子仁陳皮各半兩石膏煆一兩上銼每服四錢水一鍾半煎七分去滓溫服麥門冬湯麥門冬去心生蘆根竹茹白朮各五兩甘草炙茯苓各二兩人參陳皮萎蕤各三兩上銼散每服四錢水一盞半姜五片陳米一撮煎七分溫服平木湯竹茹腹皮蒼朮香附撫芎神麯八分半夏陳皮生薑少用吳萸為嚮導水煎服作丸亦可黃連湯黃連黃芩各一錢陳壁土炒蒼朮炒七分吳萸炮炒陳皮各五分神麯山楂水煎吳茱萸湯吳茱萸一升洗辛熱人參三兩甘溫生薑六兩切辛溫大棗十二枚擘甘溫上四味以水七升煮取二升去滓溫服七合日三服紅豆丸丁香胡椒砂仁紅豆各二十一粒上為細末薑汁糊丸皂角子大每服一丸以大棗一枚去核填藥麵裹煨熟去面細嚼白湯下空心日三服靈砂丹水銀一斤硫黃四兩上二味用新銚內炒成砂子入水火鼎煆煉為末糯米糊丸如麻子大每三丸空心棗湯米飲井花水人參湯任下量病輕重增至五七丸忌豬羊血綠豆粉冷滑物大半夏湯半夏二升洗完用人參三兩白蜜一升以水一斗三升和蜜揚之二百四十遍煮藥取三升溫服一升余分再服大黃甘草湯大黃四兩甘草一兩水三升煮一升分溫再服八味平胃散厚朴去皮姜炒升麻射干米泔浸茯苓各二兩半大黃蒸枳殼去穰麩炒甘草炙各一兩芍藥半兩每服四錢水一盞煎七分空心熱服反胃噎膈滋陰清隔飲當歸芍藥煨黃柏鹽水炒黃連各一錢半黃芩山梔生地黃各一錢甘草三分水二鍾煎七分入童便竹瀝各半酒盞食前服秦川剪紅丸雄黃別研木香各五錢檳榔三稜煨蓬朮煨貫眾去毛乾漆炒煙盡陳皮各一兩大黃一兩半為細末麵糊為丸如梧桐子大每服五十丸食前米飲下麥昆煎昆布二兩洗去咸小麥二合水煎俟麥熟去渣不拘時服一小盞再口中長含昆布兩三片咽津極效四生丸北大黃去皮酒洗紙包煨香不可過存性一兩黑牽牛三兩取頭末一兩皂角去皮生用一兩芒硝生用半兩上為末滴水為丸梧桐子大每服二三十丸白湯送下五膈寬中散白豆蔻去皮二兩甘草炙五兩木香三兩厚朴去皮薑汁炙熟一斤縮砂仁丁香青皮去白陳皮去白各四兩香附子炒去淨毛十六兩為細末每服二錢姜三片鹽少許不拘時沸湯點服霍亂桂苓白朮散桂枝人參白朮白茯苓各半兩澤瀉甘草石膏寒水石各一兩滑石二兩上為細末每服三錢白湯調下或新汲水薑湯下亦可一方有木香藿香葛根各半兩訶子散訶子炮去核甘草炙厚朴薑製乾薑炮神麯炒草果去殼良薑炒茯苓麥芽炒陳皮各等分上為細末每服二錢候發不可忍時用水煎入鹽少許服之二香散霍香白朮厚朴陳皮茯苓半夏紫蘇桔梗白芷香薷黃連扁豆各一錢大腹皮甘草各半錢水二鍾姜五片蔥白三根煎至一鍾不拘時服止渴湯人參麥門冬去心茯苓去皮桔梗栝蔞根葛根澤瀉甘草各五錢炙又為細末每服三錢不拘時蜜湯調下增損縮脾飲草果烏梅甘草砂仁各四兩乾葛二兩每服五錢姜五片同煎以水浸極冷旋旋服之無時茯苓澤瀉湯茯苓八兩澤瀉四兩甘草炙桂心各二兩白朮三兩每服四錢姜三片同煎食前服一方有小麥五兩小麥門冬湯麥門冬去心白茯苓去皮半夏湯泡七次橘皮白朮各一錢半人參小麥甘草炙各一錢水二鍾姜五片烏梅少許同煎至一鍾不拘時服黃連丸黃連去須微炒黃柏微炒厚朴去皮生薑汁塗炙令香以上各七錢半當歸微炒乾薑炮木香不見火地榆各半兩阿膠搗碎炒黃燥一兩上
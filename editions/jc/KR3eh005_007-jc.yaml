兩水煎服硃砂安神丸硃砂一錢研水飛黃連淨酒炒一錢半甘草炙五分生地黃當歸頭各一錢上為極細末蒸餅為丸如黃米大每服十丸津下麥門冬湯麥冬去心七升甘草炙二兩粳米三合半夏一升人參三兩大棗十二枚水一斗二升煎六升溫服一升日三夜一妙香丸巴豆三百十五粒去皮心膜炒熟冰片牛黃膩粉麝香各三兩辰砂飛九兩金箔九十片各研勻煉黃蠟六兩入白蜜三分同煉勻為丸每重一兩分作三十丸如治潮熱積熱傷寒結胸發黃狂走躁熱口乾面赤大小便不通煎大黃炙甘草湯下一丸毒利下血煎黃連湯調膩粉少許下酒毒食毒茶毒氣毒風痰伏痞吐利等並用膩粉龍腦米飲下中毒吐血悶亂煩躁欲死者用生人血即乳汁下小兒百病驚癇涎潮搐搦用龍腦膩粉蜜湯下綠豆大二丸諸積食積熱頰赤煩躁睡臥不寧驚哭瀉利並用金銀薄荷湯下更量歲數加減大人及婦人因病傷寒時疾陰陽氣變結伏毒氣胃中喘躁眼赤潮發不定七八日以上至半月未安醫所不明證候脈息交亂者可服一丸或分作二丸並用龍腦膩粉米飲調半盞下下後仍將此丸拾起水洗淨以油單紙裹埋入地中五日取出可再與一丸可用三次如要藥速行用針刺一孔子冷水浸少時服三物黃芩湯黃芩五錢苦參一兩生地黃二兩水四升煮取一升溫服多吐下蟲不得臥酸棗仁湯棗仁二升甘草一兩知母茯苓川芎各一兩狂癲癇生鐵落飲生鐵四十斤燒紅砧上鍜之有花墜地名鐵落用水二斗煮取一斗入後藥石膏三兩龍齒研白茯苓去皮防風去蘆各一兩半玄參秦艽各一兩上為粗散入鐵汁中煮取五升去渣入竹瀝一升和勻溫服二合無時日五服抱膽丸水銀二兩硃砂二兩細研黑鉛一兩半乳香一兩研細上將黑鉛入銚子內下水銀結成砂子次下硃砂乳香乘熱用柳木槌研勻丸雞頭大每服一丸空心井花水吞下病者睡時切莫驚動覺來即安再一丸可除根寧志膏人參酸棗仁各一兩辰砂五錢乳香二錢半為細末煉蜜和丸如彈子大每服一丸薄荷湯送下一醉膏用無灰酒二碗香油四兩和勻用楊柳枝二十條攪一二百下候油與酒相入成膏煎至八分灌之熟睡則醒或吐下即安矣靈苑辰砂散辰砂一兩須光明有牆壁者酸棗仁半兩微炒乳香半兩光瑩者上量所患人飲酒幾何先令恣飲沉醉但勿令吐至靜室中以前藥都作一服溫酒調一盞令頓飲如飲酒素少人但令隨量取醉服藥訖便令臥病淺者半日至一日病深者三兩日令家人潛伺之鼻息調勻且勿喚覺亦不可驚觸使覺待其自醒即神魂定矣萬一驚寤不可復治吳正肅公少時心病服此一劑五日方寤遂瘥壽星丸天南星一斤掘坑深二尺用炭火五斤於坑內燒紅取出炭掃淨用酒一升澆之將南星趁熱下坑內用盆急蓋訖泥壅合經一宿取出再焙乾為末琥珀四兩另研硃砂一兩研飛以一半為衣上和勻豬心血三個生薑汁打麵糊攪令稠黏將心血和入藥末丸如桐子大每服五十丸煎人參湯空心送下日三服天門冬地黃膏天門冬十斤湯浸二日去心生地黃肥淨者三十斤上二味安木臼內搗一二千杵取其汁再入溫湯更搗又取其汁不論幾次直待二藥無味方止以文武火熬成膏子盛瓷器內每服一匙溫酒化下無時日進三服妙功丸丁香木香沉香各半兩乳香研麝香另研熊膽各二錢半白丁香三百粒輕粉四錢半雄黃研青皮去白黃芩胡黃連各半兩黃連黑牽牛炒荊三稜煨甘草炙蓬莪朮陳皮去白雷丸鶴蝨各一兩大黃一兩半赤小豆三百粒巴豆七粒去皮心膜油上為細末蕎麵一兩半作糊和勻每兩作十丸硃砂飛過一兩為衣陰乾每服一丸用溫水浸一宿去水再用溫水化開空心服之小兒量減服十年病一服即愈若未愈三五日再服重者不過三服牛黃丸牛黃研麝香各半兩研虎睛一對蜣螂去頭足翅犀角屑安息香獨活去蘆茯神去木遠志去心甘草炙各一兩防風去蘆一兩半人參去蘆鐵粉研硃砂水飛龍齒各二兩研上為細末同研令勻煉蜜和丸搗五七百下丸如梧子大每服三十丸荊芥湯下無時楊氏五癇丸白附子半兩炮半夏二兩湯洗皂角二兩捶碎用水半升揉汁去柤與白礬一處熬干為度研天南星薑製白礬生烏蛇酒浸各一兩全蠍炒二錢蜈蚣半條白殭蠶炒一兩半麝香三字研硃砂二錢半水飛雄黃水飛一錢半為細末生薑汁煮麵糊丸如桐子大每服三十丸溫生薑湯送下食後服五癇通明丸用羊肝一具肥牙皂一斤去筋皮水三碗同羊肝煮乾去肝將牙皂焙乾為末半夏六兩每個切四塊箭頭硃砂一兩五錢同半夏炒黃色去硃砂南星生二兩黑牽牛二兩微炒共為末薑汁丸硃砂為衣每七十丸薑湯下忌魚雞母豬牛羊等肉方後附錄七方大方有君一臣三佐九之大方病勢大而邪不一不可以一二味治者宜之有分兩大而頓服之大方肝腎及下部病者宜之肝腎下部位遠若小劑徐呷則力微勢緩才到下部即散故必大劑急啜乃能及下也小方有君一臣二之小方病小無兼證者宜之有分兩少而徐呷之小方心肺及上肺病者宜之緩方有甘以緩之之緩方甘草飴蜜之屬有以丸緩之之緩方丸之行比湯散為遲有品味眾多之緩方品眾則遞相拘制不得各騁其性有無毒治病之緩方無毒則性純而功緩有氣味俱薄之緩方氣味俱薄則力弱故功緩急方有急病急攻之急方如中風卒厥用通關散之類有湯散蕩除之急方湯散之行比丸為速有毒藥之急方毒性上通下瀉以奪病勢有氣味俱厚之急方氣味俱厚則力猛行急按小而兼緩病在上部而緩者宜之大而兼急病在下部而急者宜之小而兼急病在上部而急者宜之大而兼緩病在下部而緩者宜之又病大者宜大小者宜小治主宜緩治客宜急各有攸當奇方有獨用一物之奇方有合奇數一三五七九之奇方偶方有二味相配之偶方有合偶數二四六八十之偶方有二方相合之偶方按王太僕云汗須以偶氣乃足以外發下須以奇乃不至攻伐太過其意蓋以奇為小方偶為大方小方治近在臟腑大方治遠在皮毛也然則奇偶即大小二方耳而復立此者蓋亦有奇大於偶者故又立此二方以見治法之變動不居耳然不必泥觀仲景桂枝湯汗以五味大承氣湯下以四味可見矣複方王太僕以複方即偶方謬也當依後人二方相合為偶數方相合為復之說又張子和引內經奇之不去則偶之偶之不去則反佐以取之之說以解複方謂復乃反覆之義蓋奇之不去則反用偶方偶之不去則覆用反佐反覆重疊以治其病也亦通十劑徐之才所定宣可去壅壅上壅也病在膈上如氣上壅而嘔噦用薑橘藿香以宣散之痰壅上膈用瓜蒂等以宣吐之中風口噤胸膈迷悶用通關散以嚏之皆是通可去滯但滯耳未至上壅也如氣滯用木香檳榔水滯用木通防己鬱滯用香附撫芎之類汪訒菴以宣與通相類改通為行水不知宣單就上部言通則兼中下二部言也補可去弱精弱以熟地蓯蓉羊肉補之氣弱以人參之屬補之泄可去閉滯但行之滯耳閉則竟不行矣如小便閉用葶藶大便閉用硝黃之類輕可去實如表邪實用麻黃湯香蘇散輕揚之劑是也重可去怯如氣怯神浮用硃砂鎮之之類滑可去著著黏著也因臟腑乾澀有所黏著而不行惟滑可以去之如大腸著用麻仁郁李小腸著用葵子滑石之類澀可去脫如汗脫用牡蠣五味腸脫用肉果訶皮粟殼津脫用五味烏梅精脫用蓮蕊血脫用地榆之類燥可去濕如濕勝用桑皮茯苓寒濕薑附胡椒氣濕蒼朮白朮濕痰半夏南星蛤粉濕熱黃連黃柏山梔之類濕可去枯濕則潤故枯燥可去服藥法則急服有通口直飲重劑治下部宜之有趁熱連飲輕劑偶劑發汗宜之緩服有趣熱徐徐小飲治肺病宜有不用氣隨津自下治咽喉病宜冷服有寒劑冷服治大熱病宦有熱劑冷服治假熱病宜熱服有熱劑熱服治大寒病宜有寒劑熱服治假寒病宜溫服有補藥溫服取溫補氣有平藥溫服病不犯大寒熱者宜空心服有五更空心服病在腎肝宜取其再睡一番藥入腎肝有早起空心服補下治下宜有空心服後即壓以食治腎恐妨心治命門恐妨肺者宜食後服有食後即服病在胸膈者宜有食遠方服病在中脘者宜或病在胸膈用峻下藥恐飲食方在胃口下早致胸結者亦宜臨臥服有服後正臥病在胸膈素有積者宜有服後左右側臥病在左右肋使藥直至病所有服去枕臥病在肺及在膈以上者宜一二滾服發散治上病者宜百十滾服溫補治中脘病者宜濃煎服治下部病者宜已未午初服於陰中引提陽氣宜補中益氣湯提瘧湯皆是煎藥用水歌急流性速堪通便宣吐回瀾水即逆流水最宜百沸氣騰能取汗甘瀾勞水意同之流水杓揚萬遍名甘瀾水又名勞水黃齏水吐痰和食霍亂陰陽水可醫見霍亂新汲無根皆取井將旦首汲曰井華水無時首汲曰新汲水出甃未放曰無根水除煩去熱補陰施地漿解毒兼清暑掘牆陰黃土以水入坎中攪取漿澄清用臘雪寒冰治疫奇更有一般蒸汗水如蒸酒法蒸水以管接取倒汗用之奇功千古少人知功堪汗吐何須說滋水清金理更微肺熱而腎涸清金則津液下澤此氣化為水天氣下為雨也腎涸而肺熱滋陰則津液上升此水化為氣地氣上為云也蒸水使水化為氣氣復化水有循環相生之妙用之最精

body:
  text: 卷之二雜症傷風寒附鼻淵有卒倒等症為中無卒倒等症為傷下各篇仿此甚者遍傳經絡已見傷寒論此言其輕淺者邪止犯皮毛皮毛為肺之合皮毛閉則肺氣不得外泄故上壅而嚏蒸成涕液壅塞鼻中故聲出重濁肺氣鬱而成熱故肺癢而咳其人平素體氣寒者則無汗熱者則有汗或發熱或不發熱或頭痛或不頭痛蓋雖輕症其中又分輕重也虛者參蘇飲見發熱實者川芎茶調散此症與鼻淵相似而不同傷風屬肺有噴嚏且為寒邪故涕清鼻淵屬腦故無噴嚏且系熱邪故涕濁甚則有穢氣鼻出血蓋鼻淵屬風熱入腦熱氣湧涕傷鼻兩孔氣出如火痛或成瘡熱不得泄傷及所過營血則衄矣初起蒼耳散散之久病熱深防風通聖散見中風清之衄者犀角地黃湯見血涼之鼻孔痛成瘡豬膽汁調冰硼散見口塗之此醫宗金鑑云爾然鼻淵屬腦熱云無嚏於理未的詳欠嚏篇可見矣破傷風或破損或瘡潰風從破處入郁遏正氣為熱理同傷寒而或甚者以曾經去血挾虛也故多搐痙等症先須辨瘡口平而無水者止於鬱熱而已若腫而出水則熱鬱而蒸成濕矣脈浮在表宜汗羌活防風湯九味羌活湯表解後以白朮防風湯補之脈弦者半表半裡宜和解小柴胡湯見寒熱羌活湯地榆防風散脈沉實不大便在裡宜下大芎黃湯江鰾丸後服羌活湯發表藥宜辛涼不宜辛熱服風藥過多汗不止者白朮黃耆湯搐痙不已蠲痙湯凡痙搐須養血潤燥加引經藥背後搐者羌活獨活防風甘草面前搐者升麻白芷獨活防風甘草兩旁搐者柴胡防風甘草右搐加滑石右屬脾濕也手足顫掉不已硃砂指甲散頭目青黑額上汗珠不流眼小目瞪痛不在瘡處者傷經絡也並不治亦有瘡熱鬱結多著白痂瘡口閉塞氣不宣通鬱熱生風者此為內風但須清熱解鬱外治法初於人家糞堆內或爛草房上取蠐螬蟲一枚捏住其背待蟲口吐水就抹在瘡口上覺麻即汗出立愈或玉真散敷之或杏仁去皮細嚼和雄黃白麵敷腫消為度牙關不開蜈蚣一條焙乾研末擦牙吐涎立蘇傷暑熱盛傷氣壯火食氣也又氣為汗泄則益耗散矣脈大而虛氣虛故脈虛其症自汗面垢背惡寒氣從汗泄則陽虛背屬陰陽微故惡寒也口乾前板齒燥熱氣從口出故前齒燥煩悶或頭痛火上攻也發熱熱外盛也神思怠倦殊甚暑傷氣而不傷形寒則傷形血脈為寒所滯也故身體不痛與傷寒異又與溫熱病相似而異此脈虛彼脈實也又與濕溫相似而異此身熱而渴彼身涼不渴也此症首在察汗之多少汗少則熱盛於裡而傷其內氣肺氣傷必喘乏人參白虎湯見發熱脾氣傷則四肢困倦不欲食人參白虎湯多用甘草腎氣傷則津液涸小便少六味地黃湯加知柏見虛損又暑先入心心屬火以類相從就燥之義也觀柴干則先燃濕則後灼可見心氣受熱而浮心血受熱而燥證見心煩口乾辰砂五苓散見傷濕硃砂安神丸見煩躁加黃連小腸為心之府五苓利心經暑毒使從小便出為治暑上劑益元散尤佳暑氣攻裡腹內作痛小便不通生料五苓散加木香七分或益元散大便不通者加味香薷飲見中暑仍佐以三黃丸見發熱暑毒客於上焦胸膈痞塞湯藥至口即出不能過闗或上氣喘急六和湯浸冷調入麝香少許暑氣久不解遂成伏暑內外俱熱煩躁自汗大渴喜冷香薷飲加黃連一錢繼進白虎湯見發熱若不愈暑毒深入結熱在裡譫語煩渴不欲近衣二便結澀調胃承氣湯見大便不通或三黃石膏湯伏暑煩渴多熱痰者消暑丸每兩入黃連末二錢名黃連消暑丸或二陳湯見痰或小半夏茯苓湯見痰並可加黃連一錢自汗手足厥冷六和湯蘇合香丸見諸中自汗手足時搐搦者謂之暑風緣汗出毛孔開風乘之火得風煽益虐筋脈枯急故也香薷飲或香薷湯並見中暑並加羌活一錢痰盛者風火交煽則痰湧盛六和湯星香散見中風各半帖暑月身癢如針刺間有赤腫處亦名暑風風邪留於皮膚熱不得泄故癢痛六和湯為末和消風散見頭痛酒調服汗多則熱泄於外陽衰於中真氣耗散宜急收其汗人參黃耆白朮五味也屬以溫中固表為宜又大汗不止亡陽且令腎水竭絕津液內枯是為亡陰急當滋水之上源三伏之義為庚金受囚也金遇丙丁失其清肅故孫思邈謂夏宜常服五味瀉丙以補庚恐金氣為熱所甚散故斂之斂之即補也壬水絕於己癸水絕於午西北寒清絕矣故前人立法謂夏月宜補乃補天元之真氣非補熱火也令人夏食寒是也生脈散見中暑主之如兩足欹側腳膝痿弱行步不正是痿也加酒洗黃柏知母令兩足湧出氣力東垣謂熱傷元氣四肢不收兩足痿軟遇早晚則寒厥日高之後陽氣將旺復熱如火乃陰陽氣血俱不足故陰虛而熱厥陽虛而寒厥也熱盛則陰虛氣傷則陽亦虛也口不知味肝熱則口酸心熱則口苦肺熱則口辛腎熱則口咸脾熱則口甘或淡是為口中不和則不知味又氣虛則食不化傷食之人亦不知味也目中溜火肝火上透也視物䀮䀮無所見精神恍惚也小便頻數大便秘結熱在下焦胃脘當心痛氣虛不運或食或痰或死血滯於胃脘或痛胸中閉塞時顯嘔噦皆不運之故或有痰嗽金受火刑口沃白沫腎水上泛腰背腹皆痛甚則如刀刺腹皆氣血凝滯之故頭痛時作火上攻兩脅痛肝氣鬱或急縮臍下周圍如繩束之急帶脈血枯筋縮食不下或食入即飽全不思食火氣脹悶自汗尤甚若陰氣覆在皮毛之上氣弱陽不外伸兼汗多漬體使然皆熱傷元氣所致黃耆人參湯主之又察其有無別邪如冒暑飲酒酒熱與暑氣內盛發熱大渴小便不利其色如血生料五苓散風傷濕去桂加黃連一錢或以五苓去桂吞酒煮黃連丸如傷食者其人頭痛背寒氣為食鬱不達於背也畏食噁心噫酸臭氣胸膈痞滿六利湯倍砂仁若因暑渴飲冷致暑毒留結心胸精神昏憒語音不出者寒閉熱於肺管故聲不出香薷湯見中暑化蘇合香丸見諸中若先飲冷後傷暑者此必心下痞憹五苓散生薑湯調服佳或君子湯見氣調中亦可中和後或小便不利或莖中痛宜蒲黃三錢滑石五錢甘草一錢又暑每兼濕時當長夏濕熱大勝蒸蒸而熾人感之四肢困倦精神短少懶於作動小便黃赤者熱也支節疼痛大便溏泄身體沉重者濕也脈洪大熱也而濡或遲濕也須以清熱燥濕之劑治之東垣清暑益氣湯謂熱傷氣故以黃耆益氣固表為君人參甘草為臣蒼朮白朮澤瀉等滲利除濕升麻葛根解表熱兼勝濕風藥也故能勝濕濕熱壅滯則食不消而痞滿炒曲青皮消食快食氣亂於胸中清濁相干陳皮理之黃柏以瀉熱救腎人參五味麥冬救金以滋水之上源為佐血虛加當歸氣鬱加升柴中滿去甘草咳去人參咽乾加乾葛血減心煩加人參陽能生陰也當歸少加黃柏瀉火如煩猶不止加黃連然苟非兼濕則諸利水之品反足以耗竭腎水致損兩目慎之東垣又謂風犯汗眼汗閉不出為濕身重體痛或渴或不渴小便不利此風濕相搏也頭痛或上熱壅盛心煩情思慘淒有不樂生之意陰濕之情狀如此所謂陽舒陰慘也此陰勝陽之極也病甚則傳為痿厥厥者氣逆上衝也痿者四肢痿軟無力也由濕鬱成熱熱極上衝而厥筋脈受傷則痿也利濕清熱為宜矣清燥湯可用又傷暑後復感風寒者身痛頭疼發熱去衣則凜著衣則煩感風則有汗五苓散見傷濕內用桂枝感寒則無汗六和湯加藿香紫蘇市井中多此症往往日間冒暑經營夜間開窗眠臥所致有此症而發潮熱似瘧而未瘧者六和湯養胃湯見瘧各半帖若鼻流清涕或鼻孔熱氣時出者亦六和湯加川芎五分羌活黃芩各七分以上皆夏月感受暑邪而為其所傷者也昔人所謂動而得之為陽症者是也有不必動而得者感其熱氣即病也益元散又有因避暑貪涼而反為寒涼所傷者或納風涼以傷其外或食瓜果以傷其內因而頭痛發熱惡風無汗昔人名此為中暑或又名為中暍名目混亂故削其名而存其症症似傷寒此為陰寒所遏周身陽氣不得伸越也治宜辛涼發散辛溫消導此全未傷暑而感風寒者與上文先傷暑續感風寒不同昔人所謂靜而得之為陰症者也暑月多食生冷忽受暑邪熱入於內陰陽錯雜冷熱相搏中氣擾動上壅則吐下迫則瀉故多吐瀉霍亂嘔不止者枇杷葉散見中暑去茅根吞來復丹見中暑嘔而痰卻暑散見中暑吞消暑丸或小半夏茯苓湯見痰飲嘔而渴者浸冷香薷湯見中暑或五苓散見傷濕兼吞消暑丸瀉而渴生料平胃散見傷食生料五苓散各半帖名胃苓散或連理湯即理中湯加黃連白茯苓也理中湯見中寒瀉止仍渴春澤湯即五苓加人參或縮脾飲見中暑瀉而腹痛有積者生料五苓散霍香正氣散見中暑各半帖雖無積而腹痛甚氣滯也生料五苓散加木香七分或六和湯加木香五分或用二湯調蘇合香丸見諸中瀉而發熱者胃苓散如吐利不止外熱內寒煩躁欲裸形此陰盛格陽香薷飲加附子或大順散加參附並浸冷服又有吐極胃虛粒米不入病甚危篤者人參一錢黃連五分薑汁炒焦糯米一撮水一茶鍾煎至一酒杯候冷與一茶匙許漸漸與之與盡便可投藥食暑月人多服香薷飲以預防之若元氣素虛或房勞過度者服之為害不淺若飲預防惟生脈散為宜暑病多陰證死而肢體爪甲青黑者是也故治暑之劑多用溫熱傷濕雨露本乎天清陽也故傷於上止犯皮毛汗多衣濕不換致濕氣返入於內者同之泥水本乎地濁陰也故傷於下侵及骨肉二者皆自外入飲食之濕脾土所生之濕本乎人皆自內出在外在上者汗之以苦溫甘卒之劑辛散濕苦燥濕甘溫益氣以散邪在內在下者利之以苦熱酸淡之品恐其上行故用酸以斂而降之以淡泄之治飲食之濕在上則吐之在下則瀉之食濕則瀉大便利之飲濕則利小便治脾土所生之濕則察其兼化蓋土德兼該挾風則為風濕走注者是挾火則熱濕煩熱者是挾寒則為寒濕痹痛者是又上下中外無處不到在上則頭重胸滿嘔吐在中則腹脹痞塞在下則足脛胕腫在外則身腫重骨節痛當分部位為治隨所兼寒熱溫涼以用藥又須察其為何臟之邪如自病土虛生濕則補土如火盛生濕則清心如氣鬱成濕則升肝如金寒水冷泛溢為災則暖腎所治之藥各從所入不特二術也其症發熱惡寒惡濕身重自汗骨節疼小便秘澀大便多泄腰腳痹冷跗腫肉如泥除濕湯見中濕若兼腰痛特甚不可轉側如纏五六貫錢重者濕入腎也腎著湯滲濕湯小便秘大便溏五苓散吞戊己丸見瀉若兼感風則證兼惡風或額上微汗除濕湯桂枝湯各半帖令微發汗不可大發已得汗而發熱不去者敗毒散加蒼朮一錢防己五分若兼感寒則無汗慘凜煩痛五積散見中寒和除濕湯見中濕五苓散各半帖若感寒又感風者汗出身重惡風喘滿骨節煩痛狀如歷節風臍下至腳冷痹不能屈伸所謂風寒濕合而為痹也防己黃耆湯或五痹湯見痹若浴出未解濕裙褲忽爾熟睡濕侵腎經外腎腫痛腰背彎曲五苓散加入真壞少許下青木香丸見氣三服臟腑通腫消腰直痛止坐濕處腎丸腫痛六味地黃見損虛加柴胡吳茱萸肉桂各一錢獨活五分若濕與熱相搏清熱滲濕湯其證肩背沉重疼痛有熱則上行於肩背也上熱胸膈不利及通身疼痛者拈痛湯見身體痛濕熱發黃當從郁治凡濕熱之物必鬱而後黃逍遙散勿用茵陳五苓酒面乳酪停滯不化除濕湯及蒼白二陳湯消息之即二陳加二術二陳見痰飲上吐下利二法利比吐為多以濕水也多就下又利大便小便二法利小便比利大便為多以濕非挾痰食等濁物者皆當由小便出也故曰利濕不利小便非其治也燥濕三法風以勝之風動而地干也羌防等土以涸之水得泥干也苓朮等酸以收之斂約不使氾濫也肉緊縮則不糟黃丹白礬等肉緊實則水不能藏不得不從二便泄去濕脈必緩兼浮為在表兼沉為在裡兼弦為風濕兼數為熱濕兼遲為寒濕通用蒼朮茯苓豬苓木通木瓜石斛在上加防風在中倍蒼朮在通身加烏藥羌活在兩臂加桑枝威靈仙在兩足加牛膝萆薢防己寒濕雖暑月亦覺清冷加虎骨官桂血必虛加當歸傷燥經曰諸燥枯涸幹勁凡物之乾燥者必硬勁皴揭皴裂也揭掀起也凡物乾者其皮必皴裂而掀起皆屬於燥燥為肺金之化秋令也所以致燥有二一因於寒秋風清肅夏令之濕至是而干所謂風勝濕也一因於熱夏時熱盛有濕以潤之至秋則濕退而熱猶未除故燥所謂燥萬物者莫熯乎火也其因於熱者固熱矣即因於寒者亦未始非熱何則秋令降斂陽氣內入寒氣外束故每當秋涼多覺口鼻氣熱是其理也此言天時之致燥也若或亡血亡津腎虛火盛致此多端則又屬於人事矣在外則皮膚皴揭枯澀在上則鼻咽焦乾在下則二便涸澀在手足則痿弱無力血不榮筋所致在脈則澀滯虛衰治以甘寒潤劑清肺以滋水源庶幾血充液滿澤及百骸滋燥養榮湯大補地黃丸清涼飲子導滯通幽湯潤腸丸二方見大便不通八正散見淋皆可隨證選用也內經每云秋傷於濕蓋運氣之說以立秋處暑白露三氣屬濕土也畢竟傷燥者多春溫溫瘧風溫溫毒濕溫溫春陽之氣也時至春而陽氣發動人應之身中之陽氣亦發動一遇風寒外襲閉其腠理此氣不得升發即鬱而為熱與冬月傷風寒發熱無異而有惡寒不惡寒之分者以冬時陽氣潛藏表陽虛故怯寒春月陽氣升發表陽盛故不怯寒也無汗者當發散然冬月陽微可用辛溫春月陽盛宜用辛涼仲景麻黃湯止為冬月傷寒立法不可混施於此證也經謂冬傷於寒春必病溫又謂冬不藏精春必病溫又謂凡病傷寒而成熱者先夏至為病溫後夏至為病暑程郊倩謂冬傷於寒寒字當腎字看蓋腎水屬冬其氣寒故古人往往言腎為寒如言肝為風言脾為濕之類細閱前代醫書自見冬傷寒云云謂耗傷腎水陰精泄而不藏陰虛則火炎至春陽氣發動炎炎之勢不可遏止一為風寒所郁故溫熱病生耳然豈特不藏精者乃然哉即在平人當春陽氣升發感受風寒鬱而成病者固多金鑑謂能藏精者其病輕不藏精者其病重韙矣或曰經言溫瘧謂得之冬中風寒氣藏骨髓中至春則氣大發寒鬱火成熱因春陽而發為溫瘧也即先夏至為病溫之意邪不能自出句上當有若字因遇暑氣腦髓灼肌肉消言熱至骨腠理開發此五句言若春時邪猶不能發至夏乃發也即後夏至為病暑意或有所用力邪氣與汗皆出此病藏於腎先後內出於外也如是者陰虛而陽盛盛則熱矣衰熱氣衰也則氣復返入入則陽虛虛則寒矣陽氣發泄太過則表虛而怯寒表怯寒則氣斂而內返氣內返則表愈虛故寒也明是言冬時觸寒子何敢程說耶曰禮記謂言非一端而各有當各求其當可也風溫即春溫之重者仲景曰太陽病發熱而渴不惡寒者在冬月傷寒則為陽明經證為熱病春月感冒邪在太陽即得此證不俟傳至陽明乃見故知為春溫病也發汗已發汗則熱泄應愈矣身灼熱者名風溫熱盛得發表之劑其勢益揚如風之煽火愈加熾盛也風溫為病脈陰陽俱浮自汗出風溫原本有汗由內熱熾盛蒸發之故較春溫內熱不甚而無汗者為重矣身重壯熱傷氣無氣以動故重多眠睡鼻息必鼾熱壅神昏也語言難出氣傷懶言若被下者小便不利亡陰泉竭直視精不榮於目也失溲陰不守於內也若被火者微發黃色火上加火熱濕欲發黃而熱多濕少故微黃也劇則如驚癇熱極生風時瘛瘲筋為熱灼干縮而抽搐也若火熏之一逆尚引日再逆促命期大抵風溫忌汗亦不宜下裡熱未實者不宜尤不宜火當用雙解散去麻黃加桂枝石膏余謂桂枝不必加春溫無汗雖宜解表然必兼清裡雙解散審其表裡之重輕為加減可也雙解散乃防風通聖散合六一散也金鑑稱其神效加減用之可也此方雖內犯芒硝大黃然泄熱莫速於此且分兩有限不至太下無傷也前人云溫熱證誤下不妨誤汗則殆硝黃可用則用之可不用則去之是在臨證斟酌耳風溫汗太多脈虛者桂枝湯見傷濕合人參白虎湯見發熱溫病兼暑證名溫毒治法不出上條濕溫即溫病挾濕者其證身重胸滿多汗兩脛冷白虎湯加蒼朮茯苓瘟疫病論瘟疫非傷寒也世醫誤以為傷寒矣傷寒感天地之常氣此感天地之厲氣也邪自口鼻入內不客臟腑外不客經舍於伏脊之內去表不遠附近於胃乃表裡分界是為半表半裡針經所謂橫連膜原是也凡邪在經為表在胃為里今邪在膜原正當經胃交關之所病之始發凜凜惡寒甚則厥逆陽熱鬱極而通則厥回而中外皆熱始而惡寒既而發熱非若傷寒發熱而兼惡寒也瘟初起先憎寒後發熱頭痛身疼脈洪而數其脈不浮不沉蓋以邪在膜原故也不可認為傷寒表證而發其汗邪不在經汗之徒傷又不可下邪不在裡下之無益宜達原飲疏之檳榔二錢厚朴一錢草果五分知母一錢芍藥黃芩各一錢甘草五分午後溫服上檳榔厚朴草果三味消滯破結協力並逐使邪氣速離膜原後四味為滋液和血清燥和中之用按此湯初起可用若病成熱熾用此恐無濟有表者宜用河間雙解散無表者宜用東垣二聖救苦丹以及涼膈白虎黃連解毒普濟消毒等劑俱對證之藥酌用可也其邪氣遊溢諸經不同本方加減法脅痛耳聾寒熱嘔而口苦邪溢於少陽也加柴胡一錢腰背項痛邪溢於太陽也加羌活一錢目痛眉稜骨痛眼眶痛鼻乾不眠邪溢於陽明也加乾葛一錢若不見三陽經證不必加藥止照本方以上論初起用達原飲服此藥其邪不傳裡者一二劑自解其證候頭痛身痛發熱而復凜凜但內無胸滿腹脹等證穀食不絕不煩不渴此邪氣外傳由肌表出或自發斑消或從出汗解斑有斑疹桃花斑紫雲斑汗有自汗盜汗狂汗之異此病氣使然不必較論但求得斑得汗為愈病耳此邪自外傳順證也勿藥亦能自愈其有汗出不徹而熱不退者宜白虎湯生石膏一兩知母甘草各五錢粳米一撮服此藥辛涼解散或戰汗或自汗而解蓋前服達原飲毒結漸開邪氣已離膜原尚未出表然內外之氣已通故多汗脈長洪數故宜白虎辛涼散之也其有斑出不透而熱不退者宜舉斑湯白芍當歸各一錢升麻五分白芷柴胡各七分穿山甲二錢炙黃水姜煎服其有斑汗並行而熱不除者宜白虎合舉斑湯斑汗既愈一二日或四五日後依前發熱無胸滿腹脹等證脈洪而數此膜原有隱伏之邪發未盡也勿藥一二日間當仍自汗自斑而愈未愈者仍依前法治之然亦少有至於再三發者更少有也以上論邪傳表若服達原飲而無汗無斑外亦無頭疼身痛惟胸膈痞滿此邪傳裡也有欲吐不吐者有得少吐不快者邪傳裡之上也宜瓜蒂散吐之甜瓜蒂一錢赤小豆二錢研生梔仁二錢用水二鍾煎至一鍾後入赤豆煎至八分先服四分一時後不吐再服盡吐之如未盡煩滿尚存者再煎服如無瓜蒂以淡豆豉二錢代之此病飲食不能胸膈煩而腹不滿吐之則邪減邪盡病自已有心腹脹滿不嘔不吐或燥結便閉或熱結旁流或協熱下利或大腸膠閉邪傳裡之中下也宜承氣湯大黃五錢厚朴一錢枳實一錢芒硝二錢若但上焦痞滿無便結等病去芒硝即小承氣湯也然雖無結糞而大便黏膩極臭者亦加之若不痞滿止便結者去厚朴枳實芒硝用二錢五分加甘草一錢即調胃承氣湯也服此導去其邪邪減病自減邪盡病自已有胸膈滿悶心腹脹滿下部熱結膠黏者此上中皆病也不可吐吐之為逆但用承氣湯則上邪順流而下嘔吐立止脹滿漸除其有吐後下後既愈二三日或四五日依前復發者在上者仍用吐藥在下仍用下藥此為再里之證常事也甚有三發者亦少有以上論邪傳裡若服達原飲後或病失治而三陽證悉具里證亦具又舌根先白胎至此時根黃至中央此表裡分傳也其證外則身熱頭痛身疼腰背項痛眉稜痛口苦耳聾鼻乾內則胸膈心腹滿悶下部熱結此瘟病常事也斷不可強求其汗宜用承氣湯先通其里里邪去則氣通乘勢盡發於肌表矣若表裡證悉去而熱仍不退此膜原之邪未盡也宜三消飲檳榔草果厚朴白芍甘草知母黃芩大黃乾葛羌活柴胡薑棗煎服調之可愈服藥既愈三兩日復發者仍用三消飲復下復汗如前而愈此亦常事也至有三發者亦少有若表邪多里證少當治表兼治里三消飲大黃少用若里證多表證少但治里或吐或下表證自愈以上論表裡分傳若始病但發熱頭痛身疼口苦鼻乾而內無里證止宜達原飲加減法若不見三經病止於發熱不用加法繼而脈洪大數自汗而渴邪離膜原未能出表也宜白虎湯辛涼解散脈靜身涼而愈愈後數日依前發熱仍宜達原飲至後反加胸滿腹脹不思食煩渴舌上刺等證皆由表傳裡也達原飲加大黃微利之久而不去在上者用吐方在下者用承氣下方若始則發熱漸加里病既用承氣等湯下之而里病除矣數日內復發熱反加頭痛身疼此由里出表也脈浮者宜白虎湯下後熱減不甚熱雖無頭痛身疼而三四日後精神不慧脈浮者亦宜白虎湯汗之若服白虎湯不得汗者因精液枯竭也加人參覆臥則汗解若大下後大汗後表裡證悉去矣繼而一身盡痛身如被杖甚則不可轉側周身骨寒而痛氣血虛故痛耳非表證也當自愈以上論表裡遞傳瘟病備用諸方天行大頭發熱頭項腫或喉痹腫痛芩連消毒湯柴胡甘草桔梗川芎黃芩荊芥黃連防風羌活枳殼連翹射干白芷上方先入大黃利去一二次後去之加人參當歸牛蒡姜煎服時行風瘟寒熱身頭痛咳嗽神朮散藁本羌活甘草白芷細辛蒼朮川芎薑蔥煎感冒聲啞是浪子瘟敗毒散羌活獨活前胡柴胡枳殼茯苓川芎乾葛甘草桔梗一鄉人皆感冒咳嗽亦是瘟用敗毒散一鄉人多發熱內熱逐瘟湯黃連戊癸年倍黃芩乙庚年倍黃柏丙辛年倍甘草甲己年倍山梔丁壬年倍香附紫蘇等分大黃三倍加硃砂雄黃為丸亦可湯則冷服嵐瘴溪毒中人病發則迷困躁狂或聲啞此敗血毒涎乘脾也玄妙散人參枳殼大黃柴胡黃芩半夏甘草腫頭傷寒玄黃闢瘟丹玄參大黃連翹牛蒡各一錢酒黃芩酒黃連各二錢五分羌活荊芥防風各五分石膏桔梗各錢半甘草一錢食後作二十次頻服蝦蟆瘟類傷寒身生濃泡疹子防風通聖散防風當歸川芎白芍連翹薄荷麻黃各四分石膏桔梗黃芩各八分白朮梔子荊芥各三分滑石二錢半大黃芒硝各四分甘草一錢瘟疫雜病論汗論不得汗雖被覆火灼亦無邪初發定在半表半裡至於傳變有出表者有入里者有表裡分傳者凡見有表復有里之病必先攻裡里邪去而後得汗若裡氣壅滯陽氣不舒四肢且厥安能氣液蒸蒸以達長此如水注閉其後竅不能涓滴凡見表裡分傳之證務宜承氣裡氣一通不待發散多有自能汗解不然者雖大劑麻黃湯連進非惟一毫無汗且加煩躁矣戰汗邪先表后里忽得戰汗經氣舒泄當即脈靜身涼煩渴頓除若應下失下氣消血耗欲作戰汗但戰而不汗者危以中氣虧敝但能陷降不能升發也次日當期復戰厥回汗出者生厥不回汗不出者死以正氣脫不勝邪也戰而厥回無汗者真陽尚在表氣枯涸也可使漸愈戰而不復忽痙者必死凡戰不可擾動但可溫覆擾動則戰而中止次日當期復戰凡戰而汗不出宜大劑歸地加參內托自汗不因發散自然汗出邪欲去也若身熱大渴脈長洪而數宜白虎湯得戰汗方解若下後得自汗數日不止熱甚汗甚熱微汗微此表有留邪實病也邪盡汗止如不止者柴胡湯佐之表解汗當自止設有三陽經證當照前用本經藥加減法若誤以認表虛自汗用實表止汗之劑則誤矣有里證時當盛暑宜白虎湯若面無神唇刮白表裡無陽證喜飲熱畏冷脈微忽自汗為虛脫夜發晝死晝發夜死急當峻補補不及者死大病愈後數日每飲食及驚動即汗此表裡虛怯宜人參養榮湯人參麥冬五味子地黃歸身白芍知母陳皮甘草黃耆倍加盜汗里證下後得盜汗者內有微邪也凡人目瞑衛氣行於陰今內有伏熱兩陽相搏則腠理開而盜汗出若伏熱一盡盜汗自止如不止柴胡湯佐之柴胡三錢黃芩一錢陳皮一錢甘草一錢生薑一錢大棗二個煎服愈後脈靜身涼數日後反得盜汗及自汗屬表虛宜黃耆湯黃耆三錢五味三錢當歸白朮各一錢甘草五分仍不止加麻黃根一錢五分如有熱者屬實不宜用此狂汗邪將去而欲汗解因其人稟素壯陽氣盛不能頓開三句當改云陽浮盛於表躁擾不寧忽然坐臥不安發狂躁少傾大汗而躁止脈靜身涼霍然而愈發斑邪留血分裡氣壅閉則伏邪不得外透為斑若下之內壅一通則衛氣疏暢透表為斑而邪外解矣若下後斑漸出不可更大下設有宜下證少與承氣湯緩緩下之若復大下中氣不振斑毒內陷則危宜托裡舉斑湯白芍當歸各一錢升麻五分白芷柴胡各七分穿山甲炙黃二錢水姜煎服如下後斑漸出復大下斑毒復隱反加循衣摸床撮空理線脈漸微者危本方加人參一錢補不及者死若未下而先發斑者設有下證少與承氣湯須從緩下熱結旁流久痢清水奪液不得汗疫證失下或挾熱下利脈沉久不下之致津液枯竭後雖下里證去矣脈雖浮宜汗而不得汗此為奪液無汗然里邪既去但得飲食少進十數日後中氣利下當作戰汗而解可滋其陰陰液內充外溢自然得汗下論舌白胎邪在膜原也若變黃胎邪入胃也胎黃宜下黑胎邪毒在胃宜下下後二三日黑皮自脫有一種但舌黑而無胎此經氣非下證也妊娠有此陰證亦有此不可下經血瘀熱或寒凝皆舌黑以在經不在胃故無胎故不可下下后里證去而舌尚黑胎皮未脫不可再下若無下證設見離離黑色者危急補之舌芒刺熱傷津液此疫毒最重者急下之若老人微疫無下證舌上乾燥生胎刺用生脈散生津潤燥胎刺自去舌裂日久失下多有此證急下裂自滿舌短舌硬舌卷皆邪氣盛真氣虧急下之舌自舒白胎乾硬如砂皮急下之唇燥裂唇焦色唇口皮起口臭鼻如煙煤胃熱多有此證當下鼻孔煤焦急下之若唇皮起仍用別證互較慎下之無遽也口渴詳有下證者下之邪去而渴自減若用生津止渴藥無效也如大汗脈長洪而渴未可下宜白虎湯汗更出而身涼渴止目赤咽乾氣噴如火小便赤黑作痛小便臭揚手躑足脈沉數皆內熱也當下之心下滿心下高起如塊心下痛腹脹滿腹痛按之愈痛心下脹痛皆宜下氣通則已頭脹痛詳有下證者下之若初起頭痛別無下證未可下小便閉行大便則小便通利水藥無益也大便閉下之無辭若老人及素弱人用蜜膽導法大腸膠黏下之自愈協熱下利宜下四逆脈厥體厥此氣閉也宜下之下後反見此證者為虛脫宜補脈厥無脈也體厥身冷也下後諸變證論下後脈浮既下矣脈浮而微數身微熱神思或不爽此邪熱浮於肌表雖無汗宜白虎湯汗解之若大下數下脈空而數按之如無白虎湯加人參覆杯則汗解似當加歸地下後脈浮而數宜汗不得汗或遷延五六日脈證不改終不得汗或素有虧虛也亦或利久使然用加人參白虎湯得汗而解下後脈復沉既下脈宜浮是汗解兆也今不汗而脈復沉餘邪復入胃也宜更下之更下後脈再浮仍當汗解宜白虎湯下後病愈數日復發熱此非關飲食勞役勿歸咎於病人也此餘邪匿而復發必然之理再少下之即愈勿用大劑也下後身反加熱下後當身涼今反加熱此結開而氣通郁陽伸越也即如爐中伏火撥開雖焰不久自熄此與下後脈反數義同若無下證而妄下之過早者其發熱乃病勢原當逐漸發熱非因誤用承氣更加發熱也日後邪氣傳胃有下證者宜更下之下後脈反數應下失下口燥舌乾而渴身熱反減四肢時厥欲得近火擁被此陽氣壅伏也既下矣厥回不冷脈大而加數舌亦不乾渴此里邪去陽氣暴伸也宜柴胡清燥湯柴胡黃芩陳皮甘草去花粉去知母加葛根隨其性而升泄之下後數日舌上覆生胎刺邪未盡也再下之胎刺未去然已軟但熱渴未除更下之胎刺既去日後又熱仍宜下之其中或緩或急或輕劑或重劑或兼用柴胡清燥湯犀角地黃湯至投承氣湯或宜多與或宜少與宜臨證斟酌下後病全愈但腹中有塊按之痛氣時不利常作蛙聲此邪氣盡而宿結未除也不可攻徒損無益待胃氣平復自能潤下或滋陰下潤自通能食者新致則陳自推下後腹滿去思食知味而熱未除脈近浮此表尚有餘邪也當得汗解如不汗以柴胡清燥湯和之復不得汗者以漸而解也勿苛求其汗戰汗後復下後越數日腹痛不止欲作滯下也勿論已見病未見病宜芍藥湯白芍當歸各一錢檳榔二錢厚朴一錢甘草七分裡急後重加大黃三錢紅積倍白芍白積倍檳榔下後自汗不止詳自汗下下後盜汗詳盜汗下下後斑漸出詳發斑下下後斑出復下斑反隱詳發斑下下後或數下亡陰瘟病有宜下者不得已數下之致兩目澀舌枯乾津不到咽唇口燥裂由其人素多火而陰虧今重亡津液宜清燥養榮湯知母花粉當歸身白芍陳皮地黃汁甘草燈心煎服如熱渴未除里證仍在宜承氣養榮湯知母當歸白芍藥生地大黃枳實厚朴姜煎服如表有餘熱宜柴胡養榮湯黃芩陳皮柴胡甘草當歸白芍生地知母花粉薑棗煎服如痰涎湧甚胸膈不清宜貝母養榮湯知母花粉栝蔞仁貝母橘紅白芍當歸蘇子姜煎服忌參術下後餘熱不能頓除以膜原之邪未盡傳胃故也當寬緩兩日以柴胡清燥湯緩劑調理下後反痞下後痞應去而反痞者虛也其人素弱或新病初起脾失健運故也再用行氣藥則非矣宜參附養榮湯當歸白芍人參炒乾薑各一錢生地黃三錢炮附子七分若果是虛一服必愈虛實宜辨表雖微熱脈不甚數口不渴者是虛痞若潮熱口渴脈數者是實痞實痞宜再下之用此則大害下後反嘔下後嘔宜去而反嘔此胃氣虛寒少食便吞酸宜半夏藿香湯一服嘔止半夏一錢半藿香炮薑陳皮白茯苓白朮各一錢甘草五分姜煎服下後脈浮宜汗不得汗見奪液不得汗條下後奪氣不語下後氣血俱虛神思不清惟向里睡似寐非寐似寤非寤呼之不應此正氣奪也與其服藥不當莫如靜守宜人參養榮湯補之能食者自然虛回前證自愈設不食者病轉加法當峻補瘟病兼證論吐蛔此胃熱也必非臟寒烏梅丸理中湯萬不可用但用調胃承氣蛔自愈蓄血疫久失下血為熱搏敗為紫黑溢於腸胃漱水不咽小便利大便黑是其候也宜桃仁承氣湯大黃芒硝桃仁當歸芍藥丹皮服此藥熱除為愈若餘熱尚存者宜犀角地黃湯地黃五錢搗爛加水絞汁其渣入鍋煎白芍一錢半丹皮一錢犀角一錢同地黃汁服發黃疫邪傳裡移熱下焦小便不利邪無輸泄經氣鬱滯而發黃身目如金宜茵陳湯菌陳一錢山梔二錢大黃五錢姜煎服循衣摸床撮空理線筋惕肉瞤肢體振戰目睛不了了皆為耽擱失下或用緩藥覊遲之故此元神將脫也補之則毒甚攻之則氣已虛危證也不得已勉用黃龍湯大黃厚朴枳實芒硝人參地黃當歸或用人參養榮湯亦可但虛候少退即宜屏去勿久用也服藥不受額汗肢冷振戰心煩坐臥不安此中氣虧不能勝藥也名藥煩急投薑湯立已或藥中多加生薑煎服則無此狀矣更宜均藥為兩三次服以防嘔吐服承氣湯全不行或次日方行或半日仍吐原藥此因中氣虧不能運藥也大凶之兆宜加生薑人參以助胃氣然有病重劑輕亦致不行不在此例思冷飲熱渴甚也勿論四時宜量與之若盡意飲則水停心下矣虛煩坐臥不安手足不定六脈不顯尺脈不至此元氣不能主持法當大補神虛譫語未下之前譫語必有內熱煩渴之證此為實病宜下既下之後數日內譫語不止此元神未復也急宜清燥養榮湯協熱下利泄瀉稀糞色必赤黃或焦黃此胃不留邪也一二日利止熱退為病愈利不止者宜小承下之而利自止若利止一二日忽煩渴又泄此伏邪又發也仍照前治大便閉結內熱故也宜下之諸病如失呃逆有寒有熱以本證參之熱則白虎承氣寒則四逆湯熱結旁流先便閉後純利清水全無糞此糞結於內也宜承氣湯下結糞而利自止若服藥後結糞不下仍利臭水邪猶在也病必不減再下之大腸膠閉極臭如黏膠而卻不結此熱極也不下即死小便赤色胃熱也宜調胃承氣湯小便急數白膏如馬遺膀胱熱也宜豬苓湯豬苓二錢澤瀉一錢滑石五分甘草八分木通一錢車前二錢小腹按之硬痛小便自調此蓄血也桃仁湯桃仁三錢丹皮當歸赤芍各一錢阿膠二錢滑石五分脈厥神色不敗言動自如別無怪證忽六脈如絲甚至於無或一手先伏此失下氣閉故也宜承氣湯緩緩下之六脈自復忌生脈散愈後諸證論愈後大便久不行作嘔不進食此下格病也宜調胃承氣熱服下宿結而嘔止愈後數日腹痛裡急此下焦伏邪欲作滯下也宜芍藥湯白芍當歸厚朴各一錢檳榔二錢甘草七分愈後大便數日不行別無他證此虛燥也切不可攻宜蜜導法甚則宜六成湯當歸一錢半白芍麥冬天冬各一錢地黃五錢肉蓯蓉三錢日後更燥宜六味丸減澤瀉愈後五更夜半作瀉其脈遲細而弱此命門陽虛也宜七成湯故紙三錢炮附白茯苓人參各一錢五味八分甘草五分愈後更發者八味丸倍加附子愈後微渴微熱不思飲食此正氣虛也強與之即為食復漸進稀粥以復胃氣愈後能飲食肢體浮腫此氣復也胃氣大健則浮腫消勿誤為水氣若小便不利而腫乃是水腫宜濟生腎氣丸愈後因勞而復發熱宜安神養血湯茯神棗仁白芍藥當歸遠志桔梗地黃陳皮甘草圓眼肉愈後傷食吞酸噯氣而復熱輕則少食重則消導自愈若無故自復此前邪未盡除也稍與前證所服之藥以徹其餘邪自愈婦人小兒瘟病論經水適來而瘟邪不入胃入於血室至夜發熱譫語或止夜熱而不譫語宜柴胡湯柴胡黃芩半夏甘草生地經水適斷而瘟宜柴胡養榮湯與適來有虛實之別妊娠瘟病宜下者照前法下之毋惑參朮安胎之說而用補藥則大凶矣但下藥得下則已勿過劑也小兒瘟病遇時氣盛行發熱目吊驚搐發痙是也宜太極丸天竺黃膽星各五錢大黃三錢麝香三分冰片三分殭蠶三錢糯米飯丸如芡實大硃砂為衣凡遇疫證薑湯下一丸神效補遺病論疫兼痢發熱身痛渴躁滿吐最為危急宜檳芍順氣湯檳榔白芍枳實厚朴大黃生薑煎服疫兼水腫宜小承氣下之陽證似陰外寒而內熱則小便必赤最易辨也陰證似陽此傷寒有之瘟病無有也瘧內經論瘧謂生於風蓋外感風寒邪在太陽陽明屬表則發熱在少陽屬半表半裡則寒熱往來觀傷寒論可見瘧疾往來寒熱邪在少陽也故仲景有瘧脈自弦弦數多熱弦遲多寒之說喻嘉言亦謂邪在少陽或兼他經證則有之謂他經而全不涉少陽則不成其為瘧故不論兼有何脈皆不離弦之一字以弦乃少陽脈也然傷寒少陽證往來寒熱無定期而瘧病往來寒熱有定期者以彼止受感無形之邪風風者善行數變故無定期此雖亦感無形之邪風然必郁成有形之痰涎留滯一處與日行之衛氣相遇邪正交爭乃作故有定期也古謂無痰不成瘧以此夫瘧由於痰滯而痰之滯也豈獨由於風寒一切外感內傷皆能致之故又謂無食不成瘧以食滯成痰也外感以風寒為舉隅內傷以食為舉隅所當推廣以求之者也又推之外感內傷既能鬱熱蓄痰獨不能停濕滯血而為是證乎此楊仁齋所以有黃水瘀血之論也問曰痰血留滯之說深為有理然嘗見痰滯血凝結為瘡腫發為寒熱亦無定期且或有不發寒熱者何也曰瘡腫初起發寒熱者必其邪盛勢大者也邪盛勢大連踞表裡無時不與衛氣相遇旋滯旋通旋通旋滯故無定期其後不復發寒熱者以日久正氣另闢行徑不與之爭也說見積聚若其初亦不發寒熱者必其瘡腫之小者乃然小邪不足以滯大氣也經曰陽並於陰則寒並兼併為一之義衛氣與邪相爭正為邪滯內郁不通不達於表則表寒不行於里則裡寒內外皆寒似純陰無陽者然故曰並也河間謂並於陰乃陽氣入於陰分亦即內郁之說陰並於陽則熱陽郁成熱郁久則伸內熱外達內外皆熱似純陽無陰者然寒時毛髮豎立欠伸遍體寒慄鼓頷陽並於陰則陽虛陽明虛則鼓頷以陽明脈循頰車也高鼓峰謂熱鬱將發火氣衝突元氣走散故寒凜與經少異然亦通腰背頭項俱痛太陽虛也太陽脈抵腰夾背上額交巔下項中外皆寒此非真寒乃陽郁之寒耳湯火不能溫也則此時不必用溫藥可知熱時內外皆熱冰水不能寒也此時不必用涼藥可知此段皆經文有一日一作而或日早或日遲者按內經謂風邪所客視其虛而入之如腰脊虛則入腰脊手足虛則入手足風府虛則入風府因舉入風府者以例之風府穴名在項上陷中邪客風府有淺有深淺者衛氣日行於表與淺分之邪相遇夜行於里則不與遇矣深者反此故每日一遇如今日卯時與遇明日卯時又與遇也衛氣到則肉理開邪氣之在風府者得以入之正不客邪相爭而病作矣此邪氣留滯其處著而不行者故每日如期而發若邪氣行而不著每日循夾脊之膂下行一節自風府至尾骶骨共二十五節則風府之邪計二十五日下行至骶骨與衛氣每日離一節故其作日遲如今日卯時衛氣到風府與適在風府之邪遇而病者明日卯時衛氣又到風府與已離風府而下行一節之邪不相遇則必待衛氣追及邪氣相遇乃作故日遲也邪氣二十六入於脊內注於伏行夾脊膂間之脈其氣上行無關節之間隔故九日而上出於缺盆之中衛氣從腹上行從背下行伏膂之脈亦背也下行之衛氣迎上行之邪氣故其作日早也此內經之說如是然有忽早忽晏又忽復早者則邪氣忽上忽下忽淺忽深行無一定之故也豈必下盡二十五節乃始上行乎發於晝者為陽邪淺在陽分也發於夜者為陰邪深在陰分也日早者邪由深出淺也日晏者邪由淺入深也經言上下不言淺深者以衛氣晝行於表夜行於里即是言淺深耳有間一日而作者有間二日而作者有間數日而作者皆邪氣深入陰分逼近臟腑橫連膜原膜原者膈膜之處空曠若平原邪正可以並容阻礙不甚故久滯乃發也靈樞歲露篇所謂蓄積乃作也發於子午卯酉日為少陰經瘧發於辰戌醜未日為太陰經瘧發於寅申巳亥日為厥陰經瘧舊說如此不必泥按衛氣遇邪之說經言不一而足又一條云夏傷於暑熱氣藏皮膚之內腸胃之外此營氣之所舍也能令人汗孔疏熱舍營分蒸汗故也腠理開暑邪若可泄矣因得秋氣至秋而感冒寒氣也汗出遇風及遇水感寒些言或當時遇風浴水不必致秋乃感寒氣藏膚內暑邪不得泄矣或謂暑邪已從汗泄此言寒邪內藏耳然經又謂夏暑汗不出秋成風瘧當從前說為是與衛氣並居相遇即並居衛氣日行陽夜行陰此氣暑氣得陽而外出得陰而內搏暑邪在陽分則外爭在陰分則內爭也內外相搏或在外或在內與衛氣相迫搏故曰作是亦以衛氣為言也乃又出一條云夏傷於暑汗出腠開遇夏氣悽清之水寒吳鶴皋謂水當作小藏於皮膚至秋復傷於風先傷於寒為陰邪後傷於風為陽邪故先寒後熱名寒瘧若先傷風后傷寒則先熱後寒名溫瘧詳其意是言陽風與陰寒相爭而為寒熱往來全與衛氣無涉果爾則遇時可作何必每日一作耶且風寒無大分別無論冬月即當暑令得風則涼是風亦即寒也而謂風為熱氣可乎其說可疑必後人之偽託也又經論溫瘧先熱後寒謂得之冬中風寒氣藏骨髓中此與內經所言冬不藏精之人外感風寒深入骨髓鬱熱於內精不藏則腎水先虛熱伏則腎水益涸至春夏遇風寒發為溫暑病意同至春則氣大發寒鬱成熱因陽氣而大發也邪不能自出邪深藏也因遇暑氣腦髓爍肌肉消言熱至骨也腠理開發或有所用力邪氣與汗皆出此病藏於腎先從內出之於外也如是者陰虛而陽盛盛則熱矣衰熱衰也則氣復反入入則陽虛虛則寒矣陽氣發泄太過則表虛而怯寒表怯寒則斂而內返氣內返則表愈虛故寒也此亦不言衛氣與邪遇且與上條所論溫瘧先傷風后傷寒故先熱後寒不同豈溫瘧固與他瘧不同特以其有寒熱與瘧相類故亦以瘧名之其證自有兩種耶安得起作內經者問之有經瘧內經曰足太陽膀胱經之瘧腰痛頭重寒從背起太陽脈抵腰上頭夾背也先寒後熱刺郄中郄中即膕中太陽脈易老用羌活加生地黃湯小柴胡加桂枝湯足少陽膽經之瘧身體解亦身體解惰名解亦寒不甚熱不甚陽並於陰自外之內則寒甚陰並於陽自內之外則熱甚少陽在半表半裡往來不遠非若他經之大出大入故其寒熱不甚想當然耳惡見人見人心惕惕然少陽以膽為腑經虛則腑亦虛故見人而恐也熱多汗出甚少陽木火升發使然刺本經易老用小柴胡湯足陽明胃經之瘧先灑淅寒甚久乃熱熱去汗出喜見天日火光陽明受陽邪則惡日與火若受陰邪則反喜之汗出熱泄陽氣乍虛雖原受陽邪亦喜之矣刺跗上本經衝陽穴易老用桂枝二白虎一湯黃芩芍藥加桂湯足太陰脾經之瘧不樂好太息脾脈不運則上焦氣不行故不樂而太息以舒之不嗜食氣不化故不飢多寒熱汗出病至則嘔嘔已乃衰脾脈絡胃夾咽故善嘔刺本經穴易老用小建中湯異功散足少陰腎經之瘧嘔吐甚腎脈上貫肝膈循喉嚨故也多寒熱邪入深故多熱多寒少水虛也欲閉戶牖而處腎陰衰故惡躁喜靜其病難已刺法失易老用小柴胡加半夏湯足厥陰肝經之瘧腰痛少腹痛小便不利肝脈過陰器抵小腹故也非癃也小便淋名瘧數便言小便頻數澀短不利非淋也噫肝氣鬱故噫以舒之恐懼肝有餘則怒不足則恐也氣不足腹中悒悒不快之意氣不足則不得舒暢也刺本經易老用四物柴胡苦楝附子湯以上論別足六經證不言手六經以足經長而遠可包手經故此與傷寒並單舉足經言非病必不涉於手經也可以意推按瘧分六經又分臟腑正與衛氣行陽行陰或淺或深與邪相遇說合則泥定少陽一經者非矣然歷騐瘧證在少陽經者居多此仲景嘉言所以專主少陽立說也有臟瘧內經曰肺瘧心寒肺金本清肅寒邪加之益寒故心覺寒冷寒甚熱熱間善驚如有所見者心近肺心血為熱耗故神不安刺太陰肺經及手陽明大腸經兩經相表裡故分刺以殺其熱易老用桂枝加芍藥湯按五臟不受邪而經列此五臟證者蓋有臟氣素虛之人為七情所傷臟氣不行因郁痰飲諸邪於內而成瘧也心瘧令人煩心欲得清水反寒多不甚熱熱在裡故外不甚熱而多寒刺本經易老用桂枝黃芩湯肝瘧色蒼蒼然太息木氣不暢故太息以達之其狀若死者木為春生之氣不舒而閉也刺本經見血易老用四逆湯通脈四逆湯脾瘧寒腹痛熱則腸鳴鳴已汗出刺本經易老用小建中湯芍藥甘草湯腎瘧洒洒然腰脊痛腰脊屬腎宛轉大便難腎主二便故也目眴眴然欲瞑也傷寒論少陰病但欲寐即此意按眴瞬同目動也無欲瞑意此解恐非手足寒刺本經及足太陽膀胱經表裡並刺也易老用桂枝加當歸芍藥湯有腑瘧內經曰胃瘧善飢而不能食胃熱故飢脾虛故不能食食而支滿腹大支支撐之意刺本經及足太陰脾經橫脈二經絡脈之橫者出血此論胃腑瘧證不言諸腑可以意推傷寒論亦止言胃腑以諸經之邪皆得入胃也大抵因風寒者先必有怯寒鼻塞等證宜發散若春時感風寒成溫瘧者必渴必汗出不惡寒熱多寒少多先熱後寒熱多陽盛陽性急故先發熱衰而退表氣乍虛故微覺寒宜白虎湯因傷暑者必多汗煩悶喘渴體若燔炭宜加暑門之藥煎成露一宿乃熱之而服感燥氣者必膚索唇揭咽乾鼻燥宜滋潤之劑感濕氣者必身重而痛小便不利宜去濕因時氣者必一方長幼病皆相似審系何氣之邪治之因飲食所傷者證見痞悶惡食噯腐小柴胡湯見寒熱合平胃散見傷飲食便結者大柴胡湯加芒硝厚朴因氣鬱者必面色青滯脈澀脅痛嘔吐清水或苦水意不樂逍遙散見郁加黃連吳茱萸水浸炒貝母倍柴胡因勞倦者必氣虛喘乏四肢困倦遇勞即發補中益氣湯見氣經年不愈邪結痞塊脹痛曰瘧母以上均審所蓄之邪是痰是血是黃水分別治之又須看熱多寒少熱少寒多以分寒熱然熱多寒少而脈空虛未可便用寒涼熱少寒多而脈洪數未可概用溫熱又當細察也此外又有純寒無熱者曰牝瘧蜀漆散牡蠣湯主之或柴胡薑桂湯減黃芩加半夏蓋其人素寒所蓄之痰飲亦寒與衛氣相觸寒氣發動純陰無陽故但有寒無熱也又有純熱無寒者曰癉瘧緣肺氣素熱陽氣盛所蓄之痰涎亦熱才遇衛氣之觸熱勢即便激發也令人消爍脫肉經云陰氣先絕陽氣獨發言肺熱偏於陽而無陰也則少氣壯火食氣也煩冤煩熱不安也手足熱而欲嘔小柴胡合白虎湯又有感山嵐瘴氣濕熱熏蒸而為瘴瘧者王裴曰南方天氣暑熱地氣鬱蒸草木水泉皆稟惡氣故病者往來寒熱名冷瘴蘊熱沉沉如臥炭火中者名熱瘴甚者病即失音名啞瘴熱甚晝夜不止稍遲二三日則血凝難救南方謂之中箭又謂之中草子有挑草子法乃以針刺頭額及上下唇仍以楮葉擦舌皆令血出徐以藥解其內熱可愈楊仁齋曰瘴瘧挾嵐瘴溪毒之氣致然血乘上焦令人迷悶甚則狂躁啞不能言皆由敗血瘀心毒涎聚脾治須涼膈疏通大腸小柴胡加大黃觀香丸治瘴木香丸皆為要藥僧繼洪曰冷瘴宜用不換金正氣散見中寒熱瘴宜用挑草子法此病最難治涼藥多不可用句未妥涼藥雖恐冰血獨不可加辛散之品乎熱藥亦不可輕用且與和解可也啞瘴即熱瘴之甚者血得寒則凝澀得熱則淖溢面赤心熱舌破鼻衄皆熱沸血壅所致故宜用挑草子法出其血甚則血上塞心竅啞不能言但噫噫作聲即啞瘴也治此皆當散血用黑神散見血立散黑神散須慎用其或痰迷心竅而舌強者不在此論又有似瘧非瘧者如傷寒邪在少陽經往來寒熱似瘧而無定期或一日二三遍且熱已即寒寒已即熱相繼不息不似瘧之有定期有息時也又虛人亦有往來寒熱經云陽虛則外寒陰虛則內熱陰氣上入陽中則惡寒本身下焦陰寒之氣上干陽分則惡寒陽氣下入陰中則發熱上焦陽氣下陷陰中則發熱故亦有往來寒熱似瘧而實非瘧病後產後多有之必由積漸虛損而致與瘧之發於陡然者不同且亦忽作忽止無有定期與瘧之不爽其期者又別也按瘴瘧亦有無定期者不可不知治法無汗鬚髮汗散邪為主丹溪謂外邪必用汗解惟足厥陰最難得汗其汗至足方佳大率取汗非必用麻黃輩但開鬱通經邪即散而為汗矣有汗當斂汗扶正為先新發邪實者可汗吐下久病正虛者宜補氣血稍久而正虛邪滯者宜一補一發若深入於陰分者宜先升後汗至若邪乘虛入則宜以發散祛其客邪然後扶持胃氣痰食氣滯則先以消導散其壅滯然後漸補脾元諸瘧發過三五次表裡之邪皆清即宜截之凡用藥病正發時當避其銳氣於未發前二時服咳嗽火刑肺金燥癢不能忍因咳咳因癢癢因火燥是咳必有火然有虛實之分不可概用寒涼嗽因於痰痰本脾濕脾熱則濕蒸為熱痰脾寒則濕泛為寒痰熱者挾火作癢而咳嗽並見寒者無火不作癢但嗽出其痰而已故古人分有聲無痰為咳非必無痰也以咳因於癢不因於痰故不言痰也有痰無聲為嗽非必無聲也以嗽本欲出其痰非因火逆作聲故不言聲也有聲有痰為咳嗽也分外感內傷二證皆以肺為主外感邪從皮毛入皮毛者肺之合也皮毛受寒則汗孔為寒所凝閉而肺氣內郁成熱或皮毛受熱亦傳入於肺而肺熱此固以肺為主若內傷火炎火性親上不論何臟腑之火皆得上干於肺故亦以肺為主也外感以有咳嗽為輕蓋肺氣雖郁尚能通也故鼻流清涕鼻癢而嚏喉癢而咳若郁甚熱壅不能上通則鼻乾且塞無噴嚏咳嗽之證矣蓋郁不甚者尚欲外散與上通甚則不外散而內攻不上通而下郁也內傷以有咳嗽為重如肝腎之火其初止病下焦未遽上干也久而炎熾乃及於肺則病重矣若肺火自盛者不在此論傷風消風寧嗽湯肺火素盛之人易於傷風以肺有火則常汗出腠開邪易入又內火盛略被遏郁即熱也治宜解表兼清其火金匱咳而上氣喉中水雞聲痰飲與氣相觸成聲射干麻黃湯上氣肺脹喘目如脫謂喘咳之甚目突欲出也脈浮大越婢加半夏湯上氣喘而急燥屬肺脹欲作風水詳腫脹門發汗則愈小青龍湯見痰加石膏咳而脈浮者厚朴麻黃湯以散外邪脈沉者澤漆湯以逐內飲時行咳嗽發熱惡寒鼻塞氣急初病即伏枕一二日即輕俗名蝦蟆瘟參蘇飲見發熱加細辛五分外感風寒失於解表久不愈因而咳血醫誤以勞證治之清金降火頻進寒涼外寒未解內寒又生纏錦日久遂致委頓假勞變成真勞俗云傷風不愈變成勞者此也此最當察醫貫云肺經受寒血凝不行咳嗽隨痰而出其人必惡寒其脈必緊其血必有或紫或黑數點此亦有火證不可執用麻黃桂枝湯微汗而愈者數人蓋汗與血一物也奪血者無汗奪汗者無血若作陰虛火動治殆矣感風者鼻塞聲重傷冷者悽清怯寒挾熱則煩躁受濕則重滯有血則膈間腥悶停水則心下怔忪夏月火盛宜滋水清金黃連必用感濕者身體重痛小便不利或有汗白朮酒見中濕秋燥宜潤杏仁栝蔞之屬有冷熱相兼者因增減衣服寒熱俱感遇乍寒亦咳遇乍熱亦咳飲熱亦咳飲冷亦咳肺火素盛者亦如此宜金沸草散消風散見頭痛合煎或款冬花散以薄荷葉代麻黃聲暴啞者寒包火也宜辛涼解散有痰壅於肺者金實則不鳴也必清肺中邪滯清咽寧肺湯咳而聲嘶杏仁煎潤肺丸清音丸有熱咳失聲咽疼多進冷劑而聲愈不出者生薑汁調消風散見頭痛少少與之然失音非獨實證有之宜審察佐以橄欖丸含化仍濃煎枇杷葉散見中暑熱服凡外感風寒治宜辛散所謂肺欲辛也若發散太過或形氣病氣俱虛即宜補內傷者陰虛火旺治宜甘潤最忌辛香所謂氣病毋多食辛也然虛中有實者亦宜行滯火鬱肺經氣分喘咳面腫身熱無痰瀉白散見發熱若面赤咳出血是火鬱血分加黃芩生地內熱甚者加黃連咳急嘔逆脅痛者肝火也加青皮青黛等若喘而面浮不得臥者是有痰飲水氣加苦葶藶以瀉之肺燥宜潤二冬貝母阿膠雞子清之屬痰因燥難出加栝蔞仁喘加杏仁動則喘滿氣急者肺脹也甚則胸高骨昂或左或右不得眠此痰夾瘀血礙氣為病四物湯見血加桃仁訶子青皮竹瀝薑汁韭汁之屬壅遏不得眠者難治咳久肺脹宜收斂訶子為主佐以海石香附童便浸三日用栝蔞仁青黛半夏曲杏仁薑汁蜜調噙之初病外感肺脹見前金匱二條忌收斂凡訶子五味五倍烏梅粟殼等皆收後之品初病切勿用也痰嗽痰出嗽止痰甚者外作寒熱痰多而清為寒實多而稠黏為熱實並壅閉正氣寒實者透羅丹熱實者瀉肺丸痰積非青黛栝蔞不除凡咳嗽面赤胸腹脅常熱惟足有涼時脈洪熱痰在胸膈也小陷胸湯見胸痛礞石滾痰丸見痰或用張子和法吐下之尤快面白悲嚏或脅急脹痛脈沉弦遲細者寒痰在胸腹也半夏溫肺湯食積痰作嗽發熱者半夏南星為君栝蔞萊菔子為臣青黛石減為使食積人面青白黃色不常面上有如蟹爪路一黃一白者是治酒嗽青黛栝蔞蜜丸噙救肺飲冷熱酒或冷水傷肺致咳紫菀飲飲酒傷肺痰多栝蔞杏仁青黛黃連為丸竹瀝煎入韭汁吞之若慮太寒遏火先以辛散之後以酸收之甚者吐之後與五苓見傷濕甘露見霍亂等勝濕去痰之劑醫貫謂肺為嬌臟畏熱畏寒火刑金固咳腎水虛火上炎者六味丸水冷金寒亦嗽若腎火虛下焦寒逼火上浮乘肺肺熱而咳雖不可云金寒然是虛熱亦同寒治八味丸有脾胃先虛不能制水水泛為痰乘肺而嗽者又有初雖心火刑金因服寒涼傷脾肺虛而嗽者須用六君子見氣加炮姜以補脾肺八味丸見虛損以補土母又謂王節齋云酒色過度損傷真陰者不可服參耆此說大是誤人予遇此證先以六味見虛損壯水降火隨以參耆救肺使金水相生而愈世之用寒涼者固非知用參耆而不知先壯水者亦非致陽火旺而陰愈傷乃不識先後著也凡咳嗽動引百骸覺氣從臍下逆奔而上者腎虛氣不歸元也安腎丸等勞嗽有因久咳嗽而成勞者有因病勞而咳嗽者其證寒熱往來或獨熱潮熱盜汗咽喉干痛精神疲睏痰或濃或淡或帶血腥語言不出保和湯滋陰清化丸五汁膏並可用乾咳無痰乃火鬱之證不得志之人多有之用苦梗開之逍遙散更妙次用滋補之劑四物湯見血加炒柏竹瀝等不已則成勞經年累月服藥不瘥余無他證卻與勞嗽不同宜保肺一味百部膏桑枝煎必效散噙化丸並可用凡咳嗽上半日多陽火也陽火旺於陽時痰稠黃二陳見痰加貝母石膏竹茹下半日多陰火也起於下焦痰青黑黏滯四物湯見血加炒柏知母或知柏八味丸黃昏咳多火氣浮於肺也肺氣當降時而不得降火浮故也不宜涼藥當以五味五倍等斂而降之又黃昏睡熟中忽嗽痰數口食積痰也睡則脾靜不運故痰停於內而嗽前證火咳此證痰嗽也二陳見痰山楂麥芽消導自已五更清晨嗽亦為痰停理詳痰門咳亦屬火火空則發也每日寅時氣血注肺其時空心無所阻礙故火隨氣乘空上浮二陳加黃芩桔梗桑皮日輕夜重屬陰虛二陳加當歸喘哮喘謂呼吸迫促勞動之人多有之如奔走則氣喘是也其在病機則氣之上奔也古人又以短氣名之謂呼吸之氣短促也然有實喘虛喘之分所當詳辨實者有邪邪氣實也虛者無邪正氣虛也實喘之狀張口抬肩搖身擷肚胸脹氣粗聲高息湧惟呼出之為快也虛喘之狀氣少而不續慌張短怯聲低息微皇皇然若氣之欲斷似喘不抬肩似呻吟而無痛呼吸雖急而無痰聲是也實喘有由於外感者六淫外邪壅閉肺氣以致胸滿上喘也有由於內傷者七情五志之動火酒食痰濕之鬱熱上壅於肺而喘也又有一等火鬱甚者其上衝作喘與諸實喘無異而陽氣內郁之極不能暢達以致四肢厥逆六脈伏澀按之鼓指此不可以熱藥投亦不可以寒藥下用寒則火愈郁惟逍遙散見郁加茱連宣散蓄熱得汗即愈愈後六味見虛損調之虛喘有由於陽虛者肺氣實則能清肅下行脾氣實則能健運四布虛則不能運行下降而但浮越於上也有由於陰虛者肝腎陰虛兼水火言則火上炎乃真元耗損命門之火自下上衝也其人平居若無病但覺喘乏察其脈數大而虛或微而無力者是也東垣曰華佗云盛而為喘活人亦云喘為氣有餘然盛而為喘者非肺氣有餘也氣盛當認作氣衰有餘當認作不足肺氣果盛當清肅下行而不喘以火入於肺肺氣衰乃喘耳故盛者非肺氣盛也乃火邪盛也故瀉之以苦寒非瀉肺氣也瀉肺中之火即所以補肺氣也按東垣所言固是然壯盛之人忽為邪襲者有之未可便言氣衰也但喘則氣越亦必漸虛矣丹溪謂新病屬實久病屬虛按新病亦有虛者如其人本虛而忽感風寒是新病亦有虛也久病亦有實者如其人痰塞肺竅久而不開喘何由除是久病亦有實也實喘治法傷風寒者五虎湯三拗湯定喘湯華蓋散寒束熱成痰者陳皮湯天寒加桂枝乍進乍退得食則減痰為食所墜下也食已即喘是痰火桔梗二陳湯動作便有痰聲是痰定喘湯加栝蔞三服後照痰證治之甚者神仙住喘湯止喘而無痰者為氣實喘蘇子降氣湯見氣甚者加葶藶前胡七情鬱結上氣喘急實者四磨飲四七湯並見氣諸實喘並忌斂澀升補燥熱酸咸之劑宜降氣清火潤肺辛散如蘇子桑皮枇杷葉前胡烏藥枳殼半夏山梔元參知母青黛黃芩貝母二冬花粉杏仁海石橘紅皆可用若脈洪實遍身痰氣火氣坐臥不得宜黃連膏水氣喘者水氣逆行肺氣得水而浮觀浴河者水浸至胸則喘可見喘不能臥葶藶大棗湯桂苓朮甘湯見痰飲等或汗之是濕者滲濕湯見傷濕暑熱喘者白虎湯見發熱栝蔞枳殼黃芩食喘者凡病初起即喘急多是停食也或放屁甚者或咬人消食自愈小兒行走氣急作喘多是食食喘兼外感散邪消食經有胃喘一證謂胃絡不和氣逆作喘胃氣本下行二陽脈亦從頭走足若不下行而反干乎上則氣喘逆然所以致逆者非火則食與痰耳審治之又有肺積名息賁賁奔同肺氣結滯成積則呼吸之息上奔在右脅下如覆杯令人喘咳發肺癰詳積聚門虛喘治法肺氣虛者人參五味阿膠之屬人參為末雞子清投新水調下一錢勞即喘者胡桃不去衣九錢人參一錢杏仁去皮尖二錢薑棗煎帶渣服去大便一次即愈昔有二人同行一含人參則不喘不含者喘可見虛宜補腎水虛者相火由衝任直衝而上非四物所能治寒涼所能制其痰為腎水所泛溢亦非竹瀝枳半所能化必用六味見虛損加門冬五味大劑煎服水升火降喘自定若腎火虛者下焦陰寒之氣逼其浮陽上越作喘外證面赤戴陽煩躁脈浮大而數去死不遠用助元接真鎮墜之藥尚可回生然不可峻驟且先以八味丸見虛損黑錫丹見呃逆養正丹見氣之類煎生脈散見中暑送下覺氣稍定然後以大劑參耆破故紙阿膠牛膝等以鎮於下又以八味加河車為丸遇飢則服方可保全火從衝任逆上則胃氣之下行者亦從之逆上矣東垣用調中益氣湯見勞倦加吳茱萸湯洗去苦味用然須治腎為是再按古人以短氣即喘而分實喘虛喘具如前說若依後人分短氣與喘為二則以短氣為虛喘而喘單就實者言未為不可也參看短氣少氣篇哮者喉間痰氣作響以胸中多痰黏結喉間與呼吸之氣相觸成聲得之食味酸鹹太過幼時多食鹽醋往往成此疾俗謂之鹽哮滲透氣管痰入結聚一遇風寒氣鬱痰壅即發其發每在冬初必須淡飲食行氣化痰禁涼劑恐風寒難解禁熱藥恐痰火愈熾蘇子桑皮枳殼青皮半夏前胡杏仁山梔必用八九月內用承氣預下其熱使冬時無熱可包是妙法哮久用青皮一個劈開入巴豆一粒扎定瓦上炙黃每服三五分姜酒下愈後用半夏八兩石膏四兩蘇子二兩丸服又方雞子略擊破殼不可損膜浸尿缸內三四日夜煮吃效能去風痰也或貓屎燒灰砂糖湯調下皂莢去皮弦子蜜炙二錢明礬一錢杏仁一錢紫菀桑皮炙草石菖蒲半夏各二錢白醜頭末一錢膽星一錢五分百部熬膏丸綠豆大每服七十丸遇厚味即發者清金丹短氣少氣二者古人不甚分別如東垣謂二者皆氣不足戴復庵謂短氣者呼吸不來語言無力宜補虛於進藥外選壯盛人吸氣噓其口中以助之此與素問謂怯然少氣者言而微終日乃復言此氣奪也乃少氣不足以言有以異乎是以二者同屬之虛也亦有分短氣為實者如仲景論胸痹短氣為實是痞滿篇又論短氣皆屬於飲見痰飲篇是以短氣為實也蓋水飲痰食諸實邪足以阻礙正氣氣本不少因為邪阻上壅而呼吸喘急古人多以短氣為喘可見不得如平氣之舒和悠長故謂之短耳此但去其邪邪去氣自舒矣須分別觀之噯氣即經所云噫氣由氣不得舒故噯以出之理與呃逆通彼則氣閉而逆沖自作響以出此則氣滯而不沖故藉噫以出之也經以心為噫痹論所謂心痹者脈不通煩則心下鼓暴上氣而喘嗌乾善噫又謂刺中心一日死其動為噫者是也王太僕解心噫之義謂象火炎上煙隨焰出又屬脾氣不舒經所謂太陰腹脹善噫者是也觀飽食則噯可見呃逆即內經所謂噦氣自下衝上而呃呃作聲也經謂諸逆衝上皆屬於火然必有所閉遏乃然有為寒氣所閉者有為熱氣所閉者有為水飲痰食及血諸有形之物所閉者景岳譬之雨中之雷陽為陰蔽奮出於地而有聲也水中之浡氣為水覆上出為浡汩汩作聲深得其理予嘗吸菸入喉胃口乍閉每每作呃故知熱氣亦能閉也丹溪治陳超越因飽食後奔走絡傷血內溢矣患呃逆但食物則呃百餘聲食物質濁血之屬也半日不止飲酒與湯則不作酒水質清氣之屬也至晚發熱血屬陰血病故夜發脈澀數以血入氣中治之猶云血覆氣上用桃仁承氣湯見血加紅花煎服下汙血數次而愈又治一女子大吐頑痰而愈故知血食痰皆能閉也有發於中焦者脾胃之氣被閉也有發於下焦者肝腎之氣被閉也氣為陽陽屬火治須撤閉散火而有實火虛火之分實者利之清之散之虛者補之無病而呃者不必治也即治不過用內經刺鼻取嚏或閉息不令出入或驚之之法皆可立已若有病而呃者形氣壯實別無惡候審其致閉之邪去之亦即已惟病重得此多為氣脫凡見其呃自丹田而上久久乃一聲密頻相連者為實久久一聲者為虛通身振動者即是危候恐難治矣此先天命門真火欲脫多不救與黑錫丹灸關元傷寒吐汗下後與瀉利日久誤服寒涼者理中湯見中寒產後丁香散傷寒熱病便燥脈數承氣湯見大便不通氣為寒閉未郁成熱者柿錢散丁香柿蒂散羌活附子湯氣逆而虛者陳皮竹茹湯痰飲者二陳湯導痰湯並見痰加薑汁竹瀝陽虛自汗者參附湯陰虛火炎者參附煎湯下大補陰丸偶然呃一二日不止者木香調氣散見中氣灸法男左女右乳下黑盡處一韭葉許灸三壯甚者二七壯欠嚏呵欠者必伸腰故又名欠伸經謂衛氣晝行於陽夜行於陰陰主夜臥陽主上陰主下故陰氣積於下陽氣未盡入行於陰陽引而上陰引而下陰陽相引故數欠此從陽之陰由動入靜之機也一人病吐血鬥余煩躁不得臥證甚危迫延予至時已半夜聞其欠聲予曰不死矣知陰猶在也藥之而愈經曰陽氣和利滿於心出於鼻故嚏河間謂鼻中癢因氣噴作聲鼻為肺竅癢為火化火甚則痛微則癢也火干於肺發於鼻故癢而嚏也或以物擾鼻亦嚏者擾者亦屬火也或視日而嚏者太陽火曜於目熱氣內通於鼻癢而嚏也仲景云其人清涕出發熱色和者善嚏即傷風淺證風在皮毛郁其陽氣於肺氣盛化涕以出鬱勃而嚏也色和謂病淺耳可見嚏由氣盛鬱勃使然故陽虛者無嚏得嚏則為佳兆傷飲食此以飲食過度留積不化者言若飲食衰少不足之證見下勞倦篇飲者或寒或熱或過飽皆能傷人飲者水也在人身屬無形之氣分多飲則氣逆水載氣上浮也觀浴者水浸至胸則氣喘可見蓋水滿於下則逼氣上浮如油在水面是也飲冷則傷肺水之寒氣上射於肺則肺氣受傷為喘咳為腫浸淫於肌膚則腫為瀉下趨則瀉輕者發汗利小便上下中外分消之重而蓄滿者芫花大戟甘遂牽牛之屬利下之言不獨利小便須二便兼利也酒者其質則濕其氣則熱飲之而昏醉狂易者熱也宜以汗去之既醒則熱去而濕存宜利小便以去之葛花解酲湯主之若不先汗而遽利小便則炎焰不肯下行濕去熱不去若動大便尤謬蓋酒之熱乃無形之氣也病在陽分而妄下之以傷其陰分是謂誅伐無過汗以辛溫從其上炎外達之性也佐以苦寒清其熱也酒疸下之久則為黑疸尤宜切戒見疸門傷酒惡心嘔逆昏眩頭痛沖和湯即參蘇飲加木香半夏茯苓湯見痰理中湯見中寒加乾葛或附子理中湯見中寒和縮脾飲見中暑酒渴縮脾飲或乾葛煎湯調五苓散見傷濕久因於酒成酒積腹痛泄瀉或暴飲有灰酒亦能致之並酒煮黃連丸見傷暑多飲結成酒癖腹中有塊隨氣上下沖和湯加蓬朮五分停為痰飲者枳實半夏湯加神麯麥芽或沖和湯加半夏茯苓解酒毒枳椇子最妙喻嘉言曰錢小魯善飲飲必醉歲無虛日嘔吐寒熱兼作骨節煩痛脈洪大促急身耎著席不能動展左腿痛如刀刺鼻煤從病起至是總未大便此癰疽之候也有謂燥金司令酒客素傷熱濕至是而發熱被斂束不得外越津液乾枯大腸失潤以清金潤燥治之或曰不然酒毒大發腸胃如焚能俟掘井取水乎必以大下為急余曰下法果勝但酒客胃氣素為多嘔所傷藥入胃中必致上湧不能下達掘井固難開渠亦不易夫酒者清烈之物不隨濁穢下行惟喜滲入者也先從胃入膽膽為清淨之腑同氣相求故也然膽之攝受無幾其次從胃入腸膀胱滲之化溺為獨多焉迨至化溺則所存者酒之餘質其烈性實惟膽獨當之是以酒至半酣雖懦夫有揮拳罵座不顧餘生之膽酒性極熱而親上心肺受之不獨膽也酒入則氣強故無所畏氣之降者屬肺升者屬肝膽肝陰膽陽酒氣乃陽升之極者故屬之膽耳膽之腑原無輸瀉而膽之熱他入可移於腦濁涕從鼻竅源源而出亦少殺其勢若小魯則陽分之陽過旺陽分之陰甚衰發髩全無直似南方不毛之地熱也極矣肯受膽之移熱乎幸其頭間多汗腦熱暗泄不為大患乃膽熱既無可宣又繼以酒之熱時之燥熱淫內熾故膽之熱汁滿而溢出於外以漸滲於經絡則身目皆黃以其滲而出也亦可轉驅而納之膀胱從溺道而消也今病獨攻環跳之穴腿痛如刀刺則病結於膽之本經不能驅使從膀胱出矣即欲針之此久傷之穴有難於扶瀉者吾更有慮焉有身以後全賴穀氣充養穀氣即元氣也谷入素少之人又即藉酒為元氣今以病而廢飲何所恃為久世之資耶吾諦思一法先搐腦中黃水出鼻次針膽穴之絡腦間者數處務期膽中之熱移從腦鼻而出庶乎上泄則下寬環跳穴中結邪漸運而腸胃之枯槁漸回然後以瀉膽熱之藥入酒中每日仍痛飲一醉飲法同而酒性異始得陰行而妙其用蓋其以生平之偏造為堅壘必藕酒轉為鄉導乃克有濟也豈清金潤燥與下奪之法能了其局乎食者物也在人身屬有形之血分傷食則胸腹痞滿噁心咽酸噫敗卵臭惡食頭痛發熱惡寒食鬱成熱上攻頭痛外蒸身熱氣不達於表故惡寒證似傷寒但氣口脈倍大於人迎及身不痛為異耳輕則消導重則吐下在上脘者吐之瓜蒂散之屬已下腸中者下之其證熱所傷之物亦熱者承氣湯見大便不通其證寒所傷之物亦寒者小七香丸料一帖姜引水煎吞感應丸或備急丸經曰上部有脈指頭部三候言下部無脈指足部三候言其人當吐不吐則死東垣謂其理同木鬱宜吐以達之以為食塞胸中太陰肺金之部分也肝木之氣為食所遏不得上升伏於脾土之中若受金之克伐者然以食在胸中肺部阻遏木氣不得升也故曰木鬱吐之則木得舒又謂肺為清陽之分如天食壅於上則天氣不得下交於地而成否地中之水源於天氣故曰水出高原氣隔於上則源絕而水不下流故下部無脈其說迂曲大抵食在胃脘之上未入於腸故宜從上越之耳又上部之氣在食之上不受遏則能運行故上部之脈亦通脈隨氣行下部之氣為食所遏不能運行故下部無脈也傷寒物者半夏神麯乾薑三稜廣朮巴豆之類治中湯加砂仁一錢下紅丸子小七香丸半夏枳朮丸寒熱不調每服加上二黃丸十丸或用木香乾姜枳朮丸丁香爛飯丸傷熱物者枳實白朮青陳麥芽黃連大黃之類上二黃丸枳朮導滯丸寒熱通用保和丸枳朮丸曲糵枳朮丸木香枳朮丸檳榔丸傷濕熱不化痞滿悶亂枳實導滯丸傷肉食濕面辛辣厚味三黃枳朮丸傷熱食痞悶兀兀欲吐上二黃丸傷濕面心腹滿悶支體沉重除濕益氣丸傷豆粉濕面油膩白朮丸食索粉片積用紫蘇濃煎汁和杏仁泥服之即散食狗肉不消心下堅或腹脹口乾發熱煮蘆根汁飲之杏仁治狗肉食魚膾生肉不化每成癥瘕搗馬鞭草汁及生薑汁飲之大抵神麯麥芽消穀食萊菔化麵食硇砂阿魏山楂消肉食紫蘇化魚蟹毒麝香消酒果積如傷冷物一分熱物二分則用寒藥二停熱藥一停隨時消息面色青黑脈浮沉不一弦而弱者傷在厥陰肝經受寒物之郁也當歸四逆湯見厥加吳茱萸或生薑之類主之面紅赤脈浮沉不一細而微者傷在少陰腎受寒物所傷逼火於上故面紅通脈四逆湯見厥面色黃脈浮沉不一緩軟也而遲者傷在太陰理中丸湯見中寒主之此條皆溫藥凡脾脈微洪屬火傷苦物苦為火味也此等皆以五行相配然勿泥咸勝苦微弦傷冷硬物溫以克之弦緊傷酸硬物辛勝酸微澀傷辛辣物苦勝辛微滑傷腥咸物甘勝咸洪緩傷甜爛物酸勝甘微遲傷冷痰積聚惡物溫胃化痰單伏主物不消化曲柏三稜廣朮之類洪浮而數乃中酒葛根陳皮茯苓傷食作瀉不止於藥中加肉豆蔻益智仁收固之傷食兼感風寒證與前同但添身疼氣口人迎並盛生料五積散見中寒養胃湯芎芷香蘇飲見腳氣和解散凡傷食主平胃散傷穀食者加穀芽麥芽神麯肉食加山楂面滯加萊菔子快膈加枳實若脾胃虛弱不能化六君子湯見氣加丁藿木香建蓮厚朴縮砂麥芽神麯脾氣下陷補中益氣湯見氣肝火乘脾脾傷不運左金丸見發熱歸脾湯見血腎火乘脾六味丸見虛損命門火衰不能生土八味丸見虛損或疑正當飽滿難於用補不知用補自有法疏啟其中竣補其下少用則助壅於上多用則峻補於下以人參一兩少加升麻一服即愈所謂塞因塞用也有胃強脾弱者能食而不能化也平胃散加炒鹽胡椒山楂麥芽神麯白蒺藜丸服更節飲食不能食傷食則惡食已詳飲食門此舉他證言之耳大抵不能食由於胃滿而致滿非一有寒氣滯於胃而滿者有熱氣壅於胃而滿者有濕痰不運而滿者有命門火衰致脾胃虛寒而滿者有腎水不足虛火上衝而滿者寒滯者六君子見氣加乾薑熱壅者石膏白芍枳實黃連陳皮之屬濕者除濕湯見中濕平胃散見傷食痰者二陳湯見痰痰積痞隔皂筴燒存性研末酒調服一錢腎火虛者八味丸見虛損二神丸腎水虛者六味丸見虛損其有飢而不能食者脾熱則消穀而飢本欲食因胃脘枯槁不能納或火熱上衝或痰涎上壅食不得下也若緣脾胃衰敗之極欲食不能則殆矣熱則消穀善飢乃熱而能運行者若壅滯不行則不能食矣勞倦傷勞則氣耗以喘而汗出喘則氣內越汗出則氣外越故氣耗也又勞則動火火動則氣益散氣愈虛而火愈炎矣氣盛則運而不積縱有火亦能行散不見其為火氣虛則不能運而火聚聚故炎也然非特勞為然也七情過甚色欲過度飲食不時皆能傷其真氣皆能生火火為元氣之賊壯火食氣一盛則一衰火聚於中脾胃受熱則困倦四肢疰悶疰住也注也言四肢㾓悶住而不去或走注也無氣以動動即喘乏脾失健運之常陰陽和平乃運一有偏勝則不運矣寒固有之熱亦宜然即不思食口不知味飲食日少穀氣不盛氣衰則資於飲食乃穀氣又衰則愈不運而鬱積矣以故氣不能升而上焦不行不能下降而下脘不通止鬱於脾胃之中而作熱熱氣上蒸於胸外透於表以故氣喘心煩頭痛而渴或不渴津液或存或亡之故表熱自汗或皮膚不任風寒而生寒熱脈浮大而虛春夏劇秋冬瘥謂之陽虛內熱病者首宜安心靜坐以存養其氣而以酸味收其散越甘溫補其虛衰按東垣云經曰勞者溫之損者溫之又曰溫能除大熱是也大忌苦寒之藥損其胃氣王安道駁之曰經謂勞者溫之溫乃溫養之謂凡調其飲食適其起居與用藥調養皆是非寒溫之溫損者溫之經原作損者益之溫能除大熱遍考內經無此語又曰溫能除熱亦惟氣溫而味甘者斯可耳蓋溫能益氣甘能緩火也愚謂安道此論甚是可為妄用附桂者當頭一棒又以甘寒瀉其熱火東垣特立補中益氣湯見氣中者何胃也氣生於胃蓋天元真氣雖五臟皆具而必得後天水穀之氣充養乃能生生不息胃獨為水穀之海飲食入胃其精氣遊行淫溢藉脾之運行以上輸於肺而充營衛布周身故言氣必歸之胃也胃氣虛則下陷於肝腎故用參耆以補其虛黃耆又能益肺固表不令自汗以泄元氣甘草能瀉脾胃之火火性急甘以緩之即為瀉也若脾胃太虛腹中急痛甘草宜多用升麻柴胡二物味薄陰中之陽從地昇天者也能引清氣上行以舉其下陷兼引參耆甘草等甘溫之氣上升以補衛氣之解散而實表清濁相干清不升則濁不降反混於清陽之位用去白陳皮以理之又能助陽氣上升以散滯氣白朮苦甘溫除胃中熱利腰臍間血脾得補則氣盛而濕行熱泄血氣流通也火盛則血虧血中有火日漸煎熬血減則心無所養致心煩亂病名曰悗悗者煩悶不安也故以當歸補血又得人參補陽為陽生陰長之用以上補中益氣方共八味火雖屬心而起於下焦腎中之陰火也火旺則腎水虛少加黃柏以瀉陰火救腎水如煩猶不止加生地黃以滋腎腎水旺則心火自降如氣浮心亂別以硃砂安神丸見煩躁鎮固之若更煩亂血不足也如腹中或周身有刺痛血不足而澀滯也加當歸身五分或一錢如精神短少加人參五分五味子十二個頭痛加蔓荊子三分痛甚加川芎五分頂腦痛加藁本五分細辛三分諸頭痛並用此四味足矣若兼頭上熱風熱上盛則此不能治別以清空膏見頭痛主之如頭痛有痰沉重懶倦乃太陰濕土痰厥頭痛加半夏五分生薑三分耳鳴目黃頰頷腫頸肩臑肘臂外後廉痛面赤脈洪大者皆風熱上攻也屬手太陽經羌活二錢防風藁本各七分甘草五分通其經血風熱上壅經脈不行故腫痛也加黃連黃芩各七分以清熱消腫人參五分黃耆七分益氣而瀉火氣旺則運行而火散另作一服與之嗌痛頷腫加黃芩甘草各三分桔梗七分口乾嗌乾胃中津液不升加葛根五分升胃氣以上潤之久病痰嗽肺中伏火去人參初病勿去之初病指未嗽時言正藉參以補氣故不可去若肺熱而嗽則當去之冬月或春寒秋涼加不去根節麻黃五分如春令大溫只加佛耳草款冬花各五分夏月加五味子三五枚去心麥冬五分夏月不嗽亦加人參三二分並五味麥冬救肺受火邪也如舌上白滑胎者舌上涼滑白潤是胸中有寒勿用麥冬五味食不下乃胸中胃上有寒或氣澀滯加青皮木香各三分陳皮五分此三味為定法如冬月加益智仁草豆蔻各五分如夏月加黃連黃芩各五分如秋涼加檳榔草豆蔻白豆蔻縮砂各五分如春寒少加辛熱之品以補春陽之不足益智仁草豆蔻可也胸中氣滯宜青皮如氣促氣少去之心下痞有寒有熱二者皆能使氣不運而痞如覺寒熱兼者加附子黃連各一錢寒痞不能食加生薑陳皮各一錢熱痞能食加黃連五分枳實三分脈緩有痰而痞加半夏黃連各一錢脈弦四肢滿悶便難肝熱滯於脾不運不達之故也而痞加柴胡七分黃連五分甘草三分痞而夯悶加芍藥黃連各一錢痞而腹脹加枳實木香縮砂各三分厚朴七分如天寒少加薑桂腹中痛者加白芍五分炙甘草三分肝熱散滿腹中急脹而痛故用白芍寒斂其熱甘草緩其急而扶脾如惡寒冷痛加桂心三分如惡熱喜寒而痛於已加白芍甘草中更加生黃芩三二分夏月腹痛雖不惡熱亦然治時熱也苦惡寒則不可加矣如天涼時惡熱而痛於已加白芍甘草黃芩中更少加桂如天寒去芍藥加益智仁三分或加半夏五分取其辛溫生薑三片如腹痛惡寒脈弦是木剋土小建中湯主之內芍藥味酸於土中瀉木為君寒證而用芍藥之寒何也蓋取其收斂肝之散滿且有桂可制其寒也如脈沉細腹中痛理中湯見中寒乾薑辛熱於土中瀉水為主此是腎寒反克脅下痛或縮急俱加柴胡三五分甘草三分臍下痛血虛加熟地五分立止如不止乃寒也更加桂三二分如脈緩體重節痛腹脹自利米穀不化濕也平胃散見傷飲食身體重者濕加去桂五苓散一錢見傷濕如風濕相搏一身盡痛加羌活七分防風藁本根各五分升麻蒼朮各一錢勿用五苓為風藥已能勝濕也別作一服與之病去勿再服小便遺失肺氣虛不能攝也宜安臥養氣黃耆人參補之不愈是熱也熱下迫也加黃柏生地各五分如臥而多驚小便淋者邪在少陽厥陰宜太陽經所加之藥指羌防藁本等味肝火鬱故用風藥以升發之更添柴胡五分如淋觀此二字知上文只就臥而多驚言加澤瀉五分此下焦風寒合病也風寒猶云肝腎經云肝腎之病同一治為俱在下焦也非風藥行經則不可故宜太陽經所加藥乃受客邪之濕熱也肝腎受熱故臥而多驚受熱不行故淋也宜升舉發散以除之風藥能散熱除濕也大便秘澀加當歸梢一錢潤而下行血藥也大便有形屬血分血燥故大便秘大黃酒洗煨五分或一錢仍不行者煎成正藥先用清者一口調元明粉五分或一錢得行即止不宜大下致變凶證腳膝痿軟行步乏力或痛乃肝腎伏熱熱則軟弱寒則堅勁凡物皆然加黃柏五分空心服不已更加漢防己五分脈緩沉困怠怠無力者加蒼朮澤瀉人參白朮茯苓以治濕熱五味子利濕防瀉氣故以此收之且清熱也上補中益氣一方加減觀此句則上文所云加減俱就補中益氣一方而言初病熱中則可用若寒中則不可用勞役傷氣有熱中濕熱暑熱火鬱寒中之分蓋此為甘酸之劑適足以益其病耳如參耆甘草芍藥五味子之類是也不能治寒也甘滯酸斂皆不能行散寒氣也按陽虛內熱與外感風寒之證相類其辨別處詳四診問寒熱條中夫內傷脾胃乃傷其氣外感風寒乃傷其形營衛血脈乃形也傷其外則為有餘邪氣有餘有餘者瀉之吐汗下皆瀉也傷其內則不足正氣不足不足者補之溫和調養皆補也誤治則有實實虛虛之禍矣若內傷而兼外感亦只用補中益氣湯一二服得微汗即已非正發汗乃陰陽和猶雲氣充自然汗出也又有時當夏令兼受暑邪肌膚壯熱煩躁悶亂惡熱大渴引飲氣上喘促目赤面紅身體疼痛日西譫語證似傷寒陽明經白虎證者誤服白虎湯見發熱必死白虎證脈洪大有力此洪大而虛重按全無氣血兩虛也經曰血虛則脈虛而發熱宜清暑益氣湯見傷暑或當歸補血湯見血寒中者乃水來侮土寒濕之證腹脹寒濕不運胃脘當心而痛亦氣不運所致膈噎不通或涎唾寒濕上泛或清涕肺寒涕冷或多溺氣虛寒濕盛不能攝足下痛不能任身履地足寒氣不運故痛也骨乏無力腎虛兩丸多冷陰陰作痛或妄見鬼狀夢見亡人陽虛見鬼無非陰象腰背皆痛不渴脈遲細或盛大以澀盛弦勁有力之意盛大寒實也如寒痰冷食之類寒滯氣血不行故澀也治用神聖復氣湯見腹痛白朮附子湯草豆蔻丸見心痛或用理中湯見中寒加減臍下築者腎氣動欲作奔豚也氣壅而不行則築築然動跳白朮壅滯去之而加肉桂以溫散之吐多亦因氣壅而逆去白朮加生薑若瀉多則留白朮正取其壅補使氣不下泄且瀉者多濕術又能勝濕也心悸者加茯苓飲聚則心神被水寒所迫不安故悸茯苓以利之渴者倍白朮水濕凝滯氣不布化則津液不生故渴術除濕濕去則氣行而津生也腹痛加人參氣虛則不運不通而痛故加參以補氣寒加乾薑腹滿去白木加附子附子味辛熱熱能勝寒辛能散滿或用建中湯飴糖甘草以益土薑桂以散寒且辛潤能通營衛芍藥酸收津液不通收而行之既不通何以用酸收蓋氣散漫不行故津液不流通收聚其氣而後津液能行也性微寒以濟薑桂之熱使不傷陰氣也嘔家不可用此湯以甜也甜則滯而滿悶內傷氣虛多汗調中益氣湯即補中益氣湯加白芍五味也以收耗散之氣又補中益氣湯除當歸白朮加木香蒼朮亦名調中益氣湯有濕而氣滯者宜之若濕多熱少清陽為濕所郁不得上升其證身重而痛二便不調洒洒惡寒陽不外達慘慘不樂陽不外伸升陽益胃湯見惡寒若過食寒涼遏火陽鬱於脾肌膚困熱烙手惡寒脈沉數升陽散火湯火鬱湯見發熱若熱多濕少陰火困脾陽不上升補中益氣湯去白朮當歸陳皮加石膏黃芩黃連蒼朮羌活若腎火上蒸時顯燥熱加生地黃柏凡言補之以辛甘溫熱之劑及味之薄者乃助春夏之升浮即瀉秋冬之收臟也凡言瀉之以酸苦寒涼之劑及淡滲之味者乃助秋冬之沉降即瀉春夏之升浮也心肝同春夏論肺腎同秋冬論虛損癆瘵虛者血氣不足也久則肌膚臟腑亦漸消損故曰虛損勞者久為病苦不得安息如勞苦不息者然又其病多為勞心勞力房勞所致又其證多屬火勞字從力從二火故曰勞也瘵者敗也證至於勞則敗壞矣前人分為五勞曰肺勞其證面浮氣短皮枯毛悴灑淅惡寒咳嗽不寧曰心勞其證血脈虛少男子面無血色女子月經不通曰脾勞其證飲食減少肌肉消削大便溏泄曰肝勞其證口苦目病胸脅引痛筋病不能行曰腎勞其證骨痿不能久立腰背不利午後發熱盜汗骨蒸小便黃赤而有餘瀝莖中痛小腹滿急又分六極曰氣極肺病極也喘促沖胸恆欲怒氣少不足以言曰血極心病極也面無血色頭髮墮落心痛唇舌紅赤曰肉極脾病極也肌肉消瘦四肢倦弱身上常如鼠走曰筋極肝病極也數轉筋爪甲枯痛手足拘攣脅下痛曰骨極腎病極也手足痛脊腰痛不能久立牙齒動曰精極臟腑皆虛極也身無膏澤眼無精光耳常聾鳴精神短乏遺精白濁骨髓空虛又分七傷曰陰寒曰陰痿曰裡急曰精速曰精少陰下濕曰精滑曰小便苦數臨事不舉又曰大飽傷脾大怒氣逆傷肝強力舉重久坐濕地傷腎形寒飲冷傷肺憂愁思慮傷心風雨寒暑傷形大恐懼不節傷志蓋積傷而成勞積勞而致極非一朝一夕之故矣舊說感寒則損陽陽虛而復感外寒則損陽分也感熱則損陰陰虛更生內熱則損陰分損陽者自上而下初損肺皮聚毛落二損心血脈空虛三損脾飲食不為肌膚四損肝脅痛筋病五損腎骨痿不能起床損至腎則死矣所謂五臟之傷窮必及腎損陰則反此自下而上至肺而死所謂內傷以有咳嗽為重詳咳嗽門然寒損陽熱損陰及肺腎上下皆舉隅之論耳蓋風寒濕三者並能郁肺氣成熱暑火燥三者亦並能傷肺氣致熱悲傷亦動肺火固不獨形寒飲冷能傷肺也腎水虛則熱火虛則寒強力舉重房勞不節恐懼不解等皆能傷腎固不止於熱也又或飲食先傷其脾思慮先傷其心鬱怒先傷其肝然後以次傳及諸臟者有矣寧必先傷肺與腎哉大綱須分氣血陰陽氣虛者四君子湯補中益氣湯並見氣保元湯等不外扶脾保肺血虛者四物湯當歸補血湯並見血地骨皮飲六物湯血虛而熱宜之加味四物湯血虛寒熱往來宜之等二方並見血不外養肝清心氣血兩虛者十全大補湯人參養榮湯等所謂陰陽皆指腎言陽虛者腎中之火虛也脈右尺必弱八味丸主之陰虛者腎中之水虛也脈必細數六味丸主之辨證之法陰虛者常熱大便燥結小便赤澀足心如烙形體消瘦陽虛者多寒亦有戴陽格陽等證身體大熱不惡寒反惡熱者然是暫時有此非常常如是大便時溏小便清白腰足冷神氣短怯肝傷補肝湯逍遙散見郁肺傷加味救肺飲心傷天王補心丹脾傷歸脾湯見血此大概也五臟之傷腎為最重腎虛則骨蒸潮熱或午後或子後潮熱自汗盜汗形體消瘦口乾咽燥聲嘶音啞消渴淋濁遺精失血易生嗔怒乾咳痰嗽不眠煩躁恍惚怔忡皆水虛火炎所致六味地黃湯為主勞嗽加五味子或合生脈散見中暑熱甚暫加知柏大抵水虛者十之八九附桂勿輕用也丹溪主乎陰虛故午後發熱午後屬陰陰虛故午後發熱也盜汗痰涎上逆頻吐不絕升屬陽降屬陰陰虛火炎氣不得降脈浮取則洪大沉取則空虛用四物加知柏後人遵用而不效何也蓋歸芎皆辛香上竄非降火之藥知柏苦寒瀉實火虛火則非所宜徒然傷胃故也改用薏苡仁百合二冬桑根白皮地骨皮丹皮枇杷葉五味子酸棗仁之屬佐以生地汁藕汁乳汁童便有痰加貝母以保肺而滋水源無不應手取效蓋諸藥皆稟燥當涼寄看降收之氣氣之薄者為陽中之陰從陽分而下降則能降上升之火又其氣清涼如當暑熱之時而商飆倏動則炎䓞如失與治暑證用白虎湯見發熱同意然彼是外感證屬有餘故用沉寒之品此為內傷證屬不足但用燥降收之劑足矣此用藥之權衡也故曰氣虛則生脈散見中暑不言白朮血虛則三才丸不言四物凡治水虛者以脾腎兼顧為難蓋水虛宜用涼潤以補肺腎而每滯脾故過用寒涼者脾必敗觀勞證多死於泄瀉可知也須間進甘溫之品或行滯快氣之藥以扶脾然不得過於辛燥以反耗腎水若火虛者脾腎皆寒一味溫補無所顧忌故曰受溫補者易治人參一味除肺壅熱脈洪數者不宜外餘證皆不可少王節齋服參必死之說大是誤人再按人參生涼熟溫本非熱品又質重氣薄當是益陰之品本草謂是補氣當是陽根於陰之義請質之高明病久虛弱厭厭不能食和中丸見不能食男子肌瘦氣弱咳嗽漸成勞瘵豬肚丸服之即肥服寒涼藥證雖大減脈反加數者陽郁也宜升宜補大忌寒涼犯之必死有重陰覆其陽火不得伸洒洒惡寒或志不樂或脈弦數四肢五心煩熱者火鬱湯柴胡升麻湯並見發熱病去即已有面色如故肌體自充外看如無病內實虛損俗呼為桃花蛀當看有何證如法治之虛勞之疾百脈空虛非黏膩之物填之不能實也精血枯涸非滋潤之物濡之不能潤也宜參耆地黃二冬枸杞五味之屬各煎成膏另用青蒿以童便熬膏及生地白蓮藕薄荷等汁人乳隔湯煉過酌定多少並麋角膠霞天膏見積聚和合成膏每用數匙湯化服如欲行瘀血加入醋製大黃末玄明粉桃仁泥韭汁之屬欲止血加入京墨之屬欲行痰加入竹瀝之屬欲降火加入童便之屬凡虛勞之證大抵心下引脅俱疼蓋滯氣不散新血不行也尤宜用膏子加韭汁桃仁泥柴胡為升清散郁之品故骨蒸用以透肌解熱用銀州者佳然不可常服為其疏散故也陰虛火動陽常舉皮硝放手心兩手合住自化陽既痿矣證本陰虛若呼吸少氣懶言語無力動作目無精光面色㿠白乃兼陽虛也人參麥冬各三錢五味子二十一粒橘皮桔梗炙甘草各五錢為末水浸油餅為丸如雞頭子大每服一丸嚼津嚥下虛損久為勞瘵積熱骨蒸熱深入骨髓中蒸達於外咳嗽唾血肌膚甲錯乾澀枯槁如鱗甲之相錯面目黑黯無光偏睡聲啞咽痛頸生瘰癧兩脅疼痛轉筋拘急或周身筋骨皆痛夜夢鬼交即夢遺時多忿怒五心煩熱頭髮作穗面唇時紅如敷胭脂大便不調小便淋濁此腎水竭肝血虧無以制火使然火灼血乾雖用滋陰之劑亦不得效以死血不去則經脈壅塞氣血無以流通熱終不除也若其人能食而大便結者尚堪攻下急用大黃䗪蟲丸陳大夫傳仲景百勞丸可與此丸互用以行其死血即無死血而積熱不除非下行無以折其勢亦當暫用大黃青蒿煎導之古方柴胡飲子防風當歸飲子麥煎散皆用大黃以折上炎之勢也然後隨證調理若不能食而泄瀉不堪攻下者必死勞瘵日久或生惡蟲敗血濕熱所化蛀蝕臟腑久而通靈變化無常身死之後傳染子孫甚而滅門名曰傳屍勞宜癸亥日二更後灸兩腰眼各七壯見針灸後服傳屍將軍丸膏肓四花穴可灸見針灸獺肝一具陰乾為末水服方寸匕日三服效未知再服大抵以保養精血為上去蟲次之安息蘇合阿魏麝香犀角丹砂雄黃固驅邪之品亦須加天靈蓋於中蓋傳屍之蟲鬼氣也伏而未起一得枯骸則鬼氣飛越附之不復著人可瀉而出外此則虎牙鯉魚頭骨亦可此乃食人之物鬼所畏者也先用芎歸血餘散吞北斗符次用鱉甲生犀散取蟲余法詳準繩虛損勞瘵屬陰虛者多必形消著骨而後死可見也以陰主形陰全竭而後形全毀也若是陽虛則有形盛而脫死者矣以陽主氣氣脫者不必待其形之脫也真臟脈見者即形肉尚存亦不久矣大骨枯槁顴股腰之骨痿痛不能支大肉陷頭項四肢大肉消陷成坑動作精神衰即真臟脈不見亦不過一歲死若更喘滿動形半年死若更痛引肩胸五臟內損一月死若更破䐃消陷之處枯燥破裂身熱不已十日死兼以真臟脈見目眶下陷視不見人即死矣若能見人為神尚未去至所不勝之日時而死虛勞危證不受補大便泄瀉筋骨痛極偏睡失音脈弦數皆危證也火凡病多屬火丹溪謂氣有餘便是火此一火也治宜清涼氣不足亦鬱而成火東垣所謂陽虛發熱也又一火也治宜甘溫以補其氣少加甘寒以瀉其火外感暑熱燥氣增助內氣成熱此一火也治宜辛潤清涼外感風寒濕氣閉郁表氣成熱亦一火也治宜辛溫發散內傷飲食辛熱之物致火得熱益熾此一火也宜以苦寒之劑消導之內傷飲食生冷之物致火被遏愈怒又一火也治宜辛熱之劑消導之腎水虛致令下焦之火上炎此一火也治宜六味見虛損壯水以制陽光腎陰盛逼其浮游之火上升又一火也治宜八味見虛損益火以消陰翳又凡動皆屬火醉飽火起於胃大怒火起於肝悲哀火起於肺房勞火起於腎五臟火熾心火自焚種種已散見於各篇中而發熱篇更詳細閱自見夫人非寒則熱非實則虛耳今寒熱虛實皆能生火然則凡病多屬火河間丹溪之言豈不信哉而張景岳輩不達其旨極力讕詆亦已過矣或曰虛火既不可用寒涼是有火之名無火之實故景岳諸公直謂之非火子何訾之乎曰虛火不可用寒涼謂苦寒之味耳若甘寒之品何可廢乎蓋虛火有二其一可用溫熱如內寒外熱下寒上熱等證是也目為非火猶可也其一宜用甘寒水虛火炎者是也目為非實火則可竟目為非火可乎至於滯下消渴吞酸蟲疳等證明明屬熱者亦概目為非火且反謂之為寒真菽麥不辨者矣彼意以為必目之為非火而後人不敢用寒涼不知立論失實徒起後人之疑也今夫駑馬之駕而敗盡人而知之矣直言此為駑馬不可駕未有不信者也必謂之非馬也鹿也誰則信之乎不信則有駕之而敗者矣是非火之說固將使人不信而用寒涼也熟若仍其虛火之名而明夫不可用寒涼之故之為實而可信哉或謂上世人所稟厚實可任攻伐晚近人所稟薄弱止宜溫補謬也丹溪去景岳不過二百餘年如果稟賦強弱相懸如是將數千百年而後人皆變為陰鬼乎惟古人謂勞擾之人多火與安靜者不同黑瘦之人多火與肥白者不同其說深為得理桂附引火歸元此為下寒上熱者言之若水涸火炎之證上下皆熱不知用此引火引歸何處今日醫者動用桂附動云引火歸元殺人如麻可嘆也說詳八味丸方注凡病有形者是痰無形者是火如紅腫結塊或痛或不痛皆形也痰也按結塊腫而不痛不紅者純痰也紅腫而痛者兼火也但痛不腫者無形也火也又謂濕火腫而不痛燥火痛而不腫亦此意也又謂脹痛是濕火筋縮痛是燥火又謂平時筋不縮偶直足一曲即縮是火蓋火性欲舒伸一屈則激而暴發陡然抽擊觀蛇之動而擊曲是其象也又謂火證睡覺忽腰背重滯轉覺不便睡則火斂於內蒸其血液滯於腰背也腰揹著席故滯隆冬薄衣不冷非壯盛食時有涕無痰痰為食壓暫下故無痰火氣得穀氣助之上升故化涕以出不食時有痰無涕弱證左側睡則心左墜一響右側睡則心右墜一響弱證人心血少易於動故轉側則傾墜與火氣相搏擊故響心中滴滴噹噹響火氣搏擊心血作響頭眩耳鳴心火黃連生地木通小腸火木通肝火柴胡片芩佐之膽火龍膽草脾火白芍胃火石膏肺火黃芩桑皮佐之大腸火子芩腎膀胱火知母黃柏凡用知柏芩連等寒藥少加枳殼行之否則凝滯又寒涼藥不可久服致傷脾胃不救三焦火山梔上中二焦火連翹虛火姜皮竹葉麥冬童便生甘草生薑緩之散之或參耆等補之實火熱甚黃芩黃連山梔黃柏宜下者芒硝大黃血虛發熱當歸生熟地無根之火遊行作熱腎水乾涸相火上炎也陽以陰為根腎陰虛故曰無根六味丸見虛損加元參作湯服氣如火從腳下起入腹腎陽虛極欲脫十不救一六味加肉桂五錢作湯外用附子末津調塗湧泉穴引火下行燥火歸地麥冬濕火蒼朮茯苓豬苓木通鬱火重按烙手輕按不覺取汗則愈過食生冷遏少陽之火於脾部者升柴葛根羌活細辛香附蔥白肝火鬱青黛郁郁者滯而不通之義百病皆生於郁人若氣血流通病安從作一有拂鬱當升不升當降不降當化不化或鬱於氣或鬱於血病斯作矣凡脈見沉伏結促弦澀氣色青滯意思不舒胸脅脹痛嘔吐酸苦者是也治法經言木鬱達之火鬱發之土鬱奪之金鬱泄之水鬱折之解者以吐訓達以汗訓發以下訓奪以解表利小便訓泄以制其沖逆訓折大概如此不必泥定何則木鬱者肝氣不舒也達取通暢之義但可以致其通暢不特升提以上達之發汗以外達之甚而瀉奪以下達之無非達也安在其泥於吐哉余仿此嘗見有病熱發汗不出者以承氣湯下之裡氣一通餘邪自化汗以出豈非火鬱以奪為發之義哉丹溪分六郁氣血濕火食痰也故制越鞠丸以香附理氣撫芎行血蒼朮開濕梔子治火神麯消食痰鬱加貝母而大要以理氣為主蓋氣滯則血亦滯而飲食不行痰濕停積鬱而成火氣行則數者皆行故所重在氣不易之理也趙獻可則以加味逍遙為主逍遙之歸芍即越鞠之川芎逍遙之白朮即越鞠之蒼朮逍遙之陳皮即越鞠之神麯逍遙之柴胡即越鞠之香附逍遙之加味即越鞠之梔子也謂肝膽少陽木氣象草穿地而出此時被寒風一郁即萎軟遏抑而不能上伸惟溫風一吹即暢達蓋木喜風風搖即舒暢寒風則畏溫風則喜柴胡薄荷辛而溫者辛故能發散溫故入少陽其鬱甚而熱者加左金丸見發熱熱非寒品不除故用黃連治火實則瀉其子也郁非辛熱不開吳萸辛熱且氣臊肝之氣亦臊同氣相求故用為反佐引以入肝服後木鬱已舒繼用六味地黃湯見虛損加柴胡芍藥以滋腎水逍遙風以散之也六味雨以潤之也木有不得其天者乎按趙氏此論甚精但謂此方可以通治諸郁則主張太過舉一廢百烏乎可也六淫七情皆足以致郁如外傷於風寒濕三氣皆足以閉遏陽氣鬱而成熱固也暑熱燥三氣亦足令氣鬱準繩謂燥金收澀收澀則傷其分布之政不惟生氣不得升即收氣亦不得降不升屬肝鬱不降屬肺郁經曰逆秋氣則太陰不收肺氣焦滿又謂諸氣怫鬱皆屬於肺是燥氣之致郁也又燥為火化易曰燥萬物者莫熯於火是燥之致郁無非火熱之氣所為也至於七情除喜則氣舒暢外其憂思悲怒皆能令氣鬱結而痰食之遏閉水濕之停阻又可知矣準繩謂郁多在中焦蓋不論何臟腑鬱結皆關中土也又謂用藥兼升降蓋欲升必先降之而後得升也欲降之必先升之而後得降也越蘹之蒼朮足陽明藥也氣味雄壯辛烈開發水穀氣上升之力多香附陰血中快氣藥也下氣之功多一升一降互用也按上升下降則中焦之郁開矣氣鬱胸脅痛脈沉而澀宜香附蒼朮撫芎濕鬱周身走痛或關節痛遇陰寒則發其脈沉細宜蒼朮川芎白芷茯苓熱鬱目瞀小便赤其脈沉數宜山梔青黛香附蒼朮撫芎痰鬱動則喘寸口脈沉滑宜海石香附南星栝蔞仁血鬱四肢無力能食便紅其脈芤澀宜桃仁紅花青黛川芎香附食鬱噯酸腹滿不能食右寸脈緊盛宜香附蒼朮山楂神麯針砂上諸郁藥春加防風夏加苦參秋冬加吳茱萸蒼朮撫芎總治諸郁按百病皆生於郁與凡病皆屬火及風為百病之長三句總只一理蓋郁未有不為火者也火未有不由郁者也濃酒厚味房勞損陰以致火炎似無關於郁然亦必由不能運散乃然耳而鬱而不舒則皆肝木之病矣故曰知其要者一言而終痰飲痰本吾身之津液隨氣運行氣若和平津流液布百骸受其潤澤何致成痰為病苟氣失其清肅而過於熱則津液受火煎熬轉為稠濁或氣失溫和而過於寒則津液因寒積滯漸致凝結斯痰成矣故痰一也而因寒因熱其源不同可概治歟辨別之法古以黃稠者為熱稀白者為寒此特言其大概而不可泥也試以外感言之余嘗自驗傷風咳嗽痰隨嗽出頻數而多色皆稀白誤作寒治遂致困頓後悟其理方知為熱極所致蓋火盛壅逼頻咳頻出停留不久故未至於黃稠耳迨火衰氣平咳嗽漸息痰之出者半日一口反黃而稠則火不上壅痰得久留受其煎煉所致而病亦遂愈方知黃稠之痰火氣尚緩而微稀白之痰火勢反急而盛也此皆當用辛涼解散而不宜於溫熱者也又以內傷言之腎火虛水泛為痰其痰清稀當用溫熱固也即腎火盛水沸為痰其痰亦清稀蓋龍雷動而雨水隨之卒然上湧雖略帶濁沫終非黃稠可比亦宜用甘寒壯水而不宜於溫熱者也孰謂稀白之痰必屬於寒哉大抵稀白而吐疎者必屬寒予嘗吐痰出喉冰冷雖咳嗽頻並而不咳之時多仍是疎非數用溫胃斂肺之藥而愈然又有痰出喉甚冷而證仍屬熱者蓋痰本水屬積久而多則火不能溫也故張子和謂新痰熱舊痰寒吐數而因傷風鬱熱者及內傷雷龍火動者必屬熱因於脾氣虛寒不能攝涎頻吐遍地者必屬寒其人安靜無他既非傷風咳嗽又非雷龍火動可辨此等須細為辨別更當參之以脈可見也有氣化之津液有飲食之津液胃者津液之海也故痰聚焉積久聚多隨脾胃之氣以四訖則流溢於腸胃之外軀殼之中經絡為之壅塞皮肉為之麻木甚至結成窠囊牢不可破其患固不一矣法在平調其氣熱者使復清肅之常涼風生而濕土燥寒者使回陽和之令旭日出而堅冰消氣得其平痰源以絕而後其停蓄於腸胃之內肌膚之中者乃可徐圖否則根株不拔旋去旋生無奏效之日矣更有一妙義痰隨氣行既隨氣以出於腸胃之外亦隨氣以入於腸胃之內若潮之往返然人身之氣日則行於外夜則返於內者也故遇夜安臥晨興盥嗽則吐痰獨多豈非痰隨夜氣內返於胃之故乎然則往者必令復返外者必令復內乃有出路否則迷留經絡之中難於消導矣喻嘉言發明此理謂人不宜夜食恐脾胃之氣因食運動外達而不內收痰難返胃誠為篤論然遇夜而勞擾不息更屬大戒舉一返三喻氏之說所當推廣也風痰屬肝脈弦面青肢體痛悶麻痹便溺秘澀詳二便及中風門心多鬱怒或成癱瘓搐搦眩暈水煮金花丸川芎丸防風丸祛風丸導痰丸星半天麻牙皂殭蠶秦艽皆治風痰可用吐法或因痰悶絕烏藥枳殼明星薑汁灌之即醒熱痰屬心脈洪面赤煩熱燥渴多笑眩暈嘈雜頭風爛眼或背心一點冰冷痰多稠濁小黃丸黃芩利膈丸見痞滾痰丸當下者控涎丹加盆硝等分每服三兩丸栝蔞仁芩連青黛山梔二冬竹瀝童便可用因暑得者消暑丸見傷暑濕痰屬脾脈緩面黃肢體重倦弱嗜臥腹脹食不消泄瀉關節不利或作腫塊麻木不仁白朮丸二朮星半茯苓澤瀉可用腫塊加乳沒臂痛加薄桂薑黃肋脹加柴胡白芥青皮滾痰丸最利飲盛者小胃丹濕痰多而易出痰之動濕也主於脾或由脾氣壅滯不行或由脾氣虛寒不運而生氣痰屬肺脈澀面白氣上喘促灑淅寒熱悲愁不樂攻注走刺不定兩肋脹痛玉粉丸局方桔梗湯二陳湯去甘草加香附木香砂仁枳殼烏藥蘇子青皮竹瀝薑汁氣鬱七氣湯見氣越鞠丸見郁痰少而黏連不易出氣燥也宜潤之門冬地黃枸杞之屬使肺氣得清肅下行寒痰屬腎脈沉面黑足寒心多恐怖痞塞骨痹四肢不舉薑桂丸局方胡椒理中丸乾薑決不可少甚則加桂麻黃細辛痰之本水也原於腎腎火虛則水泛為痰其痰清八味丸火盛則水沸為痰有濁沫六味丸水沸為痰暴壅也若火非湧盛而但熱涸者痰則稠黏此二者皆屬於熱不作寒論又有因驚而心神出舍舍空痰入多成心痛癲疾婦人因產受驚多有此證腹有如孕一塊轉動躍跳痛不可忍甘遂大戟白芥子加硃砂痛加全蠍成塊加山甲炒鱉甲玄胡莪朮食積生痰多成瘧痢痞塊口噯食臭山楂神麯麥芽枳殼木香黃連滾痰丸亦妙或保和丸見傷飲食飲酒生痰常多嘔惡食不美妙應丸加雄黃全蠍各二錢每服十丸老痰即郁痰結成黏塊吐咯不出非南星半夏茯苓蒼朮可治青黛為主五倍海石苦梗旋覆花栝蔞仁芒硝痰核痰結喉嚨如梅核狀用梅子半青半黃每一個用鹽一兩浸曬數次以水盡為度用大錢三個夾梅兩個麻線扎定貯瓦罐埋地下百日含口中汁下即消又一法用海石烏梅栝蔞桔梗芒硝射干海藻薑汁蜜為丸噙又見咽喉頭面頸項身之中下有結核不紅不痛不硬不作膿皆痰核脾肺氣逆痰滯於內順氣消痰自愈亦有鬱怒傷損肝脾血病結核者宜養血清肝火外用白果肉南星搗貼痰在身習習如臥芒刺如蟲行或走注疼痛或燥癢搔之則癮疹隨生痰在皮毛烘熱色如錦斑痰在頭偏頭風雷頭風頭眩痰在額額悶痛眉稜癢痛痰在目目暈眼蠕動如姜蜇膠黏癢澀目中時出火星眼前如見白氣或見兩月交輝或見金光數道或眼前黑暗或眼皮下菸灰黑色痰在耳輪癢痛蟬鳴水響痰在鼻鼻塞或聞焦臭痰在口齒頰癢痛牙床浮口糜舌爛口燥唾稠嘔冷涎綠水黑汁胡言不語痰在面形枯發焦頷腮腫硬似疼非疼痰在頸項無故腫繞項結核喉痹痰如破絮桃膠蜆肉咯不出咽不下或噎塞煩悶如煙火上衝頭面烘熱或喉間豆腥痰在四肢肩背痠疼腫硬似疼非疼或筋骨疼無常處難名狀或手麻臂疼狀如風濕或倏然仆地四肢厥冷或麻木不仁或重滯或牽引或不舉非竹瀝薑汁不開二陳加枳殼南星木香薑黃痰在心胸噫氣吞酸嘈雜或痛或穢乾嘔也或心下如停冰鐵或驚悸怔忡如畏人捕或胸膈迷悶如癲呆狀或痞滿健忘噁心痰在脊背脊上冰冷一條如線或冰冷一點疼痛或如熱湯沃背痰在兩肋肋脹痛如湯沸非白芥子不能達痰在腰腎腰間骨節卒痛呼吸難任痰在二便癃閉秘結遺同米泔糞後魚凍婦人月水不通痰在足足腕痠軟步履如踏灰上痰在夢寐睡時魘夢刑戳刀兵夢入人家四壁圍繞一實得出不知何所夢在燒人地上煙火枯骨焦氣撲鼻無路可出或不因觸發忿怒悲啼而寤怪誕百般不可殫述隱君悉以滾痰丸治之龐安常有言人身無倒上之痰天下無逆流之水故善治痰者不治痰而治氣氣順則一身之津液亦隨氣而順矣並宜蘇子降氣湯見氣導痰湯各半帖合煎或小半夏茯苓湯加枳實木香各半錢吞五套丸或以五套丸料依分兩作飲子煎服亦好按痰標也所以致痰者本也治病固當求本然須看痰勢緩急緩則治本固也若痰勢盛急度難行散非攻無由去者虛人可標本並治攻補兼施若勢甚緊急則雖虛人亦當先攻後補如中風之用三生飲見諸中控涎丹是也當此咽喉閉塞之時不吐去其痰立即堵塞而死矣昧者乃畏其虛而不敢用獨不畏其死耶夫人之虛莫虛於中風者矣猶必先攻後補乃於尋常虛人反畏之耶準繩謂治痰固宜補脾以復健運之常使痰自化然停積既久如溝渠壅遏瘀濁臭穢無所不有若不疏通而欲澄治已壅之水而使之清決無是理又謂凡病痰飲而變生諸證不當為諸證牽掣且以治飲為先如頭風眉稜骨疼累月風藥不效投痰藥收功眼赤羞明而痛與涼藥弗瘳授痰劑獲愈云云真格言也按二證皆痰壅熱上喻嘉言曰脾之濕熱胃之壯火交煽互蒸結為濁痰溢入上竅久久不散透開肺膜結為窠囊窠囊之痰如蜂子之穴於房中如蓮實之嵌於蓬內生長則易剝落則難繇其外窄中寬任行驅導徒傷他臟此實閉拒而不納耳究而言之豈但窠囊之中痰不易除即肺葉之外膜原之間頑痰膠結多年如樹之有蘿如屋之有遊如石之有苔附托相安倉卒有難於刻伐者治法必靜以馭氣使三陰之火不上逆又必嚴以馭脾使太陰之濕不上蒸乃廣服大藥以安和五臟培養肺氣肺金之氣一清則周身之氣翕然從之下降前此上升濁邪允絕其源矣又曰人身之氣經盛則注於絡絡盛則注於經窠囊之成始於痰聚胃口嘔時數動胃氣胃氣動則半從上出於喉半從內入於絡胃之絡貫膈者也其氣奔入之急則沖透膈膜而痰得以居之日增一日故治之甚難必先去胃中之痰而不嘔不觸俾胃經之氣不急奔於絡轉虛其胃以聽絡中之氣返還於胃逐漸以藥開導其囊而滌去其痰則自愈矣又曰李繼江常苦咳嗽生痰胸膈不寬今夏秋間臥床不起瀕亡者再將家事分撥安心服死忽覺稍安亦心死則身康之一徵也未幾仍與家事其病復作就診見其頤旁有小小壘塊數十高出謂之曰觀爾脈盛筋強必當好色而喜任奔走本病宜發癰疽所以得免者以未享膏粱之奉且火才一動便從精孔泄出耳然雖不病癰而病之所造今更深矣爾胸背肩髃間巉巖如亂石插天櫛比如新筍出土嵌空如蜂蓮之房芒銳如棘慄之刺每當火動氣升痰壅緊逼之時百苦交煎求生不生求死不死比桁楊之罪人十倍過之由好色作勞氣不歸元騰空而上入於肝肺散葉空隙之間膜原之內者日續一日久久漸成熟路只俟腎氣一動千軍萬馬乘機一時奔輳有入無出如潮不返海潮兼天湧至倘後潮不熄則前潮不退古今死於此病者不知其幾但爾體堅堪耐是以病至太甚尚自無患耳爾宜歸家休心息神如同死去俾火不妄動則痰氣不為助虐胸背之堅壘始有隙可入吾急備藥為爾覆巢搗穴可得痊也渠以為病未即死且往鄉徵租因勞陡發暴不可言痰出如泉聲響如鋸面大舌脹喉硬目突二日而卒飲者停水之名又痰之清稀者曰飲故痰飲並稱金匱謂飲有四其人昔肥今瘦由津液盡化痰飲不復外充形體也水走腸間瀝瀝有聲曰痰飲飲後水流脅下咳吐引痛曰懸飲懸結於脅中不上不下也飲水流行歸於四肢當汗出而汗不出身體疼重謂之溢飲飲水乃有形之水非水精四布之水止宜下行從小便出今不下行而旁達應從汗泄而不得化汗以出故身體疼重即風水水腫之病也曰溢者言泛溢於四旁也咳逆倚息氣短倚坐而倚物也以不得臥故息呼吸也氣短喘急也不得臥氣逆使然其形如腫面多腫曰支飲水停於胸在心肺之側如木之旁枝也按此四飲乃隨其部位分言耳又謂心下有留飲久而不去名留背寒冷如掌大阻遏心陽故背寒冷脅下痛引缺盆留於脅則礙肝氣故脅痛缺盆為十二經道路故引及之咳嗽則轉甚氣逆也胸中有留飲其人短氣肺氣被迫也而渴水阻氣不布不能化生津液故胸雖停水而咽喉則干也四肢歷節痛留於身體則塞經絡故肢痛由此推之留於脾分則腹腫身重留於腎部則囊足脛腫理必然矣此言留飲及下文言伏飲乃上四飲之總綱也又謂膈上病痰飲留膈上伏而不出煎煉成痰也滿喘咳吐留伏日多故胸滿肺氣被迫而喘咳且吐痰也發則寒熱背痛腰冷發謂伏而發也今之值秋寒或感春風而發發則喘滿咳吐痰多寒熱背痛腰疼俗名吼喘病者此也目泣自出咳甚則肺葉舉而目泣自出也振振身瞤喘咳甚則身動即抬肩搖身也必有伏飲伏而難攻也比留為更甚矣又謂水停心下甚者則悸心氣為水所逼而跳動不寧也微者短氣脈雙弦者寒也皆大下后里虛偏弦者飲也先渴後嘔言飲本偏弦若大下里虛虛寒相搏變為雙弦也氣被水阻不能化生津液故渴小半夏茯苓湯此屬飲家言平日多飲之人也又謂嘔家本渴嘔家謂非因停水而嘔者乃別病也嘔傷津液故本應作渴渴者為欲解病從嘔去故雖渴亦為欲解也今反不渴心下有支飲故也此辨證之法言卒然嘔吐則未知其為別病之嘔歟抑留飲之吐歟則以嘔後渴不渴辨之渴者是別病之嘔不渴者乃留飲之嘔也留飲未嘔之先亦渴而嘔後反不渴者以嘔則水稍去而氣稍通能布化生津也小半夏湯又謂心下痞半夏加茯苓湯臍下悸水停心下則心下悸而痞塞若停臍下則臍下悸也吐涎沫觀此則上文所謂嘔者為涎沫可知眩水逼火上浮也五苓散見傷濕又謂短氣有微飲水停心下甚者為悸微者短氣當從小便去之桂苓朮甘湯腎氣丸即八味丸金鑑云呼出為陽心肺主之吸入為陰肝腎主之若呼之氣短是心肺之陽為水所礙用苓桂朮甘湯益上氣以行水若吸之氣短是肝腎之陰為水所礙用腎氣丸溫陽以行水按呼出氣自下而上故屬心肺呼氣短者言水在上焦阻礙上焦呼吸之氣致令喘促也乃舉呼以該吸非單言呼也吸氣仿此勿泥看又謂脈浮而細滑傷飲初病未深之診脈沉者有留飲經云沉潛水蓄是也病深之診病者脈伏沉甚為伏其人慾自利水欲去不上出而嘔則下行而利此為留飲欲去也雖利心下續堅滿乃伏飲盤結不得去可知甘遂半夏湯甘遂甘草並用激之使出因已利故佐芍藥以約斂之不令亡陰又謂水在肝脅下支滿嚏而痛氣動則水動而衝擊作痛水在腎心下悸心當作臍又謂支飲腹滿原文作胸滿從金鑑改之厚朴大黃湯又謂腹滿口舌乾燥腸間有水氣即水聲己椒藶黃丸防己椒目導飲從小便出大黃葶藶推飲從大便下前後分消也又謂脈沉弦者懸飲內痛十棗湯見腫脹又謂溢飲當發汗大小青龍湯又謂肺飲脈不弦但苦喘短氣不能臥肺飲即支飲葶藶大棗湯見哮喘又謂膈間支飲喘滿心下痞堅自胸連膈盤結實甚面色黧黑水邪深結之色脈沉緊得之數十日醫吐下之不愈盤結可知木防己湯見喘主之方中用參以吐下後傷正也虛者即愈得參補之故愈實者三日復發復與不愈去石膏惡其寒加芒硝開結茯苓下滲又謂脈弦數有寒飲外寒而內鬱熱故脈弦數也冬夏難治冬用熱藥則妨其內之熱夏用寒藥則妨其外之寒也然不必泥又謂久咳數歲詳下乃支飲漬肺而咳也脈弱可治久病脈應弱脈大數者死脈虛必苦冒其人本有支飲在胸中故也氣虛停飲則清陽不升故昏冒如有物蔽之即傷濕首如裹之義治屬飲家言不從咳嗽門治法也按金匱所言停飲證當與水腫門參看張子和謂飲當去水溫補轉甚蓋寒飲在中反以熱藥從上投之為寒所拒水濕未除反增心火火既不降水反下注其上焦枯其下寒慄當依內經留者攻之十棗見腫脹神祐見腫脹之屬為宜次以淡劑流其餘蘊以降火之劑開其胃口自愈痞滿胸痹痞塊痞者痞塞不開滿者滿悶不行也痞滿與脹滿不同脹滿內滿而外脹起痞滿但內覺滿悶而外無脹急之形也有在胸在腹之分皆由中氣不運而所以致不運者則或寒而凝閉或熱而䐜脹或食滯痰停或氣結怒郁或脾濕不化或血瘀不行皆能致之不特外邪陷入結塞而成如傷寒論所云也在胸者理同胸痹金匱謂陽微寸脈微也上焦虛寒陰強尺脈弦也下焦寒盛即胸痹而痛陰邪上干胸中微陽為寒所閉不通而痛責其極虛上焦陽虛又云平人無寒熱非表邪也短氣不足以息者實也上言正虛此言邪實即經所謂邪之所湊其氣必虛留而不去其病為實也實謂痰飲之類短氣不足以息以邪阻氣道呼吸喘促不利非真氣之短乏又云喘息咳唾胸背痛短氣寸脈沉遲上焦內氣寒也關脈小緊數小為陽虛緊數為寒痛是中焦亦受病也寸遲關數可疑栝蔞薤白白酒湯辛溫行陽開痹又云胸痹不得臥心痛徹背者比上證更甚矣栝蔞薤白半夏湯心痛徹背背痛徹心猶云痛無休息比上證又甚矣烏頭赤石脂丸又云胸痹緩急者其痛或緩或急也薏苡附子散視栝蔞湯為重烏頭丸為輕又云胸中氣塞短氣不痛證輕茯苓杏仁甘草湯或橘枳薑湯胸為氣海陽邪干之則化火火性開不病痹也病痹必陰邪干之陰邪化水水性凝故令氣塞水盛於熱以茯苓湯利水氣盛於水以橘枳湯行氣又云心下痞氣結在胸胸滿脅下逆搶心首條云陰弦此云脅下氣逆乃肝腎之邪氣上逆也枳實薤白桂枝湯桂以伐肝人參湯上方散邪此方補正又云心中痞諸逆心懸痛上條不過沖心此則心痛而搖動若懸空然桂枝生薑枳實湯大抵胸為清陽之分濁陰乾之則氣不行為虛痞甚則痰涎停聚為實痞更甚則痛也東垣謂痞但滿不痛視胸痹有痛證雖不同理則無二兀兀欲吐者吐之食鬱上焦者亦然一味栝蔞子炒熟連皮煎或丸最能盪滌胸中垢膩在腹中者黃耆補中湯加升柴緣天地不交為否豬苓澤瀉降天氣使下濟升麻柴胡升地氣使上行飲食停滯輕者大消痞丸枳朮丸見傷飲食甚者檳榔丸見傷飲食下之酒積雜病下之太過致痞滿者升提其胃氣加血藥下多亡陰故補其血郁者越鞠丸逍遙散並見郁濕者平胃散見傷飲食合五苓見傷濕氣滯四七湯見氣痰滯導痰湯見痰脾弱不運者四君子湯異功散並見氣挾死血者丹皮江西紅曲穿山甲降香桃仁紅花當歸童便韭汁之屬鬱怒者加香附童便制在腹亦有虛實之分實而積久成形即名痞塊於積聚門求之積聚積者有形之邪或食或痰或血積滯成塊時常硬痛始終不離故處者也在婦人則謂之癥癥者徵也有形可驗也聚者無形之氣滯則聚行則散聚則有形而硬痛散則痛止形消忽此忽彼無有定處者也在婦人謂之瘕瘕者假也假氣為形而實非有形也形屬陰氣屬陽故積屬陰聚屬陽古分積屬臟在血分聚屬腑在氣分即陰陽之義耳不必泥也至其病因則內經謂寒氣入腸胃則腸外汁沫凝聚不散日以成積又或飲食過飽或用力過度傷其腸胃之絡則血溢腸外與寒沫搏結成積或外中於寒而憂怒氣逆血凝液留皆成積可見外感內傷皆足以鬱滯其氣血痰液以成積聚而在婦人尤甚以婦人經產血行或食生冷或感風寒且多恚怒憂鬱易致瘀滯也一食積酒積附證見噯腐吞酸腹滿惡食宜秘方化滯丸山楂麥芽枳實神麯阿魏礞石牽牛巴豆之類倒倉法最佳按食停腸內必棲泊在隱曲之處乃能久而不下隱曲之處為地無幾必附益以腸外之涎沫內外交結乃成大塊須兼治其痰飲乃效酒積目黃口乾肚腹脹痛少食宜葛根枳椇麥芽之類酒濕熱傷脾痰血瘀滯成積須兼清熱利濕導滯之藥舊謂食積在右血積在左痰積在中大概如此不可泥一痰積水積附證見麻木眩暈痞悶嘈雜其人平素多痰宜控涎丹見痰飲硃砂膩粉瓜蒂甘遂之類水積足脛腫脹必有窠囊宜郁李商陸甘遂芫花之類一血積證見面色痿黃有蟹爪紋路血不能上榮也多怒善忘口燥便秘骨熱肢冷宜桃仁煎地榆虻蟲水蛭之類以上皆有形之積阻礙正氣故痛也而亦有不痛者日久則正氣另闢行徑不復與邪相爭或邪另結窠囊不礙氣血隧道之故此為難治以藥不易到也又食痰血數者皆無知之物不能移動故常在其處然有飲汙井之水吞蛟蜃之精因而假血氣以成形含有活性時能蠢動遊移者須以意治之如敗梳治蝨瘕銅屑治龍瘕之類七癥八瘕載千金方有蛟蛇狐鱉等名又積久則成疳因經絡壅滯郁成濕熱以致口糜齦爛當兼用龍薈等丸見脅痛以清疳熱凡治積宜丸不宜湯必兼用膏藥熨貼及艾灸乃除以其在腸胃之外也一氣聚證必肚腹膨脹時痛時止得噯即寬旋覆痛遊走攻刺宜木香檳榔枳殼牽牛之類不可下上明積聚之理至下文所舉色目不過隨部位而異名總不出積與聚二端心積名伏梁起臍上大如臂上至心下心經氣鬱血滯所致久不已令人煩心宜大七氣湯加石菖蒲半夏兼吞伏梁丸肝積名肥氣在左脅下如覆杯有頭足久不已令人嘔逆或胸脅痛引小腹足寒轉筋寒熱如瘧肝經血氣鬱滯所致宜大七氣湯煎熟待冷淋燒紅鐵鐵器乘熱服兼吞肥氣丸肺積名息賁在右脅下大如覆杯氣逆背痛或少氣善忘久不愈令人洒洒寒熱喘咳皮中時痛如蝨緣針刺肺熱氣壅所致宜大七氣湯加桑白皮杏仁兼吞息賁丸按內經謂脅不滿氣逆二三歲不已病名息積當是肥氣之屬非即此證脾積名痞氣在胃脘大如覆盤痞塞不通心背痛飢減飽見腹滿吐泄久則四肢不收發黃疸飲食不為肌膚足腫肉消宜大七氣湯下紅丸子見傷飲食兼吞痞氣丸腎積曰奔豚發於小腹上衝至心如豚狀上下無時少腹急腰痛久不已令人喘逆骨痿宜大七氣湯倍桂加茴香炒楝子肉兼吞奔豚丸痃在腹內近臍左右各有一條筋脈急痛大者如臂小者如指有時而現如弦之狀故名痃癖偏僻也僻居兩肋有時而痛石瘕生胞中因寒氣客於子門惡血留聚日漸大狀如懷子此氣先病血後病月事不以時下此血分病腸覃寒客大腸外結瘕始如雞卵漸益大如懷孕此氣病血未病故月水不斷此氣分病上二者皆女子病似妊娠治法可用辛熱如吳茱萸桂心附子加入消塊藥脈法沉弦為積浮弦為聚實大有力者生虛小衰弱者死治法大法結者散之客者除之留者行之堅者削之咸以軟之苦以泄之辛以開之莪朮三稜鱉甲專治積聚凡磨積之藥必用補正之藥兼服積消及半即止過則傷正蓋壯人無積必正氣不足邪乃留滯須分初中末三治初起正不甚弱邪尚淺可攻中則邪深正弱可補瀉迭用末但補益正氣兼導達經脈使氣旺流通破殘之邪不攻自走矣又日久則氣鬱已久其初即寒至此亦郁成濕熱積得濕熱愈大當兼驅濕熱之邪胃弱少食勿與攻下二賢散常服自消張子和謂五積六聚治同郁斷蓋積聚由於鬱滯也其治肥氣吐以獨聖散見傷飲食兼汗吐後必有血數滴勿疑以肝藏血故也續以磨積藥調之治伏梁吐以茶調散見傷飲食兼汗又以禹功導水並見腫脹奪之繼以降火之藥調之治痞氣以瓜蒂散見傷飲食吐之以導水禹功下之末以五苓見傷濕淡劑調之治息賁吐以瓜蒂散汗下兼行治賁豚下以導水丸通經散次用治血化氣磨積之藥調之賁豚忌吐或言其峻子和曰積在臟腑多著脂膜曲折之處如陳莝之在江河不在中流多著汀灣洄泊之地遇江河之溢一漂而去積之在臟理亦如之故先以丸藥驅逐新受之食使無梗塞其碎著之積已離未下次以散藥滿胃而下如橫江之筏一湧而盡設未盡者以藥調之惟堅積不可用此法宜以漸除塊癖是也因述九積治法於後食積心酸腹滿大黃牽牛之類甚者礞石巴豆酒積目黃口乾葛根麥糵之類甚者甘遂牽牛氣積噫氣痞塞木香檳榔之類甚者枳殼牽牛涎積咽如拽鋸硃砂膩粉之類甚者瓜蒂甘遂痰積涕唾稠黏半夏南星之類甚者瓜蒂黎蘆癖積兩脅刺痛三稜廣朮之類甚者甘遂蠍梢水積足脛腫滿郁李商陸之類甚者甘遂芫花血積打撲朒瘀產後不月桃仁地榆之類甚者虻蟲水蛭肉積贅瘤核癧膩粉白丁香砭刺出血甚者硇砂信石九積皆以氣為主蟲蟲由濕熱鬱蒸以生或雜食生冷肥甘厚味停滯或五臟勞熱病後氣血鬱積凡可以致濕熱者皆能生蟲不必過餐魚膾白酒誤啖鱉莧水蛭乃然也觀日中有雨則禾節生蟲可見玄珠云蟲得風木之氣乃生得雨氣乃化蓋風木氣溫雨氣濕其為濕熱所生無疑千金要方云蟲有九皆能食人臟腑一曰伏蟲長四分群蟲之主也一曰蛔蟲長一尺或五六寸生髮多則貫心而殺人一曰白蟲長一寸故名寸白蟲子孫相生其母轉大長至四五丈準繩作相連長一丈能殺人子和云頭偏小因飲白酒以桑枝貫牛肉炙食或食生粟或食生魚後即飲乳酪所生發動則損人精氣腰腳疼一曰肉蟲狀如爛杏令人煩滿一曰肺蟲狀如蠶令人咳嗽一曰胃蟲狀如蝦蟆令人嘔吐胃逆喜噦一曰弱蟲又名膈蟲狀如瓜瓣令人多唾一曰赤蟲狀如生肉令人腸鳴一曰蟯蟲至細微形如菜蟲居廣腸中能為痔漏瘡癩疥癬等患人不必盡有有亦不必盡多本事方云心蟲曰蛔即蚘脾蟲曰寸白腎蟲如寸截絲縷即蟯蟲也肝蟲如爛杏肺蟲如蠶皆能殺人肺蟲居肺葉內蝕肺系成瘵疾咯血聲嘶藥所不到治之為難又有屍蟲與人俱生狀如馬尾或如薄筋依脾而居乃有頭尾皆長三寸蟲證心嘈腹痛或上攻心如咬蟲動則心慌亂不寧故嘈雜蟲竄動咬齧則腹痛也嘔吐涎沫清水或青黃水蟲多在胃中胃氣被蟲擾動則津液隨氣壅泛也經謂蟲動則胃緩胃緩則廉泉開故流涎謂胃氣為蟲所滯不能行其津液故上泛而從廉泉穴出耳面色痿黃胃脈上面胃因蟲病虛弱故痿悴之黃色見於面也或乍赤乍白乍青黑青黑為痛色白為少血色赤為火色蟲擾動無常痛甚則面色青黑氣血滯於內不上行則面無血色久滯忽通火得上伸則赤也或面有白斑胃中蝕痕斑駁故面亦應之而成斑若影之肖形然唇常紅脾血因熱滯故色見於唇或生瘡如粟米準繩謂蟲蝕下部為狐下唇有瘡蝕上部為惑上唇有瘡按狐惑之名本金匱謂蝕於喉聲嗄為惑蝕下部咽乾為狐金鑑謂狐即下疳蝕爛肛門與下陰惑即牙疳蝕咽腐齦脫牙穿腮破唇按牙疳下疳皆濕熱病也或沉默欲眠臥起不安不欲飲食惡聞食臭蟲聞食臭即動動則令人心煩故不欲食惡聞食臭飢則痛得食痛更甚蟲飢動而求食又蟲爭食而亂動也飽即安蟲飽即不動矣時痛時止以手拊擊即息一人心腹痛百藥不效惟手捶即止以捶則震動蟲驚畏而止也不捶又作取蟲而愈腹大有青筋或腹中有塊耕起下利黑血小兒疳熱生蟲土敗木克故青筋見腹血敗故利黑血也體有寒熱氣滯於裡則惡寒滯久暴伸於外則發熱脈洪而大腹痛脈當沉弱今反洪大乃濕熱生蟲之象皆其候也治諸蟲法常以白筵草沐浴佳根葉皆可用草既香且為屍蟲所畏也蟲在腹中月上旬頭向上中旬橫之下旬向下觀牛馬生子上旬生者行在母前中旬生者並母而行下旬生者後隨之貓食鼠上旬食上段中旬食中段下旬食下段皆自然之理故治蟲須於上旬用藥一云初一至初五蟲頭向上一云初一至初三一云肺蟲惟初四初六頭向上用獺爪為末調藥若急不能待可忍飢一日使蟲餓於五更時先嚼炙豬肉咽津而勿食使蟲聞香則頭向上然後服殺蟲之藥或用藥末攪雞蛋煎食諸殺蟲藥皆苦惟榧子使君子甘小兒疳蟲煨使君與食以其殼煎湯送下甚妙鶴蝨雷丸蕪荑苦楝根檳榔錫灰等皆殺蟲之品錫灰為最毛景得奇疾每語喉中必有物聲相應有道人教令誦本草藥名至藍而默然遂取藍捩汁飲之少頃吐出肉塊長一寸余人形悉具自後無聲陳正敏遯齋間覽載楊勔得異病每發言應答腹中有小聲效之數年間其聲浸大有道人見而驚曰此應聲蟲也久不治延及妻子令讀本草至雷丸蟲無聲乃頓服之遂愈趙子山苦寸白蟲醫者戒云是疾當止酒而以素所耽嗜欲罷不能一夕醉歸寓已夜半口乾咽燥倉卒無湯飲適廊廡下有甕水月色下照瑩然可掬即酌而飲之其甘如飴連飲數酌乃就寢迨曉蟲出盈席覺心腹頓寬宿疾遂愈驗視乃織草履者浸紅藤根水也吳少師嘗得疾數月間肌肉消瘦每日飲食下咽少時腹如萬蟲攢攻且癢且痛張銳切脈戒云明日早且忍飢勿啖一物銳取黃土一盂溫酒一升投土攪其內出藥百粒飲之覺腸胃掣痛幾不堪忍須臾暴下如傾穢惡鬥許有螞蝗千餘宛轉盤結銳曰蟲入人肝脾里勢須滋生此蟲喜酒又久不得土味乘飢畢集故一藥能洗空之耳蔡定夫之子苦寸白為糵醫者使之碾檳榔細末取石榴東引根煎湯調服之先炙肥豬肉一大臠置口中嚼咀其津膏而勿食云此蟲惟月三日以前其頭向上可用藥攻打餘日即頭向下縱有藥皆無益蟲聞肉香故空群爭赴之覺胸中如萬箭攢攻是其候也然後飲前藥蔡悉如其戒不兩刻腹中雷鳴急登廁蟲下如傾命僕以杖挑撥皆聯綿成串幾長數丈尚蠕動舉而拋於溪流宿患頓愈患此者雖羸弱必先去蟲後以和平之劑調之即此可為一切虛中有實先攻後補之例暗者只用滋補甚且謂蟲為臟寒所生妄加熱藥可哂也中毒不論所服何毒急取灶心土為末冷水調服方寸匕地漿亦佳見砒霜毒或以甘草濃煎汁多飲之須放冷飲毒乃解以下諸藥皆然又食蜜少許佳又服蔥涎或煮大豆汁服亦可又濃煎薺苨汁飲之不及煮便嚼食亦得又方生麥冬八兩去心蔥白八兩搗豉三升水七升煮取三升半分三服又薺苨一分藍葉花七月七日取葉並花陰乾二分共搗末水調服方寸匕日三又板藍根乾者四兩洗淨曬乾貫眾一兩銼去毛青黛研生甘草各一兩為末蜜丸或水浸蒸餅丸桐子大另以青黛為衣每服十五丸嚼爛新水送下即解常服三五丸亦解暑熱又紫金錠冷水磨服孕婦忌之如欲死急取新小便和廁旁久屎一升絞取汁一升盡灌之便活已死者亦可救參下蕈毒條取糞汁法砒霜毒羊血及雞鴨血熱服藍根砂糖擂水服入薄荷汁尤妙亦治巴豆毒綠豆擂漿新汲水調通口服真靛花一二錢井花水濃調灌豆豉煎濃汁飲亦治服藥過劑煩悶芭蕉根搗汁飲掘地至黃土入新汲水攪濁取出濾去滓不必澄清飲之並解蕈毒名地漿巴豆毒黃連菖蒲小豆大豆汁芭蕉根汁並解之狼毒毒白蘞鹽藍汁並解之藜蘆毒雄黃蔥汁並解之芫花毒防風防己甘草桂枝汁並解之躑躅花毒梔子汁解之射岡毒藍汁大小豆汁六畜血蚯蚓屎藕汁並解之莨菪毒薺苨甘草升麻犀角蟹汁並解之半夏毒生薑汁解之大戟毒菖蒲汁解之附子天雄烏頭毒大豆綠豆各數合煎濃汁飲又遠志防風棗飴糖並解之杏仁毒藍子汁解之川椒毒閉口者有毒戟喉能殺人食蒜或飲地漿或濃煎豆豉汁飲並解之雄黃毒防己解之丹砂毒鹽五錢冷水調澄旋服丹毒地漿良食蚌肉解丹石毒五石毒薺苨汁生服吞金屑未絕者水銀一兩放口中搖動令下咽入腹金即消滅成泥而出三服即活漆毒搗蟹汁塗蕈毒忍冬草即金銀花生啖人糞汁飲一升截竹筒去青皮浸糞窖中取筒內汁大豆煮濃汁飲之細茶芽研新汲水調服石首魚或鯗魚頭白水煮汁服荷葉殺蕈毒苦瓠毒黍穰煮汁服解之面毒豆腐毒並用蘿蔔煎湯服子亦可六畜肉毒及一切藥毒白扁豆生曬乾為末新汲水調下三錢匕鳥獸中毒箭死者有毒大豆煮汁及藍汁服解之牛肉毒人乳合豉濃汁服馬肉毒香豉二兩杏仁三兩同蒸一食頃熟搗服日再又方煮蘆根汁飲之郁肉密器蓋肉經宿者也漏脯毒經屋漏水黏著之脯肉也燒犬屎酒服方寸匕飲人乳或韭汁二三升良六畜肝毒凡肝不宜食自死者尤毒豆豉水浸絞汁旋服治馬肝毒雄鼠屎尖者是二七枚為末水和服日再又人頭垢取方寸匕酒調服河豚毒五倍子白礬等分為末水調服或多飲清油吐之蟹毒紫蘇煮汁飲三升冬瓜汁飲二升食果中毒豬骨煆為末服方寸匕亦治馬肝漏脯等毒蛇遺精水中誤服中毒並治蛇咬水調雄黃末飲之蛇咬兼塗傷處蛇咬水洗頭垢稠濃一云泔洗飽飲蟲毒初中尚在膈上者宜吐白礬建茶各二錢為末新汲水調頓服即吐又此藥入口覺甘甜不苦可驗是毒也或令唾水沉者是浮者非或含銀器口中經宿色黑者是若在膈下宜瀉麝香二錢半別研雄黃硃砂水飛俱另研赤腳蜈蚣微炙去足續隨子各一兩共為末煮糯米粥丸如芡實大每服一丸熱酒下即瀉出又方敗鼓皮蠶蛻紙各燒存性刺蝟皮五倍子續隨子硃砂飛雄黃飛各等分為末糯米稀糊丸桐子大每服七丸空心熟水送下又升麻桔梗栝蔞各五兩搗末先以熟湯洗患者陰中再以湯調方寸匕日二服漸加至二三匕毒即內消忌食黏物及豬肉又方鼓皮闊五寸長一尺薔薇根五寸如足拇趾大細切水一升清酒三升煮取一升頓服下其毒即愈又方薺苨根為末飲服方寸匕又方生栝蔞根取汁一升和醬汁少許溫服之須臾吐出蟲甚驗又方胡荽根搗取汁半升和酒飲之立下又方以豬膽導下部良若吐血或下血如爛雞肝者茜根蘘荷根各三兩水四升煮取二升去滓頓服愈又方蝟皮燒灰水服方寸匕即吐出之又方酒服桔梗末加犀角末更佳方寸匕日三服不能服可灌之心中當煩須臾自靜有頃下服至七日止食豬脾補之又治五蟲一曰蛇二曰蜣螂三曰蝦蟆四曰科斗五曰草蟲細切胎衣曬乾為末水服半錢匕即消或含升麻咽汁亦佳嵐瘴惡氣毒犀角羚羊角雄黃麝香解之又甘草二兩水三升煮一升分服井中毒凡五六月井中及深塚中皆伏有毒氣欲入者先以雞鴨毛投之直下至底則無毒若徘徊不下必有毒矣亦可納生雞鴨於其中試之不死者無毒也又須以酒或醋數升灑其四旁良久乃入如中毒鬱悶欲死即取其井中水洗其面令飲之又灌其頭及身即活若其井無水即他井亦可一云他井灑身上至三食頃便活東井取西井南井取北井

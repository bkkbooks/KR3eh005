body:
  text: 卷之一雜症臟腑說喉在咽前其系堅空連接肺本為氣息之路呼吸出入由肺橐龠肺居胸上覆諸臟腑故稱華蓋虛如蜂窠下無透竅吸氣則滿呼氣則虛肺氣上通鼻竅故謂肺開竅於鼻也肺下為心心有系絡上繫於肺心中有竅與肺不同心氣上通於舌故謂心開竅於舌按舌之腠理即竅也原病式注云古知味不可云無竅但細微不似耳目等竅之大耳故守真曰玄腑者玄微腑也臟腑皮毛骨肉筋膜無處不有乃氣出入升降之門路以此推之則心竅在舌可默會矣若泥耳目等竅求之固矣心外有心包絡即膻中也形如仰盂以包裹此心使邪不能犯犯者包絡當之若犯至心即死矣脾胃肝膽腎膀胱各有一系繫於包絡之旁以通於心此三者皆在膈上膈者隔也有膜與脊脅周迴相著遮蔽膈下濁氣使不得上熏心肺膈膜之下為肝肝氣上通於目故謂肝開竅於目肝葉中有膽膽中有汁藏而不瀉以上肺心心包絡肝膽皆從喉之一路而下者也咽在喉後咽系柔空下接胃本為飲食之路水穀由此入胃與喉之氣道不相犯蓋喉竅有一會厭覆之如皮如膜發聲則開咽食則閉故水穀下咽了不犯喉若當食而發聲則會厭忽開食錯入喉喉不容物遂嗆而出矣胃在膈膜之下其上之左有脾形如刀鐮能動而磨食使消化脾氣上通於口故謂脾開竅於口也胃之下口連小腸小腸後附脊膂前附臍之上左環周迴疊積共盤十六曲小腸之下口右接大腸亦名迴腸當臍左回周疊積亦盤十六曲其下為廣腸附脊左環疊積其下名直腸出肛門為糞道廣腸即大腸下節之更大者直腸又廣腸之末節耳廣腸之左側為膀胱膀胱上無竅只有下口出尿飲食入胃得脾消運其精華之氣上升於肺肺布之周身以充血液其餘下入小腸小腸受三焦之氣化泌別清濁糟粕趨大腸以出水飲滲入膀胱小腸與膀胱雖皆無竅相通而得氣運化腠理可以滲灌為尿以出此全賴三焦氣化施行若氣不施化則閉塞不通而病矣以上脾胃小腸大腸膀胱皆從咽之一路而下者也腎有兩形如豆左右相對而附於脊各有二系上繫系於心下繫系於脊腎氣上通於耳故謂腎開竅於耳也心肺脾肝腎為五臟臟者藏也所藏惟精氣藏而不瀉者也膽胃大小腸膀胱為腑腑如庫之貯物膽所貯者汁亦藏而不瀉余所貯者水穀則瀉而不藏雖有瀉不瀉之殊而均有所貯則均謂之腑但膽所貯者乃精汁與水穀之滓穢不同故膽獨名為清淨之腑也心屬火腎屬水肝屬木肺屬金脾屬土而小腸與心經脈相連故從心屬火膀胱與腎經脈相連故從腎屬水膽與肝經脈相連故從肝屬木大腸與肺經脈相連故從肺屬金胃與脾經脈相連故從脾屬土而臟屬陰則配乙丁己癸辛之陰乾故肝稱乙木心稱丁火脾稱己土腎稱癸水肺稱辛金腑為陽則配甲丙戊庚壬之陽干故膽稱甲木小腸稱丙火胃稱戊土大腸稱庚金膀胱稱壬水也五臟五腑兩其五行而為十干止矣而益以心包絡與三焦為十二何也此千古所未明而不可不言者說見後篇心包絡三焦說心包絡難經謂其無形然考內經論十二官無心包絡之名而有膻中之號蓋膻中乃心之窩心藏窩中若包裹然則膻中固即心包絡非無形也三焦經謂上焦如霧上焦膈以上也清陽之分其氣如霧中焦如漚中焦膈下臍上也水穀之區停留如漚下焦如瀆下焦臍以下也便溺所出如決瀆亦未言其形狀論者紛紛皆如捕風捉影毫無實指惟張景岳謂即腔子臟腑如物腔子如囊之括物人但知物之為物而不知囊之亦為一物其說甚通古謂三焦有名無形者蓋指腔子內臟腑外之空際言乃三焦火氣遊行之處也予因是而思人之臟腑只有十而以心為君余為臣三焦即腔子竊謂焦當作椎人身脊骨二十一椎上焦乃上七椎中焦乃中七椎下焦乃下七椎也椎別作焦耳觀靈樞背腧篇五七九十一十四各椎俱作焦可見如京城君臣所同居也心包絡即膻中如宮城君所獨居也宮城在內京城在外內為陰外為陽故三焦亦稱腑而心包絡亦稱臟耳三焦既即腔子則為有形有形則有經脈凡腔子中之經脈皆三焦之經脈但不分地立名難於指稱故將其與各臟腑絡系者分屬所絡系之臟腑名曰某臟某腑經脈而以其無所擊屬者名三焦經脈猶之九州之地皆王土而除分封諸侯外余為王畿心包經脈亦三焦經脈之絡繫於膻中者所分屬為十二經也奇經八脈亦即三焦經脈另立名目分出如王畿內有公卿大夫采地也五臟配五行八卦說心肺位居膈上而肺尤高天之分也故屬乾金肝腎位下而腎尤下為黃泉之分故屬坎水坎外陰而內陽陽氣潛藏於黃泉之中靜極復動故冬至而一陽生驚蟄而雷出於地腎水得命門之火所蒸化氣以上肝受之而升騰故肝於時為春於象為木於卦為震雷巽風肝之怒而氣盛如之陽氣上升至心而盛陽盛則為火故心屬火於卦為離離南方之卦也聖人嚮明而治心居肺下乾卦之九五也實為君主神明出焉離乾中畫之變也兌乾上畫之變也肺居心上乾之上畫也上畫變而為兌於時為秋於象為金金性沉降秋氣斂肅陽氣升極而降由肺而降故肺又屬兌金心火上炎腎水下潤坎離之定位也火在上而下降水在下而上升坎離之交媾也腎水上升由肝木之汲引地道左旋而上於天也心火下降由肺金之斂抑天道右旋而入於地也脾臟居中為上下升降之樞紐飲食入胃脾為行運其氣於上下內外猶土之布化於四時故屬土於卦為坤為艮金木土皆配兩卦而水火各主一卦故五行惟水火之用為獨專也水火說男女媾精以成胎精即水也精中之氣即火也水火精氣妙合而凝是為胎元精以成形氣以成神以其原於父母故曰先天然五官百骸皆本此精以為質而無非此水所灌充也呼吸運動皆本此氣以為機而無非此火所流行也其獨指腎為先天者則以精氣先結胞胎中起一莖形如蓮蕊一莖即臍帶也蓮蕊即兩腎也兩腎為水命門之火寓焉一陽藏於二陰之中於卦為坎以臟腑之始結在此故獨以腎中水火為先天也先天水足則兒肥盛而潤澤火足則兒強健而精明水得火則氣常溫而不至於寒火得水則形常潤而不至於槁苟先天水火一有偏勝則稟受失其中和而後天培養之功為不可少矣人生一日不再食則飢故有資於飲食則脾胃司之胃主進納脾主運化飲食之氣味精華由脾胃以灌輸周身氣日盛而體日充先天之水火賴此滋養以生生不息故以脾胃為後天之本也總之人身中潤澤之氣即水也溫暖之氣即火也一有偏勝其致自飲食者調之甚易其稟於胎氣者治之甚難故先天為重然不以畏難而廢治全賴飲食以救弊補偏故後天為要也火根於腎而屬諸心何也曰腎於卦為坎於令為冬於位為北本水之宅也而陽根於陰則火生焉下潛而上升心於卦為離於令為夏於位為南則火之宅也至其宅而後旺故從其旺而屬之心也其曰心為君火腎為相火又曰君火以明相火以位何也曰君者主也嚮明以治心為一身之主神明出焉故稱君相者竭其才能以奉君出治者也腎位於下輸其火於心以為神明之用猶相臣竭其才力以奉君出治故稱相位以職掌言明以功能言也火者人身溫和之氣也五臟六腑皆有此溫和之氣各歸其部則各有其位各效其能則各有其明腎中相火非無明也陽方潛藏光未被乎四表職司封蟄龍不離於深淵故不言明而言位失其位則有飛揚僭越之患矣心中君火非無位也君主無為不與臣下較職守神明有覺獨從方寸著虛靈故不言位而言明也失其明則有昏惑晦昧之憂矣然則君火相火皆吾身陽和之正氣而不可無者而或指之為邪謂君火可直折相火不可直折何也曰失其正則為邪失其和則為熱故謂君相火為邪火者乃指君火相火之邪熱者言非君火相火之本為邪也直折猶云正治治熱以寒治之正也君火屬心居於上焦其病無與於下無與於下則根本之真陽無恙特炎於上者過乎赫曦故可以寒涼治其有餘之邪使歸於正無所損於本原也若腎中相火居於下焦病則必干乎上無論下焦為寒鳥熱熱固上僭寒亦上浮蓋腎中水火同根本無偏勝若熱盛而水虧則火必致上炎寒盛而火虛亦必火因寒逼不安其宅而上浮也故言相火為病者乃因其在上之熱而直探其在下之根言之病既根於下則不可以治上者治之矣何也火虛而治以寒涼是益助其下焦之寒火愈被逼而上浮矣且為寒所逼之火本無根之殘焰而又以寒折之有不消滅者乎水虛而火炎若無妨於寒涼不知火炎本乎水虛不用平潤之劑以補水而徒用苦寒以制火是何異因金銀之缺少而鑿平馬以相就必致並傷其火而後已故曰不可直折也相火靜而藏則屬腎動而發則屬肝膽此火布𮑮於三焦而心包絡為三焦之臟若肝之配膽故又曰肝膽三焦心包絡相火也命門說難經謂腎有兩枚非皆腎也左為腎屬水右為命門屬火後人非之謂兩腎皆屬水命門在兩腎之中當脊骨自上數下第十四椎陷中若自下數上則為第七椎正與臍對引內經鬲肓之上中有父母謂心也七節即第七椎之旁中有小心為證謂兩腎在七節之旁兩腎中間即七節之陷中也小心即命門醫貫又以中字為解以太極形容謂一中分太極中篆作太極也分太極為者象人之脊骨象人之兩腎兩腎相合仍為一太極其中空白處象命門又兩腎既分為兩儀則左腎為陰水右腎為陽水陽水者氣之液也坎水也坎以一陽陷於二陰水氣潛行地中為萬物受命根本月令於仲秋云殺氣如盛陽氣衰水始涸是水之涸地之死也於仲冬云水泉動是月一陽生是水之動地之生也陰水者形也兌澤也一陰上徹於二陽之上兌以有形之水普施萬物下降為資生之利澤其說甚有理然與難經所言大致亦自無殊蓋皆言腎雖屬水而水中有火耳所用補火之藥總屬一樣豈有分別此味則入右腎彼味則入七節憂其岐誤致煩辨正哉至趙氏謂命火乃先天之元陽腎水乃先天之元陰為生命之根本治病必須求本故凡寒之不寒用寒藥以治熱而熱不退是無水也無水者壯水之主主水者腎以制陽光當主六味丸熱之不熱是無火也無火者益火之原以消陰翳當主八味丸並見虛損遵其說而用之敗證效誠如神若初起遽以此投之則謬矣何則初病止傷其後天之血氣未遽累及先天之水火故但熱之則寒消寒之則熱退隨手立應何必他求乃不去其邪而遽補其正有不遷延時日坐失事機者哉何今之為醫者泥於醫貫之說不論新病久病非六味則八味非補中見氣則歸脾見血竟若歷古方書皆可刪卻亦惑之甚矣或問氣即火也血即水也兒在胎中氣血已具是氣血亦先天所生六味補水八味補火是水火亦後天所養今謂氣血為後天水火為先天毋乃輕氣血而重水火乎曰氣血者水火之大綱也人身呼吸運動知覺神明皆此火之為之也氣可以言呼吸運動不可以言知覺神明是氣雖即火而不足以盡火人身之血液精髓皆此水之為之也血特水中之赤者耳不可以概其餘故血雖即水而不足以盡水有生之初胎孕始結形如露珠父母之精氣也是水火乃先天之先天數月形成而後血氣具是血氣為先天之後天若夫既生之後飲食所長養之氣血其為後天又不待言矣此水火氣血先後天之分如此先天實為後天之根故水火為氣血之原而下焦又為中上之根故腎命為水火之本其輕重之分固不能以無別也先天水火又互相為根如噓氣成水陰根於陽也蒸水成氣陽根於陰也五臟生克說五臟生克須實從氣機病情講明若徒作五行套語茫然不知的實多致錯誤今略著其概如左飲食入胃脾為運行其精英之氣雖曰周布諸臟實先上輸於肺氣親上也肺先受其益是為脾土生肺金肺受脾之益則氣愈旺化水下降澤及百體是為肺金生腎水腎受肺之生則水愈足為命門之火所蒸化氣上升肝先受其益是為腎水生肝木肝受腎之益則氣愈旺上資心陽發為光明是為肝木生心火脾之所以能運化飲食者氣也氣寒則凝滯而不行得心火以溫之乃健運而不息是為心火生脾土此五臟相生之氣機也肺在心上心火上炎肺受其傷此為心火克肺金也若由脾胃積熱或由肝腎相火或由本經鬱熱皆與心無涉腎陰太盛寒氣上衝心為之悸或腎寒甚而逼其龍火上乘心為之煩皆腎水克心火也若飲水過多停蓄不行心火被逼不安而悸者與腎無涉脾氣過燥則腎水為其所涸而失潤或過濕則腎水為其所壅而不流皆脾土克腎水也若他臟之燥外感之濕與脾無涉肝木疎泄太過則脾胃因之而氣虛或肝氣鬱結太甚則脾胃因之而氣滯皆肝木克脾土也若自致耗散自致凝滯及由他臟腑所致者與肝無涉氣有降則有升無降則無升純降則不升何則濁陰從肺右降則胸中曠若太虛無有窒塞清陽得以從肝左升是謂有降有升若濁陰壅滿胸中不肯下降則肝氣被遏欲升不能是謂無降無升東垣謂食填太陰為金剋木即此說詳見傷飲食門肺金肅斂太過有秋無春是謂純降不升無降無升純降不升皆肺金克肝木也若肝木自沉或因他臟之寒鬱與肺無涉此五臟相剋之病情也不足則欲其生太過則欲其克故木疏土而脾滯以行金得火而肺寒以解腎得脾之健運而水無氾濫之虞肝得金之斂抑而木無疎散之患人但知生之為生而不知克之為生心火偏勝則克肺金若腎水充足則火有所制不但不剋金且溫脾以生金餘臟同此論之此平人之無病實由五臟互相剋制故不至偏勝為災即經所謂亢則害亢太盛也害克也承乃制承相承也水之承金如子之承父火耒剋金水乃制之也制生化火受水制則不特不剋金且益土以生金化猶生也若已病之人則火盛者不但刑金且復涸水肝脾皆被焚灼矣不治之而望其自然承製有此理乎乃醫者見其熱極血瘀而舌黑也熱伏於內而外反寒慄也謂黑為水色寒慄為水象是火極而反兼水化乃金之子水為母報火之仇即亢害承製之理其說雖本前人終欠的當醫貫曰人皆曰水剋火予獨曰水養火蓋水剋火者後天有形之水火也水養火者先天無形之水火也先天水火互相為根故水養火如燈得油而愈明也人皆曰金生水予獨曰水生金蓋肺氣夜臥則歸藏於腎水之中腎中火炎則金為火刑而不能歸無火則水冷金寒亦不能歸凡氣從臍下逆奔而上者腎虛不能納氣歸元也毋徒治肺或壯水之主此即承製之理腎水心火一也或益火之元所謂水冷金寒用丙丁也即制生化以克為生之理金向水中生矣人皆曰土剋水予獨於水中補土八味丸從水中補火以蒸腐水穀是也尋常土寒止須補脾胃之陽若命門火衰猶釜底無薪必須八味丸人皆曰木剋土予獨升木以培土蓋木者春生之氣也與胃氣同出異名當遂其發生之性木氣升發即胃氣升發也及其發達既久生意已竭又當斂歸水土之中以為來春發生之本明此則金之剋木正所以斂聚其生意不使散也亦以克為生之理焉有伐之之理此東垣脾胃論用升柴以升木氣諄諄言之詳也土性中和有升有降鬱而不升雖曰木病亦即土病故升木即是培土由是言之若有升無降則降金亦未始非培土矣愚按趙氏之說甚有理誠能觸類引伸則五臟互相關係之故無不了然矣趙氏又論五行各有五其說頗鑿未甚的當予謂五臟無一臟無血液是皆有水也無一臟無氣是皆有火也無一臟不發生是皆有木也無一臟不藏斂是皆有金也有氣有血有發有斂是無一臟不和平則皆有土也知五臟各具五行則其互相關涉之故愈推愈覺無窮而生克之妙不愈可見哉五邪說五臟互相關涉則五臟皆得為一臟之病故有本臟自病者有他臟傳來者何以別之以證之先後見者別之如止見腰熱足心熱尺脈沉數是腎水虛而熱也若先見目赤脅痛左關脈數而後見前脈證是子病及母也若先見咳嗽喘滿右寸脈數而後見前脈證是母病及子也若先見腹痛肚熱大便秘結右關脈數而後見前脈證是夫病傳妻也若先見心煩舌赤小便赤澀左寸脈數而後見前脈證是妻病傳夫也他臟仿此難經論五邪謂假令心病因傷暑得之為正邪暑屬心火本經自病因中風得之為虛邪乃從後來者也木向前生火是火在木前木在火後心病自肝傳來故曰從後來也因飲食勞倦得之為實邪從前來者也因傷寒猶言因肺受寒得之為微邪從所勝來者也因中濕難經以濕屬腎以濕即水也得之為賊邪從所不勝來者也脈訣又以脈言之謂心火當夏令時反見肝脈為虛邪虛則補其母難愈反見脾脈為實邪實則瀉其子易愈反見肺脈為微邪雖不治自愈蓋以夏令心火當權脈應洪大今猶見春脈是至而不至不得乘時正位為火氣不足故見傷風飧泄之證須用辛溫之品以補肝使木氣上升以生火而補正難於速效也又脾脈未及長夏而先見為土氣有餘故見飲食停滯大便燥結等證須用苦寒以瀉其子一瀉而邪即去易於為力也又火令當權金偶來乘立即避去不逐自退如夏月偶然感寒咳嗽即不發表而暑月多汗邪隨汗散不藥而愈也然脈訣又謂春得脾而難療冬見心而不治反以微邪為可畏者何也解者謂本脈得令而兼帶妻脈則為微邪不治自愈如夏令見洪肺略帶澀也若本脈全無而獨見妻脈則不可以微邪論也如夏令脈澀而不洪是全見妻脈也恐金生水來剋火故不治當細察之十二經配三陽三陰說心經脈名手少陰經小腸經脈名手太陽經肺經脈名手太陰經大腸經脈名手陽明經心包絡經脈名手厥陰經三焦經脈名手少陽經以各脈俱行於手故言手以別於足經也腎經脈名足少陰經膀胱經脈名足太陽經脾經脈名足太陰經胃經脈名足陽明經肝經脈名足厥陰經膽經脈名足少陽經以各經俱行於足故言足以別於手經也陰陽之分則從其所繫之臟腑而命之耳然太陽少陽太陰少陰四象也四象之外又增陽明厥陰名色非蛇足乎則何不直以心經小腸經等稱稱之之為得乎又內經嘗以厥陰為一陰少陰為二陰太陰為三陰少陽為一陽陽明為二陽太陽為三陽矣則又何不以一陰二陰等稱稱之乎竊謂五臟配五行六經配六爻三陰經坤之三畫也三陽經乾之三畫也以一二三為序命之似為妥當而必立此太少厥等名色且泥此生解支離牽強無當病情千古相沿不改此莊生所謂呼牛者姑應以牛呼馬姑應以馬耳六氣說六氣風熱暑濕燥寒也風屬木暑熱皆屬火而分熱為君火暑為相火此與心為君火腎為相火之說各別濕屬土燥屬金寒屬水此內經之說也夫四時之氣春則溫夏則熱秋則涼冬則寒然溫熱蒸而為濕涼寒肅而為燥此四氣之外又添燥濕二氣也濕極於夏燥始於秋故系濕於長夏系燥於秋一以終言一以始言乃互文以見意非謂春無濕而冬無燥也又四時皆有風而屬巽木故系之春豈夏秋冬無風乎不言溫涼者以寒熱為舉隅非謂春必當以風易溫秋必當以燥易涼也此等最宜活看倘若執運氣之說則於理難通矣何則陰陽水火相為對待本無偏勝故四序不愆若泥分大寒立春雨水驚蟄屬風木則混冬月之節令入於春矣分春分清明穀雨立夏屬熱火小滿芒種夏至小暑屬暑火則春夏混亂火令過多矣分大暑立秋處暑白露屬濕土則秋氣反多於夏而土為失位矣九秋皆屬燥氣而割三節以與相反之濕止存秋分寒露霜降三節反取立冬一節以益之牽混破碎節序皆愆尚可信乎雖雲陽有餘陰不足亦何至火二而水一因分火為熱暑二氣以致此盈彼縮而四序皆愆亦何為乎竊謂溫涼寒熱四氣分布四時鐵板不易燥濕二氣皆屬之土有寒濕有熱濕有寒燥有熱燥分布四季月辰未為濕土溫熱之所蒸也戌醜為燥土寒涼之所肅也是為熱濕寒燥又火在地中而土燥坤土次於離火之後是也水在地中而土濕艮土次於坎水之後是也是為熱燥寒濕蓋土德兼該有如是也風則無時不有而秋冬更為凜烈合之為七氣夫何不可之有哉昔人謂內經非岐黃書乃後人之假託要未必出於一手故有醇有疵分別觀之可耳六氣後論有在天之六氣有在人之六氣上篇所言天之六氣也此篇所言人身之六氣也經曰人身之氣以天地之疾風名之是人身之氣可名之為風也各臟腑皆有氣皆可名風而屬之肝者以風為動物肝主動也經曰在天為風在地為木在人為肝故古人於肝或名之為木或名之為風凡醫書中所言風證作外感風寒看不合者作肝氣看則合初學之士不可不知也若誤作外邪治妄行發散則非矣然內風亦有當發散者以肝氣鬱抑於中則與之升發或服藥後溫覆以取微汗令之外發或但服藥令之內升不用溫覆取汗酌之可也外感之風多屬寒雖夏月得風亦涼可見也內生之風則多屬熱何者人身之氣有寒有熱氣寒則微氣熱則盛盛則鼓盪飄忽而風生焉所謂熱極生風又謂風從火斷汗之宜也風既為熱氣所生則其氣必熱而亦有寒者以火氣暴盛者元氣被其沖激煽而為風風動而生涼也驗之焚燎火起則風發風即虛空之氣耳不煽不動火之沖激與用扇搧之無異也習習生涼可見故丹溪謂寒氣自下上衝為火即此義也火在天為熱氣經以屬之春分後四氣暑氣經以屬之小滿後四氣在地為五行之火在人身為君相之火已詳水火論濕在天為濕氣在地為土在人為脾胃故古人言脾胃往往以土名之或以濕名之然脾胃居中兼該六氣六氣皆能為之病不獨主濕惡濕也燥在天為清氣在地為金在人為肺故古人言肺往往以金名之以燥名之而或主寒燥言或主熱燥言則當細與辨別庶不致錯誤寒在天為寒氣在地為水在人為腎故古人言腎往往以水名之以寒名之經曰冬傷於寒寒字即腎字之替身非言時令之寒也人身六氣為病有自生者有與天之六氣相感應而生者故外感內傷大端最宜分晰也運氣說運氣之說拘牽不通固為有識者所不信然其大指在詳舉六氣有許多變幻寒中有熱熱中有寒邪正交錯蕃變紛紜莫可紀極一以明人之病源一以例人之病情耳明人之病源者言人感六氣而生病欲人細推所感之氣其中有無夾雜他氣當兼治也例人之病情者天地之氣變幻無定則人身之氣亦變幻無定而病情不可以一律拘也如冬月固屬寒氣司令然亦有客熱加臨故冬月亦有溫時所謂非時之暖也人於冬月病外感則未知為感寒而病歟抑感非時之溫而病歟是其源所當察也寒氣在上則陽伏地中故土上凜烈而井泉溫暖以驗人身則外感於寒而內郁為熱也是其情之有可例也此言運氣者之大指取其大者略其煩碎棄其紕謬而實實體驗於人身是在善讀書者耳虛實寒熱說虛者正虛也謂其人氣血虛衰也實者邪實也一切內外寒熱諸邪不論有形無形但著滯為患亟宜消散者皆為實邪非謂其人氣血壯實也故曰虛中有實實中有虛所謂正自虛而邪自實也虛而不實者只用補虛而實者必攻補兼施若實而不虛則直攻之而已如虛人傷食輕則於補劑中加消導之品重則加下利之藥頃刻收功矣庸醫乃謂須與純補俟其氣旺則食自運遷延時日坐失事機往往變生他證即幸而奏效病者受苦久矣未有久苦於病而元氣不傷者也名曰補之實以傷之亦何為哉有虛寒有實寒如多食生冷及寒痰停滯之類有虛熱有實熱知實熱而不知虛熱與知虛寒而不知實寒皆庸醫也補瀉論瀉此即補彼如瀉火即是補水補此即瀉彼如補火即是驅寒故瀉即補也補即瀉也寒以補陰故夏月飲水熱以補陽故冬日飲湯必以溫熱為補寒涼為瀉者謬也張子和謂良工治病先治其實後治其虛亦有不治其虛時庸工治病純補其虛不敢治其實以為先固其氣元氣實邪自去不知邪之中人輕則傳久而自盡頗甚則傳久而難已更甚則暴死補之真氣未勝邪已交馳橫騖而不可制矣惟脈虛下脫無邪無積之人方可議補其餘有邪積之人必以吐汗下三法先攻其邪邪去而元氣自復也又曰汗吐下以藥石草木治病者也猶君之刑罰補者以穀肉果菜養口體者也猶君之德教故曰德教興平之粱肉刑罰治亂之藥石若人無病粱肉而已及其有病當先誅伐病之去也粱肉補之如世已治矣刑措而不用豈可以藥石為補哉又曰胸以上大滿大實病如膠粥微丸微散皆兒戲也非吐病安能出又曰風寒暑濕之氣入於皮膚之間而未深欲亟去之莫如發汗又曰人知下之為瀉而不知下之為補陳莝去而腸胃潔癥瘕盡而榮衛昌不補之中有真補者存焉又曰人之食飲酸鹹甘苦百味皆聚於胃壅而不行蕩其舊而新之亦脾胃之所望也其言可謂名通按子和治病不論何證皆以吐汗下三法取效此有至理存焉蓋萬病非熱則寒寒者氣不運而滯熱者氣亦壅而不運氣不運則熱鬱痰生血停食積種種阻塞於中矣人身氣血貴通而不貴塞非三法何由通乎又去邪即所以補正邪去則正復但以平淡之飲食調之不數日而精神勃發矣故婦人不孕者此法行後即孕陰陽和暢也男子亦陽道驟興子和云病久否閉忽得湧泄血氣衝和心腎交媾陽事必舉宜切戒房室非其明驗乎丹溪倒倉法實於此得悟後人不明其理而不敢用但以溫補為穩殺人如麻可嘆也反治論以熱治寒以寒治熱謂之正治又謂之逆治逆其性也以熱治熱以寒治寒謂之反治又謂之從治從其性也而有真反假反之分假反者如熱邪內陷陽氣不達於外故身冷肢厥戰慄惡寒以大承氣湯下之而愈不識者見其外證似寒用寒訝其相反識者謂其內證真熱用寒實為正治乃假反而非真反也真反者如風火暴盛痰涎上湧閉塞咽喉非辛熱之品不能開散不得已暫用星半烏附巴豆等熱藥是則真反也又有寒熱並用者因其人寒熱之邪夾雜於內不得不用寒熱夾雜之劑古人每多如此昧者訾為雜亂乃無識也然亦有純寒而於熱劑中少加寒品純熱而於寒劑中少加熱藥者此則名為反佐以純熱證雖宜用純寒然慮火因寒鬱則不得不於寒劑中少佐辛熱之品以行散之庶免凝閉郁遏之患寒藥熱服亦此意也純寒證雖宜用純熱然慮熱性上升不肯下降則不得不於熱劑中少佐沉寒之品以引熱藥下行如加膽汁童便入熱藥中引入肝腎之類又熱藥寒服亦此意也此反佐之義也知此諸義則上病取下如心火上炎由腎水下虛滋陰則火自降下病取上如小便不攝由肺氣虛者則益肺氣左病取右右病取左如左半身痰凝不遂由右半身火氣逼注使然則瀉右之火氣而左自寬欲升先降濁降而後清可得而升如水停氣不化津而渴用五苓去水升清則津生渴止是也欲降先升如小便不通用吐法欲行先止如氣虛散漫不能運行須先收斂其氣凝聚不散盛則自運所謂塞因塞用也欲止先行如食積瀉用承氣去積則已所謂通因通用也等法皆觸類貫通矣標本說標本中氣之說出於內經有謂天之六氣為本人之六經為標經之相為表裡者為中氣所謂少陽之上火氣治之中見厥陰天在人上故曰上言少陽感天之火氣而病少陽與厥陰為表裡病每相連故其中兼見厥陰證也余仿此陽明之上燥氣治之中見太陰太陽之上寒氣治之中見少陰厥陰之上風氣治之中見少陽少陰之上熱氣治之中見太陽太陰之上濕氣治之中見陽明是也有謂人之臟腑為本六經為標臟腑之相為表裡者為中氣如胃為本足陽明經為標脾為中氣脾為本足太陰經為標胃為中氣是也有謂病之先受者為本病之後變者為標如病本於傷食因而證見吐瀉是也又此臟此經先病後乃轉屬他臟他經是也經謂病有生於本者有生於標者有生於中氣者有在標而求之於標在本而求之於本有在本而求之於標在標而求之於本先病而後逆者因病而致氣血之逆先逆而後病者先寒或熱而後病者先病而後寒或熱者先病而後泄者先泄而後病者皆治其本惟先熱而後生中滿先病而後生中滿及大小便不利者皆治其標中滿指脹極肚腹欲裂者言大小便不利指點滴不通者言並屬危急之候故先治標按中風痰涎壅盛不通則死急用三生飲稀涎通關等散去其痰又吐衄余血停瘀不得不去瘀導滯亦急則治標之義也又謂病發而有餘邪盛也本而標之邪盛則侮及他臟而因本以傳標先治其本後治其標病發而不足正虛也標而本之不足則他臟來侮為標病傳本先治其標後治其本謹察間間即論語病間曰之間甚以意調之間者並行標本兼治也甚者獨行又謂少陽太陰從本少陰太陽從本從標陽明厥陰不從標本從乎中從前解者殊欠明白愚謂少陽經之屬陽者也少陽之上火氣治之火亦陽也故少陽從本為以陽從陽不言從中者中為厥陰木從火化彼反從我故不言也太陰經之屬陰者也濕亦陰氣也故太陰從本為以陰從陰不言從中者中為陽明燥從濕化亦彼反從我故不言也少陰經之屬陰者也熱氣則為陽矣太陽經之屬陽者也寒氣則屬陰矣標本異氣各能生病故或從本或從標也亦俱不言從中者少陰之中為太陽言從本之陽足以該之太陽之中為少陰言從本之陰亦足以該之至若陽明亦經之陽者也燥亦氣之屬陽者也寧非以陽從陽而不言從本者以從本一義已於少陽太陰發之而有燥從濕化者其理不可不明故特舉從中言也厥陰亦經之陰者也風亦氣之屬陽者寧非標本異氣而不言或從標或從本者以從標一義已於少陰太陽發之而從本之風則又從乎火化故不從本而從乎中也然風從火化木火同氣其理無疑若燥濕相反其從化理似難說然觀仲景治傷寒燥渴反用五苓去濕其理可推蓋脾土之濕壅滯不行則氣化不布津液不流而胃與大腸均失其潤反成燥結固有之矣按從中之說不過於常理之外另立一義以示木能生火濕鬱成熱之例非謂厥陰病必有陽無陰陽明病必有濕而無燥也若執泥便說不去張子和標本歌云少陽從本為相火太陰從本濕土坐厥陰從中風是家陽明從中濕是我太陽少陰標本從陰陽二氣相包裹風從火斷汗之宜燥與濕兼下之可其意蓋謂燥證當以溫潤之藥治之耳觀其治燥諸條只用硝黃不用去濕之藥不泥經語可見矣再按少陽太陰從本此純熱無寒純寒無熱標本合一者之治例也少陰太陽從本從標此寒中有熱熱中有寒陰陽夾雜者之治例也陽明厥陰不從標本從乎中治此陽證根陰陰證根陽表裡互求者之治例也如此看較活表裡論以周身言則軀殼為表臟腑為里而以軀殼言則皮膚為表骨肉為里以臟腑言則腑為表臟為里也以經脈言太陽陽明為表三陰為里少陽為半表半裡而於表中又分表裡則太陽乃表之表陽明乃表之裡於裡中又分表裡則太陰為里之表少陰為里之中厥陰為里之裡也故傷寒傳經之次首太陽次陽明次少陽次太陰次少陰次厥陰按太陽之腑為膀胱陽明之腑為胃二腑皆貯物瀉而不藏外通出表故其經脈屬表太陰之藏脾少陰之藏腎厥陰之藏肝皆貯精藏而不瀉不能外出故其經脈屬裡少陽之府膽所貯精汁類於物則似腑也然亦藏而不瀉則又似臟故其經脈屬半表半裡此無可疑獨腎位肝下最屬深藏其經脈應為里之裡乃反為里之中此則不能無疑豈經脈雖連繫於臟腑而其表裡層次自以其行於肌膚之淺深分不照臟腑之部位為次序耶且此止言足經耳若手經之次第亦有可得而言者耶竊疑內經熱病論論傷寒傳經之次乃仿運氣厥陰為一陰少陰為二陰太陰為三陰少陽為一陽陽明為二陽太陽為三陽之說以為言然此乃言客氣之次第恐未可為病機之據也且運氣之說亦謬而不足信矣陰陽論人身從臍中分上部為陽下部為陰面為陽背為陰左為陽右為陰表為陽里為陰腑為陽臟為陰氣為陽血為陰動為陽靜為陰語為陽默為陰寤為陽寐為陰呼為陽吸為陰魂為陽魄為陰內經言背為陽是對腹為陰說非謂背為陽而面為陰也蓋腹處下而背居上故以上者為陽下者為陰耳後人不明其說以腹字當面字看誤矣觀易卦陽盛於午陰盛於子背北也北屬陰陰靜陽動背不動屬陰明矣又溺水死者女屍必仰女人陰氣重也男屍必僕男人陽氣重也不更可驗背之屬陰面之屬陽哉夫陽盛於午陰盛於子此面陽背陰之義也由復至乾左升為陽由姤至坤右降為陰此左陽右陰之義也陽主氣陰主血陽大而陰小乃丹溪謂左半血多右半氣多人右手足大於左手足何也曰左右陰陽對待本甚均平無偏多偏少然陽盛於午至酉而猶熱陰盛於子至卯而猶寒豈非極盛之勢餘氣猶旺耶然則左雖屬陽而陰反盛右雖屬陰而陽反強固可見矣又何疑於左半身血多右半身氣多右手足之大於左手足乎醫貫謂冬至一陽生當漸向暖和乃臘月大寒冰雪反甚蓋陽伏於下逼陰於上故井水氣蒸而堅冰至夏至一陰生當漸向清涼乃三伏潺暑酷熱反熾蓋陰盛於下逼陽於上故井水寒而雷電合可以互證予嘗病眼熱必右目先而甚左目後而微知左屬血火不易傷也所謂乾柴者先灼濕者後燃也又病腳腫必左先而甚右後而微知右屬氣濕尚易運也又嘗掩右目用左目視月則不如右目之明以右目火盛能遠燭也掩左目用右目觀書則不如左目之朗以左目水盛能近鑑也然此猶各有所長也若較其強弱則右必強於左嘗吹筒弋鳥筒鳥相對若引繩以為必中也而不中知二目之力有強弱不同也因閉右目獨用左目視筒鳥如引繩乃開右目並用則大異矣是左目為右目所奪也又閉左目獨用右目視筒鳥如引繩乃開左目並視其為如引繩者亦無異也是右目不為左目所奪也豈非右目強而左目弱哉故經言右耳目不如左耳目明者吾不信也腑為陽臟為陰細分之則心肺處上部為陽肝腎居下部為陰又心與肺較則肺屬金為陰心屬火為陽肝與腎較腎屬水為陰肝屬木為陽又肺與肝較則肺主降為陰肝主升為陽又腎有水有火腎火為陽腎水為陰紛紜蕃變無有定名醫書動言陰陽而不切指其為何項甚屬朦混當細分之如言陰虛則未知其言血虛耶肺虛耶腎水虛耶腎火虛耶何不切指之曰血虛曰肺虛曰腎水虛曰腎火虛之為明白也本集一一分晰之夏月伏陰辨丹溪謂夏月炎暑盛行人身內外皆熱其說甚的乃張景岳謂夏月伏陰人身外熱內寒冬至伏陽人身外寒內熱以夏至陰生地上熱而井水寒冬至陽生地上寒而井水溫為證其說似是而非乃知有天時而不知有地理者也人身之氣與天地通固從天時而變亦隨地勢而移既有東西南北之殊豈無上下高深之別人之身固在地上也非在地中也設夏時而身處井中則不特內寒即外亦寒矣尚得如其說謂外熱內寒耶然則置身地上不特外熱即內亦熱自可反觀而見矣試觀浮瓜沉李咽水飲冰未嘗畏冷其情可見冬月能如是乎或曰夏月汗多汗多則亡陽陽亡則陰生於內謂之伏陰非歟曰夏月汗多是人皆然豈皆亡陽乎不過虛其津液耳津液虛即陰虛陰虛則陽愈熾觀小便之短而赤可知不滋金水而補火土吾見其惑也曰古人於暑證多用熱劑非歟曰此因證轉虛寒乃然不可一概混施也問夏月陽氣外泄冬月陽氣內臟非歟曰陽外泄則汗出而內涸故清潤之品為宜氣內斂則化水而陰滋故溫熱之劑可任觀夏月渴而小便短赤冬月不渴而小便清長則陽外泄者之內非冷陽內藏者之中非熱不辨自明矣氣氣無形而血有質氣為陽主護衛於外故名之曰衛血為陰主營運於中故名之曰營血陰有質故其行也必次第循經而入於脈道之中充於內而後達於外氣陽無形故其行也慓疾不循經而出於脈道之外實於表而後返於裡觀內經謂飲酒者氣先行皮膚先充在外之絡脈而後滿於在內之經脈可見矣此二者之行所以有不同也經謂營氣之行寅時起由肺經而大腸胃脾心小腸膀胱腎心包三焦膽肝諸經復返於肺如是者每日五十周衛氣之行每日早至暮行陽分二十五周每周由太陽而少陽陽明足少陰復返於太陽暮至曉行陰分二十五周每周由腎而心肺肝脾復返於腎二者之行不同如此按經言營氣是言血中之氣非單言血蓋血中之氣既負血而行則亦不及衛氣之慓疾也經言衛氣晝行陽二十五度度即遍也夜行陰二十五度大概如此蓋晝則陽動而氣行於表者多夜則陰靜而氣斂於內者多非晝全不行於內夜全不行於外也至謂一晝夜必行五十周則鑿矣氣一耳以其行於脈外則曰衛氣行於脈中則曰營氣聚於胸中則曰宗氣名雖有三氣本無二氣與血並根柢於先天而長養於後天經謂營氣出於中焦又謂心生血不過以胃受穀氣蒸化成血血色之赤稟於心火為言耳要之血即天一之水觀血味鹹可知氣為坎中之陽同根於腎無岐出也氣根於腎亦歸於腎故曰腎納氣其息深深氣不歸元則喘咳不得臥肺司呼吸氣之出入於是乎主之且氣上升至肺而極升極則降由肺而降故曰肺為氣主腎主納氣故丹田為下氣海肺為氣主故胸中為上氣海腎水為坎中之陽所蒸則成氣上騰至肺所謂精化為氣地氣上為云也氣歸於肺復化為水肺布水精下輸膀胱五經並行水之精者行於經永所謂水出高源天氣下為雨也陰陽互根於此可悟矣腎以閉藏為職雖子半陽生而氣發淵泉機猶未暢故氣之升發不屬腎而屬肝也藏屬腎泄屬肝升則泄矣此肝腎之分也肝主升肺主降此肺肝之分也心主動志壹則動氣也腎主靜此心腎之分也而靜藏不致於枯寂動泄不致於耗散升而不致於浮越降而不致於沉陷則屬之脾中和之德之所主也然則升降動靜苟失其中雖為肝肺心腎之不職亦即脾之不職而但知氣之不升或有升無降為肝木克脾土者陋也知各臟之病皆關乎脾則知脾氣調和即各臟俱調和矣故補脾不如補腎不過舉要之詞故不若補腎不如補脾之論為得其全也老人小兒尤以脾胃為主經言陽之氣以天地之疾風名之又曰風氣通於肝故氣病往往稱風如肝風腸風胃風之類飲食在胃則胃實腸虛氣下於腸飲食在腸則腸實胃虛氣上於胃往來鼓動有聲所謂腸風胃風即此皆氣之往來鼓動若風耳非必外來之風也以上明氣之理至其病證脈治詳下氣之病證內經列九氣為病一曰怒則氣上甚則嘔血暴怒傷陰血隨氣逆飧泄完穀而出也怒氣上衝則嘔血下鬱則飧泄氣鬱不運則水穀不分也或血菀於上不嘔則鬱積於上焦形氣絕卒然倒斃名薄厥薄迫也謂血氣厥逆迫於上焦或胸滿脅痛食則氣逆而不下一曰喜則氣緩志氣通暢和緩本無病然過於喜則心神散蕩而不藏為笑不休為氣不收甚則為狂有喜極氣暴脫而死者必其人素虛氣浮無根也所謂暴喜傷陽一曰悲則氣消心志摧抑沮喪則氣亦因之消索以怒則氣盛而張反觀之可見悲則氣衰而斂矣為目昏悲泣多則目昏為筋攣為陰縮皆有降無升肝木受克所致也為酸鼻辛頞為少氣不能報息報接續意為下血氣不能攝血也為泣則臂麻一曰恐則氣下精卻腎精方欲化氣而上因恐則卻而退下也王太僕謂恐則傷精卻而上不下流下焦陰氣亦迴環而不散故聚而脹未妥氣還下焦脹為陰痿骨酸精時自下一曰驚則氣亂心無所倚神無所歸慮無所定為癡癇驚則神不守舍痰涎入心所致為不省人事為僵仆一曰思則氣結心有所存神有所歸正氣留而不行為不眠為中痞三焦閉塞為不嗜食為昏瞀為得後即大便與氣噯氣或屁氣鬱下陷之屁不若傷食之屁臭甚則快然而衰結氣得通而滯減也一曰寒則氣收腠理閉氣不行上下所出水液澄澈清冷一曰熱則氣泄腠理開汗大泄喘嘔吐酸暴迫下注所謂壯火食氣又曰熱傷氣也氣乘風則飄遇火則散火主發泄一夜熱作而身頓怯可見一曰勞則氣耗喘息汗出內外皆越精神竭絕經曰靜則神藏躁則消亡為促乏為嗽血為腰痛骨痿為高骨壞為煎厥五心煩熱如煎熬而厥逆也男為少精女為不月按七情皆生於心以悲則氣下故屬之肺怒則氣上故屬之肝恐則怯而欲藏匿故屬於腎思則無所不通故屬之脾耳此義宜知驚屬心肝氣動故風火交煽則病發驚駭清氣在下則生飧泄濁氣在上則生䐜脹經謂清濁相干為亂氣水穀之清氣注五臟濁氣注六腑清氣上升濁氣下行反之則亂也予謂邪正相干亦然此如卦畫之交錯陰陽揉雜於此想見霍亂情狀氣滯必痛經云諸痛皆因於氣又云氣傷痛形傷腫先痛後腫者氣傷形也先腫後痛者形傷氣也丹溪謂氣有餘便是火自覺冷氣自下而上者非真冷也火極似水耳不治其火則氣不降火極似水猶云熱證似寒氣為火所衝突飄忽若風故冷也氣本清滯而痰凝血瘀則濁矣不治其痰血則氣不行脈長則氣治短則氣病數則氣熱遲則氣寒大則陰傷弦則氣鬱上盛則氣高下盛則氣脹澀則氣滯衰則氣少凡氣不舒者脈必沉治法結者散之郁者達之閉者開之氣閉者無小便或兩手脈伏不見陷者舉之高者抑之浮越者鎮墜之脫者固之散者收之虛者補之痞滿似難補然由脾虛不行正宜補脾以復其健運之職則濁氣行而痞滿自除所謂塞因塞用也熱者清之寒者溫之其病在七情非藥可愈者以五志相勝故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪褻狎之言娛之恐可以治喜以迫遽死亡之言怖之怒可以治思以汙辱欺罔之言觸之思可以治恐以慮彼忘此之言奪之又習可以治驚使之習見則不驚逸可以治勞也大約青皮疏肝枳殼利膈香附散郁木香舒脾厚朴散滿沉香降逆前胡下痰柴胡升清烏藥川芎紫蘇能散邪氣從汗而解檳榔大腹皮能使濁氣下行而去後重萊菔子蘇子杏仁下氣潤燥肺氣滯於大腸者宜之豆蔻沉香丁香檀香辛熱能散滯氣暴郁者宜之郁久成火者忌用須以姜炒山梔子佐之以上皆治有餘氣病若兼痰火兼積滯兼血各隨症加減調氣用木香然性溫上升若陰火上衝胸喉似氣滯而實非氣者用之反以助火當用黃柏知母少佐枳殼氣虛氣滯六君子湯加益智蘇梗血虛氣滯四物湯見血加香附陳皮腎陰虛氣滯六味地黃湯見虛損加沉香石斛砂仁腎陽虛氣滯四逆湯見厥加肉桂補骨脂肥人氣滯必挾痰二陳湯見痰加香附枳殼燥以開之甚者加蒼朮白芥子瘦人氣滯必挾火宜蘇子山梔歸芍降以潤之婦人性執易於動氣痞滿脹痛上湊心胸或攻築脅肋腹中結塊月水不調或眩暈嘔吐往來寒熱正氣天香散四七湯酌用之如氣不升降痰涎壅盛者蘇子降氣湯氣不歸元以補骨脂為主取其壯腎收濁氣歸就膀胱使化而出也或白朮亦可以其能和胃胃和則氣自歸元此為脾腎兩虛者立法也若肺腎兩虛氣不歸元喘促不臥者宜五味胡桃人參之類氣鬱久則中氣傷不宜克伐宜歸脾見血逍遙見郁二方佐撫芎香附枳殼以舒郁胎產同法木香流氣飲通治一切氣病利三焦通營衛達內外腫脹喘嗽痛疼皆效分心氣飲治七情氣滯蘇子降氣湯治氣上逆補中益氣湯治氣虛下陷越鞠湯見郁治氣鬱中焦血精髓血乳汗液外出為汗內蘊為液津出於口者涕蓄於腦出於鼻淚溺皆水也並屬於腎而血色獨紅者血為心火之化數者色皆白乃肺氣之化也腎為陰肺為陽陽交乎陰而液以化腎屬水心屬火水交於火而血以成以其為心火所成故經謂心生血又云血屬於心又云心主身之血脈也赤者心火之色心火不足則血色淡心氣虛寒則血凝而紫黑紫黑為腎色自見無火也亦有火盛血瘀而色紫黑者總可見血之關於心張介石曰凡身有血處觸之必痛痛屬心知而赤為火色故曰心生血又曰人身麻木處則無血色血所不至是心所不治故不知痛癢又曰趙氏云血隨相火行故色紅非也相火居坎水中弗能自露陽為陰掩其色黑至於心火而陽老矣陰為陽閉故內暗外明其色赤血如隨相火行則必黑而不紅汗液津淚溺皆清澈陽所生也精髓血乳涕皆稠濁陰所成也陽性速其生易故氣至而即生如悲哀氣動則淚若湧泉內熱蒸騰則汗出如雨可見陰性遲其成難故蓄積而後富細分之則精髓涕為一類血與乳為一類而乳之成較血為易故曰血者難成而易虧髓藏而不泄涕即腦髓其泄也以病腦熱惟精藏而能泄其泄也以陰陽之和暢故能成生育之功血亦藏而不泄較精之藏而能泄殊矣故精動而血靜精陽而血陰婦人之月事乃溢而傾非施泄之謂也精少血多貴賤之別也精生血死老少之分也精色白肺氣所化清陽也清陽為少火火少則生血色赤心火所成濁陽也濁陽為壯火火壯則老水凝為冰見晛則消血凝成塊雖煮不化水隨氣行能越於外血隨氣行但運於中清濁陰陽氣質之分可觀矣舊謂血總統於心此即心生血之義矣而曰化生於脾臟受於肝宣布於肺施泄於腎何也曰經言水穀入胃中焦受氣取汁變化而赤為血蓋言胃中水穀之清氣藉脾運化成血故曰化生於脾然兒在胎中未嘗飲食先已有血可見血為先天之水不過藉後天為長養非全靠後天也又云脾統血者則血隨脾氣流行之義也又經言人臥則血歸於肝蓋言人寤屬陽寐屬陰陽主外而親上陰主內而親下寤則血隨陽動外運而親上臥則血隨陰靜內臟而親下五臟皆在內而肝腎居下為血之所歸臟言肝而腎可該何則肝動腎靜動者尚臟則靜者可知故曰臟受於肝也一說血不藏皆肝之疏泄使然故以臟受責之亦通其謂宣布於肺則血隨氣行之義耳其謂施泄於腎則混精為血觀古人動稱父精母血可見要知是精非血不當混合為一也經脈之血流行臟腑之血守位以上明血之理其病證脈治詳下血隨氣行氣寒而行遲則血澀滯氣熱而行駛則血沸騰蓋血屬陰非陽不運故遇寒而凝氣屬火非少則壯故遇熱而灼澀滯皮膚則為痛痹凝結經絡則為疽癖瘀積腸胃則為敗腐虛寒不攝則為脫崩沸騰上焦則為吐衄流注下焦則為便血壅塞經脈則為癰毒浮見皮膚則為癍疹而且濕盛而蒸為癘風血乾而化為癆蠱致病非一要不出寒熱二端大抵瘀尚易治干則難醫無潮熱者輕有潮熱者重吐血即嘔血舊分無聲曰吐有聲曰嘔不必吐由口出古人謂是胃腑之血張景岳則謂出於口者有咽與喉之異喉為肺之上竅而兼總五臟之清道故諸臟之血皆得從清道以出於喉不獨肺也咽為胃之上竅而兼總六腑之濁道故諸腑之血亦皆得由濁道以出於咽不獨胃也五臟之氣皆稟於胃則五臟之病亦皆及於胃如怒則氣逆而嘔血肝病也欲火上炎而嘔血腎病也而其血皆由胃脘以出則是出於喉者止五臟之血而出於咽者不只六腑之血矣按景岳之說甚是然何以別之大抵由肝腎而出者往往傾盆而來如潮之湧此雷龍之火暴發乘胃所致肝腎胃血俱出彼時喘息不定面如醉酒心神煩亂少刻火退神清面白氣平血乃漸止若胃火自病其勢不甚暴烈所出必不若是之多也凡血色初吐鮮紅而散少停一二時再吐則略紫而凝久而又吐則黑而結塊若吐血不停則初吐者為上焦近血色鮮紅後出者為中下焦遠血其色深紅吐後未盡余血色淡或糖色或粉紅色咳嗽血火刑金而肺葉干皺則癢癢則咳此不必有痰故名乾咳咳多則肺絡傷而血出矣嗽則兼有痰痰中帶有血線亦肺絡之血也其證有輕重但熱壅於肺者輕清火自愈久嗽肺損者重保肺為主阿膠為君白芨苡仁生地甘草枳梗橘紅貝母為丸噙化又須看痰色如瑪瑙成塊者出胃口易治若一絲一點從肺臟中來肺少血為火所逼雖少亦出漸至肺枯成癆難治咳出白血必死血色淺紅似肉似肺者是脈弦氣喘聲嘶咽痛不治咯唾血咯與嗽為一類皆因有痰而欲出之或費力或不費力總以出痰為主非欲出其血也因值其失血故血隨痰出耳唾與吐為一類此則因血而然緣血為火所湧上升出至咽喉多則吐少則唾並不費力皆系純血無痰涎夾雜吐唾既為一類吐不定屬胃唾獨必屬腎乎古謂唾血屬腎者因經論五液謂腎主唾水泛於上也故耳不可泥咯既與嗽為一類舊分嗽屬肺咯屬腎亦非腎脈上入肺中病則俱病腎亦有嗽肺亦有咯也然則何以別之曰血證由於火驚則火起於心怒則火起於肝悲傷火起於肺思慮火起於脾房勞火起於腎審察病因自見言不能盡也張景岳謂失血證凡見喘滿咳嗽及胸膈左右皆隱隱脹痛者此病在肺也若胸膈膻中間覺有牽痛如縷如絲或懊憹嘈雜不可名狀者此病在心包絡也若胸腹膨脹不知飢飽食飲無味多涎沫者此病在脾也若雨脅肋牽痛或多怒郁往來寒熱者此病在肝也若氣短似喘聲啞不出骨蒸盜汗咽乾喉痛動氣上衝者此病在腎也若大嘔大吐煩渴頭痛大熱不臥者此病在胃也若有兼證則病不止在一臟肺病宜清降不宜升浮心主病宜養營不宜耗散脾病宜溫中不宜酸寒肝病或宜疏利或宜甘緩不宜秘滯腎病宜壯水宜滋陰不宜香燥克伐胃病或宜大瀉或宜大補當察虛實鼻衄衄行清道經藏之血也多由督脈而上出經藏之氣通於鼻故其血之溢者亦出於鼻張景岳曰凡鼻衄必自山根以上睛明之次而來而睛明一穴乃小腸膀胱胃陰蹺陽蹺五經之會皆能為衄又衝脈為十二經之血海其上俞出膀胱經之大杼下俞出胃經之氣街膀胱胃二經血至則衝脈之血亦至而十二經之血無不至矣所以血衄之微者不過一經之近甚者通身之血盡出舊謂衄出於肺豈其然哉準繩云鼻通於腦血上溢於腦所以從鼻而出宜茅花湯調止衄散嵩厓云不甚者以水紙搭鼻衡或以涼水拊項後即止甚者犀角地黃湯對症之藥又黃芩白芨各二兩水丸治久衄神效犀角下入腎由腎脈上通鼻腦故也胃衄者亦可用以胃脈亦上入鼻也故火鬱陽明致衄者無犀角以升麻代之以升麻陽明藥也齒衄此胃大腸腎三經之病蓋大腸脈入下齒中胃脈入上齒中而腎主骨齒為骨之餘也胃火盛則血出如湧而齒不動搖或見口臭牙齦腐爛腫痛此濃酒厚味所致宜清胃火便結可下之若口不臭牙不痛但齒動不堅或微痛不甚而牙縫時多出血者此腎陰虛火動而然宜滋腎水六味丸見虛損主之若腎火虛而上浮者八味丸見虛損主之醫旨緒餘述所治三人齒衄出血甚多皆以三製大黃末二錢枳殼湯少加童便調下去黑糞而愈緣陽明熱盛衝任二脈皆附陽明故血如潮湧若腎虛血必點滴而出齒亦悠悠而疼必不如此暴且甚也舌衄舌上無故忽出血線此心脾腎諸經之火所致三經脈皆及舌槐花炒研末糝之或浦黃炒為末準繩云文蛤散治熱壅舌出血如泉五棓子白膠香牡蠣粉等分為末每月少許糝患處又云肝壅則舌血上湧服清肝之藥按肝脈絡於舌本耳衄耳中出血也小腸三焦膽各脈俱入耳中又耳屬腎諸經皆足為病龍骨末吹入即止若左關脈弦洪柴胡清肝散尺脈或躁或弱六味地黃丸見虛損肌衄血自毛孔中出曰血汗又名脈益心主血脈極虛有火則見脈益湯人參黃耆當歸伏神麥冬石蓮硃砂薑汁生地益疑溢九竅出血耳目口鼻一齊出血藥不及煎死在須臾先將水當面噴幾口急分開頭髮用粗紙數層蘸醋令透搭在囟門血即止次用當歸一兩煎好磨沉降香各五錢加童便服或瞿麥飲瞿麥生薑梔子燈心炙草棗再用發灰二錢茅根車前草煎湯下之血自歸經然後以四物加人參五味丸服可收萬全之功九竅出血兼身熱不能臥者死惟婦人產後瘀血妄行九竅出血有用逐瘀之藥而生者若無故卒然暴厥九竅出血者死久病之人忽然上下出血亦死搔癢出血搔癢血出不止糞桶箍燒灰敷之呂元膺治一僧搔膕中疥出血如湧泉竟日不止營氣暴衰止余尺脈如絲與四神湯加荊芥穗防風晨夜並進明日脈漸出服十全大補見虛損而愈便血分腸風臟毒二證三因諸邪皆致便血二者特其大端耳腸風者或風邪外感或肝風內生風熱相合侵犯經絡血脈被阻漏出經絡之外滲入腸胃之中從大便出隨感隨見血清色鮮者是槐花湯加羌防秦艽即非外風亦可升陽燥濕按內風即氣也氣不順亦可用羌防輩升發之但不溫服取汗耳故古方不分內外風統用之也臟毒者濕與熱合蘊積日久傷損陰絡血滲腸胃積久乃下其色黯濁者是槐花湯加炒苦楝炒蒼朮下血腹中痛血色鮮紅為熱毒芍藥黃連湯主之不痛血色不鮮或紫黑如豆汁為濕毒黃連湯主之先血而後糞近血也出於大腸槐花條芩烏藥先糞而後血遠血也出胃與小腸石膏山梔烏藥又結陰便血內經結陰者便血一升再結二升三結三升所下純是血經不言何邪所結景岳謂風寒之邪留結血分所致宜灸中脘氣海三里以散風邪服平胃地榆湯以溫散之亦舉隅之論也下血太甚人參升麻牡蠣粟殼瘀血不可止待色鮮紅略加澀藥椿皮烏梅最妙用寒涼藥須酒煮或炒恐血凝便血日久服涼藥不應宜升補升陽除濕和血湯有熱略加黃連以吳萸泡水炒用虛加人參此病多食乾柿或生柿最效腸風臟毒結陰並血出腸中與五痔之血出於漏孔者不同亦與赤痢有異溲血痛者為血淋見淋症門不痛者為溺血不論何臟之血但損傷妄行皆得滲入膀胱與尿同出蓋不上行則下趨可以滲入腸胃亦可以滲入尿胞此準繩謂溲血淋血便血三者雖前後陰不同而受病則一其散血止血等藥無越數十品之間惟嚮導少異其說固甚允也若不與尿同出乃從精竅出也蓋清道之血上可從鼻出下亦可從精竅出多因色欲而成牛膝四物湯服諸藥不效者所溺之血成塊不得出而痛甚者珀珠散甚效蓄血蓄血症多嗽水不咽言即煩熱欲飲水但嗽不咽也以熱止在經不在腑之故熱在經則經血動不衄則蓄小便利此膀胱外蓄血以血只在小腹未入膀胱也大便黑此腸胃蓄血跌打閃撞奔走努力惱怒皆能致之傷寒等熱證尤多蓄於上令人善忘血蓄則氣不通心竅閉故善忘時時鼻血犀角生地赤芍丹皮蓄於中則心下手不可近桃仁桂枝芒硝甘草大黃丹皮枳殼蓄於下則臍腹腫痛或如狂譫語發黃詳傷寒太陽篇生地四錢犀角一錢大黃三錢桃仁一錢水酒煎入生漆一錢再煎服半日血不下再一服下即止名生漆湯一切瘀血大黃四錢芒硝一錢桃仁泥六個歸尾生地山甲各一錢桂五分為丸名代抵當丸在上血丸如芥子大去枕仰臥以津咽令停留喉下中下血丸如桐子大百沸水下若血積久此藥不能下去歸地加莪朮醋炒一錢肉桂七分又破血方女子通經亦用之大黃醋煮桃仁益元散各一兩乾漆炒煙盡為度生牛膝各五錢醋糊丸每服七十丸大凡跌撲損折蓄血腫痛發熱先服折銳湯大黃桃仁紅花當歸寄奴川芎赤芍大下數次再服行血破瘀湯三七當歸玄胡乳香沒藥血竭蘇木靈脂赤芍紅花然後服百和湯收功首烏地黃當歸骨碎補白芨鹿膠續斷甘草薄荷凡血妄行瘀蓄必用桃仁大黃行血破瘀之劑蓋瘀敗之血勢無復反於經之理不去則留蓄為患故不問人之虛實強弱必去無疑虛弱者加入補藥可也好酒者多陽明蓄血但牙齒蝕數年不愈者是桃仁承氣湯料為丸服屢效脈法澀為血少滑為血充失血脈應微細而反見浮大無力即為虛芤蓋陰既虧陽無所依浮散於外故見此象凡失血證脈虛小沉弱安靜身涼者生實大急數躁動身熱喘咳氣逆不得臥者死瘀血脅痛肝脈弦緊此為常勿以必死論治法吐血治法凡血逆上行宜降氣降氣火自降若徒以寒涼降火往往傷脾作瀉脾寒不能行血血愈不歸經宜行血血行歸經自止歸經非已離經之血復能返於經也但未離經者得不脫即為歸耳若徒事止血必有瘀蓄之患宜補肝不宜伐肝肝火動由肝血之虛滋陰則火自降用寒涼伐肝火被郁則怒發而愈烈矣凡吐血屬火者飲童便立止或搗側柏葉汁以童便二分酒一分和而溫飲之大能止血或白湯化阿膠二錢發灰二錢入童便生藕汁生地黃汁刺薊汁各一杯仍濃磨好墨汁頓溫服或急用加味四生飲生荷葉生艾葉生柏葉生地黃各等分入降香童便煎服元氣虛弱即將童便浸前藥水丸獨參湯送下或蘇子降氣湯加人參阿膠各一錢下養正丹並見氣氣降則血自下矣凡上膈壅滯吐血脈有力精神不倦覺胸中滿痛或血是紫黑塊者用生地黃赤芍當歸丹皮荊芥阿膠滑石大黃醋製元明粉桃仁泥之屬從大便奪之此釜底抽薪法也蓋血從下出為順上出為逆用大黃等引血下行轉逆為順也觀仲景謂蓄血證下血則愈又謂無病忽惡利血為病進若血上行後忽惡利血為邪欲愈可見矣血下行後用苡仁百合麥冬地骨皮鮮者更佳嗽渴加枇杷葉五味子桑白皮有痰加貝母皆氣薄味淡肺經之本藥也因其衰而減之於虛勞證尤宜吐血在暑天病人口渴面垢頭暈乾嘔煎茅花燈心麥門冬湯仍入藕節汁側柏汁茅根汁生薑汁少許生蜜亦少許調五苓散見傷濕血止用生地黃當歸牡丹皮赤芍藥百草霜末煎服一二帖卻用黃耆六一湯調理暑氣通心火毒刑肺雖致吐衄然大熱傷氣其人必脈虛氣怯體倦息微此惟生脈散見中暑人參湯之屬為宜不得濫用寒涼若氣不甚虛者宜局方犀角地黃湯或枇杷葉散見中暑凡肝火盛者必有煩熱脈證宜芍藥生地丹皮梔子澤瀉芩連之屬降其火而血自消若肝氣逆者必有胸脅痛滿等證芍藥生地青皮枳殼貝母澤瀉之屬行其氣而血自清怒氣傷肝者唇青面青脈弦當用柴胡清肝散或雞蘇丸煎四物湯吞下並用十四友丸見驚燈心麥門冬湯吞下蓋其中有理肝之藥其有病雖因怒察其無脹無火是逆氣已散肝火已平無得再散再清若脈虛神困病傷及脾治當專理中氣宜景岳五陰煎五福飲之類主之勿謂始因怒氣而專意伐肝也凡憂思損傷心脾以致吐血證見氣短形悴或胸懷郁然食飲無味或飢不欲食或魂魄驚困而臥不安是皆中氣虧損不能攝血所致速宜救本不宜治標宜歸脾湯飲酒傷胃吐血宜葛花解酲湯見傷飲食加黃連丹皮或湯中加金鉤子乾葛茅花過啖炙爆辛熱上焦壅滿痛血出紫黑成塊桃仁承氣湯導之酒色過度飢飽吐血效方枇杷葉款冬花北紫菀杏仁鹿茸桑白皮木通大黃為末蜜丸噙化又有飽食胃冷不化強吐之使所食物與氣衝裂胃口吐鮮血宜理中湯見中寒加川芎扁豆或川芎乾葛勞心吐血用蓮子心五十粒糯米五十粒研末溫酒調服及天門冬湯勞力太過吐血不止蘇子降氣湯見氣加人參阿膠用豬肝煮熟蘸白芨末食之打撲損傷吐血先以藕節汁側柏汁茅根汁韭汁童便磨墨汁化阿膠止之卻以芎歸白芍百合荊芥穗阿膠丹皮紫金藤大黃滑石紅花煎湯調番降香末白芨末與服或先用蘇合香丸見諸中卻以黑神散和小烏沉湯童便調服凡努力及跌打等傷吐血宜芎歸飲引血歸經有瘀則加大黃桃仁紅花或鬱金黃酒以行之凡吐衄失血如湧多致血脫氣亦脫危在頃刻者此際有形之血不能即生無形之氣所當急固急用人參一二兩為細末加飛羅面一錢許或溫水或井花冷水隨其所好調如稀糊徐徐服之或濃煎獨參湯徐服亦可此正血脫益氣陽生陰長之理也凡郁證吐血六淫七情皆能鬱氣成熱鬱於經則衄鬱於腑則吐脈多枯澀證惡風寒誤以為虛溫補之殆矣觀其面色多滯喜作嘔噦口苦酸即當散郁加味逍遙散見郁主之後用六味見虛損滋陰楊仁齋曰血遇熱則流故止血多用涼藥然有虛寒致血錯行者當溫中使血歸經理中湯見中寒加木香或甘草乾薑湯甚效醫貫云血得寒而凝不歸經絡而妄行者其血必黑黯面色必夭白脈必微遲身必清涼古人謂凡失血證多以胃藥收功腎寒火虛逼陽上升載血而出脈沉足冷舌必無胎即有亦白薄而滑雖渴不能飲冷強飲亦不能多少頃即吐出面雖赤色必嬌嫩八味湯見虛損冷服此為內傷之證又有外感寒邪直中腎經逼火上衝致吐血者須服白通湯即愈內傷漸致外感暴來分別在此此為雷龍之火不可直折若覺腎熱脈洪足溫又為水乾火炎去桂附純用六味見虛損熱嗽血治法宜金沸草散見咳嗽加阿膠一錢痰盛加栝蔞仁貝母癆嗽有血宜補肺湯加阿膠杏仁桑白皮各一錢吞養正丹見氣或三炒丹間進百花膏或七傷散大阿膠丸陰虛火動嗽血滋陰保肺湯痰帶血絲出童便竹瀝止之感冒小恙不知解表過服寒涼肺經之血凝滯咳嗽帶痰而出證惡寒而脈緊或寒束熱於肺久嗽出血麻黃桂枝甘草當歸杏仁枳梗後證宜加清涼之品得微汗愈血證最忌汗惟此當汗耳咯唾血治法癆瘵咯血七珍散加阿膠當歸各半錢惡甜人更加百藥煎半錢仍調鍾乳粉為佳一味鍾乳粉用糯米飲調吐血嗽血亦治因飽屈身傷肺吐嗽血者白芨枇杷丸或白芨蓮鬚散治咯血黃藥子漢防己各一兩為末每服一錢水一盞小麥二十粒同煎食後溫服白芨一兩藕節半兩為末每一錢湯調下新綿灰半錢酒調下苡仁為末煮熟豬胰切片蘸藥食後腹微空時服鼻衄治法亂髮燒存性細研水服方寸匕並吹鼻中萱草根汁每一盞入生薑汁半盞相和細呷竹蛀屑水調服線扎中指中節左鼻出扎左指右出扎右兩出兩紮之有頭風自衄頭風才發則衄不止宜芎附飲間進一字散下虛上盛而衄不宜過用寒劑宜四物湯加參耆麥冬五味磨沉香下養正丹見氣八味地黃丸見虛損傷濕而衄腎著湯見傷濕加川芎名除濕湯伏暑而衄茅花湯調五苓散見傷濕飲酒過多而衄茅花湯加乾葛雞距子或理中湯見中寒去乾薑加乾葛茅花攧而衄不止蘇合香丸見諸中一丸或以小烏沉湯一錢白湯調下或煎濃紫蘇湯獨調小烏沉湯或添入黑神散一錢鹽湯調下亦得仍驀然以水噀其面使驚則血止非特攧衄凡五竅出血皆治衄後頭暈四物湯十全大補湯見虛損溲血治法先與生料五苓散見傷濕和四物湯若服藥不效其人素病於色者此屬虛證宜五苓散和膠艾湯吞鹿茸丸或八味地黃丸見虛損或鹿角膠丸或辰砂妙香散見心痛和五苓散吞二項丸子若小便自清後有數點血者五苓散加赤芍藥一錢亦有如砂石而色紅卻無石淋之痛亦屬虛證宜五苓散和膠艾湯或五苓散和辰砂妙香散吞鹿茸丸八味丸鹿角膠丸灰髮二錢茅根車前草煎湯調下夏枯草燒灰存性為末米飲或涼水調下便血治法發熱煩躁不欲近衣大渴脈洪以無目痛鼻乾知非白虎證此陰虛發躁當以黃耆一兩當歸二錢煎服風冷入客腸胃下瘀血如豆汁八珍湯見虛損去生地甘草加桂名胃風湯暑毒入腸胃下血者一味黃連煎湯飲酒積下血不止糞後見神麯一兩半白酒藥二丸為末水調作餅慢火炙黃為細末每服二錢白湯調下腸風腹痛肛腫敗毒散見傷濕加槐角荊芥或槐花湯枳殼散臟毒腹略疼肛腫凸大便難通先以拔毒疏利之劑追出惡血膿水然後內托並涼血祛風虛兼參術助養胃氣下血久面色痿黃漸成虛憊宜用黃耆四君子湯見氣下斷紅丸氣虛脫血補中益氣湯見氣中蠱臟腑敗壞下血如雞肝如爛肉其證唾水沉心腹絞痛馬藺根末水服方寸匕蠱隨吐出蝟毛燒末水服方寸匕亦吐苦瓠一枚水二升煮取一升服亦吐蓄血治法仲景抵當丸難用用韓氏生地黃湯虛人難下者以四物湯加穿山甲煎服妙亦有用花蕊石散以童子小便煎服或酒調下補虛熟地歸身枸杞萸肉棗仁蓯蓉潤燥蜜當歸阿膠柏子仁乳酪涼血二冬生地芩連梔子知母黃柏元參花粉丹皮白芍犀角膽草槐花溫血附子肉桂黑姜止血棕灰發灰童便茅花烏梅白芨柏葉藕節地榆蒲黃炒黑百草霜椿白皮行滯瞿麥川芎香附乳香沒藥韭汁生牛膝滑石蒲黃生用玄胡索益母草五靈脂破結大黃芒硝桃仁紅花三稜莪朮薑黃歸尾花蕊石蘇木多用舉陷荊芥穗升麻川芎柴胡荷葉有三藥必用二藥必禁服寒涼百不一生則知母黃柏宜禁服童便百不一死則童便宜服血雖陰類運之者陽荷葉仰盂象震最能運血則荷葉宜用降氣莫善於降香則降香宜用也舊說如此勿泥發熱發熱者熱之發現於肌表者也凡病多發熱熱生於火火本於氣丹溪謂氣有餘便是火其義可見其理不外氣乖與氣鬱二端小兒痘疹發熱別見氣乖有三一曰陽亢發熱陰陽水火原自和平不熱不寒是謂正氣一有乖違不無偏勝經曰陽勝則熱此為亢陽之火證見煩渴燥結小便赤澀六脈洪數治宜寒涼有因濃酒厚味蘊釀而成者有炎令燥氣感觸而致者有五志過極心火亢暴者一曰陰虛發熱血虛同陰虛謂腎水虛也火性本上炎而外現得水以制之則離交於坎龍潛於淵內蘊而為神明下濟而成交泰若陰虧水虛則柴干火烈而焚灼為災矣或由色欲損精或由瀉利亡陰或由燥熱傷液皆能致之也此之火炎乃由水虛所致與上條陽亢而陰未虧者不同證見口乾體瘦食少懶倦頭痛時作時止遺精盜汗骨蒸肉爍唇紅顴赤咳嗽痰血久成癆瘵治宜甘潤之劑滋水以制火若誤用苦寒則火被寒鬱其怒發愈烈矣按薛立齋治一老人腎虛火不歸經而遊行於外發熱煩渴引飲面目俱赤遍舌生刺斂縮如荔枝兩唇焦裂或時喉間如煙火上衝急飲涼茶少解兩足心如烙痰涎壅盛小便頻數喘急脈洪數無倫而且有力捫其身烙手以十全大補見虛損加山茱萸澤瀉丹皮山藥麥冬五味附子及八味丸見虛損治之而愈愚謂此證明是水虛火炎當用六味見虛損而用前藥者必因其人年老水火併虛故爾如火不虛不得因此案而誤用溫熱以致陰分愈傷也虛不論水火脈皆無力而此有力者必曾服寒涼之劑激之使然故凡用寒藥直折者必須熱服不效則藥須用薑汁或酒炒過服之即愈亦防郁遏之意也再按此證全似實火然虛火較實火必反烈以其離根浮越全體外現比實火之內熱透外韜光埋焰者自不同也已任編云有誤服白虎以致熱甚如燔衝開三五尺人不能近者可想見虛火之烈矣血虛發熱或由吐衄便血或由產後崩漏一切失血所致證見煩躁面目黑渴飲不止證類白虎惟脈不長不實浮大而重按全無為異耳誤服白虎必危治宜滋陰補血若陽並虛兼用氣藥血脫補氣陽生陰自長也一曰陽虛發熱陽虛謂腎火虛也陽虛應寒何以反發熱則以虛而有寒若無寒而但陽虛則止自見其不足不能發熱寒在內而格陽於外故外熱陽被寒拒出居肌表外越則脫不脫而又不能內返則格鬥而激發為熱也寒在下而戴陽於上故上熱也此為無根之火乃虛焰耳證見煩躁欲坐臥泥水中面赤如微酣或兩顴淺紅遊移不定與實熱之盡面通紅者異渴欲飲水或咽喉痛而索水置前卻不能飲肌表雖大熱而重按之則不熱或反覺冷且兩足必冷小便清白下利清穀脈沉細或浮數無力按之欲散治宜溫熱之劑溫其中而陽內返溫其下而火歸元誤投寒涼立死或口食冷物或鼻吸寒氣其人平素陽虛陰盛外寒一中陰邪遂張真陽因之失守也氣鬱有七一風寒鬱熱陽氣自內達外喜暢達而惡遏閉若風寒外襲則陰凝之氣足以閉固腠理而表陽不宣則鬱而為熱也證見頭項強痛惡風汗出脈浮緩者為傷風兼體痛而惡寒無汗脈浮緊者為傷寒治宜解肌發表得汗則熱泄而愈此乃表陽受郁一飲食鬱熱飲食停滯中脘則脾胃之陽氣被其遏抑不能宣通亦鬱而成熱證見頭痛發熱如傷寒而身不痛惡食欲吐噯腐吞酸胸口飽悶或脹痛氣口脈滑大甚或沉伏治宜消導此乃里氣受郁一為痰飲鬱熱痰飲所在之處氣被阻滯鬱而成熱理同食滯證見惡風自汗似傷寒但頭不痛項不強或頭痛而作止無常胸膈不快噁心氣上衝目下如灰色或煙黑脈弦滑治宜除痰一為瘀血鬱熱癰疽同理同痰飲證見小便利大便黑小腹臍或胸脅急結按之痛或兩足厥冷或吐紅鼻衄不渴即渴亦嗽水不咽脈必澀治宜行血柴胡黃芩川芎白芷桃仁五靈脂甘草便結加大黃濃蜜利出黑物愈瘡毒則脈弦數惡寒飲食如常而有痛處一為水濕鬱熱水濕由外感者理同風寒由內傷者理同痰飲證見身重或重痛不可轉側骨節掣痛屈伸不利汗出惡風不欲去衣頭如裹聲如從甕中出脈遲緩治宜利濕一為肝氣鬱熱恚怒不發止自摧抑則肝氣不宣鬱而成熱婦人最多此證證見胸脅脹痛或飧泄面青手足冷太息不樂脈沉弦木鬱則達之宜逍遙散見郁一為脾氣鬱熱或勞倦氣散或思慮氣結或飢餓氣餒中氣因而衰微不能運行或滯於中或陷於下而鬱滯成熱證見怠惰嗜臥行動喘乏四肢困倦此勞倦飢餒傷或時自言自語不知首尾此思慮傷夜分即熱氣行里親下滯陷愈甚也天明暫緩氣外出上升郁陷得略解也此初郁病證或晝夜不解郁久則熱甚不分晝夜矣或日出氣暄則熱天陰夜涼則緩鬱熱又久則氣耗散愈熱愈耗愈耗愈熱晝動陽浮故加煩熱動散靜存故天陰夜涼則緩緣初則鬱熱而生火繼則火發而熱劇終則火壯而氣耗節次如此乃病成而變之理不可不知五心煩熱甚則肌肉筋骨如燒此李東垣所謂陽虛發熱也此症內經名陰虛發熱陰字當內字看東垣名陽虛發熱陽字當氣字看合二說言之是內氣虛發熱也與上條陽虛發熱戴陽格陽症不同蓋此為中焦之陽彼為下焦之陽彼格陽是內寒而外熱此則內外皆熱而無寒戴陽是上熱而下寒此則熱反下陷而無寒故不同也治宜培補中氣氣旺則滯者運氣升則陷者舉矣五臟郁證止舉肝脾余當於郁證門求之勞倦者加酸味以斂其浮越上疏發熱之理至熱分臟腑經絡三焦晝夜血氣虛實詳後一熱分臟腑經絡東垣云五臟有邪各有身熱其狀各異脈皆洪數而有浮沉之別以輕手捫之則熱重按之則不熱王海藏謂皮膚如火燎重按則不甚熱然則東垣所云不熱非全不熱也特不甚熱耳下仿此是熱在皮毛血脈也在皮毛者屬肺熱申酉尤甚肺金氣旺時也症見喘咳灑淅惡寒輕者瀉白散重者涼膈散白虎湯地骨皮散之類治之白晴赤煩渴黃芩一物煎湯丹溪清金丸即黃芩為末粥丸二方瀉肺中血分之火瀉白散瀉肺中氣分之火在血脈者屬心熱日中益甚症見煩心掌中熱以黃連瀉心湯瀉丁導赤散瀉丙火腑丹見淋丙丁俱瀉硃砂安神丸見煩躁清涼飲子見傷燥之類治之重按至筋骨之分則熱蒸手極甚輕摸之則不熱是熱在筋骨間也在筋者肌肉之下骨之上也屬肝熱寅卯間甚或寅申間發症見胸脅滿悶便難轉筋多怒善驚四肢困熱筋痿不能起床瀉青丸柴胡飲見虛損之類治之或當歸龍薈丸見脅痛左金丸在骨者屬腎熱亥子尤甚骨蒸酥酥然如蟲蝕困熱不任亦不能起於床滋腎丸見小便不通六味地黃丸見虛損主之輕捫重按俱不熱不輕不重按之而熱是熱在肌肉也屬脾熱遇夜尤甚脾陰土夜屬陰症見怠惰嗜臥四肢不收無氣以動實熱以瀉黃散調胃承氣湯見大便不通治之虛熱以人參黃耆散補中益氣湯見氣治之胃中熱則消穀令人懸心心神被火灼故懸懸不寧也善飢臍以上皮熱胃居臍上也腸中熱則出黃如糜糜粥也臍以下皮熱腸居臍下也由是推之肝膽熱則脅亦熱心肺熱則胸背亦熱腎熱則當腰亦熱矣兩手太熱如在火中為骨厥灸湧泉穴三壯立愈手足心熱梔子香附蒼朮白芷半夏川芎為末神麯糊丸五心煩熱火鬱脾中火鬱湯三物黃芩湯見煩躁治婦人四肢煩熱熱時發時止知不在表在表則常熱也大小便如常知不在裡非表非里是在經絡也一熱分三焦熱在上焦咽乾口爛梔子黃芩熱在中焦心煩口渴黃連芍藥熱在下焦便閉溺赤黃柏大黃一熱分晝夜血氣詳惡寒篇末晝熱夜靜是陽邪即熱邪自旺於陽分也陽分者表也腑也氣也陽邪在陽分遇陽時故熱作晝靜夜熱是陽邪下陷於陰分也觀熱入血室症日輕夜重可見詳傷寒少陽篇晝夜俱熱煩躁是重陽無陰當亟瀉其陽峻補其陰晝熱在氣分柴胡飲見虛損白虎湯以瀉氣中之火陰虛者不宜用夜熱在血分地骨皮散清涼飲子見傷燥以瀉血中之火一熱分虛實血肉充盛皮毛榮潤陰有餘而熱及能食而熱口苦幹燥大便難脈洪盛者為實熱骨痿肉燥筋緩血枯皮聚毛落陰不足而熱及不能食而熱氣短脈虛者為虛熱潮熱有作有止如潮水之來不失其期一日一發熱者火也火氣所在之經必乘本經氣旺之時而發如心經熱則潮於午腎經熱則潮於子之類已詳發熱門若日三五發即是發熱不名潮熱矣潮熱有虛有實傷寒日晡潮熱胃實也已詳傷寒論餘症潮熱若大便結澀小便赤短喜冷畏熱睡臥不安此氣盛也參蘇飲見發熱或小柴胡湯見寒熱或氣乏食少神瘁體羸病雖暫去而五心常有餘熱此為虛茯苓補心湯十全大補湯養榮湯二方俱見虛損之類病後欠調理者八珍散症似虛而胸膈痞滿背心痛服補藥不效者痰飲也隨氣而潮故熱隨飲而亦潮五飲湯夜微熱病人不自覺早起動作無事飲食如常既無別症可疑只是血虛陰不濟陽宜潤補宜上條茯苓補心等湯脈滑有宿食常暮發熱於傷食門求之血虛五心熱夜劇者四物二連湯熱病愈後餘熱伏留在經復發熱者小便清利誤用寒涼致中氣虛寒無以托邪不能行散大劑參術等補之戰汗而解血虛加歸地惡寒輕則畏怯重則戰慄惡寒分內傷外感外感惡寒有四一傷感初感傷風惡風傷寒惡寒猶傷酒惡酒傷食惡食也蓋表陽被邪所郁方欲就溫暖以宣通故惡寒之遏閉未發熱時固惡即發熱時亦惡不欲去衣被甚而近火猶凜當暑亦惡不論有風無風皆生畏怯惡寒與惡風稍異惡風者有風乃惡無風則否不若惡寒之有風無風皆惡也必待表解方罷症必發熱無汗頭項強痛脈浮緊所謂發熱惡寒發於陽也若不發熱而惡風蜷臥則為直中陰症矣所謂無熱惡寒發於陰也按傷寒論少陰厥陰篇俱言惡寒而太陰篇無之闕文耳蓋六經皆有惡寒妄生分別便非一為傷寒陽邪深入傳經陽邪深入陰分熱鬱於內表氣不通手足厥逆惡寒狀若陰症所謂惡寒非寒明是熱症者此也一為傷寒將解按傷寒論辨脈篇曰脈浮而緊按之反芤此為本虛故當戰而汗出也其人本虛是以發戰以脈浮故當汗出而解也若脈浮而數按之不芤此人本不虛若欲自解但汗出耳不發戰也蓋傷寒欲解正氣實者邪不能爭則汗出而解不發戰若正氣本虛邪與正爭則先戰而後汗若但內慄而汗不出則正氣虛極無以托邪為危候一為瘧疾發作瘧邪與衛氣相爭正為邪滯內郁不通不達於表則表寒不行於里則里亦寒故外戰而內慄也內傷惡寒有五一為陽衰表虛此經所謂陽虛則惡寒也治宜薑附參耆之類助陽固表又有痹氣一症帝曰人身非衣寒也中指臟腑言非有寒氣也寒從中生者何岐伯曰是人多痹氣也寒濕之氣凝閉於肌體陽氣少陰氣多故身寒如從水中出此則陽衰而兼寒實者也一為陰乘陽位上焦陽虛下焦素有陰寒之氣發動乘虛上干故惡寒也一為陽氣鬱陷或酒食痰血水濕瘡毒鬱抑陽氣於裡不達於表或勞倦鬱抑中氣下陷不能升發則表虛而怯寒也或發之或吐之產後血瘀乳脹皆能致之觀邪塞上焦不通抑遏陽氣東垣用升陽益胃湯丹溪用吐法吐出濕痰使陽氣隨吐升發可見矣一為熱盛氣散熱盛於裡火能生風衝突元氣氣從火散故凜凜而寒甚則振顫鼓頷咬牙戰慄如傷神守有以大承氣湯見大便不通下之而愈者此外假寒而內真熱之症也此為陽盛格陰與陰盛格陽相反陽指內熱言陰指外寒言內熱外寒兩相格拒所謂陽盛格陰也一為肺被火刑肺主皮毛熱則氣張汗越失其斂肅之權腠理虛疏不任風寒故惡之上明惡寒之理至內傷外感之辨晝夜之分詳後一內外之辨外感惡寒雖近烈火不除內傷惡寒得就溫暖則解一晝夜之分夜寒者陰氣即寒邪旺於陰分為里為臟為血晝寒者陰邪加於陽分晝夜俱寒者重陰也與發熱篇熱分晝夜條對看更詳味下條自明按陽虛則畏寒而惡陰故旦安而暮亂至夜則寒也陰虛則畏熱而惡陽故夜寧而朝爭晝則熱也此正虛之候也陽邪實者遇陽而愈旺故朝熱而暮輕陰邪實者逢陰而更強故夜寒而晝減此邪實之候也陽虛而陰邪乘於陽分則氣行陽二十五度而病發故日寒而夜息陰虛而陽邪陷於陰分即血分也則氣行陰二十五度而病發故夜熱而晝涼觀瘧疾或日發或夜發可見矣此正虛挾邪之候也其有晝夜俱熱甚者為重陽無陰晝夜俱寒甚者為重陰無陽晝寒夜熱者為陰陽交錯也其有久病虛弱無分晝夜作止不時者以正氣不能主持而陰陽相乘勝復無常也若壯實人初病見此又為邪正相攻不時擾動之故觀傷寒少陽證往來寒熱初無定期可見矣寒熱惡寒發熱常相兼觀彼兩門自見此篇乃以寒熱往來及內外上下寒熱者言之往來寒熱有期者瘧也無期者諸病也有傷寒邪在少陽及婦人病傷寒熱入血室而往來寒熱者詳傷寒少陽篇有衰弱人陰陽之氣並虛相為勝復而往來詳傷寒平脈篇病有灑淅惡寒條中病後產後多有之產後黃耆丸有鬱抑而致者如寡婦尼姑獨陰無陽欲火熾於中則內熱不得遂而氣鬱於裡不外達則表寒久之鬱熱得伸則表熱是也抑陰地黃丸有宿食結滯者輕則消導重則下之有結熱在裡者大柴胡湯見瘧又氣鬱則痰停而寒熱作理詳瘧門外熱內寒仲景云身大熱反欲得衣者熱在皮膚寒在骨髓也活人云先與桂枝湯見傷濕治寒次與小柴胡湯治熱按二方謬甚此證大抵陰盛格陽用二方殆矣外寒內熱仲景云身大寒反不欲衣者寒在皮膚熱在骨髓也活人云先與白虎加人參湯見發熱治熱次與桂枝麻黃各半湯治寒按熱入三陰其表必冷以陽陷於內不達於表也但去裡熱則陽氣復還於表而外寒自解其可印定此二方乎上寒下熱腰上寒腰下熱靈樞云先刺項太陽大杼天柱等穴久留之久留以補其陽已刺謂已入針則熨項與肩胛兼用熨法以溫之令熱下合乃止上熱與下熱相合不復上寒下熱也止謂出針所謂推而上之者也嵩厓尊生書用炒梔二錢半瞿麥五分二物沉降引上寒入下焦則下焦之熱得和炙草三分蔥白三根姜三片薑蔥發散推下熱上行以解上焦之寒煎服叔和謂此為陽附陰言陽火下乘於陰部也上熱下寒叔和謂此為陰附陽言陰火上乘於陽位也經云視其虛脈而陷之於經絡者取之氣下乃止所謂引而下之者也上熱下寒則在下之脈必虛虛必陷下須察視之虛者不可見而陷者可見故視其陷下之在於經或在於絡則取而補之俟陽氣下行乃止針東垣云上熱下寒經云陰病在陽陽上焦也言陰火上乘於陽分當從陽引陰言當從上焦引去其熱必須先去絡脈經隧之血指陽經脈絡言須刺出血以去其熱若陰中火旺上騰於天天謂上焦致六陽上焦陽氣反不衰而上充者即經所謂陰病在陽也先去五臟之血絡陰絡也引而下行引火歸下天氣降下則下寒之病自去矣慎勿獨瀉其六陽只去陰火只損血絡經隧之邪勿誤也又云聖人以上熱下寒是有春夏無秋冬也有升無降當從天外猶雲天上指上焦言引陽降入地中此乃天上群陰火熾猶言陰火上乘反助六陽不能衰退先於六陽中決血絡出血使氣下降故經云視其虛脈下陷於經絡者取之所謂引而下之也病大者三稜針決血去陽中之熱使得行秋令奉收道下降入地中也按經言視脈虛陷取之謂取其穴而補之也東垣誤以為瀉故有此論又疑獨瀉六陽為非故又言須去五臟之血絡總由不明經語耳楊參政年踰七十病面郁赤若飲酒痰稠黏眩運兩寸脈洪大尺脈弦細無力上熱下寒明矣欲藥之為高年氣弱不任記先師所論凡上熱猶鳥巢高巔射而取之即以三稜針於巔前髮際刺二十餘出紫血約二合許即時頭目清利諸苦皆去後不復作又治姚公六十有七頭面赤腫而痛耳前後腫尤甚胸中煩悶嗌咽不利身半已下寒足脛尤甚脈浮數按之弦細刺腫處五十餘痛止又灸氣海百壯助下焦陽氣退其陰寒次灸三里各七壯以引陽氣下行足胻寒退遂制既濟解毒湯以黃芩黃連酒製瀉上熱桔梗甘草佐諸苦藥治其熱升柴以散之連翹散結消腫酒煨大黃引苦藥上行止煩熱全愈按此症有實熱者如上二案治法可也若虛熱則是戴陽症也不用熱劑溫腎以引火歸原而反用寒涼殆矣審之諸中總論諸中謂中風中寒中暑中濕中氣中食中惡也皆卒然仆倒昏不知人若痰涎壅盛咽喉作聲證在危急但見閉證牙關緊閉兩手握固是也不見脫證者詳下不論何中且先與治痰通關並可用麻油薑汁竹瀝調蘇和丸虛寒者三生飲加人參竹瀝薑汁抉開口灌之如抉不開則令人含藥口內以竹管吹入其鼻自能下咽二藥必是閉非脫者方可用若止中血脈不入臟腑亦勿輕用恐引邪入內且先用通關散細辛皂角菖蒲為末或加南星生半夏薄荷末吹鼻得嚏則蘇又痰壅宜吐急救稀涎散豬牙皂角肥實不蛀者四挺去黑皮晉礬光明者一兩為細末輕者五分重者七分溫水調灌又碧霞丹揀好石綠研水飛再研取二三錢同冰片三四豆許研勻以生薄荷汁溫酒調服二藥不大嘔吐但微微令涎自口角流出即蘇又本門方載此二方與此大同小異酌輕重用之無汗表實三聖散有汗裡實巴礬丸皆吐藥也若見口開心絕手撒脾絕眼合肝絕遺尿腎絕聲如鼾肺絕此為脫症不治然五症不全見者速灸臍下氣海穴服參耆膏亦有生者切忌蘇合牛黃等丸牛黃丸見中風髮直吐沫搖頭上攛面赤如粧或赤黑汗綴如珠皆不治諸中或未蘇或已蘇或初病或久病忽吐出紫紅色者死卒中眼上戴不能視者灸第二第五椎骨上各七壯一齊下火炷如半棗核大涎涎潮卒則當扶入暖室中正坐沃醋炭火內當面熏之氣入鼻內良久涎之聚於心者自收歸舊處立蘇不可令吃一滴湯水恐涎繫於心絡不能去必成廢人卒僕六脈多沉伏邪滯於裡氣不外達也亦有洪盛者暴僕時多沉伏甦醒時即轉洪盛矣浮緩吉堅大急疾凶浮進為寒虛大為暑不當暑言非暑月則為虛浮澀為濕浮大為風浮數無力亦為風微而數沉而遲皆氣中風應人迎氣應氣口洪數為火滑為痰更當察時月氣候及其人之起居飲食參以顯證以定病之主名中風其證卒然仆倒昏迷不醒痰涎壅塞咽喉作聲或口眼喎斜四肢癱瘓或半身不遂或口噤舌強喑不能言卒倒者中臟重證不倒者中血脈等輕證詳下風有外風有內風內風者即人身中之氣也經曰人身之氣以天地之疾風名之又氣有餘便是火火氣之標疾如風也又肝屬風外風由於外感內風由於內傷此證有純是內傷者有內傷兼外風者從無純只外風者若單隻感冒外風不過為頭疼發熱自汗等輕證如仲景傷寒論所云而已烏有昏迷卒倒瀕於死亡如前所舉諸重證哉前項重證皆由內傷虧敗而然風若非寒縱極狂暴無令人昏倒之事惟西北方寒風令人凍僵仆倒則有之然此即屬中寒不名中風矣按王安道謂卒暴僵仆等證昔人以為外中於風及劉河間李東垣朱丹溪出所論始與昔人異河間主火東垣主氣丹溪主濕詳下反以風為虛象蓋三子以相類中風之病混同立論致使後人狐疑雲云後人祖其說咸以古人所言者為真中風三子所論者為類中風張景岳又謂三子所論與外中風邪無涉固不可以中風名之並不可以類中風名之直名之為非風可耳瑤按三子所論乃指內風立說與外感之風對講內風外風皆可雲中故予仍舊概以中風名之使人知有內風之義非故與王張諸公立異也內傷兼外風證靈樞經云虛邪即外風偏客於身半因其人半身血氣空虛故風邪偏客之其入深內居營衛營衛衰則真氣去邪氣獨留發為偏枯偏謂半身枯枯廢也真氣衰乃偏枯其非一外感即偏枯可知可見外感風寒必無卒僕及偏廢等證惟內傷而後有身偏不用不能運動也而痛血氣為邪滯故痛言不變志不亂邪未入臟腑神明不亂也病止在分分肉腠腠理之間巨針取之刺經絡以通其血脈益其不足損其有餘乃可復也痱之為病也經謂中風有四一曰偏枯如木之根本未甚枯而一邊枝幹先萎也即上證二曰風痱即下證三曰風癔謂奄然忽不知人也即中臟證四曰風痹謂痹證因風所成者也詳痹門身無痛者病在裡故外不痛也四肢不收如癱瘓是也癱者坦也筋脈弛縱坦然不舉也瘓者渙也血氣散渙而無用也較偏枯止病半身者為甚矣志亂不甚其言微知其言尚可曉也可治甚則不能言不可治也仲景謂中風絡脈空虛經絡之血氣虛賊邪不瀉或左或右邪氣反緩邪滯故緩也緩遲滯弛縱之意正氣即急正被邪遣故急迫也如左被邪氣凝滯而寒則迫正氣於右而熱故右之筋脈縮急也正氣引邪喎僻不遂即口眼喎斜邪在於絡肌表浮絡肌膚不仁麻木不知痛癢邪在於經即重不勝營分著邪筋脈廢而不用則轉動艱難故重或兼濕氣也邪入於腑即不識人中腑必歸胃胃熱蒸液成痰由胃之大絡入迷心竅故不識人也邪入於臟舌不能言口吐涎中臟必歸心舌者心之苗心經痰滯筋脈不靈無以運舌故舌強難言心火上蒸舌下廉泉穴開故吐涎也東垣則分中血脈蓋兼仲景中絡中經言之者外有六經之形症中腑者內有便溺之阻隔二便不通中臟者痰涎昏冒卒倒口不能言不識人東垣所謂中臟蓋兼仲景中腑言之中血脈者偏枯歪斜麻木者是小續命湯加減分六經證治之證見太陽無汗惡寒此傷寒也非中風也然風每兼寒故通言之本湯倍麻黃防風杏仁並針至陰崑崙舉蹺有汗惡風本湯倍桂枝芍藥杏仁針風腑證見陽明無汗身熱亦是傷寒證不惡寒傷寒惡寒傳至陽明則不惡寒而反惡熱本湯加石膏知母各二兩甘草一兩有汗身熱不惡風本湯加葛根二兩倍桂枝黃芩針陷谷刺厲兌證見太陰無汗身涼傷寒在三陽經則身熱傳至太陰則熱入於裡身但微溫今言涼者蓋主直中言也本湯倍附子加乾薑二兩甘草三兩針隱白證見少陰有汗無熱太陰不言有汗少陰不言無汗當是互文本湯倍桂枝附子甘草針太谿若無此四證而但見少陽厥陰證者或六經證混淆者或支節攣痛麻木不仁者每本湯八兩加羌活四兩連翹六兩其證見少陽者灸絕骨見厥陰者刺大敦以引其熱按小續命湯乃麻黃桂枝之變方止可用於中血脈然亦不可輕用內熱熾者尤忌慎之金鑑以口眼喎斜肌膚麻木不仁為中絡形氣實者烏藥順氣散虛者大秦艽湯以喎斜癱瘓不遂為中經實者換骨丹虛者小續命湯黃耆五物湯按六經形證在傷寒以頭疼腦後巔頂項強背痛屬太陽以頭痛額前目痛鼻乾屬陽明頭痛兩太陽穴兩角脅痛嘔口苦寒熱往來屬少陽此皆以其經脈所行之部分言也若太陰之腹痛自利飲食不消腹脹噯氣身重黃腫亦是少陰之脈沉細但欲寐唾沫善恐奔豚骨痿脊腰兩股後廉內痛足下熱痛亦是厥陰之消渴氣上撞心等證閉癃遺尿疝小門痛面塵嘔逆亦是則皆以其經脈受邪之為病言之然三陰主裡病輒經臟相連病在經者有此證入臟者亦有此證何以別之曰三陰入臟則身無熱在經則身熱觀傷寒論三陰證以發熱為邪還於表可悟則但有身熱惡風寒而內無便溺阻隔及昏迷等證則可知為病在血脈之表而不在臟腑之裡矣抑又思之此皆以足經言耳豈手經獨無可言者乎考其經脈可知也再按六經形證可參下文中腑兼中臟條中腑者內有便溺之阻隔大小二便不通也不利於飲食者亦是三化湯或局方麻仁丸通利之金鑑實者三化湯虛者搜風順氣丸若外無六經之形證內無便溺之阻隔而但手足不能運動舌強不能語言乃血弱不能養筋故也大秦艽湯養血而筋自榮若內外證俱有先解表而後攻裡表裡邪既解當服愈風湯以行中道行中道猶雲和解久服大風盡去縱有微邪亦從愈風湯加減治之然治病之法不可失於通塞塞固不可太通利亦不可也或一氣之微汗十五日也或一旬十日也之微利內外分解使餘邪盡出也問此證既兼內傷何得數為汗下不顧虛虛耶曰虛者自虛實者自實不去其邪何以存正庸醫惟知溫補反訾古人亦可哂矣久之清濁自分營衛自和矣中臟者痰涎昏冒至寶丹活命金丹之類內有麝香入脾治肉牛黃入肝治筋龍腦入腎治骨中血脈中腑者不可用恐其通竅而引邪入筋骨不能出也金鑑實者牛黃清心丸虛者參附湯脫症見者倍參中腑多兼中臟如左關脈浮弦面目青左脅偏痛兩脅皆肝部位而左脅尤肝所居筋脈拘急肝主筋目瞤肝竅於目頭目眩肝火上衝手足不收坐㩉不得皆筋病也此中膽兼中心犀角散之類如左寸脈浮洪面赤汗多汗為心液心神顛倒舌強言語謇澀心脈上榮舌本忪悸恍惚此中小腸兼中心加味牛黃散之類如右關脈緩或浮大面唇黃汗多脾濕盛也身重怠惰嗜臥肌肉瞤動不仁脾主肌肉腹脹不食脾氣不運此中胃兼中脾也防風散之類如右寸脈浮澀而短鼻流清涕多喘肺氣上壅胸中冒悶胸中肺之部分也氣短聲嘶肺主聲音四肢痿弱肺熱則痿此中大腸兼中肺也五味子湯之類如左尺脈浮滑面目黧黑腰脊痛引小腹不能俯仰兩耳虛鳴骨節疼痛足痿善恐此中膀胱兼中腎獨活散之類按中臟必有痰涎昏冒卒倒等危證非只此等此等特用以分別其為何腑臟耳治風之法初得之當順氣順氣則可破氣瀉氣則不可及其久也當活血四物湯吞活絡丹即此義若不順氣徒用烏附又不活血徒用防風天麻羌活輩未見其能治也按中風必由於真氣虛則宜補氣以順之黃耆人參必用之藥氣虛而逆沖則宜降氣以順之沉香之屬氣虛而滯則宜宣導以順之木香陳皮之屬皆所謂順也氣熱則涼之氣寒則溫之亦為順熱則血枯澀寒則血凝滯或滋潤以活之或溫行以活之皆所謂活也此證未有不因真氣不周而病者故黃耆為必用之君藥防風為必用之臣藥黃耆助真氣者也防風載黃耆助真氣以周於身者也亦能發散風邪許胤宗治王太后中風口噤煎二藥熏之而愈況服之乎多怒則加羚羊角渴加葛根汁秦艽口噤口喎亦加秦艽恍惚錯語加茯神遠志不得睡加酸棗仁內熱加梨汁人乳生地黃汁痰多加竹瀝荊瀝少佐以薑汁治此證用諸汁最妙以其行經絡滲分肉捷於諸藥也以上所論乃內傷而兼外風者也蓋內傷氣血虧敗日久有所觸則隨觸而發故一遇外感風寒而卒然倒僕顯出如許危證知非一朝一夕之故矣內風證內傷虧敗日久極則必發不必有所感觸也久病或產後多有暴脫之症深居密室豈有外感哉劉河間則主乎火謂熱甚生風非肝木之風如雲不必泥定肝風耳亦非外感之風由將息失宜五志過極心火暴盛腎水虛衰不能制之熱氣鬱怫心神昏冒故卒倒無知病微則但僵仆氣血流通筋脈不攣發過如故重則氣血鬱結不通陰氣暴絕陽氣後竭而死其說甚是然既曰火盛由於火虛則當用六味乃反用地黃飲子熱劑者以火發而陽暴脫也若腎火未虛者只以降心火為主清心湯瀉心湯大劑與之俟心火既降次以防風通聖散汗之內火亦用汗散者蓋火雖已降而浮盛於表者未散故汗之使外越也或大便門塞者三化湯下之內外火邪已盡以羌活愈風湯調之宣其氣血導其經絡通痰滯也若腎水虛虧命門真火挾肝風上衝者大劑六味地黃丸料見虛損煎服若竟至陽脫宜先用參附大劑峻補其陽而後實其陰繼以生脈散見中暑滋其化源東垣則主乎氣謂人身之陽氣以天地之疾風名之中風證非外來之風此本氣衰也四旬氣衰之後或再傷其氣七情勞役房事飲食皆足傷之多有此證壯時無有也肥盛者間亦有之亦形盛氣衰而然耳此證非大劑參耆何以挽回若不僕但舌強語謇痰壅支體不遂六君子見氣加諸汁治之此為氣虛內奪之證蓋虛弱之人多有卒然昏眩而倒者與下中氣篇氣逆者下同丹溪則主於痰謂土濕生痰痰鬱成熱極生風問內風亦有中血脈中腑臟之分乎曰病自內發未有不傷其腑臟者由於火盛則火發而血與痰壅矣由於氣虛則氣滯而血與痰凝矣痰血壅滯食亦不化填塞於腑則二便不通阻礙臟氣則昏迷不醒其重者也輕者中後邪散布經絡而血脈之行不利固有之矣豈必兼外風乃然哉至於下文所舉各症亦多內傷所致不必兼涉外感也口噤即牙關不開也由氣血凝結於牙關筋脈不能活動以蘇合丸或生南星冰片烏梅肉為末擦牙或以鬱金藜蘆末搐鼻或針人中頰車各四分或白礬半兩鹽花一分細研擦點牙根下更以綿裹半錢匕安牙盡頭用甘草比中指節截作五截生油內浸過炭火上炙候油入甘草斡開牙關令咬定甘草如人行十里許時又換一截後灌藥極效口眼喎斜胃經細筋為目下綱膀胱經細筋為目上綱膽經脈起於目銳眥其筋亦結焉小腸三焦筋脈俱至目銳眥又胃經大腸經脈俱挾唇口左右風寒之邪視諸經筋脈之虛而中之左虛則左受寒筋脈急引而喎斜右虛反此以清陽湯秦艽升麻湯散之內有熱者宜加辛涼患處宜灸目斜灸承泣承泣禁灸再考口喎灸地倉不效更灸人迎頰車若純是內風火邪而喎斜者則為熱灼筋枯短縮與寒而收引者相反不可灸亦不可用溫散之藥須苦寒降火有用承氣湯見大便不通下之而愈者是也通用牽正散白附子辛熱專去頭面之風內火盛者宜加清涼之品殭蠶全蠍二味去風破結痰痰結筋脈間非去痰筋不舒等分為末每二錢酒調服外搗萆麻子一兩冰片三分為膏寒月加乾薑附子各一錢右喎貼左左喎貼右舊謂左寒則右熱左熱則右寒此為內有熱而外感寒者言若止外寒而內不熱或止內熱而外無寒則左寒者不必右熱左熱者不必右寒也大抵純是內風而熱不甚者必無此證熱甚者乃有之然喎斜不甚以火即暴甚不至遽枯其根也若兼外感風寒則甚矣以寒熱相激其勢愈暴也純感風寒者亦甚以寒之收引易也然亦必虛人乃有之凡遇旋風而喎斜者皆虛人也半身不遂經云胃脈沉鼓澀胃外鼓大外鼓猶雲浮而鼓指心脈小堅堅即實也急急即緊也皆偏枯男子發左女子發右不喑舌轉可治以其病止在血脈未及臟腑也蓋胃與脾為表裡更實更虛更迭也胃陽虛則脾陰盛而胃從於脾故胃脈沉鼓澀也澀為多血少氣氣少故血雖多而不流走也胃陽盛則脾陰虛而脾從於胃故胃脈鼓大於臂外也大為多氣少血氣多故血雖少而脈亦大然必大而兼虛心之元陽不足陰寒乘之故脈小堅急者者陽不足也堅急者陰寒之邪也心胃脾三等脈凡有其一即為偏枯者何也蓋心之神無處不周者也胃之氣無處不行者也神行氣流充足盈溢何有於病若神氣受傷則運行不能周遍而筋脈偏枯矣所謂未有不因真氣不周而病者也然豈特心胃為然哉五臟六腑凡有一不周皆足以致偏枯固可推耳丹溪謂左半多屬死血與血虛四物等補血之劑右半多屬氣虛與痰四君等補氣之劑並加竹瀝薑汁以行痰是大概如此不可泥古方順風勻氣散虎骨散虎脛骨酒黃耆酒可選用外用蠶沙兩石分三袋蒸熱一袋著患處冷則再換一袋羊肚釀粳米蔥白薑椒豉等煮爛日食一具十日止失音不語經謂內奪精血虧敗亡失如被人奪去者然而厥逆而上行名厥火氣上衝也則為音痱此腎虛也腎水虛故火上炎少陰腎脈不至者不至謂不能上通也即腎水不上潤意厥也腎脈不至於上則不得循喉嚨挾舌本故不能言也地黃飲子六味八味等六八味見虛損主之或用竹瀝荊瀝去痰梨汁去熱各三杯生葛汁去熱人乳汁潤燥各二杯陳醬汁半杯和勻隔湯頓溫服舌為心之苗痰火盛則心脈乾燥拘急故舌強而不能言又痰迷心竅則心脈不用故不能掉舌且神昏不能語也有痰者滌痰湯內熱者涼膈散見發熱加石菖蒲遠志以通心竅也為末煉蜜丸彈子大硃砂為衣每服一丸薄荷湯化下名轉舌膏或寶鑑訶子湯見喑正舌散茯神散外用龜尿點舌神效置龜新荷葉上豬鬃戮其鼻立出語澀有舌縱舌麻皆以痰火治之烏藥殭蠶膽星芩連枳殼防風竹瀝薑汁痰盛者橘紅一斤逆流水五碗煮數滾去橘紅再煮至一碗頓服白湯導之後又飲白湯以手探喉導令吐也吐痰之聖藥也中後氣未盡順痰未盡除當以藿香正氣散和星香散煎服中氣中惡霍亂尤宜之中後體虛有痰四君子見氣和星香散或六君子見氣養正丹見氣墜痰鎮氣氣實者以星香散吞之氣虛者六君子湯吞之四肢不舉實者脾濕盛令筋脈緩軟宜去濕虛者脾燥熱壯火食氣無氣以動十全大補湯見虛損加減去邪留正身體疼痛風寒濕三氣留滯經脈故不通而痛鐵彈丸十味銼散有熱藥無熱者宜之蠲痹湯見痹昏冒活命金丹至寶丹至聖保命金丹牛黃清心丸小便不通三因白散子加木通燈心茅根煎熱盛去附子潔古云如自汗津液外亡小便自少不可利之使營衛枯竭無以制火當退熱止汗小便自利遺尿濃煎參耆湯少加益智子頻啜之多食火盛則脾陰虛而燥故能消食當瀉火脾陰復則食減是其驗也舊謂脾虛則求助於食經云實則夢與虛則夢取即其義也亦通食以養血故脾陰虛則思食然食而能消則有火也中風須分陰陽氣虛者多寒火盛者多熱陰中面色青白手足厥冷多汗風火內生亦有轉為寒症者蓋風火發越汗出過多陽隨外泄症轉陰寒固有之矣昔人謂中風之痰始為熱痰後為寒痰亦此意也陽中面赤如醉怒目上視強直掉眩經云掉眩支痛強直筋縮為厥陰風木之氣木旺生火風火屬陽多為兼化皆熱氣也又風能勝濕而為乾燥風病勢甚因而筋縮強直燥熱之甚也寶鑑云凡人初覺大指次指次指麻木不仁或不用者三年內必中風肺脈終大指大腸脈起食指金病則皮毛不固易於受風也宜先服愈風湯天麻丸各一料以預防之薛立齋云預防之理當養氣血節飲食戒七情遠房幃若服前藥以預防適所以招風取中也乾坤生意云凡人手足漸覺不遂麻痹不仁或口眼喎斜此皆經絡之病易中外風語言謇滯或胸膈迷悶吐痰相續此痰火之病易中內風六脈弦滑而無力其去卒厥仆倒亦不遠矣須防之有婦人先胸脅脹痛肝血虛肝火盛而鬱也後四肢不收血虛不能養筋也自汗如雨肝熱津泄小便自遺肝熱陰挺疏泄不藏大便不實火蒸脾土濕動口緊目瞤筋脈收引飲食頗進臟腑未傷十餘日或以為中臟立齋曰非也若風中臟真氣既脫指汗遺言惡症既見禍在反掌安能延至十日中風陡然而發亦無先見胸脅之證視其色則青赤木火之色診其脈洪數而肝尤甚乃用犀角散四劑頓愈又用加味逍遙散見郁調之後因鬱怒復作兼發熱嘔吐月經不止飲食少思乃木剋土脾不攝血也用加味歸脾佐以逍遙散而愈又有人素無疾苦忽如死人身不動目閉不開口噤不言惡聞人聲狀如冒眩移時方寤此由出汗過多血少陽氣鬱胃於上不行所致移時氣下而寤名曰郁胃白薇湯倉公散引此二證以為辨證之法中寒其證卒然仆倒身體強直口噤不語或四肢戰掉厥逆身冷無汗醒後惡寒或發熱或不發熱脈沉細弦緊腹痛此與傷寒論寒邪直中三陰經同理但彼不至卒倒之甚耳治之先用酒調蘇合香丸次用五積散加香附一錢麝香少許重則用姜附湯若人漸蘇身體回暖稍能言語問其別有何證寒脈遲緊挾氣帶洪攻刺作痛附子理中湯加木香五分挾風帶浮眩暈加防風一錢挾濕帶濡腫滿疼痛加白朮一錢筋脈牽急加木瓜一錢肢節疼痛加桂一錢亦可灸丹田穴以多為妙大抵中在皮膚則為浮浮腫也觀凍瘡之腫可見中在肉則為苛為腫為聚液血液不行分裂而痛或痛在四肢或痛在胸脅或痛在脛背或痛在小腹引睪大抵初時周身受寒後則並走一處蓋視其虛而入之也或經絡引注臟腑之膜原為心腹痛或注連於臟腑則痛死不知人中於筋骨為筋攣骨痛屈伸不利中入腑臟則死矣治當察微甚甚則附子理中湯無汗加麻黃細辛嘔吐加丁香吳茱萸陰毒加生川烏脈微欲絕加人參微則不換金正氣散加附子五積散臍腹痛唇白甲青四肢厥附子理中湯姜附湯入肝加木瓜入肺加桑白皮入脾加白朮入心加茯苓麝香半夏皂角各二錢半為末填臍中生薑切片蓋之艾灸至手足溫為度或灸丹田穴因房事致手足冷腹絞痛者亦然凍倒人不得近火近火即逼寒氣入心而死矣北方之人手足凍僵若湯浴火炙則肢節脫落須緩緩搓之俟其回暖或反以雪搓之引出寒氣氣舒暖回乃愈即其理也僵凍成冰堅凝不解以火遽逼則先融者與未融者解離不接故脫落也又水流濕火就燥皮膚之寒為內陽所拒原欲外出而苦於無所引以雪搓之則以寒就寒而外附於是內陽得伸而暖回也中暑或名暑風以與中風相似也其證卒然悶倒汗多先出之汗多熱後出之汗多冷面垢汗多則面油膩昏不知人手足微冷或吐或瀉或喘或滿多於田間路上烈日中得之以來復丹末同蘇合香丸見諸中用湯調灌或單用來復丹調灌或卻暑散水調灌亦得如倉卒無藥急研蒜水以灌之蓋中暑毒陽外陰內陽氣隨汗大泄在內之血液痰食無氣以溫皆變寒凝故諸暑藥多用熱劑如大順散之用薑桂枇杷散之用丁香是也大蒜辛暖暖取其回陽辛取其通竅散結陰寒凝結痰涎阻滯則關竅不通也又蒜氣臭烈能通諸竅大概極香極臭之物皆能通竅也候稍蘇繼以益元散見傷暑氣實者蒼朮白虎湯氣虛者人參白虎湯並見發熱熱死人切勿便與冷水恐熱血得冷而凝結也及臥冷地正如凍死人不得遽近火也故凡行路暍死者惟得置日中熱地上令人溺熱土取罨其臍或令近火以熱湯灌之或布蘸熱湯更易熨其心腹臍下以引熱外出也觀湯火傷者誤以冷水洗之即激火內攻可見急以二氣丹湯灌之一方用不蛀皂角刮去黑皮燒煙欲盡盆合地上周圍令勿透煙每用皂角灰一兩甘草末六錢和勻每服一錢溫漿水調下昏迷不醒者不過兩服蓋中暑人痰塞關竅皂角能疏利去痰也又有暑迷一證似中而輕但昏迷耳未至悶倒欲睡懶語暑氣乘心煩悶所致壯人香薷飲加黃連一錢虛人星香散見中風加香薷一錢醒後冷汗不止手足尚逆煩悶多渴者香薷飲若過投冷劑致吐利不止外熱內寒煩躁多渴內寒何以渴汗出津竭也甚欲裸形此陰盛格陽宜溫藥香薷飲加附子浸冷服渴者縮脾飲加附子亦浸冷服詳傷暑門中濕得之冒雨臥濕嵐瘴熏蒸外感濕氣內濕即丹溪所謂濕熱生痰已見中風門積滯日久關節重痛浮腫喘滿腹脹煩悶卒然昏倒其脈必沉而緩或沉而細宜除濕湯白朮酒此必積久乃然然見此者亦鮮矣有破傷處因澡浴濕氣從瘡口中入其人昏迷沉重狀似中濕名曰破傷濕白朮酒問此證所受濕氣無幾何以致是曰氣血流行不容少有阻滯濕入不論多少但能阻礙正氣則鬱滯不行由是逆入攻心則昏迷沉重矣余詳傷濕門中氣此為氣逆與中風門東垣所論氣虛卒倒證各別其證卒然仆倒不省人事牙關緊急身支冷中風則身支溫與此異無痰涎即有亦不如中風之多氣滯於內不外達故身冷氣結於中故痰不上出因七情動氣因怒者尤多結塞於中上下不通故卒死也其脈沉應氣口中風則脈浮而應人迎與此異中氣甚類中風以氣藥治風則可以風藥治氣則不可風藥指續命等言蓋發散之劑也嫌其散氣若指清心瀉心等寒劑言則中氣原非火證亦不應用寒涼矣三方並見中風以蘇合香丸見諸中灌之候蘇虛人繼以八味順氣散加香附三五錢壯人繼以木香調氣散內有痰未除前言無痰非無痰也特不壅出於喉口間耳四七湯見氣星香散見中風若其人本虛痰氣結滯關隔不通上下不得升降或大便虛秘三和丹有不治而氣復自蘇者經日無故而喑脈不至者雖不治自已為氣暴逆也氣復自愈中食其證卒倒無知口不能言四肢厥逆不能舉狀似中風因飲食過度醉飽之後或感風寒或著氣惱以致氣血鬱滯飲食無以運化填塞胸中陰陽痞隔升降不通若誤作中風中氣而以驅風行氣之藥治之其死可立而待胃氣已受傷不堪再為行散也凡遇此等卒暴之病必須審問曾否醉飽過度有此加以氣口脈緊盛且作食滯治之先煎鹽湯探吐其食挾痰者瓜蒂散見傷飲食吐之醒後察審如挾有風寒之證以藿香正氣散見中風解之如挾氣滯者以八味順氣散見中氣調之若別無他證只用平胃散見傷飲食加白朮半夏曲糵之類調理中惡附鬼擊屍疰其證卒然仆倒口噤肢冷肌膚粟起頭面青黑昏不知人參後精神不守錯言妄語由冒犯不正之氣吊死問喪入廟登塚多有此證蘇合香丸見諸中灌之候蘇以調氣散和平胃散服名調氣平胃散平胃散內有蒼朮可以辟邪飛屍鬼擊等邪證附後此多由精神衰虛遂為邪鬼所擊或附著於體昏昏沉沉妄言譫語或評露人事或言未來禍福多中人有起心即能知之登高涉險如履平地或悲泣呻吟不欲見人此為鬼物所憑者也舊有五屍之說一曰飛屍發無由漸昏然而至屍即鬼物其人心腹刺痛氣息喘急脹滿一曰遁屍停遁在人肌肉血脈間觸即發動證與前同瘥後復發一曰沉屍發時亦心腹絞痛脹滿喘急雖歇之後猶沉錮在人臟腑一曰風屍在人四肢循環經絡其狀冷躍去來沉沉默默不知痛處衝風則發一曰伏屍隱伏五臟積年不除未發如無病人發則心腹刺痛脹滿喘急又諸屍疰乃死屍傳注之氣如傳屍癆蟲之屬流注身體令人寒熱淋漓腹痛脹滿喘急或磥磈踴起或攣引腰脊或舉身沉重精神昏謬每節氣改變輒至大惡積年累月漸至頓滯而死死後復易旁人乃至滅門以上皆用忍冬藤葉銼數斤煮濃汁日三服瘥太乙精神丹蘇合香丸最妙喻嘉言治祟方用犀角羚羊角龍齒虎威骨鹿角霜牡蠣粉人參黃耆等藥為末羊肉半斤煎濃汁調作一次服立效蓋祟附於身與人之神氣交持原逼處不安但無隙可出故用諸多靈物之遺形引以羊肉之羶俾邪祟轉附骨角移從大便而出也說甚有理
